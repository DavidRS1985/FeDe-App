        font-family: 'Inter', system-ui, sans-serif !important;
    }
    #main-tabs .tab {
        font: var(--fede-caption) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        background: transparent !important;
        border: none !important;
        border-top: 2px solid transparent !important;
        border-radius: 0 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
        box-shadow: none !important;
        transition: color 0.15s, border-color 0.15s !important;
    }
    #main-tabs .tab.active {
        color: var(--fede-on-surface) !important;
        border-top-color: var(--fede-on-surface) !important;
        background: transparent !important;
    }


    /* ── HISTORIAL — FILTER CHIPS ───────────────────────────────────────────── */
    .fede-filter-chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        border-radius: var(--fede-r-pill);
        font: var(--fede-caption);
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        touch-action: manipulation;
        border: 1.5px solid var(--fede-border);
        background: transparent;
        color: var(--fede-on-surface-2);
        transition: background 0.1s, color 0.1s, border-color 0.1s;
        flex-shrink: 0;
    }
    .fede-filter-chip.active {
        background: var(--fede-on-surface);
        color: var(--fede-bg);
        border-color: var(--fede-on-surface);
    }
    /* Chips por modo (color semántico cuando no están activos pero están seleccionados) */
    .fede-chip-pedido.active    { background: var(--fede-accent-pedido);    border-color: var(--fede-accent-pedido);    color: var(--fede-on-accent); }
    .fede-chip-stock.active     { background: var(--fede-accent-stock);     border-color: var(--fede-accent-stock);     color: var(--fede-on-accent); }
    .fede-chip-recepcion.active { background: var(--fede-accent-recepcion); border-color: var(--fede-accent-recepcion); color: var(--fede-on-accent); }
    .fede-chip-merma.active     { background: var(--fede-accent-merma);     border-color: var(--fede-accent-merma);     color: var(--fede-on-accent); }

    /* ── DASHBOARD — KPI CARDS ──────────────────────────────────────────────── */
    .fede-kpi-card {
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-lg);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-family: 'Inter', system-ui, sans-serif;
    }
    .fede-kpi-icon-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
    }
    .fede-kpi-icon { width: 14px; height: 14px; color: var(--fede-on-surface-3); flex-shrink: 0; }
    .fede-kpi-label {
        font: var(--fede-caption);
        font-weight: 600;
        color: var(--fede-on-surface-3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .fede-kpi-value {
        font-size: 36px;
        font-weight: 700;
        line-height: 1;
        color: var(--fede-on-surface);
        font-variant-numeric: tabular-nums;
        letter-spacing: -1px;
    }
    .fede-kpi-sub {
        font: var(--fede-caption);
        color: var(--fede-on-surface-3);
        margin-top: 4px;
    }

    /* Dashboard recent-cats: section chips */
    #dash-recent-cats {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 2px 0 8px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }
    #dash-recent-cats::-webkit-scrollbar { display: none; }
    .dash-sec-chip {
        display: inline-flex;
        flex-direction: column;
        gap: 3px;
        padding: 10px 14px;
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-md);
        font-family: 'Inter', system-ui, sans-serif;
        min-width: 110px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .dash-sec-chip-name { font-size: 13px; font-weight: 600; color: var(--fede-on-surface); }
    .dash-sec-chip-time { font-size: 11px; font-weight: 500; color: var(--fede-on-surface-3); }

    /* Celdas del heatmap calendar */
    #dash-calendar .cal-day {
        aspect-ratio: 1;
        border-radius: 6px;
        background: var(--fede-surface-sunken);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--fede-on-surface-3);
        cursor: pointer;
        transition: opacity 0.1s, transform 0.1s;
        gap: 2px;
        user-select: none;
        -webkit-user-select: none;
    }
    #dash-calendar .cal-day:active { transform: scale(0.88); opacity: 0.7; }
    #dash-calendar .cal-day.today {
        background: var(--fede-on-surface);
        color: var(--fede-surface);
        font-weight: 700;
    }
    #dash-calendar .cal-day.has-activity:not(.today) {
        background: color-mix(in srgb, var(--fede-info) 12%, var(--fede-surface));
        color: var(--fede-on-surface);
        font-weight: 600;
    }
    .cal-day-dots {
        display: flex;
        gap: 2px;
        justify-content: center;
        align-items: center;
    }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .cal-dot-pedido    { background: var(--fede-accent-pedido); }
    .cal-dot-stock     { background: var(--fede-accent-stock); }
    .cal-dot-recepcion { background: var(--fede-accent-recepcion); }
    .cal-dot-merma     { background: var(--fede-accent-merma); }
    /* Dots sobre el fondo oscuro de "hoy" — forzar alta visibilidad */
    .cal-day.today .cal-dot { opacity: 0.9; filter: brightness(1.3); }

    /* Google Calendar event cards */
    .cal-event-card {
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-md);
        padding: 12px 14px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        font-family: 'Inter', system-ui, sans-serif;
    }
    .cal-event-card.cal-event-today { border-left: 3px solid var(--fede-info); }
    .cal-event-icon {
        width: 32px; height: 32px;
        background: color-mix(in srgb, var(--fede-info) 10%, transparent);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .cal-event-icon i { width: 14px; height: 14px; color: var(--fede-info); }
    .cal-event-body { flex: 1; min-width: 0; }
    .cal-event-time {
        font-size: 11px; font-weight: 600;
        color: var(--fede-on-surface-3);
        text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px;
    }
    .cal-event-title { font-size: 14px; font-weight: 600; color: var(--fede-on-surface); line-height: 1.3; }

    /* ── HOME BUTTONS — neutralizar McFetridge global button override ────────
       La regla McF "button:not(.x)×9" tiene especificidad (0,9,0,1).
       "#home-content button" tiene (1,0,0,1) → el ID siempre gana.  ──────── */

    /* Base — todos los <button> dentro del home */
    #home-content button {
        background: var(--fede-surface) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-md) !important;
        color: var(--fede-on-surface) !important;
        font: var(--fede-label) !important;
        font-weight: 600 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        padding: 11px 12px !important;
        box-shadow: none !important;
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        cursor: pointer !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        touch-action: manipulation !important;
    }
    #home-content button:active {
        background: var(--fede-surface-sunken) !important;
        transform: none !important;
        box-shadow: none !important;
        color: var(--fede-on-surface) !important;
    }

    /* Icon buttons (settings, fullscreen) — top bar */
    button#btn-home-settings,
    button#btn-home-fullscreen {
        width: 36px !important;
        height: 36px !important;
        padding: 0 !important;
        border-radius: var(--fede-r-sm) !important;
        display: inline-flex !important;
        justify-content: center !important;
        gap: 0 !important;
    }

    /* Dashboard + Historial — ya heredan el base, solo afinar */
    button#btn-home-dashboard,
    button#btn-home-historial {
        padding: 11px 12px !important;
    }

    /* Nueva reserva — ancho completo, borde punteado */
    button#btn-nueva-reserva {
        width: 100% !important;
        justify-content: center !important;
        border: 1px dashed var(--fede-border) !important;
        padding: 12px !important;
        color: var(--fede-on-surface-2) !important;
    }

    /* Realizar pedido CTA — azul pedido, full width, funciona en light y dark */
    button#btn-realizar-pedido {
        background: var(--fede-accent-pedido) !important;
        border: none !important;
        border-radius: var(--fede-r-lg) !important;
        padding: 16px !important;
        width: 100% !important;
        justify-content: space-between !important;
        color: #fff !important;
    }
    button#btn-realizar-pedido:active {
        background: #1d4ed8 !important;
        color: #fff !important;
    }

    /* Draft banner — Reanudar (warning orange) */
    button#btn-reanudar-draft {
        background: var(--fede-warning) !important;
        border: none !important;
        border-radius: var(--fede-r-sm) !important;
        padding: 7px 14px !important;
        color: #fff !important;
    }

    /* Draft banner — Descartar (ghost) */
    button#btn-descartar-draft {
        background: transparent !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        padding: 7px 14px !important;
        color: var(--fede-on-surface-2) !important;
    }

    /* ── DARK MODE — Elevación de superficies interactivas ─────────────────── */
    /* Light: bg=#f4f5f7 vs surface=#fff → 27 units contrast. Dark: #0f1217 vs #181c24 → 9 units.
       Compensamos con una inset highlight y sombra suave para que los botones se lean. */
    [data-theme="dark"] #home-content .fede-action-card {
        border-color: rgba(255,255,255,0.09) !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.45) !important;
    }
    [data-theme="dark"] #home-content .fede-action-card:active {
        box-shadow: none !important;
    }
    [data-theme="dark"] #home-content button:not(#btn-smart-generate):not(#btn-realizar-pedido):not(#btn-reanudar-draft):not(#btn-descartar-draft):not(#btn-no-ahora) {
        border-color: rgba(255,255,255,0.08) !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 1px 3px rgba(0,0,0,0.35) !important;
    }
    [data-theme="dark"] #home-content button:not(#btn-smart-generate):not(#btn-realizar-pedido):not(#btn-reanudar-draft):not(#btn-descartar-draft):not(#btn-no-ahora):active {
        box-shadow: none !important;
    }

    /* ── LOADER BACKGROUND (reset var(--mcf-bg) legacy) ────────────────────── */
    #loader {
        background: var(--fede-bg) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
    }

    /* ── VIEWS — reset backgrounds legacy var(--mcf-bg) en todas las views ─── */
    body.theme-mcf .view {
        background: transparent !important;
        display: none !important; /* Restore core navigation visibility logic */
    }
    body.theme-mcf .view.active {
        display: flex !important;
        flex-direction: column !important;
    }

    /* Views FeDe v2 — fondo correcto */
    body.theme-mcf #view-historial,
    body.theme-mcf #view-dashboard,
    body.theme-mcf #view-datos {
        background: var(--fede-bg) !important;
    }

    /* Relevamiento — fede-bg en vez de mcf-bg */
    body.theme-mcf #view-relevamiento.active {
        background: var(--fede-bg) !important;
    }

    /* ── HOME CONTENT — reset paddings legacy que recortaban el layout ─────── */
    /* Necesitamos la misma especificidad que la regla en línea ~3315:
       body.theme-mcf #home-content { padding: 0 20px 100px 16px !important }
       Para ganarle en la cascada usamos el mismo selector */
    #home-content {
        padding: 0 !important;
        background: var(--fede-bg) !important;
    }
    body.theme-mcf #home-content {
        padding: 0 !important;
        background: var(--fede-bg) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
    }

    /* ── .view.scroll.active — layout y scroll para vistas secundarias ─────── */
    body.theme-mcf .view.scroll.active,
    body.theme-mcf #view-datos.active {
        padding: 0 !important;
        overflow-y: auto !important;
        flex-direction: column !important;
        min-height: calc(100vh - var(--mcf-tab-height, 70px)) !important;
        -webkit-overflow-scrolling: touch !important;
    }

    /* ── HOME ALERTS CARD (Reset CSS viejo + remap tokens FeDe v2) ────────── */

    /* Reset del contenedor — elimina el border-left amber y bg mcf-paper legacy */
    #home-alerts-card {
        width: 100% !important;
        box-sizing: border-box !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 1px solid var(--fede-border) !important;
        border-left: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-lg) !important;
        background: var(--fede-surface) !important;
        overflow: visible !important;
        display: block !important;
        height: auto !important;

        /* Remap de tokens --mcf-* para que el HTML inyectado por JS
           resuelva a colores FeDe v2 sin modificar app.html */
        --mcf-ink:      var(--fede-on-surface);
        --mcf-bg:       var(--fede-surface);
        --mcf-paper:    var(--fede-surface);
        --mcf-amber:    var(--fede-warning);
        --mcf-amber-lt: #fffbeb;
        --mcf-border:   var(--fede-border);
        --mcf-muted:    var(--fede-on-surface-3);
        --mcf-rose:     var(--fede-danger);
        --mcf-slate:    var(--fede-info);
        --mcf-sage:     var(--fede-success);
    }

    /* ── SETTINGS / AJUSTES (Fase 6) ───────────────────────────────────────── */

    #view-datos {
        background: var(--fede-bg) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
    }

    .fede-settings-card {
        background: var(--fede-surface) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-lg) !important;
        padding: 18px !important;
        box-shadow: none !important;
    }

    .fede-settings-section-title {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        font: var(--fede-label) !important;
        font-weight: 700 !important;
        color: var(--fede-on-surface) !important;
        margin-bottom: 16px !important;
        padding-bottom: 12px !important;
        border-bottom: 1px solid var(--fede-divider) !important;
        text-transform: none !important;
        letter-spacing: normal !important;
    }

    .fede-settings-label {
        display: block !important;
        font: var(--fede-caption) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        margin-bottom: 6px !important;
    }

    .fede-settings-input {
        width: 100% !important;
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        padding: 11px 14px !important;
        font: var(--fede-body) !important;
        font-weight: 500 !important;
        color: var(--fede-on-surface) !important;
        outline: none !important;
        text-transform: none !important;
        box-shadow: none !important;
        transition: border-color 0.15s ease, background 0.15s ease !important;
    }

    .fede-settings-input:focus {
        border-color: var(--fede-on-surface-2) !important;
        background: var(--fede-surface) !important;
    }

    /* ── DARK / LIGHT MODE TOGGLE ───────────────────────────────────────────── */
    .fede-scheme-row {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 6px 0 !important;
        cursor: pointer !important;
        user-select: none !important;
        gap: 12px !important;
        -webkit-tap-highlight-color: transparent !important;
    }

    .fede-scheme-left {
        display: flex !important;
        align-items: center !important;
        gap: 12px !important;
        flex: 1 !important;
        min-width: 0 !important;
    }

    .fede-scheme-icon-wrap {
        width: 40px !important;
        height: 40px !important;
        border-radius: var(--fede-r-sm) !important;
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        flex-shrink: 0 !important;
        transition: background 0.2s !important;
    }

    .fede-scheme-text-label {
        font: var(--fede-caption) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
    }

    .fede-scheme-value {
        font: var(--fede-label) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface) !important;
        margin-top: 2px !important;
    }

    /* Switch pill */
    .fede-toggle-switch {
        position: relative !important;
        width: 52px !important;
        height: 30px !important;
        border-radius: 15px !important;
        background: var(--fede-border) !important;
        transition: background 0.25s ease !important;
        flex-shrink: 0 !important;
    }
    .fede-toggle-switch.on {
        background: var(--fede-on-surface) !important;
    }
    .fede-toggle-thumb {
        position: absolute !important;
        top: 3px !important;
        left: 3px !important;
        width: 24px !important;
        height: 24px !important;
        border-radius: 50% !important;
        background: #ffffff !important;
        box-shadow: 0 1px 4px rgba(0,0,0,0.25) !important;
        transition: transform 0.25s cubic-bezier(0.16,1,0.3,1) !important;
    }
    .fede-toggle-switch.on .fede-toggle-thumb {
        transform: translateX(22px) !important;
    }

    /* Botón acción principal */
    .fede-settings-action-btn {
        width: 100% !important;
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        padding: 13px !important;
        font: var(--fede-label) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface) !important;
        cursor: pointer !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        transition: background 0.15s ease, border-color 0.15s ease !important;
        box-shadow: none !important;
        text-transform: none !important;
    }

    .fede-settings-action-btn:active {
        background: var(--fede-border) !important;
    }

    /* Botón + añadir categoría */
    .fede-settings-add-btn {
        width: 44px !important;
        height: 44px !important;
        flex-shrink: 0 !important;
        background: var(--fede-on-surface) !important;
        border: none !important;
        border-radius: var(--fede-r-sm) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        cursor: pointer !important;
        color: var(--fede-surface) !important;
        transition: opacity 0.15s ease !important;
        box-shadow: none !important;
    }

    .fede-settings-add-btn:active {
        opacity: 0.7 !important;
    }

    /* Day chips (generados por JS con clase fede-day-chip) */
    #cfg-order-days .fede-day-chip,
    #cfg-order-days .mcf-set-day-chip {
        padding: 7px 14px !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-pill) !important;
        font: var(--fede-caption) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        background: var(--fede-surface-sunken) !important;
        box-shadow: none !important;
        cursor: pointer !important;
        transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
    }

    #cfg-order-days .fede-day-chip.active,
    #cfg-order-days .mcf-set-day-chip.active {
        background: var(--fede-on-surface) !important;
        color: var(--fede-surface) !important;
        border-color: var(--fede-on-surface) !important;
        transform: none !important;
    }

    /* ── CATEGORY TREE — Settings (Redesigned) ────────────────────────────── */

    /* Search within tree */
    .tree-search-box {
        position: relative;
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }
    .tree-search-icon {
        position: absolute;
        left: 12px;
        width: 15px !important;
        height: 15px !important;
        color: var(--fede-on-surface-3);
        pointer-events: none;
    }
    .tree-search-input {
        width: 100%;
        height: 40px;
        padding: 0 36px 0 36px;
        background: var(--fede-surface-sunken);
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-sm);
        font: var(--fede-body);
        color: var(--fede-on-surface);
        outline: none;
        box-sizing: border-box;
    }
    .tree-search-input:focus {
        border-color: var(--fede-on-surface-2);
        background: var(--fede-surface);
    }
    .tree-search-clear {
        position: absolute;
        right: 8px;
        width: 28px;
        height: 28px;
        border: none;
        background: none;
        color: var(--fede-on-surface-3);
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .tree-search-clear:active { background: var(--fede-surface-sunken); }

    /* Add category row */
    .tree-add-cat-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
    }

    /* Stats bar */
    .tree-stats-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 4px;
        font: var(--fede-caption);
        font-weight: 700;
        color: var(--fede-on-surface-3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .tree-stats-dot { font-size: 8px; }

    #tree-cats .tree-node {
        border: 1px solid var(--fede-divider) !important;
        border-radius: var(--fede-r-sm) !important;
        margin-bottom: 6px !important;
        overflow: hidden !important;
        box-shadow: none !important;
    }

    #tree-cats .tree-row {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        background: var(--fede-surface-sunken) !important;
        padding: 10px 12px !important;
        border-bottom: 1px solid var(--fede-divider) !important;
        box-shadow: none !important;
        cursor: pointer !important;
        min-height: 44px !important;
        user-select: none !important;
    }

    /* Chevron icon */
    .tree-chevron {
        width: 16px !important;
        height: 16px !important;
        color: var(--fede-on-surface-3) !important;
        flex-shrink: 0 !important;
        transition: transform 0.15s ease !important;
    }

    /* Category icon */
    .tree-cat-icon {
        width: 17px !important;
        height: 17px !important;
        color: var(--fede-on-surface-2) !important;
        flex-shrink: 0 !important;
    }

    #tree-cats .tree-label {
        flex: 1 !important;
        font: var(--fede-label) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface) !important;
        min-width: 0 !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        white-space: nowrap !important;
    }

    /* Product count badge */
    .tree-count-badge {
        font: var(--fede-caption) !important;
        font-weight: 700 !important;
        color: var(--fede-on-surface-3) !important;
        background: var(--fede-surface) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-pill) !important;
        padding: 2px 8px !important;
        min-width: 24px !important;
        text-align: center !important;
        flex-shrink: 0 !important;
    }

    /* Action buttons (edit, delete) */
    .tree-action-btn {
        width: 32px !important;
        height: 32px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        background: none !important;
        border: 1px solid transparent !important;
        border-radius: var(--fede-r-sm) !important;
        cursor: pointer !important;
        color: var(--fede-on-surface-3) !important;
        flex-shrink: 0 !important;
        padding: 0 !important;
        transition: all 0.12s ease !important;
    }
    .tree-action-btn:hover {
        background: var(--fede-surface) !important;
        border-color: var(--fede-border) !important;
        color: var(--fede-on-surface) !important;
    }
    .tree-action-btn:active {
        transform: scale(0.9) !important;
    }
    .tree-action-btn--danger:hover {
        color: var(--fede-danger) !important;
        background: color-mix(in srgb, var(--fede-danger) 8%, transparent) !important;
        border-color: color-mix(in srgb, var(--fede-danger) 20%, transparent) !important;
    }

    /* Collapse/expand */
    #tree-cats .tree-children {
        display: none !important;
        background: var(--fede-surface) !important;
    }
    #tree-cats .tree-children.open {
        display: block !important;
    }

    /* Product leaf */
    #tree-cats .tree-leaf {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding: 8px 12px 8px 20px !important;
        border-bottom: 1px solid var(--fede-divider) !important;
        background: var(--fede-surface) !important;
        box-shadow: none !important;
        min-height: 40px !important;
        gap: 8px !important;
    }
    #tree-cats .tree-leaf:last-of-type {
        border-bottom: none !important;
    }

    .tree-leaf-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
    }
    .tree-leaf-name {
        font: var(--fede-body) !important;
        color: var(--fede-on-surface) !important;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .tree-leaf-units {
        font: var(--fede-caption) !important;
        color: var(--fede-on-surface-3) !important;
        font-weight: 500 !important;
    }
    .tree-leaf-actions {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
    }

    /* Add product form */
    #tree-cats .tree-add-form {
        display: flex !important;
        gap: 6px !important;
        padding: 8px 10px !important;
        background: var(--fede-surface) !important;
        border-top: 1px solid var(--fede-divider) !important;
        align-items: center !important;
    }

    #tree-cats .tree-add-inp,
    #tree-cats .tree-prod-inp {
        flex: 1 !important;
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        padding: 8px 12px !important;
        font: var(--fede-body) !important;
        color: var(--fede-on-surface) !important;
        box-shadow: none !important;
        text-transform: none !important;
        outline: none !important;
    }
    #tree-cats .tree-add-inp:focus,
    #tree-cats .tree-prod-inp:focus {
        border-color: var(--fede-on-surface-2) !important;
        background: var(--fede-surface) !important;
    }

    #tree-cats .tree-add-btn {
        width: 36px !important;
        height: 36px !important;
        background: var(--fede-on-surface) !important;
        color: var(--fede-surface) !important;
        border: none !important;
        border-radius: var(--fede-r-sm) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        cursor: pointer !important;
        flex-shrink: 0 !important;
    }
    #tree-cats .tree-add-btn:active {
        opacity: 0.8 !important;
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       FASE 7 — MODALES Y BOTTOM SHEETS
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ── 7A. SHEET BASE — overlay + card ──────────────────────────────────── */

    .shov {
        background: rgba(15, 18, 23, 0.72) !important;
        backdrop-filter: blur(4px) !important;
        -webkit-backdrop-filter: blur(4px) !important;
    }

    .sh {
        width: 100% !important;
        background: var(--fede-surface) !important;
        border-top: 1px solid var(--fede-border) !important;
        border-left: none !important;
        border-right: none !important;
        border-bottom: none !important;
        border-radius: var(--fede-r-lg) var(--fede-r-lg) 0 0 !important;
        padding: 28px 20px calc(env(safe-area-inset-bottom, 0px) + 24px) !important;
        box-shadow: none !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        max-height: 90vh !important;
        overflow-y: auto !important;
        transform: translateY(100%) !important;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }
    .shov.open .sh {
        transform: translateY(0) !important;
    }

    .sh-handle {
        width: 36px !important;
        height: 4px !important;
        border-radius: 2px !important;
        background: var(--fede-border) !important;
        margin: -12px auto 20px !important;
        opacity: 1 !important;
    }

    /* Títulos dentro de .sh — override body.theme-mcf .shov h2 McFetridge */
    .sh h2,
    #sh-title {
        font: var(--fede-title) !important;
        font-weight: 700 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        margin-bottom: 20px !important;
        color: var(--fede-on-surface) !important;
    }

    /* Labels dentro de .sh */
    .sh label {
        font: var(--fede-caption) !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
    }

    /* ── CUERPO RESUMEN (#sh-body) ────────────────────────────────────────── */

    #sh-body {
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-md) !important;
        padding: 0 !important;
        margin-bottom: 20px !important;
        overflow: hidden !important;
    }

    /* Filas del manifiesto generadas por JS */
    .mcf-manifest-row {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding: 10px 14px !important;
        background: transparent !important;
        border: none !important;
        border-bottom: 1px solid var(--fede-divider) !important;
        border-radius: 0 !important;
        margin-bottom: 0 !important;
        box-shadow: none !important;
    }
    .mcf-manifest-row:last-child { border-bottom: none !important; }

    .mcf-manifest-name {
        font: var(--fede-label) !important;
        font-weight: 500 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        color: var(--fede-on-surface) !important;
    }

    .mcf-manifest-qty {
        font: var(--fede-body) !important;
        font-weight: 700 !important;
        color: var(--primary) !important;
    }
    .mcf-manifest-qty.status-86 { color: var(--fede-danger) !important; }

    /* ── MOTIVO MERMA ─────────────────────────────────────────────────────── */

    #merma-motivo-section > label {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.6px !important;
        margin-bottom: 10px !important;
    }

    button.motivo-btn {
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-pill) !important;
        padding: 6px 14px !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        color: var(--fede-on-surface-2) !important;
        box-shadow: none !important;
        cursor: pointer !important;
        touch-action: manipulation !important;
    }
    button.motivo-btn:active {
        background: var(--fede-border) !important;
        transform: none !important;
        box-shadow: none !important;
    }
    button.motivo-btn.active {
        background: var(--fede-on-surface) !important;
        border-color: var(--fede-on-surface) !important;
        color: #fff !important;
        transform: none !important;
        box-shadow: none !important;
    }

    /* ── BOTONES DE ACCIÓN EN .sh ─────────────────────────────────────────── */

    .sh .btn {
        width: 100% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        border-radius: var(--fede-r-md) !important;
        font: var(--fede-label) !important;
        font-weight: 700 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        box-shadow: none !important;
        cursor: pointer !important;
        touch-action: manipulation !important;
        padding: 14px 16px !important;
        border: none !important;
        transition: opacity 0.15s, background 0.15s !important;
    }

    .sh .btn-whatsapp {
        background: #25D366 !important;
        color: #fff !important;
    }
    /* FIX: usar --primary (acento del modo) en vez de --fede-on-surface que en dark = blanco */
    .sh .btn-confirm {
        background: var(--primary) !important;
        color: #fff !important;
    }
    .sh .btn-delete {
        background: color-mix(in srgb, var(--fede-danger) 10%, transparent) !important;
        border: 1px solid var(--fede-danger) !important;
        color: var(--fede-danger) !important;
        font-weight: 600 !important;
    }
    .sh .btn-ghost {
        background: transparent !important;
        border: none !important;
        color: var(--fede-on-surface-3) !important;
        font-weight: 500 !important;
    }
    .sh .btn-whatsapp:active { opacity: 0.85 !important; }
    .sh .btn-confirm:active  { opacity: 0.85 !important; }
    .sh .btn-delete:active   { background: color-mix(in srgb, var(--fede-danger) 20%, transparent) !important; }
    .sh .btn-ghost:active    { background: var(--fede-surface-sunken) !important; }

    /* ── INPUTS GENÉRICOS EN .sh ──────────────────────────────────────────── */

    .sh input[type="text"],
    .sh input[type="number"],
    .sh input[type="date"],
    .sh input[type="time"],
    .sh input[type="datetime-local"],
    .sh textarea,
    .sh .tree-add-inp {
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 15px !important;
        font-weight: 400 !important;
        color: var(--fede-on-surface) !important;
        padding: 12px 14px !important;
        box-shadow: none !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }
    .sh input:focus,
    .sh textarea:focus {
        outline: none !important;
        border-color: var(--fede-on-surface-2) !important;
    }

    /* ── BOTONES save/cancel MCFETRIDGE LEGACY EN .sh ────────────────────── */

    .sh .mcf-edit-btn-save,
    .sh button.mcf-edit-btn-save {
        background: var(--fede-on-surface) !important;
        border: none !important;
        border-radius: var(--fede-r-md) !important;
        color: #fff !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 14px !important;
        font-weight: 700 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        box-shadow: none !important;
        padding: 14px !important;
        width: 100% !important;
        cursor: pointer !important;
        display: block !important;
    }
    .sh .mcf-edit-btn-save:active { background: var(--fede-on-surface-2) !important; }

    .sh .mcf-edit-btn-cancel,
    .sh button.mcf-edit-btn-cancel {
        background: transparent !important;
        border: none !important;
        color: var(--fede-on-surface-3) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 13px !important;
        font-weight: 500 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        box-shadow: none !important;
        padding: 8px !important;
        width: 100% !important;
        cursor: pointer !important;
    }

    /* wa-btn (clase legacy) dentro de .sh → dark save */
    .sh .wa-btn {
        background: var(--fede-on-surface) !important;
        border: none !important;
        border-radius: var(--fede-r-md) !important;
        color: #fff !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 14px !important;
        font-weight: 700 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        box-shadow: none !important;
        padding: 14px !important;
        width: 100% !important;
        cursor: pointer !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
    }

    /* ── 7B. MODAL EDITAR CATEGORÍA ──────────────────────────────────────── */

    #modal-edit-cat .sh > div {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
    }

    /* ── 7C. MODAL EDITAR PRODUCTO ───────────────────────────────────────── */

    #modal-units-box {
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-md) !important;
        padding: 14px !important;
        margin-bottom: 20px !important;
        box-shadow: none !important;
    }
    #modal-units-box > div:first-child {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
        margin-bottom: 10px !important;
    }
    #modal-units-box > div:last-child {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 11px !important;
        font-weight: 400 !important;
        color: var(--fede-on-surface-3) !important;
        margin-top: 10px !important;
        line-height: 1.5 !important;
    }

    /* Chips de unidades (inyectados por JS en #modal-units-list) */
    #modal-units-list .cchip,
    #modal-units-list button {
        background: var(--fede-surface) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-pill) !important;
        padding: 5px 12px !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 12px !important;
        font-weight: 600 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        color: var(--fede-on-surface-2) !important;
        box-shadow: none !important;
        cursor: pointer !important;
    }
    #modal-units-list .cchip.active,
    #modal-units-list button.active {
        background: var(--fede-on-surface) !important;
        border-color: var(--fede-on-surface) !important;
        color: #fff !important;
    }

    /* ── 7D. MODAL INGRESO MANUAL ────────────────────────────────────────── */

    #manual-entry-title {
        font-size: 22px !important;
        word-break: break-word !important;
        margin-bottom: 6px !important;
    }

    /* Subtítulo "INGRESAR VALOR MANUAL" */
    #manual-entry-title + div {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        color: var(--fede-on-surface-3) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.8px !important;
        margin-bottom: 16px !important;
    }

    /* Input numérico grande */
    #manual-entry-input {
        height: 64px !important;
        font-size: 32px !important;
        font-weight: 700 !important;
        text-align: center !important;
        letter-spacing: -1px !important;
        font-variant-numeric: tabular-nums !important;
    }

    /* ── 7E. MODAL EDITAR HISTORIAL ──────────────────────────────────────── */

    #modal-edit-hist.mcf-modal-overlay {
        background: rgba(15, 18, 23, 0.72) !important;
        backdrop-filter: blur(4px) !important;
        -webkit-backdrop-filter: blur(4px) !important;
    }

    #modal-edit-hist .mcf-modal-content {
        background: var(--fede-surface) !important;
        border: none !important;
        border-top: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-lg) var(--fede-r-lg) 0 0 !important;
        padding: 28px 20px calc(env(safe-area-inset-bottom, 0px) + 20px) !important;
        box-shadow: none !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        max-height: 92vh !important;
        overflow-y: auto !important;
    }

    #modal-edit-hist .mcf-modal-handle {
        width: 36px !important;
        height: 4px !important;
        border-radius: 2px !important;
        background: var(--fede-border) !important;
        margin: -12px auto 20px !important;
        opacity: 1 !important;
    }

    #modal-edit-hist .mcf-modal-title {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 20px !important;
        font-weight: 700 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        text-align: left !important;
        color: var(--fede-on-surface) !important;
        margin-bottom: 20px !important;
    }

    #modal-edit-hist .mcf-edit-label {
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.6px !important;
        color: var(--fede-on-surface-3) !important;
        margin-bottom: 8px !important;
    }

    #modal-edit-hist .mcf-edit-mode-btn {
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 12px !important;
        font-weight: 600 !important;
        text-transform: none !important;
        letter-spacing: normal !important;
        color: var(--fede-on-surface-2) !important;
        box-shadow: none !important;
        padding: 10px 8px !important;
        transform: none !important;
    }
    #modal-edit-hist .mcf-edit-mode-btn.active {
        color: var(--fede-on-accent) !important;
        transform: none !important;
        box-shadow: none !important;
    }
    #modal-edit-hist #edit-mode-pedido.active    { background: var(--fede-accent-pedido) !important;    border-color: var(--fede-accent-pedido) !important; }
    #modal-edit-hist #edit-mode-stock.active     { background: var(--fede-accent-stock) !important;     border-color: var(--fede-accent-stock) !important; }
    #modal-edit-hist #edit-mode-recepcion.active { background: var(--fede-accent-recepcion) !important; border-color: var(--fede-accent-recepcion) !important; }
    #modal-edit-hist #edit-mode-merma.active     { background: var(--fede-accent-merma) !important;     border-color: var(--fede-accent-merma) !important; }

    #edit-hist-date {
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        font-family: 'Inter', system-ui, sans-serif !important;
        font-size: 14px !important;
        font-weight: 400 !important;
        color: var(--fede-on-surface) !important;
        padding: 10px 14px !important;
        box-shadow: none !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    #edit-hist-body.mcf-edit-list-container {
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-md) !important;
        background: var(--fede-surface-sunken) !important;
        box-shadow: none !important;
        padding: 0 !important;
        overflow: hidden !important;
    }

    #modal-edit-hist .mcf-search-box {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        background: var(--fede-surface-sunken) !important;
        border: 1px solid var(--fede-border) !important;
        border-radius: var(--fede-r-sm) !important;
        padding: 0 14px !important;

        display: flex;

        font-size: 11px;
        font-weight: 600;

    /* ── SMART REPLENISHMENT v2 ──────────────────────────────────────────────── */

    /* Pantalla de contexto */
    .order-ctx-card {
        background: var(--fede-surface);

        border-radius: 12px;
        padding: 4px 14px;

    .order-ctx-badge {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 0;

        font-weight: 600;
        color: var(--fede-on-surface);

    .order-ctx-badge:last-child { border-bottom: none; }

    .order-ctx-badge--info    { color: var(--fede-info); }
    .order-ctx-badge--neutral { color: var(--fede-on-surface-2); }
    .order-ctx-badge--ok      { color: var(--fede-success); }
    .order-ctx-badge--event   { color: var(--fede-info); }
    .order-ctx-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--fede-on-surface);

    .order-ctx-sub {
        font-size: 11px;
        color: var(--fede-on-surface-3);
        font-weight: 500;
        margin-top: 2px;

        line-height: 1.5;

        color: var(--fede-warning);

        display: inline-block;

        display: flex;
        flex-direction: column;
        gap: 10px;

    .btn-primary-ctx {
        background: var(--fede-on-surface);

        font-weight: 700;

    .btn-secondary-ctx {

    /* ── Módulo 6: Feedback Modal ── */
    .feedback-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 18, 23, 0.72);
        backdrop-filter: blur(4px);
        z-index: 9000;
        display: flex;
        align-items: flex-end;
    }
    .feedback-modal {
        background: var(--fede-surface);
        border-radius: var(--fede-r-lg) var(--fede-r-lg) 0 0;
        padding: 20px 16px 32px;
        width: 100%;
        box-sizing: border-box;

    .feedback-modal-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--fede-on-surface);
        margin-bottom: 12px;

    .feedback-modal-items {
        background: var(--fede-surface-2);
        border-radius: var(--fede-r-md);
        padding: 4px 12px;
        margin-bottom: 14px;

    .feedback-item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-top: 1px solid var(--fede-border);
        gap: 8px;

    .feedback-item-row:first-child { border-top: none; }
    .feedback-item-name {
        font-size: 13px;
        color: var(--fede-on-surface);
        font-weight: 500;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;

    .feedback-item-delta {
        font-size: 12px;
        color: var(--fede-on-surface-2);
        font-variant-numeric: tabular-nums;

    .feedback-item-more {
        font-size: 11px;
        color: var(--fede-on-surface-3);
        padding: 6px 0 4px;

    .feedback-modal-reasons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 4px;

    .feedback-reason-btn {
        background: var(--fede-surface-2);
        border: 1.5px solid var(--fede-border);
        border-radius: 20px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 600;
        color: var(--fede-on-surface-2);
        cursor: pointer;
    }
    .feedback-reason-btn--active {
        background: var(--fede-on-surface);
        border-color: var(--fede-on-surface);
        color: var(--fede-surface);
    }

    /* ── Módulo 7B: Production Lot Modal ── */
    .prod-lot-field {
        margin-bottom: 14px;
    }
    .prod-lot-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--fede-on-surface-2);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .prod-lot-select {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--fede-border);
        border-radius: var(--fede-r-md);

        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;

    .prod-lot-input-row {
        display: flex;

    .prod-lot-input {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid var(--fede-border);
        border-radius: var(--fede-r-md);

        font-size: 14px;

        box-sizing: border-box;

    .prod-lot-input:focus, .prod-lot-select:focus {

    .prod-lot-unit-label {
        font-size: 12px;
        color: var(--fede-on-surface-3);
        white-space: nowrap;

    /* Verificación rápida Clase A */
    .order-verify-card {
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        border-radius: 10px;
        padding: 4px 12px;
        margin: 12px 0;
    }
    .order-verify-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 0;
        border-bottom: 1px solid var(--fede-border);

    .order-verify-row:last-child { border-bottom: none; }
    .order-verify-name {
        flex: 1;
        font-size: 13px;
        font-weight: 700;
        color: var(--fede-on-surface);

    .order-verify-meta {
        font-size: 11px;
        color: var(--fede-on-surface-3);

    .order-verify-stepper button {
        width: 28px; height: 28px;
        border-radius: 6px;
        border: 1px solid var(--fede-border);

    .order-verify-stepper span {
        min-width: 36px;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        color: var(--fede-on-surface);

    /* Smart suggestion cards */
    .smart-section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0 8px;
        margin-top: 16px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fede-on-surface-3);
        border-bottom: 1px solid var(--fede-border);
        margin-bottom: 8px;
    }
    .smart-section-expand-btn {
        width: 100%;
        background: var(--fede-surface);
        border: 1px dashed var(--fede-border);
        border-radius: 10px;
        padding: 12px;
        font-size: 12px;
        font-weight: 700;
        color: var(--fede-on-surface-2);
        cursor: pointer;
        margin-top: 8px;
        text-align: center;
    }
    .smart-section-expand-btn--warning {
        border-color: #d97706;
        color: #92400e;
    }
    /* ── Smart Card Redesign v2 ── */
    .smart-card {
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-lg);
        padding: 16px 20px;
        margin: 0 0 10px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
        overflow: hidden;
    }
    .smart-card::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0; width: 3px;
        background: transparent;
        border-radius: 3px 0 0 3px;
    }
    .smart-card--urgent { border-color: var(--fede-danger); }
    .smart-card--urgent::before { background: var(--fede-danger); }
    .smart-card--stale  { border-color: var(--fede-warning); opacity: 0.9; }
    .smart-card--stale::before  { background: var(--fede-warning); }
    .smart-card--inactive { opacity: 0.65; border-style: dashed; }
    .smart-card.has-qty { border-color: var(--primary); }
    .smart-card.has-qty::before { background: var(--primary); }

    .sc-top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .sc-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        letter-spacing: 0.02em;
    }
    .sc-badge--reliable  { background: rgba(34,197,94,0.12); color: #16a34a; }
    .sc-badge--projected { background: rgba(99,102,241,0.12); color: #4f46e5; }
    .sc-badge--stale     { background: rgba(245,158,11,0.12); color: #d97706; }

    .sc-hide-btn {
        width: 32px;
        height: 32px;
        border: none;
        background: transparent;
        color: var(--fede-on-surface-3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        touch-action: manipulation;
        flex-shrink: 0;
    }
    .sc-hide-btn:active { background: var(--fede-surface-2); transform: scale(0.9); }

    .sc-name {
        font-size: 16px;
        font-weight: 700;
        color: var(--fede-on-surface);
        line-height: 1.2;
    }
    .sc-stock-line {
        font-size: 13px;
        color: var(--fede-on-surface-2);
    }
    .sc-stock-line strong {
        color: var(--fede-on-surface);
        font-weight: 600;
    }

    /* Stepper — acción primaria */
    .sc-stepper-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        background: var(--fede-surface-2);
        border-radius: 12px;
        padding: 4px;
        margin: 2px 0;
    }
    .sc-btn {
        width: 52px;
        height: 52px;
        border: none;
        background: transparent;
        font-size: 22px;
        font-weight: 300;
        color: var(--fede-on-surface);
        cursor: pointer;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        flex-shrink: 0;
        transition: background 0.12s;
    }
    .sc-btn:active { background: var(--fede-border); transform: scale(0.9); }
    .sc-btn--minus { color: var(--fede-danger); }
    .sc-btn--plus  { color: #16a34a; }

    .sc-qty-block {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
    }
    .sc-qty-num {
        font-size: 26px;
        font-weight: 800;
        color: var(--fede-on-surface);
        line-height: 1;
        font-variant-numeric: tabular-nums;

        font-size: 12px;
        color: var(--fede-on-surface-2);
        font-weight: 500;

        font-size: 12px;
        color: var(--fede-on-surface-3);

        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;

    /* Compat: smart-conf-badge aún usado por _renderSmartCardStale */
    .smart-conf-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 7px;
        border-radius: 5px;
        letter-spacing: 0.03em;
        white-space: nowrap;
    }
    .smart-conf-badge--reliable  { background: rgba(34,197,94,0.12); color: #16a34a; }
    .smart-conf-badge--projected { background: rgba(99,102,241,0.12); color: #4f46e5; }
    .smart-conf-badge--stale     { background: rgba(245,158,11,0.12); color: #d97706; }

        color: var(--fede-on-surface-3);

        align-items: center;
        justify-content: space-between;

        color: var(--fede-on-surface);

        min-width: 0;

        justify-content: space-between;

        flex-shrink: 0;

        border-radius: 20px;
        border: 1px solid var(--fede-accent, #2563eb);

        color: var(--fede-accent, #2563eb);
        cursor: pointer;
        white-space: nowrap;
    }
    .order-guide-tip {
        font-size: 11px;
        color: var(--fede-on-surface-3);
        padding: 6px 4px 10px;
        line-height: 1.5;
        border-bottom: 1px solid var(--fede-border);
        margin-bottom: 8px;

        font-size: 13px;
        font-weight: 700;
        color: var(--fede-on-surface);
        white-space: nowrap;
