<style>
    /* ——————————————————————————————————————————————————————————————————————————
       MCFETRIDGE METHOD — DESIGN SYSTEM
       Flat form. Muted tone. Clean line.
       MOBILE-FIRST OPTIMIZED.
       —————————————————————————————————————————————————————————————————————————— */

    /* 📱 MOBILE ALIGNMENT & SAFE AREAS */
    /* 🏗️ INDUSTRIAL TOKENS - UNIFIED MCFETRIDGE SYSTEM */
    :root {
        /* Palette */
        --mcf-paper: #FDFBF7;
        --mcf-bg: #F4F0E5;
        --mcf-surface: #E8E3D6;
        --mcf-ink: #1A1816;
        --mcf-ink-muted: #6E6A62;
        --mcf-ink-ghost: #9E9A92;
        --mcf-rose: #D4937A;
        --mcf-rose-lt: #EDD9CF;
        --mcf-sage: #8BA87A;
        --mcf-sage-lt: #CEDFCA;
        --mcf-slate: #4E637A;
        --mcf-slate-lt: #C8D1DC;
        --mcf-mauve: #A884A6;
        --mcf-mauve-lt: #DDD0DC;
        --mcf-amber: #C89A42;
        --mcf-amber-lt: #F0DAAA;
        --mcf-sky: #7AB8D4;
        --mcf-sky-lt: #CFE6ED;

        /* Typography */
        --mcf-font-display: 'Outfit', sans-serif;
        --mcf-font-body: 'DM Sans', sans-serif;

        /* Layout & Spacing */
        --mcf-tab-height: 70px;
        --mcf-header-height: 64px;
        --mcf-border: 4px solid var(--mcf-ink);
        --mcf-shadow: 6px 6px 0px var(--mcf-ink);
        --mcf-shadow-lg: 10px 10px 0px var(--mcf-ink);
        --mcf-gap: 16px;
        --mcf-snap: cubic-bezier(0.4, 0, 0.2, 1);
        --mcf-fluid: cubic-bezier(0.16, 1, 0.3, 1);

        /* Bridge to Legacy */
        --text: var(--mcf-ink);
        --text2: var(--mcf-ink-muted);
        --primary: var(--mcf-amber);
        --bg: var(--mcf-bg);
        --bd: var(--mcf-ink);
        --r: 0px !important;
        --r2: 0px !important;
    }

    html.theme-mcf {
        background: var(--mcf-bg) !important;
        min-height: 100vh !important;
        margin: 0;
        padding: 0;
    }

    body.theme-mcf {
        background: var(--mcf-bg) !important;
        background-image: none !important;
        color: var(--mcf-ink) !important;
        font-family: var(--mcf-font-body) !important;
        margin: 0;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }

    body.theme-mcf * {
        box-sizing: border-box !important;
        border-radius: 0 !important;
        -webkit-tap-highlight-color: transparent;
    }

    @media (prefers-reduced-motion: reduce) {
        body.theme-mcf * {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
            scroll-behavior: auto !important;
        }
    }

    body.theme-mcf :focus-visible {
        outline: 4px solid var(--mcf-amber) !important;
        outline-offset: 4px !important;
        z-index: 999999 !important;
    }

    /* Theme-Mode Semantic Mapping */
    body.theme-pedido {
        --mode-color: var(--mcf-rose);
        --mode-bg: var(--mcf-rose-lt);
    }

    body.theme-stock {
        --mode-color: var(--mcf-slate);
        --mode-bg: var(--mcf-slate-lt);
    }

    body.theme-recepcion {
        --mode-color: var(--mcf-sage);
        --mode-bg: var(--mcf-sage-lt);
    }

    body.theme-merma {
        --mode-color: var(--mcf-mauve);
        --mode-bg: var(--mcf-mauve-lt);
    }

    body:not([class*="theme-"]) {
        --mode-color: var(--mcf-ink);
        --mode-bg: var(--mcf-paper);
    }

    /* Unified Tags logic handled in adaptive sections below */

    /* 🏙️ ADAPTIVE COMMAND SYSTEMS (Search) - FRONTEND DESIGN V2 */
    .mcf-command-deck {
        position: fixed !important;
        left: 16px !important;
        right: 16px !important;
        z-index: 20000 !important;
        display: none !important; 
        bottom: 16px !important; 
        background: var(--mcf-paper) !important;
        border: 4px solid var(--mcf-ink) !important;
        box-shadow: 10px 10px 0px var(--mcf-ink) !important;
        box-sizing: border-box;
        pointer-events: auto !important;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), bottom 0.3s var(--mcf-snap) !important;
        /* Internal Industrial Label */
    }

    .mcf-command-deck::before {
        content: "COMMAND DECK V11.1";
        position: absolute;
        top: -12px;
        left: 12px;
        background: var(--mcf-ink);
        color: var(--mcf-paper);
        font-size: 8px;
        font-weight: 900;
        padding: 2px 8px;
        letter-spacing: 1.5px;
        z-index: 2;
    }

    body.view-relevamiento .mcf-command-deck {
        display: block !important;
        transform: translateY(0) !important; /* Force visible in Relevamiento */
        pointer-events: auto !important;
        opacity: 1 !important;
        visibility: visible !important;
    }

    /* Status LED indicator */
    .mcf-deck-wrap::after {
        content: "";
        width: 8px;
        height: 8px;
        background: var(--mcf-sage);
        position: absolute;
        right: 16px;
        top: 16px;
        animation: mcf-led-pulse 1.5s infinite alternate;
    }

    @keyframes mcf-led-pulse {
        from { opacity: 0.4; box-shadow: 0 0 0px var(--mcf-sage); }
        to { opacity: 1; box-shadow: 0 0 8px var(--mcf-sage); }
    }

    /* Dynamic Elevation: Above Contextual Bar when active */
    body.theme-mcf .ctx-bar:not(.hidden) ~ .mcf-command-deck,
    body.theme-mcf .ctx-bar:not(.hidden) ~ #app .mcf-command-deck {
        bottom: 86px !important;
    }

    .mcf-command-deck.hdr-search-hidden {
        transform: translateY(180%) !important;
        pointer-events: none !important;
    }

    .mcf-command-deck.hdr-search-active,
    .mcf-command-deck.hdr-search-persistent {
        transform: translateY(0) !important;
        pointer-events: auto !important;
        opacity: 1 !important;
        visibility: visible !important;
    }

    .mcf-deck-wrap {
        position: relative;
        display: flex;
        align-items: center;
        padding: 0 20px;
        height: 72px;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    .mcf-deck-icon {
        width: 32px !important;
        height: 32px !important;
        stroke-width: 3px !important;
        color: var(--mcf-ink) !important;
        margin-right: 18px !important;
        flex-shrink: 0;
    }

    .mcf-deck-wrap input {
        border: none !important;
        background: transparent !important;
        color: var(--mcf-ink) !important;
        font-family: var(--mcf-font-display) !important;
        font-weight: 950 !important;
        font-size: 1.15rem !important;
        flex: 1;
        outline: none !important; /* Managed by .mcf-command-deck:focus-within */
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .mcf-deck-wrap input::placeholder {
        color: var(--mcf-ink-ghost) !important;
        opacity: 0.6 !important;
    }

    .mcf-command-deck:focus-within {
        border-color: var(--mcf-amber) !important;
    }



    .mcf-search-results-overlay {
        position: absolute !important;
        bottom: calc(100% + 4px) !important;
        left: -4px !important;
        right: -4px !important;
        background: var(--mcf-paper) !important;
        border: 4px solid var(--mcf-ink) !important;
        border-bottom: none !important;
        box-shadow: none !important;
        max-height: 50vh;
        overflow-y: auto;
        z-index: 6000 !important;
        display: none;
    }

    /* Results visibility logic tied to content, as JS handles the display toggle */
    .mcf-command-deck .mcf-search-results-overlay:not(:empty) {
        /* JS handles display style directly, but we ensure it's allowed */
    }

    /* 📋 SEARCH RESULT ITEM (McFetridge Pro) */
    .mcf-res-item {
        padding: 14px 18px !important;
        border-bottom: 2px solid var(--mcf-surface) !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 2px !important;
        cursor: pointer !important;
        pointer-events: auto !important;
        background: var(--mcf-paper) !important;
        transition: background 0.15s ease !important;
    }

    .mcf-res-item:last-child {
        border-bottom: none !important;
    }

    .mcf-res-item:active,
    .mcf-res-item:hover {
        background: var(--mcf-amber) !important;
        transform: scale(0.98);
    }

    /* 🧱 TECTONIC PULSE (Success Search Indicator) */
    @keyframes mcf-found-pulse {
        0% {
            background: var(--mcf-bg);
            filter: brightness(1);
        }

        30% {
            background: var(--mcf-amber);
            filter: brightness(1.2);
            box-shadow: 0 0 40px var(--mcf-amber);
        }

        100% {
            background: var(--mcf-bg);
            filter: brightness(1);
        }
    }

    .mcf-found-highlight {
        animation: mcf-found-pulse 1s var(--mcf-industrial) !important;
        position: relative;
        z-index: 5;
    }

    .mcf-res-name {
        font-size: 14px !important;
        font-weight: 850 !important;
        color: var(--mcf-ink) !important;
        text-transform: uppercase !important;
    }

    .mcf-res-cat {
        font-size: 10px !important;
        font-weight: 900 !important;
        color: var(--mcf-ink-muted) !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
    }

    /* Force hide redundant systems */
    .mcf-top-bar,
    .hdr-search-container,
    .hdr-search-wrap {
        display: none !important;
    }

    body.theme-mcf .mcf-command-deck:focus-within ~ .tabs,
    body.theme-mcf .mcf-command-deck.hdr-search-active ~ .tabs {
        display: none !important;
    }

    /* Pushes content down ONLY when top-bar is active */
    body.theme-mcf .ctx-bar:not(.hidden)~.view .scroll-content,

    }

    body.theme-mcf .ctx-bar:not(.hidden)~.mcf-command-deck,
    body.theme-mcf .ctx-bar:not(.hidden)~#app .mcf-command-deck {
        bottom: 86px !important;
        display: block !important; /* Ensure it stays visible above the bar */
    }

    body.theme-mcf .ctx-bar:not(.hidden)~#app .tabs {
        display: none !important;
    }

    /* 🔍 SEARCH RESULTS (Interactive & Thumb-Centric) */
    .mcf-res-item {
        padding: 16px 20px !important;
        background: var(--mcf-paper) !important;
        border-bottom: 2px solid var(--mcf-surface) !important;
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        cursor: pointer !important;
        touch-action: manipulation !important;
        user-select: none !important;
        -webkit-user-select: none !important;
        -webkit-tap-highlight-color: transparent !important;
        transition: background 0.15s ease, transform 0.1s ease !important;
    }

    .mcf-res-item:last-child {
        border-bottom: none !important;
    }

    .mcf-res-item:active {
        background: var(--mcf-amber) !important;
        transform: scale(0.98) !important;
    }

    .mcf-res-item:focus-visible {
        outline: 2px solid var(--mcf-ink) !important;
        outline-offset: -2px !important;
    }

    .mcf-res-name {
        font-weight: 900 !important;
        text-transform: uppercase !important;
        font-size: 14px !important;
        color: var(--mcf-ink) !important;
    }

    .mcf-res-cat {
        font-size: 9px !important;
        font-weight: 800 !important;
        color: var(--mcf-amber) !important;
        text-transform: uppercase !important;
        background: var(--mcf-ink) !important;
        padding: 2px 8px !important;
        letter-spacing: 1px !important;
    }

    /* Subliminal Highlight for finding items */
    .prow-highlight {
        animation: mcf-flash 1.5s ease-out !important;
    }

    @keyframes mcf-flash {
        0% { border-color: var(--mcf-amber); box-shadow: 0 0 40px var(--mcf-amber); transform: scale(1.02); }
        100% { border-color: var(--mcf-ink); box-shadow: 8px 8px 0px var(--mcf-ink); transform: scale(1); }
    }

    @keyframes mcfFadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes mcfScaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    /* ——————————————————————————————————————————————————————————————————————————
       RESET & GLOBAL OVERRIDES (Scoped to McFetridge Theme)
       —————————————————————————————————————————————————————————————————————————— */

    body.theme-mcf * {
        box-sizing: border-box;
        border-radius: 0 !important;
        /* Force sharp corners */
    }

    body.theme-mcf {
        background-color: var(--mcf-bg) !important;
        background-image: none !important;
        /* Remove zinc patterns */
        font-family: var(--mcf-font-display) !important;
        color: var(--mcf-ink) !important;
    }

    /* Remove filters globally within McFetridge theme */
    body.theme-mcf * {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        text-shadow: none !important;
    }

    /* Aesthetics Only - Minimal Structural Intervention */
    /* Aesthetics Only - Minimal Structural Intervention */
    body.theme-mcf .view {
        display: none !important;
        background: var(--mcf-bg) !important;
        min-height: 100vh !important;
        width: 100% !important;
        opacity: 1 !important;
    }

    body.theme-mcf .view.active {
        display: flex !important;
        flex-direction: column !important;
        visibility: visible !important;
        opacity: 1 !important;
    }

    body.theme-mcf .dash-card,
    body.theme-mcf .mcf-search-box {
        background: var(--mcf-paper) !important;
        border: 4px solid var(--mcf-ink) !important;
        margin: 0 6px 20px 0 !important;
        box-shadow: 6px 6px 0px var(--mcf-ink) !important;
        display: flex !important;
        flex-direction: column !important;
        width: calc(100% - 10px) !important;
        box-sizing: border-box !important;
    }

    /* Dedicated Button Logic removed and consolidated below */

    /* ——————————————————————————————————————————————————————————————————————————
       BARRA CONTEXTUAL (Fixed Footer)
       —————————————————————————————————————————————————————————————————————————— */
    /* 🛠️ CONTEXTUAL ACTION BAR (Industrial Footer) */
    footer.ctx-bar {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        height: auto !important;
        min-height: var(--mcf-tab-height, 70px) !important;
        background: var(--mcf-paper) !important;
        border-top: 5px solid var(--mcf-ink) !important;
        display: flex !important;
        align-items: center !important;
        padding: 8px 16px calc(env(safe-area-inset-bottom, 0px) + 8px) !important;
        gap: 12px !important;
        z-index: 70000 !important;
        box-sizing: border-box !important;
        box-shadow: 0 -12px 0px rgba(26, 26, 26, 0.08) !important;
        transform: none !important;
        margin: 0 !important;
    }

    .ctx-btn {
        height: 52px !important;
        /* Reduced height to fit better */
        border: 4px solid var(--mcf-ink) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        font-weight: 950 !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
        font-family: inherit !important;
        cursor: pointer;

    }

    .ctx-exit {
        flex: 1 !important;
        background: var(--mcf-surface) !important;
        color: var(--mcf-ink) !important;
    }

    .ctx-send {
        flex: 2 !important;
        background: var(--mode-color, var(--mcf-amber)) !important;
        color: var(--mcf-paper) !important;
        box-shadow: 4px 4px 0px var(--mcf-ink) !important;
    }

    .ctx-send:active {
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0px var(--mcf-ink) !important;
    }

    .ctx-count {
        background: rgba(255, 255, 255, 0.25) !important;

        justify-content: center !important;
    }

    /* ═══════════════════════════════════════════════════════════════════
       ORDER MODULE OVERLAY (MOP Adaptation)
       ═══════════════════════════════════════════════════════════════════ */

    }

    .order-header h2 {

    }

    .order-item-row {

       FULLSCREEN MODE (MOP Adaptation)

    /* Precision Overrides */
    body.theme-mcf .order-overlay *,
    body.theme-mcf .prod-fs-header *,
    body.theme-mcf .prod-fullscreen * {

    .mcf-header {

        max-width: 500px;
        background-color: var(--mcf-ink);
        background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='rgba(255,255,255,0.05)' stroke-width='1.5' fill='none'%3E%3Cpath d='M0,0 Q100,200 200,0 M0,200 Q100,0 200,200 M100,0 L100,200 M0,100 L200,100' /%3E%3Ccircle cx='100' cy='100' r='50' /%3E%3Ccircle cx='100' cy='100' r='80' stroke-dasharray='6 6' /%3E%3Ccircle cx='100' cy='100' r='20' /%3E%3Cpolygon points='100,10 190,100 100,190 10,100' stroke-dasharray='2 4' /%3E%3C/g%3E%3C/svg%3E");
        background-size: 140px 140px;
