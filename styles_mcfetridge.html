<style>
    /* ——————————————————————————————————————————————————————————————————————————
       MCFETRIDGE METHOD — DESIGN SYSTEM
       Flat form. Muted tone. Clean line.
       MOBILE-FIRST OPTIMIZED.
       —————————————————————————————————————————————————————————————————————————— */

    /* 📱 MOBILE ALIGNMENT & SAFE AREAS */
    /* 🏗️ INDUSTRIAL TOKENS - UNIFIED MCFETRIDGE SYSTEM */
    :root {
        /* 🎨 Color Tokens (Phase 03) */
        --mcf-rose:       #D4937A;
        --mcf-rose-lt:    #EDD9CF;
        --mcf-sage:       #8BA87A;
        --mcf-sage-lt:    #CEDFCA;
        --mcf-slate:      #4E637A;
        --mcf-slate-lt:   #C8D1DC;
        --mcf-mauve:      #A884A6;
        --mcf-mauve-lt:   #DDD0DC;
        --mcf-amber:      #C89A42;
        --mcf-amber-lt:   #F0DAAA;
        
        --mcf-ink:        #1A1816;
        --mcf-muted:      #6E6A62;
        --mcf-ghost:      #9E9A92;
        --mcf-border:     #C8C4BB;
        --mcf-surface:    #E8E3D6;
        --mcf-bg:         #F4F0E5;

        /* 🖋️ Typography (Phase 03) */
        --font-family:    'Helvetica Neue', Arial, sans-serif;
        --font-size-display: 60px;
        --font-size-title:    34px;
        --font-size-h:        20px;
        --font-size-body:     15px;
        --font-size-small:    13px;
        --font-size-label:    11px;
        
        --font-weight-regular: 400;
        --font-weight-bold:    700;
        --font-weight-xbold:   800;

        /* 📏 Spacing (Phase 03) */
        --s-xs:   4px;
        --s-sm:   8px;
        --s-md:   12px;
        --s-lg:   16px;
        --s-xl:   24px;
        --s-2xl:  32px;
        --s-3xl:  48px;

        /* 🧱 Borders (The Absolute Rule) */
        --border-main:    1.5px solid var(--mcf-ink);
        --border-light:   1px solid var(--mcf-border);
        
        /* Bridge to Legacy */
        --bg: var(--mcf-bg);
        --text: var(--mcf-ink);

        /* 🔧 TOKENS FALTANTES (completados) */
        --mcf-paper:       #F8F5EE;
        --mcf-font-display: 'Helvetica Neue', Arial, sans-serif;
        --mcf-ink-ghost:   var(--mcf-ghost);
        --mcf-ink-muted:   var(--mcf-muted);
        --mcf-shadow:      4px 4px 0px var(--mcf-ink);
        --mcf-shadow-lg:   8px 8px 0px var(--mcf-ink);
        --mcf-sky:         #7AB8D4;
        --mcf-sky-lt:      #C8E0EC;
        --mcf-fluid:       cubic-bezier(0.4, 0, 0.2, 1);
        --mcf-tab-height:  70px;
        --mcf-view-pt:     0px;
        --mcf-font-body:   'Helvetica Neue', Arial, sans-serif;
    }


    /* ══════════════════════════════════════════════════════════════════════════
       FEDE DESIGN SYSTEM v2 — Tokens (Claude Design Handoff)
       Coexiste con --mcf-*. Migración gradual pantalla por pantalla.
       ══════════════════════════════════════════════════════════════════════════ */

    /* Fuente Inter para las nuevas vistas */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root,
    [data-theme="light"] {
        /* Superficies */
        --fede-bg:            #f4f5f7;
        --fede-surface:       #ffffff;
        --fede-surface-sunken:#eef0f4;
        --fede-on-surface:    #0f1217;
        --fede-on-surface-2:  #3a4150;
        --fede-on-surface-3:  #6b7280;
        --fede-border:        #e2e4e9;
        --fede-divider:       #eef0f4;

        /* Acentos semánticos por modo operativo */
        --fede-accent-pedido:    #2563eb;   /* Azul    */
        --fede-accent-stock:     #16a34a;   /* Verde   */
        --fede-accent-recepcion: #7c3aed;   /* Violeta */
        --fede-accent-merma:     #d97706;   /* Ámbar   */

        /* Estados */
        --fede-success: #16a34a;
        --fede-warning: #d97706;
        --fede-danger:  #dc2626;
        --fede-info:    #2563eb;

        /* Escala tipográfica — Inter, 7 pasos */
        --fede-display:  600 28px/34px "Inter", system-ui, sans-serif;
        --fede-title:    600 22px/28px "Inter", system-ui, sans-serif;
        --fede-h2:       600 18px/24px "Inter", system-ui, sans-serif;
        --fede-body-lg:  400 16px/22px "Inter", system-ui, sans-serif;
        --fede-body:     400 15px/20px "Inter", system-ui, sans-serif;
        --fede-label:    500 13px/16px "Inter", system-ui, sans-serif;
        --fede-caption:  400 11px/14px "Inter", system-ui, sans-serif;
        --fede-mono:     400 12px/16px "JetBrains Mono", monospace;

        /* Radio de bordes */
        --fede-r-sm:   8px;
        --fede-r-md:   12px;
        --fede-r-lg:   16px;
        --fede-r-pill: 24px;
    }

    [data-theme="dark"] {
        --fede-bg:            #0f1217;
        --fede-surface:       #181c24;
        --fede-surface-sunken:#0b0e14;
        --fede-on-surface:    #f0f2f7;
        --fede-on-surface-2:  #9ba5b8;
        --fede-on-surface-3:  #5a6478;
        --fede-border:        #252b38;
        --fede-divider:       #1e2430;
    }

    /* Acento dinámico por modo operativo (usado vía data-mode en el root) */
    [data-mode="pedido"]    { --fede-accent: var(--fede-accent-pedido); }
    [data-mode="stock"]     { --fede-accent: var(--fede-accent-stock); }
    [data-mode="recepcion"] { --fede-accent: var(--fede-accent-recepcion); }
    [data-mode="merma"]     { --fede-accent: var(--fede-accent-merma); }

    /* ── FeDe Components Base Layer ─────────────────────────────────────────── */

    /* Shimmer skeleton animation */
    @keyframes fede-shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    .fede-skeleton {
        background: linear-gradient(90deg,
            var(--fede-surface-sunken) 25%,
            var(--fede-border) 50%,
            var(--fede-surface-sunken) 75%
        );
        background-size: 200% 100%;
        animation: fede-shimmer 1.4s ease infinite;
        border-radius: var(--fede-r-sm);
    }

    /* SyncPill — estado de sincronización */
    .fede-sync-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: var(--fede-r-pill);
        font: var(--fede-caption);
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    .fede-sync-pill::before {
        content: '';
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
    }
    .fede-sync-pill[data-state="online"]  { background: #dcfce7; color: #166534; }
    .fede-sync-pill[data-state="online"]::before  { background: #16a34a; }
    .fede-sync-pill[data-state="syncing"] { background: #dbeafe; color: #1e40af; }
    .fede-sync-pill[data-state="syncing"]::before { background: #2563eb; animation: fede-pulse 1s infinite; }
    .fede-sync-pill[data-state="offline"] { background: #f3f4f6; color: #4b5563; }
    .fede-sync-pill[data-state="offline"]::before { background: #9ca3af; }
    .fede-sync-pill[data-state="error"]   { background: #fee2e2; color: #991b1b; }
    .fede-sync-pill[data-state="error"]::before   { background: #dc2626; }

    @keyframes fede-pulse {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.4; }
    }

    /* AlertCard */
    .fede-alert {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 12px 14px;
        border-radius: var(--fede-r-md);
        border-left: 3px solid;
        font-family: "Inter", system-ui, sans-serif;
    }
    .fede-alert[data-tone="info"]    { background: #eff6ff; border-color: var(--fede-info);    color: #1e3a8a; }
    .fede-alert[data-tone="warning"] { background: #fffbeb; border-color: var(--fede-warning); color: #92400e; }
    .fede-alert[data-tone="danger"]  { background: #fef2f2; border-color: var(--fede-danger);  color: #7f1d1d; }
    .fede-alert-title { font: var(--fede-label); font-weight: 600; }
    .fede-alert-body  { font: var(--fede-caption); opacity: 0.85; }
    .fede-alert-cta   {
        margin-top: 4px;
        align-self: flex-start;
        font: var(--fede-caption);
        font-weight: 600;
        text-decoration: underline;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        color: inherit;
    }

    /* ActionCard — acceso rápido a modos */
    .fede-action-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 16px;
        border-radius: var(--fede-r-lg);
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        position: relative;
        overflow: hidden;
        touch-action: manipulation;
        font-family: "Inter", system-ui, sans-serif;
    }
    .fede-action-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: var(--fede-accent, var(--fede-accent-pedido));
    }
    .fede-action-card:active {
        transform: scale(0.97);
        box-shadow: 0 0 0 2px var(--fede-accent, var(--fede-accent-pedido));
    }
    .fede-action-card-icon {
        width: 36px; height: 36px;
        border-radius: var(--fede-r-sm);
        background: color-mix(in srgb, var(--fede-accent, var(--fede-accent-pedido)) 12%, transparent);
        display: flex; align-items: center; justify-content: center;
        color: var(--fede-accent, var(--fede-accent-pedido));
    }
    .fede-action-card-label { font: var(--fede-label); font-weight: 600; color: var(--fede-on-surface); }
    .fede-action-card-badge { font: var(--fede-caption); color: var(--fede-on-surface-3); }

    /* Stepper FeDe */
    .fede-stepper {
        display: flex;
        align-items: stretch;
        border: 1.5px solid var(--fede-border);
        border-radius: var(--fede-r-md);
        overflow: hidden;
        height: 48px;
        background: var(--fede-surface);
        font-family: "Inter", system-ui, sans-serif;
    }
    .fede-stepper-btn {
        width: 48px; min-width: 48px;
        display: flex; align-items: center; justify-content: center;
        background: var(--fede-surface-sunken);
        border: none;
        font-size: 18px; font-weight: 600;
        color: var(--fede-on-surface);
        cursor: pointer;
        transition: background 0.1s ease;
        touch-action: manipulation;
    }
    .fede-stepper-btn:active { background: var(--fede-border); }
    .fede-stepper-val {
        flex: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        border-left: 1.5px solid var(--fede-border);
        border-right: 1.5px solid var(--fede-border);
        font-size: 16px; font-weight: 600;
        color: var(--fede-on-surface);
        font-variant-numeric: tabular-nums;
        cursor: pointer;
    }
    .fede-stepper-unit {
        font: var(--fede-caption);
        color: var(--fede-on-surface-3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       FEDE MODO OPERATIVO — Fase 4
       Restyling de cat-grid, prod-row, stepper, ctx-bar, sync-overlay
       con tokens --fede-*. Los elementos son generados por app.html JS.
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ── AppBar modo operativo ─────────────────────────────────────────────── */
    .fede-app-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--fede-surface);
        border-bottom: 1px solid var(--fede-border);
        font-family: 'Inter', system-ui, sans-serif;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .fede-app-bar-mode-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--fede-accent, var(--fede-accent-pedido));
        flex-shrink: 0;
    }
    .fede-app-bar-title {
        flex: 1;
        font: var(--fede-h2);
        font-weight: 700;
        color: var(--fede-on-surface);
    }
    .fede-app-bar-count {
        font: var(--fede-caption);
        font-weight: 600;
        color: var(--fede-accent, var(--fede-accent-pedido));
        background: color-mix(in srgb, var(--fede-accent, var(--fede-accent-pedido)) 10%, transparent);
        padding: 3px 9px;
        border-radius: var(--fede-r-pill);
    }
    .fede-app-bar-btn {
        width: 34px; height: 34px;
        border-radius: var(--fede-r-sm);
        border: 1px solid var(--fede-border);
        background: var(--fede-surface);
        display: inline-flex; align-items: center; justify-content: center;
        cursor: pointer; touch-action: manipulation;
    }

    /* ── Category header en prod-section ──────────────────────────────────── */
    #prod-section .fede-cat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 8px;
        position: sticky;
        top: 53px; /* debajo del AppBar */
        background: var(--fede-bg);
        z-index: 9;
        border-bottom: 1px solid var(--fede-divider);
    }
    #prod-section .fede-cat-header h2 {
        font: var(--fede-h2);
        font-weight: 700;
        color: var(--fede-on-surface);
        margin: 0;
    }
    #prod-section .fede-mode-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font: var(--fede-caption);
        font-weight: 600;
        color: var(--fede-accent, var(--fede-accent-pedido));
        background: color-mix(in srgb, var(--fede-accent, var(--fede-accent-pedido)) 10%, transparent);
        padding: 4px 10px;
        border-radius: var(--fede-r-pill);
        cursor: pointer;
        touch-action: manipulation;
        border: none;
    }

    /* ── Category Grid (generado por JS: .cat-grid + .cat-btn) ────────────── */
    #view-relevamiento .cat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 16px;
        background: var(--fede-bg);
    }
    #view-relevamiento .cat-btn {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        padding: 16px;
        background: var(--fede-surface);
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-lg);
        cursor: pointer;
        touch-action: manipulation;
        text-align: left;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
        font-family: 'Inter', system-ui, sans-serif;
        position: relative;
        overflow: hidden;
    }
    #view-relevamiento .cat-btn::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: var(--fede-accent, var(--fede-accent-pedido));
        opacity: 0.8;
    }
    #view-relevamiento .cat-btn:active {
        transform: scale(0.97);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--fede-accent, var(--fede-accent-pedido)) 30%, transparent);
    }
    #view-relevamiento .cat-btn .cat-icon {
        width: 36px; height: 36px;
        border-radius: var(--fede-r-sm);
        background: color-mix(in srgb, var(--fede-accent, var(--fede-accent-pedido)) 12%, transparent);
        display: flex; align-items: center; justify-content: center;
        color: var(--fede-accent, var(--fede-accent-pedido));
    }
    #view-relevamiento .cat-btn .cat-name {
        font: var(--fede-label);
        font-weight: 600;
        color: var(--fede-on-surface);
        line-height: 1.2;
    }
    #view-relevamiento .cat-btn .cat-count {
        font: var(--fede-caption);
        color: var(--fede-on-surface-3);
    }

    /* ── Product Rows (generado por JS: .prod-row) ─────────────────────────── */
    #prod-list .prod-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--fede-divider);
        background: var(--fede-surface);
        font-family: 'Inter', system-ui, sans-serif;
        transition: background 0.1s ease;
    }
    #prod-list .prod-row:first-child { border-radius: var(--fede-r-md) var(--fede-r-md) 0 0; }
    #prod-list .prod-row:last-child  { border-radius: 0 0 var(--fede-r-md) var(--fede-r-md); border-bottom: none; }
    #prod-list .prod-row.loaded {
        background: color-mix(in srgb, var(--fede-accent, var(--fede-accent-pedido)) 5%, var(--fede-surface));
    }
    #prod-list .prod-name {
        flex: 1;
        font: var(--fede-body);
        font-weight: 500;
        color: var(--fede-on-surface);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    #prod-list .prod-name.loaded-name { color: var(--fede-on-surface); font-weight: 600; }

    /* ── Stepper inline (generado por JS: .stepper) ────────────────────────── */
    #prod-list .stepper {
        display: flex;
        align-items: stretch;
        border: 1.5px solid var(--fede-border);
        border-radius: var(--fede-r-md);
        overflow: hidden;
        height: 44px;
        background: var(--fede-surface);
        flex-shrink: 0;
    }
    #prod-list .stepper .step-btn {
        width: 40px; min-width: 40px;
        display: flex; align-items: center; justify-content: center;
        background: var(--fede-surface-sunken);
        border: none;
        font-size: 18px; font-weight: 600;
        color: var(--fede-on-surface);
        cursor: pointer;
        touch-action: manipulation;
        transition: background 0.1s;
    }
    #prod-list .stepper .step-btn:active { background: var(--fede-border); }
    #prod-list .stepper .step-val {
        min-width: 44px; max-width: 60px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        border-left: 1.5px solid var(--fede-border);
        border-right: 1.5px solid var(--fede-border);
        font-size: 15px; font-weight: 700;
        color: var(--fede-on-surface);
        font-variant-numeric: tabular-nums;
        cursor: pointer;
        padding: 0 4px;
    }
    #prod-list .stepper .step-val.filled {
        color: var(--fede-accent, var(--fede-accent-pedido));
    }
    #prod-list .stepper .step-unit {
        font: var(--fede-caption);
        color: var(--fede-on-surface-3);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        font-size: 10px;
    }

    /* ── Ctx-bar (barra SALIR / FINALIZAR) ─────────────────────────────────── */
    .ctx-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
        background: var(--fede-surface);
        border-top: 1px solid var(--fede-border);
        gap: 10px;
        font-family: 'Inter', system-ui, sans-serif;
    }
    .ctx-bar.hidden { display: none; }
    .ctx-exit {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        border: 1px solid var(--fede-border);
        border-radius: var(--fede-r-md);
        background: transparent;
        color: var(--fede-on-surface-2);
        font: var(--fede-label);
        font-weight: 600;
        cursor: pointer;
        touch-action: manipulation;
    }
    .ctx-send {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        border: none;
        border-radius: var(--fede-r-md);
        background: var(--fede-accent, var(--fede-accent-pedido));
        color: #fff;
        font: var(--fede-label);
        font-weight: 700;
        cursor: pointer;
        touch-action: manipulation;
        transition: opacity 0.15s;
    }
    .ctx-send:active { opacity: 0.85; }
    .ctx-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: var(--fede-r-pill);
        background: rgba(255,255,255,0.22);
        font: var(--fede-caption);
        font-weight: 700;
    }

    /* ── Sync overlay (restyled) ────────────────────────────────────────────── */
    .sync-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(15, 18, 23, 0.72);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-family: 'Inter', system-ui, sans-serif;
    }
    .sync-overlay .sync-spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-overlay .sync-text {
        font: var(--fede-label);
        font-weight: 600;
        color: rgba(255,255,255,0.85);
        letter-spacing: 0.3px;
        text-transform: none;
    }

    /* ── Command Deck (bottom search) ──────────────────────────────────────── */
    .mcf-command-deck.global {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 150;
        background: var(--fede-surface);
        border-top: 1px solid var(--fede-border);
        padding: 8px 16px calc(8px + env(safe-area-inset-bottom, 0px));
        font-family: 'Inter', system-ui, sans-serif;
        transition: transform 0.2s ease;
    }
    .mcf-command-deck.global.hdr-search-hidden {
        transform: translateY(calc(100% + 1px));
    }
    .mcf-deck-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 44px;
        background: var(--fede-surface-sunken);
        border-radius: var(--fede-r-md);
        padding: 0 14px;
        color: var(--fede-on-surface-3);
    }
    .mcf-deck-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .mcf-deck-wrap input {
        flex: 1;
        border: none;
        background: transparent;
        font: var(--fede-body);
        color: var(--fede-on-surface);
        outline: none;
    }
    .mcf-deck-wrap input::placeholder { color: var(--fede-on-surface-3); }

    /* ═══════════════════════════════════════════════════════════════════════════
       FIN FEDE DESIGN SYSTEM v2
       ═══════════════════════════════════════════════════════════════════════════ */



    html.theme-mcf {

        background: var(--mcf-bg) !important;
        min-height: 100vh !important;
        margin: 0;
        padding: 0;
    }

    body.theme-mcf {
        background: var(--mcf-bg) !important;
        background-image: none !important;
        color: var(--mcf-ink) !important;
        font-family: var(--font-family) !important;
        margin: 0;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }

    body.theme-mcf * {
        box-sizing: border-box !important;
        border-radius: 0 !important;
        -webkit-tap-highlight-color: transparent;
        box-shadow: none !important; /* Technical Drawing: Shadow-less */
    }

    @media (prefers-reduced-motion: reduce) {
        body.theme-mcf * {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
            scroll-behavior: auto !important;
        }
    }

    /* ——————————————————————————————————————————————————————————————————————————
       PHASE 05: ILLUSTRATION SYSTEM (McFetridge Motifs)
       —————————————————————————————————————————————————————————————————————————— */
    .mcf-ill {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        background: var(--mcf-surface);
        border: var(--border-main);
    }

    /* Scales */
    .mcf-ill-sm { width: 120px; height: 120px; }
    .mcf-ill-md { width: 180px; height: 180px; }
    .mcf-ill-lg { width: 280px; height: 280px; }

    /* Motif 01: Flat Figure */
    .motif-figure {
        background-image: url("data:image/svg+xml,%3Csvg width='160' height='200' viewBox='0 0 160 200' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='80' cy='50' r='30' fill='%23D4937A' stroke='%231A1816' stroke-width='1.5'/%3E%3Crect x='55' y='85' width='50' height='80' fill='%23D4937A' stroke='%231A1816' stroke-width='1.5'/%3E%3Crect x='20' y='95' width='35' height='12' fill='%23D4937A' stroke='%231A1816' stroke-width='1.5'/%3E%3Crect x='105' y='95' width='35' height='12' fill='%23D4937A' stroke='%231A1816' stroke-width='1.5'/%3E%3Crect x='50' y='168' width='20' height='25' fill='%23D4937A' stroke='%231A1816' stroke-width='1.5'/%3E%3Crect x='90' y='168' width='20' height='25' fill='%23D4937A' stroke='%231A1816' stroke-width='1.5'/%3E%3C/svg%3E");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }

    /* Motif 02: Puzzle Grid */
    .motif-puzzle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
    }
    .motif-puzzle div { border: 0.75px solid var(--mcf-ink); }
    .motif-puzzle .p1 { background: var(--mcf-rose); }
    .motif-puzzle .p2 { background: var(--mcf-sage); }
    .motif-puzzle .p3 { background: var(--mcf-slate); }
    .motif-puzzle .p4 { background: var(--mcf-mauve); }

    /* Motif 03: Repetition Field */
    .motif-repetition {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        padding: 16px;
    }
    .motif-repetition div {
        aspect-ratio: 1;
        border-radius: 50%;
        border: 1.5px solid var(--mcf-ink);
        background: var(--mcf-slate-lt);
    }
    .motif-repetition div.accent { background: var(--mcf-amber); }

    /* Motif 04: Split Space */
    .motif-split {
        display: flex;
        border: 1.5px solid var(--mcf-ink);
    }
    .motif-split .left, .motif-split .right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .motif-split .left { background: var(--mcf-paper); border-right: 1.5px solid var(--mcf-ink); }
    .motif-split .right { background: var(--mcf-ink); }

    /* Motif 05: Outline Emphasis */
    .motif-outline {
        border: 1.5px solid var(--mcf-ink);
        position: relative;
    }
    .motif-outline::before, .motif-outline::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 2px;
        background: var(--mcf-rose);
    }
    .motif-outline::before { top: 10px; left: 10px; }
    .motif-outline::after { bottom: 10px; right: 10px; background: var(--mcf-sage); }

    /* Motif 06: Layered Composition */
    .motif-layered {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .motif-layered .layer {
        border: 1.5px solid var(--mcf-ink);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .motif-layered .l1 { width: 90%; height: 90%; background: var(--mcf-slate-lt); }
    .motif-layered .l2 { width: 70%; height: 70%; background: var(--mcf-mauve-lt); }
    .motif-layered .l3 { width: 40%; height: 40%; background: var(--mcf-rose-lt); }


    /* 🧱 PHASE 04: COMPONENT LIBRARY (Normalized Modules) */
    /* 🎛️ PHASE 04: COMPONENT LIBRARY (High-Precision Controls) */
    .btn {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        border: 4px solid var(--mcf-ink) !important;
        background: var(--mcf-bg) !important;
        color: var(--mcf-ink) !important;
        padding: 10px 20px !important;
        font-size: 13px !important;
        font-weight: 950 !important;
        text-transform: uppercase !important;
        letter-spacing: 1.2px !important;
        cursor: pointer !important;
        transition: background 0.15s cubic-bezier(0.4, 0, 0.2, 1), transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1) !important;
        position: relative !important;
        overflow: hidden !important;
        user-select: none !important;
        white-space: nowrap !important;
        border-radius: 0 !important;
        font-family: var(--mcf-font-display) !important;
        box-shadow: 8px 8px 0px var(--mcf-ink) !important;
        aspect-ratio: unset !important;
        width: auto !important;
        flex-direction: row !important;
    }

    .btn:active {
        transform: translate(4px, 4px) !important;
        box-shadow: 4px 4px 0px var(--mcf-ink) !important;
        background: var(--mcf-paper) !important;
    }
    .btn:hover { background: var(--mcf-paper) !important; }

    /* Button Sizes */
    .btn-sm {
        padding: 6px 12px !important;
        font-size: 11px !important;
        gap: 4px !important;
        border-width: 2px !important;
        box-shadow: 4px 4px 0px var(--mcf-ink) !important;
    }
    .btn-sm:active {
        transform: translate(2px, 2px) !important;
        box-shadow: 2px 2px 0px var(--mcf-ink) !important;
    }
    .btn-md { padding: 10px 20px; font-size: 13px; }
    .btn-lg { padding: 14px 28px; font-size: 14px; }

    /* Button Variants */
    /* rose/sage/mauve usan --mcf-ink (ratio ≥4.5:1) en lugar de --mcf-bg (ratio ~2.3:1) */
    .btn-rose  { background: var(--mcf-rose); color: var(--mcf-ink); border-color: var(--mcf-ink); }
    .btn-sage  { background: var(--mcf-sage); color: var(--mcf-ink); border-color: var(--mcf-ink); }
    .btn-slate { background: var(--mcf-slate); color: var(--mcf-bg); border-color: var(--mcf-ink); }
    .btn-mauve { background: var(--mcf-mauve); color: var(--mcf-ink); border-color: var(--mcf-ink); }
    .btn-amber { background: var(--mcf-amber); color: var(--mcf-ink); border-color: var(--mcf-ink); }
    .btn-ink   { background: var(--mcf-ink); color: var(--mcf-bg); border-color: var(--mcf-ink); }
    .btn-ghost { background: transparent !important; border-color: var(--mcf-ink) !important; color: var(--mcf-ink) !important; box-shadow: 4px 4px 0px rgba(26, 24, 22, 0.35) !important; }
    .btn-ghost:hover { background: rgba(26, 24, 22, 0.05) !important; }

    /* Context-Specific Styling */
    .btn-whatsapp { background: var(--mcf-sage); color: var(--mcf-bg); border-width: 2px; }
    .btn-delete   { background: transparent !important; color: var(--mcf-rose) !important; border-color: var(--mcf-rose) !important; box-shadow: 4px 4px 0px var(--mcf-rose) !important; }
    .btn-confirm  { background: var(--mcf-ink) !important; color: var(--mcf-bg) !important; }

    /* ── REALIZAR PEDIDO — CTA de alta jerarquía ──
       Barra de comando de ancho completo, diseño "Terminal de Despacho"
       Sin clases btn-amber/btn-confirm para evitar conflictos */
    #btn-realizar-pedido {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        width: 100% !important;
        padding: 16px 20px !important;
        margin-bottom: 8px !important;   /* Garantía anti-clipping */
        background: var(--mcf-ink) !important;
        color: var(--mcf-paper) !important;
        border: 4px solid var(--mcf-ink) !important;
        box-shadow: 6px 6px 0px var(--mcf-amber) !important;
        cursor: pointer !important;
        touch-action: manipulation !important;
        box-sizing: border-box !important;
        min-height: 72px !important;
        transition: transform 0.12s var(--mcf-snap), box-shadow 0.12s var(--mcf-snap) !important;
        font-family: var(--mcf-font-display) !important;
        outline: none !important;
    }
    #btn-realizar-pedido:active {
        transform: translate(4px, 4px) !important;
        box-shadow: 2px 2px 0px var(--mcf-amber) !important;
    }
    /* El estado .hidden lo gestiona JS — no sobreescribir display cuando está oculto */
    #btn-realizar-pedido.hidden {
        display: none !important;
    }



    /* Utility Buttons */
    .mcf-mini-btn { width: 40px; height: 40px; padding: 0 !important; flex-shrink: 0; }
    .mcf-mini-btn i { width: 16px; height: 16px; }


    .badge {
        display: inline-block !important;
        padding: var(--s-xs) var(--s-md) !important;
        font-size: var(--font-size-label) !important;
        font-weight: var(--font-weight-xbold) !important;
        letter-spacing: 0.08em !important;
        text-transform: uppercase !important;
        border: var(--border-main) !important;
        border-radius: 0 !important;
    }

    /* rose/sage/mauve/amber usan --mcf-ink para texto (WCAG AA) */
    .badge-rose  { background: var(--mcf-rose) !important; color: var(--mcf-ink) !important; border-color: var(--mcf-rose) !important; }
    .badge-sage  { background: var(--mcf-sage) !important; color: var(--mcf-ink) !important; border-color: var(--mcf-sage) !important; }
    .badge-slate { background: var(--mcf-slate) !important; color: var(--mcf-bg) !important; border-color: var(--mcf-slate) !important; }
    .badge-mauve { background: var(--mcf-mauve) !important; color: var(--mcf-ink) !important; border-color: var(--mcf-mauve) !important; }
    .badge-amber { background: var(--mcf-amber) !important; color: var(--mcf-ink) !important; border-color: var(--mcf-amber) !important; }
    .badge-ink   { background: var(--mcf-ink) !important; color: var(--mcf-bg) !important; border-color: var(--mcf-ink) !important; }

    /* Surgical Stepper */
    .stepper { 
        display: flex; 
        align-items: center; 
        border: var(--border-main); 
        background: var(--mcf-bg); 
        height: 52px;
        overflow: hidden;
    }
    .stepper-btn { 
        width: 48px; 
        height: 100%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: transparent; 
        border: none; 
        cursor: pointer; 
        color: var(--mcf-ink); 
        font-size: 20px; 
        font-weight: 950;
        transition: background 0.1s;
    }
    .stepper-btn:active { background: rgba(26,24,22,0.1); }
    .stepper-val { 
        flex: 1;
        min-width: 60px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-left: var(--border-main);
        border-right: var(--border-main);
        cursor: pointer;
        user-select: none;
    }
    .stepper-qty { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 950; color: var(--mcf-ink); line-height: 1; }
    .stepper-unit { font-size: 9px; font-weight: 950; text-transform: uppercase; letter-spacing: 1px; color: var(--mcf-muted); margin-top: 2px; }


    .card {
        border: var(--border-main) !important;
        overflow: hidden !important;
        background: var(--mcf-bg) !important;
        display: flex !important;
        flex-direction: column !important;
    }

    .card-head { height: 10px !important; background: var(--mcf-rose) !important; flex-shrink: 0 !important; }
    .card-head.sage  { background: var(--mcf-sage) !important; }
    .card-head.slate { background: var(--mcf-slate) !important; }
    .card-head.mauve { background: var(--mcf-mauve) !important; }
    .card-head.amber { background: var(--mcf-amber) !important; }

    .card-body  { padding: var(--s-lg) !important; }
    .card-label { font-size: var(--font-size-label) !important; font-weight: var(--font-weight-bold) !important; text-transform: uppercase !important; color: var(--mcf-muted) !important; margin-bottom: var(--s-xs) !important; }
    .card-title { font-size: var(--font-size-h) !important; font-weight: var(--font-weight-xbold) !important; color: var(--mcf-ink) !important; margin-bottom: var(--s-sm) !important; line-height: 1.2 !important; }
    .card-desc  { font-size: var(--font-size-small) !important; color: var(--mcf-muted) !important; line-height: 1.5 !important; }

    .form-group { margin-bottom: var(--s-lg) !important; display: flex !important; flex-direction: column !important; }
    .form-label { font-size: var(--font-size-label) !important; font-weight: var(--font-weight-bold) !important; text-transform: uppercase !important; color: var(--mcf-muted) !important; margin-bottom: var(--s-sm) !important; }
    
    .form-input {
        border: var(--border-main) !important;
        padding: var(--s-sm) var(--s-md) !important;
        font-size: var(--font-size-body) !important;
        font-family: inherit !important;
        color: var(--mcf-ink) !important;
        background: var(--mcf-bg) !important;
        border-radius: 0 !important;
    }

    .form-input:focus { outline: none !important; border-color: var(--mcf-rose) !important; }

    /* 🧱 UTILITIES (Phase 04) */
    .mcf-p-xs { padding: var(--s-xs) !important; }
    .mcf-p-sm { padding: var(--s-sm) !important; }
    .mcf-p-md { padding: var(--s-md) !important; }
    .mcf-p-lg { padding: var(--s-lg) !important; }
    .mcf-p-xl { padding: var(--s-xl) !important; }

    .mcf-gap-xs { gap: var(--s-xs) !important; }
    .mcf-gap-sm { gap: var(--s-sm) !important; }
    .mcf-gap-md { gap: var(--s-md) !important; }
    .mcf-gap-lg { gap: var(--s-lg) !important; }
    .mcf-gap-xl { gap: var(--s-xl) !important; }

    body.theme-mcf :focus-visible {
        outline: 2px solid var(--mcf-ink) !important;
        outline-offset: 2px !important;
        z-index: 999999 !important;
    }

    /* Theme-Mode Semantic Mapping */
    body.theme-pedido {
        --mode-color: var(--mcf-rose);
        --mode-bg: var(--mcf-rose-lt);
    }

    body.theme-stock {
        --mode-color: var(--mcf-slate);
        --mode-bg: var(--mcf-slate-lt);
    }

    body.theme-recepcion {
        --mode-color: var(--mcf-sage);
        --mode-bg: var(--mcf-sage-lt);
    }

    body.theme-merma {
        --mode-color: var(--mcf-mauve);
        --mode-bg: var(--mcf-mauve-lt);
    }

    body:not([class*="theme-"]) {
        --mode-color: var(--mcf-ink);
        --mode-bg: var(--mcf-paper);
    }

    /* Unified Tags logic handled in adaptive sections below */

    /* 🏙️ ADAPTIVE COMMAND SYSTEMS (Search) - FRONTEND DESIGN V2 */
    .mcf-command-deck {
        position: fixed !important;
        left: 16px !important;
        right: 16px !important;
        z-index: 20000 !important;
        display: none !important; 
        bottom: 16px !important; 
        height: 64px !important; /* Technical precision */
        background: var(--mcf-bg) !important;
        border: var(--border-main) !important;
        box-shadow: none !important; 
        transform: translate(0, 0); 
        box-sizing: border-box;
        pointer-events: auto !important;
        transition: transform 0.2s var(--mcf-snap), bottom 0.3s var(--mcf-snap) !important;
    }

    body.view-relevamiento .mcf-command-deck {
        display: block !important;
        transform: translateY(0) !important;
        pointer-events: auto !important;
        opacity: 1 !important;
        visibility: visible !important;
    }

    /* ⚡ ACTIVE PRESSED STATE (On Focus) */
    .mcf-command-deck:focus-within {
        transform: translate(10px, 10px) !important;
        box-shadow: none !important;
    }

    /* Dynamic Elevation: Above Contextual Bar when active */
    body.theme-mcf .ctx-bar:not(.hidden) ~ .mcf-command-deck,
    body.theme-mcf .ctx-bar:not(.hidden) ~ #app .mcf-command-deck {
        bottom: 86px !important;
    }

    .mcf-command-deck.hdr-search-hidden {
        transform: translateY(180%) !important;
        pointer-events: none !important;
    }

    .mcf-command-deck.hdr-search-active,
    .mcf-command-deck.hdr-search-persistent {
        transform: translateY(0) !important;
        pointer-events: auto !important;
        opacity: 1 !important;
        visibility: visible !important;
    }


    .mcf-deck-icon {
        width: 32px !important;
        height: 32px !important;
        stroke-width: 1.2px !important;
        color: var(--mcf-ink) !important;
        margin-right: 18px !important;
        flex-shrink: 0;
    }

    .mcf-deck-wrap input {
        border: none !important;
        background: transparent !important;
        color: var(--mcf-ink) !important;
        font-family: var(--font-family) !important;
        font-weight: var(--font-weight-xbold) !important;
        font-size: var(--font-size-body) !important;
        flex: 1;
        outline: none !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: none !important;
    }

    .mcf-deck-wrap input::placeholder {
        color: var(--mcf-ink-ghost) !important;
        opacity: 0.6;
        transition: opacity 0.15s ease;
    }

    /* Clear placeholder immediately on focus */
    .mcf-deck-wrap input:focus::placeholder {
        opacity: 0 !important;
    }

    .mcf-command-deck,
    .mcf-command-deck:focus,
    .mcf-command-deck:focus-within {
        outline: none !important;
        -webkit-appearance: none !important;
        appearance: none !important;
    }

    /* El input de búsqueda usa box-shadow como indicador de foco en lugar de outline */
    .mcf-deck-wrap input:focus-visible {
        outline: none !important;
        box-shadow: inset 0 -2px 0 var(--mcf-ink) !important;
    }



    .mcf-search-results-overlay {
        position: absolute !important;
        bottom: calc(100% + var(--s-xs)) !important;
        left: -1.5px !important;
        right: -1.5px !important;
        background: var(--mcf-bg) !important;
        border: var(--border-main) !important;
        border-bottom: none !important;
        box-shadow: none !important;
        max-height: 50vh;
        overflow-y: auto;
        z-index: 6000 !important;
        display: none;
    }

    /* Results visibility logic tied to content — display toggled via JS */

    /* 🧱 TECTONIC PULSE (Success Search Indicator) */
    @keyframes mcf-found-pulse {
        0% {
            background: var(--mcf-bg);
            filter: brightness(1);
        }

        30% {
            background: var(--mcf-amber);
            filter: brightness(1.2);
            box-shadow: 0 0 40px var(--mcf-amber);
        }

        100% {
            background: var(--mcf-bg);
            filter: brightness(1);
        }
    }

    .mcf-found-highlight {
        animation: mcf-found-pulse 1s var(--mcf-industrial) !important;
        position: relative;
        z-index: 5;
    }

    /* Force hide redundant systems */
    .mcf-top-bar,
    .hdr-search-container,
    .hdr-search-wrap {
        display: none !important;
    }

    body.theme-mcf .mcf-command-deck:focus-within ~ .tabs,
    body.theme-mcf .mcf-command-deck.hdr-search-active ~ .tabs {
        display: none !important;
    }

    /* Pushes content down ONLY when top-bar is active */
    body.theme-mcf .ctx-bar:not(.hidden)~.view .scroll-content,
    body.theme-mcf .ctx-bar:not(.hidden)~main .scroll-content {
        padding-top: 20px !important;
    }

    body.theme-mcf .ctx-bar:not(.hidden)~.mcf-command-deck,
    body.theme-mcf .ctx-bar:not(.hidden)~#app .mcf-command-deck {
        bottom: 86px !important;
        display: block !important; /* Ensure it stays visible above the bar */
    }

    body.theme-mcf .ctx-bar:not(.hidden)~#app .tabs {
        display: none !important;
    }

    /* 🔍 SEARCH RESULTS (Interactive & Thumb-Centric) */
    .mcf-res-item {
        padding: 16px 20px !important;
        background: var(--mcf-paper) !important;

        animation: mcfReveal 0.6s var(--mcf-snap) both;

    /* Loader Focaccia -> McFetridge */
    /* 🚀 PHASE 08: ZEN-TECH LOADER (Technical Blueprint) */
    #loader {
        position: fixed;
        inset: 0;
        background: var(--mcf-bg) !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-image: 
            linear-gradient(rgba(26,24,22,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(26,24,22,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: 9999999; 
        transition: opacity 0.6s var(--mcf-snap), visibility 0.6s var(--mcf-snap);
        opacity: 1;
        visibility: visible;
    }

    #loader.loader-hidden {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
    }



    .loader-wrapper {
        position: relative;
        width: 180px;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;

    }

    /* Geometric Core (Puzzle Motif) */
    .loader-core {
        width: 140px;
        height: 140px;
        border: 1.5px solid var(--mcf-ink);
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        position: relative;
        overflow: hidden;
        animation: mcfPulse 2s infinite ease-out;
    }
    .loader-core div { border: 0.5px solid rgba(26,24,22,0.1); transition: background 0.3s; }
    .loader-core .c1 { background: var(--mcf-rose); }
    .loader-core .c2 { background: var(--mcf-sage); }
    .loader-core .c3 { background: var(--mcf-slate); }
    .loader-core .c4 { background: var(--mcf-mauve); }

    /* Scanning Line */
    .loader-scanner {
        position: absolute;
        width: 100%;
        height: 2px;
        background: var(--mcf-ink);
        top: 0;
        left: 0;
        z-index: 10;
        box-shadow: 0 0 15px var(--mcf-ink);
        animation: mcfScan 2.5s infinite linear;
    }

    .loader-perc {
        position: absolute;
        font-family: 'Outfit', sans-serif;
        font-size: 32px;
        font-weight: 950;
        color: var(--mcf-ink) !important;
        background: var(--mcf-bg);
        padding: 4px 12px;
        border: 1.5px solid var(--mcf-ink);
        z-index: 20;
        letter-spacing: -1px;
    }

    .loader-status {
        font-size: 11px;
        font-weight: 900;
        color: var(--mcf-ink) !important;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        opacity: 0.7;
        position: relative;
    }

    .loader-status::after {
        content: '';
        position: absolute;
        right: -15px;
        width: 8px;
        height: 1.5px;
        background: var(--mcf-ink);
        bottom: 4px;
        animation: mcfBlink 0.8s infinite;
    }

    @keyframes mcfScan {
        0% { top: 0; }
        50% { top: 100%; }
        100% { top: 0; }
    }

    @keyframes mcfPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); border-width: 2px; }
    }

    @keyframes mcfBlink {
        0%, 100% { opacity: 1; }

    }
