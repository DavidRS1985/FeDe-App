    var PROD_LOOKUP = {};  // Índice inverso prod → { cat, idx } — M1

    var units = [

        "cajón/es", "bolsa/s", "bandeja/s", "caja/s", "maple/s",
        "botella/s", "lata/s", "frasco/s", "sachet/s", "balde/s",
        "sobre/s", "pack/s", "atado/s", "taper/s", "tubo/s",

    /* ══════════════════════════════════════════════════════════════════════════
       UNIT_REGISTRY v3 — Sistema de Unidades Industrial
       Schema por entrada:
         dimension  : "mass" | "volume" | "count" | "packaging"
         nature     : "continuous" | "discrete"
         system     : "metric" | null
         step       : number  — incremento default del stepper
         baseUnit   : string | null — unidad base para conversión (null = ya es base)
         toBaseFactor: number | null — factor para convertir a baseUnit
    ══════════════════════════════════════════════════════════════════════════ */
    var UNIT_REGISTRY = {
        _table: {
            /* ── Peso métrico ── */
            "kg":       { dimension: "mass",      nature: "continuous", system: "metric", step: 0.5, baseUnit: null,       toBaseFactor: null    },
            "gr":       { dimension: "mass",      nature: "continuous", system: "metric", step: 50,  baseUnit: "kg",        toBaseFactor: 0.001   },
            /* ── Volumen métrico ── */
            "lt":       { dimension: "volume",    nature: "continuous", system: "metric", step: 0.5,  baseUnit: null, toBaseFactor: null    },
            "ml":       { dimension: "volume",    nature: "continuous", system: "metric", step: 50,   baseUnit: "lt", toBaseFactor: 0.001   },
            "cc":       { dimension: "volume",    nature: "continuous", system: "metric", step: 5,    baseUnit: "lt", toBaseFactor: 0.001   },
            /* ── Volumen culinario (1 taza=240ml, 1 cda=15ml, 1 cdita=5ml) ── */
            "taza":     { dimension: "volume",    nature: "continuous", system: null,     step: 0.25, baseUnit: "lt", toBaseFactor: 0.240   },
            "cda":      { dimension: "volume",    nature: "continuous", system: null,     step: 0.5,  baseUnit: "lt", toBaseFactor: 0.015   },
            "cdita":    { dimension: "volume",    nature: "continuous", system: null,     step: 0.25, baseUnit: "lt", toBaseFactor: 0.005   },
            /* ── Conteo discreto ── */
            "unidad/es":{ dimension: "count",     nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "pieza/s":  { dimension: "count",     nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "porción/es":{ dimension: "count",    nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "docena/s": { dimension: "count",     nature: "discrete",   system: null,     step: 1,   baseUnit: "unidad/es", toBaseFactor: 12      },
            "horma/s":  { dimension: "count",     nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "penca/s":  { dimension: "count",     nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            /* ── Envases / packaging ── */
            "cajón/es": { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "bolsa/s":  { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "bandeja/s":{ dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "caja/s":   { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "maple/s":  { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "botella/s":{ dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "lata/s":   { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "frasco/s": { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "sachet/s": { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "balde/s":  { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "sobre/s":  { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "pack/s":   { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "atado/s":  { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "taper/s":  { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    },
            "tubo/s":   { dimension: "packaging", nature: "discrete",   system: null,     step: 1,   baseUnit: null,        toBaseFactor: null    }
        },

        get: function (unit) {
            if (!unit || typeof unit !== 'string') return null;
            return this._table[unit.toLowerCase()] || null;
        },
        getStep: function (unit) {
            var m = this.get(unit);
            return m ? m.step : 1;
        },
        isContinuous: function (unit) {
            var m = this.get(unit);
            return m ? m.nature === 'continuous' : false;
        },
        isDiscrete: function (unit) {
            var m = this.get(unit);
            return m ? m.nature === 'discrete' : true;
        },
        getDimension: function (unit) {
            var m = this.get(unit);
            return m ? m.dimension : null;
        },
        getBaseUnit: function (unit) {
            var m = this.get(unit);
            return m ? m.baseUnit : null;
        },
        getFactor: function (unit) {
            var m = this.get(unit);
            return m ? m.toBaseFactor : null;
        }
    };

    /* ── Alias retrocompatible: código existente sigue usando UNIT_META ── */
    var UNIT_META = UNIT_REGISTRY._table;

    function getUnitStep(u) {
        return UNIT_REGISTRY.getStep(u);
    }

    /* ══════════════════════════════════════════════════════════════════════════
       UNIT_CONVERTER v1 — Conversión via grafo estrella implícito
       Flujo: from → baseUnit(from) ← to
       Reglas:
         - Misma unidad → retorna qty sin operar
         - Dimensiones distintas → retorna null
         - qty no numérico → retorna null
         - Factor 0 en registry → retorna null (guard división por cero)
    ══════════════════════════════════════════════════════════════════════════ */
    var UNIT_CONVERTER = {

        /* Resuelve la baseUnit de una unidad (si ya es base, retorna ella misma) */
        _resolveBase: function (unit) {
            var meta = UNIT_REGISTRY.get(unit);
            if (!meta) return null;
            return meta.baseUnit || unit;
        },

        /* Convierte una unidad a su base. Retorna number | null */
        _toBase: function (qty, unit) {
            var meta = UNIT_REGISTRY.get(unit);
            if (!meta) return null;
            if (!meta.baseUnit) return qty;                    /* ya es base */
            if (!meta.toBaseFactor) return null;               /* factor 0 o null — inválido */
            return parseFloat((qty * meta.toBaseFactor).toFixed(10));
        },

        /* Convierte desde base hacia una unidad destino. Retorna number | null */
        _fromBase: function (qtyInBase, toUnit) {
            var meta = UNIT_REGISTRY.get(toUnit);
            if (!meta) return null;
            if (!meta.baseUnit) return qtyInBase;              /* destino ya es la base */
            if (!meta.toBaseFactor) return null;
            return parseFloat((qtyInBase / meta.toBaseFactor).toFixed(10));
        },

        /* Convierte qty de fromUnit a toUnit. Retorna number | null */
        convert: function (qty, fromUnit, toUnit) {
            /* Guard: input numérico */
            if (typeof qty !== 'number' || isNaN(qty)) return null;

            /* Identidad */
            if (fromUnit === toUnit) return qty;

            var fromMeta = UNIT_REGISTRY.get(fromUnit);
            var toMeta   = UNIT_REGISTRY.get(toUnit);
            if (!fromMeta || !toMeta) return null;

            /* Guard: misma dimensión */
            if (fromMeta.dimension !== toMeta.dimension) return null;

            var fromBase = this._resolveBase(fromUnit);
            var toBase   = this._resolveBase(toUnit);

            /* Ambas unidades deben converger a la misma base */
            if (fromBase !== toBase) return null;

            var inBase = this._toBase(qty, fromUnit);
            if (inBase === null) return null;

            return this._fromBase(inBase, toUnit);
        },

        /* Verifica si la conversión es posible sin operar */
        canConvert: function (fromUnit, toUnit) {
            if (fromUnit === toUnit) return true;
            var fromMeta = UNIT_REGISTRY.get(fromUnit);
            var toMeta   = UNIT_REGISTRY.get(toUnit);
            if (!fromMeta || !toMeta) return false;
            if (fromMeta.dimension !== toMeta.dimension) return false;
            return this._resolveBase(fromUnit) === this._resolveBase(toUnit);
        },

        /* Normaliza qty+unit a la escala más legible.
           1500 gr → { qty: 1.5,  unit: "kg" }
           0.2  kg → { qty: 200,  unit: "gr" }
           1200 ml → { qty: 1.2,  unit: "lt" }
           0.3  lt → { qty: 300,  unit: "ml" }
           Invariante: convert(A→B)→convert(B→A) ≈ A (sin drift, toFixed(10) en _toBase/_fromBase)
           Unidades de conteo y packaging: sin normalización (retorna sin cambio). */
        normalize: function (qty, unit) {
            var meta = UNIT_REGISTRY.get(unit);
            if (!meta) return { qty: qty, unit: unit };

            if (unit === 'gr' && qty >= 1000)
                return { qty: parseFloat((qty / 1000).toFixed(6)),  unit: 'kg' };
            if (unit === 'ml' && qty >= 1000)
                return { qty: parseFloat((qty / 1000).toFixed(6)),  unit: 'lt' };
            if (unit === 'kg' && qty > 0 && qty < 1)
                return { qty: parseFloat((qty * 1000).toFixed(6)),  unit: 'gr' };
            if (unit === 'lt' && qty > 0 && qty < 1)
                return { qty: parseFloat((qty * 1000).toFixed(6)),  unit: 'ml' };

            return { qty: qty, unit: unit };
        }
    };

    /* ══════════════════════════════════════════════════════════════════════════
       PACK_FACTORS — Factores de conversión por producto (packaging)
       Tipo: { [productId]: { [packUnit]: factor } }
       Semántica del factor:
         - Si baseUnit del producto es "unidad/es": factor = unidades por envase
             "huevos" → { "maple/s": 30, "docena/s": 12 }
         - Si baseUnit del producto es "kg": factor = kg por envase
             "papa"   → { "bolsa/s": 20 }
       Población: inicializa vacío y se rellena desde CONFIG al cargar la app.
       NO hardcodear productos aquí — vienen de Google Sheets.
    ══════════════════════════════════════════════════════════════════════════ */
    var PACK_FACTORS = {};

    /* ══════════════════════════════════════════════════════════════════════════
       PACK_CONVERTER — Conversión por producto (packaging)
       Nivel 2 del sistema de conversiones. Separado de UNIT_CONVERTER porque:
         - Los factores son datos del negocio, no constantes del sistema
         - Son variables (dependen del proveedor y el producto)
         - No se normalizan automáticamente (decisión operativa)
       Regla: packaging NO auto-switch — solo sugerencia.
    ══════════════════════════════════════════════════════════════════════════ */
    var PACK_CONVERTER = {

        /* Registra factores para un producto. Llamar al cargar CONFIG.
           Acepta estructura flexible con fromUnit explícito:
             { "unidad/es": { "maple/s": 30, "docena/s": 12 } }
             { "kg":        { "bolsa/s": 20 } }
           Valida que cada factor sea number > 0 — descarta entradas inválidas. */
        /* Normaliza productId a lowercase para evitar bugs silenciosos.
           "Huevos", "HUEVOS", "huevos" → todos apuntan a la misma entrada. */
        _normalizeId: function (productId) {
            return productId ? productId.toLowerCase() : null;
        },

        register: function (productId, factors) {
            var id = this._normalizeId(productId);
            if (!id || !factors || typeof factors !== 'object') return;
            var validated = {};
            var fromUnits = Object.keys(factors);
            for (var fi = 0; fi < fromUnits.length; fi++) {
                var fromUnit = fromUnits[fi];
                var toMap    = factors[fromUnit];
                if (!toMap || typeof toMap !== 'object') continue;
                validated[fromUnit] = {};
                var toUnits = Object.keys(toMap);
                for (var ti = 0; ti < toUnits.length; ti++) {
                    var toUnit = toUnits[ti];
                    var factor = toMap[toUnit];
                    if (typeof factor !== 'number' || factor <= 0) continue;
                    validated[fromUnit][toUnit] = factor;
                }
            }
            PACK_FACTORS[id] = validated;
        },

        /* Retorna los factores validados de un producto, o null              */
        getFactors: function (productId) {
            return PACK_FACTORS[this._normalizeId(productId)] || null;
        },

        /* Convierte qty de fromUnit a toUnit para un producto específico.
           Estructura: { fromUnit: { toUnit: factor } }
           Cubre dos sentidos:
             base → envase:  30 "unidad/es" → 2.166 "maple/s"  (÷ factor, puede ser fracción)
             envase → base:  1 "maple/s"   → 30 "unidad/es"   (× factor, exacto)
           ⚠️ base→envase NO es bijectivo: convert(65→maple)→(maple→base) = 65, no 60.
              Para obtener envases enteros + remainder, usar suggest() en su lugar.
           Retorna number | null (null = conversión no disponible).           */
        convert: function (qty, fromUnit, toUnit, productId) {
            if (typeof qty !== 'number' || isNaN(qty)) return null;
            if (fromUnit === toUnit) return qty;

            var factors = PACK_FACTORS[this._normalizeId(productId)];
            if (!factors) return null;

            /* Directo: fromUnit → toUnit */
            if (factors[fromUnit] && factors[fromUnit][toUnit] !== undefined) {
                var fDirect = factors[fromUnit][toUnit];
                if (!fDirect) return null;
                return parseFloat((qty / fDirect).toFixed(6));
            }

            /* Inverso: toUnit → fromUnit (el "from" es el envase) */
            if (factors[toUnit] && factors[toUnit][fromUnit] !== undefined) {
                var fInverse = factors[toUnit][fromUnit];
                if (!fInverse) return null;
                return parseFloat((qty * fInverse).toFixed(6));
            }

            return null;
        },

        /* Sugiere el envase más eficiente para una qty (sin forzar).
           Retorna { packUnit, packQty, remainder } | null
           Ejemplo: suggest(65, "unidad/es", "huevos")
             → { packUnit: "maple/s", packQty: 2, remainder: 5 }              */
        suggest: function (qty, baseUnit, productId) {
            var factors = PACK_FACTORS[this._normalizeId(productId)];
            if (!factors || !factors[baseUnit]) return null;

            var best     = null;
            var packMap  = factors[baseUnit];
            var packUnits = Object.keys(packMap);
            for (var i = 0; i < packUnits.length; i++) {
                var pu     = packUnits[i];
                var factor = packMap[pu];
                if (!factor || qty < factor) continue;
                var packQty   = Math.floor(qty / factor);
                var remainder = parseFloat((qty - packQty * factor).toFixed(6));
                if (!best || remainder < best.remainder) {
                    best = { packUnit: pu, packQty: packQty, remainder: remainder };
                }
            }
            return best;
        }
    };

    /* ══════════════════════════════════════════════════════════════════════════

    var DENSITY_TABLE = {

        'queso crema':        1.050,

        /* Harinas */

        'azucar':             0.833,
        'azúcar':             0.833,
        'azucar blanca':      0.833,
        'azúcar blanca':      0.833,
        'azucar impalpable':  0.471,
        'azúcar impalpable':  0.471,
        'azucar mascabo':     0.888,
        'azúcar mascabo':     0.888,
        'azucar morena':      0.888,
        'azúcar morena':      0.888,
        /* Cacao y derivados */
        'cacao':              0.354,
        'cacao amargo':       0.354,
        'cacao en polvo':     0.354,
        'cacao dulce':        0.354,
        /* Leudantes */
        'polvo de hornear':   0.900,
        'levadura quimica':   0.900,
        'levadura química':   0.900,

        'bicarbonato de sodio':1.000,
        'sal':                1.217,

        'avena':              0.375,

    };

    /* ── KA_TABLE — Pesos volumétricos empíricos (King Arthur Baking) ────────
       Fuente: kingarthurbaking.com/learn/ingredient-weight-chart
       Unidad: gramos por taza (240ml) / cda (15ml) / cdita (5ml).
       Claves normalizadas via _normDensityKey (sin tildes, lowercase).
       Diferencia con DENSITY_TABLE: estos son pesos aparentes (bulk),
       incluyen aire/compactación. NO mezclar con densidades físicas. */
    var KA_TABLE = {
        /* ── Harinas ── */
        'harina':                    { taza: 120, cda:  8, cdita: null },
        'harina 0000':               { taza: 120, cda:  8, cdita: null },
        'harina 000':                { taza: 120, cda:  8, cdita: null },
        'harina 00':                 { taza: 120, cda:  8, cdita: null },
        'harina 0':                  { taza: 120, cda:  8, cdita: null },
        'harina de trigo':           { taza: 120, cda:  8, cdita: null },
        'harina todo uso':           { taza: 120, cda:  8, cdita: null },
        'harina de pan':             { taza: 120, cda:  8, cdita: null },
        'harina integral':           { taza: 113, cda:  7, cdita: null },
        'harina de trigo integral':  { taza: 113, cda:  7, cdita: null },
        'harina de torta':           { taza:  96, cda:  6, cdita: null },
        'harina de reposteria':      { taza:  96, cda:  6, cdita: null },
        'harina de almendras':       { taza:  96, cda:  6, cdita: null },
        'harina de avena':           { taza:  92, cda:  6, cdita: null },
        'harina de centeno':         { taza: 102, cda:  6, cdita: null },
        'harina de maiz':            { taza: 122, cda:  8, cdita: null },
        'harina de coco':            { taza: 128, cda:  8, cdita: null },
        'harina de arroz':           { taza: 160, cda: 10, cdita: null },
        'harina de arroz integral':  { taza: 160, cda: 10, cdita: null },
        'fecula de maiz':            { taza: 112, cda:  7, cdita:    4 },
        'almidon de maiz':           { taza: 112, cda:  7, cdita:    4 },
        'fecula de papa':            { taza: 152, cda: 10, cdita:    3 },
        'almidon de papa':           { taza: 152, cda: 10, cdita:    3 },
        'semola':                    { taza: 163, cda: 10, cdita: null },
        'semolin':                   { taza: 163, cda: 10, cdita: null },
        /* ── Azúcares ── */
        'azucar':                    { taza: 198, cda: 12, cdita:    4 },

    /* Normaliza un nombre de producto para buscar en DENSITY_TABLE.
       Elimina tildes, pasa a lowercase, colapsa espacios. */
    function _normDensityKey(str) {
        if (!str || typeof str !== 'string') return '';
        return str.toLowerCase()
            .replace(/[áàä]/g, 'a').replace(/[éèë]/g, 'e')
            .replace(/[íìï]/g, 'i').replace(/[óòö]/g, 'o')
            .replace(/[úùü]/g, 'u').replace(/ñ/g, 'n')
            .replace(/\s+/g, ' ').trim();
    }

    /* Retorna densidad (g/ml) para un producto. Prioridad:
       1. CONFIG.densities[prod]  — override del operador
       2. DENSITY_TABLE           — default gastronómico
       3. null                    — sin datos, conversión no disponible */
    function getDensity(prod) {
        if (!prod) return null;
        /* 1. Override en CONFIG */
        if (CONFIG.densities && typeof CONFIG.densities === 'object') {
            var customKey = _normDensityKey(prod);
            var customKeys = Object.keys(CONFIG.densities);
            for (var ci = 0; ci < customKeys.length; ci++) {
                if (_normDensityKey(customKeys[ci]) === customKey) {
                    var v = parseFloat(CONFIG.densities[customKeys[ci]]);
                    if (!isNaN(v) && v > 0) return v;
                }
            }
        }
        /* 2. Tabla estándar — solo hit exacto (búsqueda parcial eliminada por falsos positivos) */
        var key = _normDensityKey(prod);
        if (DENSITY_TABLE[key] !== undefined) return DENSITY_TABLE[key];
        return null;
    }

    /* ── Capa 3 del motor: conversión cross-dimension via densidad ──────────
       Flujo:
         from → base(from) [g o ml] → aplicar densidad → base(to) → to
       Retorna number | null. null = sin densidad conocida (no crash). */
    UNIT_CONVERTER.convertCross = function (qty, fromUnit, toUnit, productId) {
        if (typeof qty !== 'number' || isNaN(qty)) return null;
        var fromDim = UNIT_REGISTRY.getDimension(fromUnit);
        var toDim   = UNIT_REGISTRY.getDimension(toUnit);
        /* Solo opera entre mass y volume */
        if (!((fromDim === 'mass' && toDim === 'volume') ||
              (fromDim === 'volume' && toDim === 'mass'))) return null;

        var density = getDensity(productId);
        if (!density || density <= 0) return null;

        /* Paso 1: fromUnit → base del sistema (lt si volume, kg si mass)
           Luego ×1000 para obtener ml o gr, que son las unidades en que se
           expresa la densidad (g/ml). Usa _toBase del registry → soporta
           cualquier unidad registrada (cda, taza, cdita, etc.) automáticamente. */
        var inBase = this._toBase(qty, fromUnit);
        if (inBase === null) return null;
        var baseQty = inBase * 1000; /* lt→ml  o  kg→gr */

        /* Paso 2: aplicar densidad (g/ml) */
        var baseTarget;
        if (fromDim === 'volume') {
            baseTarget = baseQty * density;   /* ml × (g/ml) = g */
        } else {
            baseTarget = baseQty / density;   /* g  / (g/ml) = ml */
        }

        /* Paso 3: base(g o ml) → toUnit, vía _fromBase del registry.
           baseTarget está en g (si toDim=mass) o ml (si toDim=volume).
           _fromBase espera la base canónica del sistema (kg o lt),
           por eso dividimos ×1000 antes de llamarla. */
        var result = this._fromBase(baseTarget / 1000, toUnit);
        return result !== null ? parseFloat(result.toFixed(10)) : null;
    };

    /* ── Bridge actualizado: 3 capas ────────────────────────────────────────
       Capa 1: misma dimensión (gr↔kg, ml↔lt)
       Capa 2: packaging (unidades↔maples) via PACK_CONVERTER
       Capa 3: cross-dimension (gr↔ml, kg↔lt) via densidad */
    UNIT_CONVERTER.convertSmart = function (qty, fromUnit, toUnit, productId) {
        if (fromUnit === toUnit) return qty;
        var fromDim = UNIT_REGISTRY.getDimension(fromUnit);
        var toDim   = UNIT_REGISTRY.getDimension(toUnit);

        /* Capa 1: misma dimensión física */
        if (fromDim === toDim && fromDim !== null && fromDim !== 'packaging') {
            return this.convert(qty, fromUnit, toUnit);
        }
        /* Capa 2: packaging */
        if (fromDim === 'packaging' || toDim === 'packaging') {
            return PACK_CONVERTER.convert(qty, fromUnit, toUnit, productId);
        }
        /* Capa 3: cross-dimension mass↔volume */
        return this.convertCross(qty, fromUnit, toUnit, productId);
    };

    UNIT_CONVERTER.canConvertSmart = function (fromUnit, toUnit, productId) {
        if (fromUnit === toUnit) return true;
        var res = this.convertSmart(1, fromUnit, toUnit, productId);
        return res !== null;

       UNIT_STEPPER v1.1 — Lógica pura del stepper y formato de cantidades
       stepQty : función pura (sin side effects), guards NaN + unit null
       formatQty: suprime decimales para unidades discretas, elimina ".00"
       stepWithConversion: cambio de unidad seguro (convertir → step)
    ══════════════════════════════════════════════════════════════════════════ */
    var UNIT_STEPPER = {

        /* Incrementa/decrementa qty según la unidad. dir: +1 | -1
           Guards:
             - qty NaN o no-numérico → trata como 0
             - unit null/undefined   → step 1 (comportamiento degradado seguro)
             - clamp ≥ 0 antes de round para evitar -0 en discretas
             - round solo en discretas, después del clamp                      */
        stepQty: function (qty, unit, dir) {
            var safe = (typeof qty === 'number' && !isNaN(qty)) ? qty : 0;
            var step = UNIT_REGISTRY.getStep(unit);
            var next = Number((safe + dir * step).toFixed(10));   /* Number() evita string drift */
            next = Math.max(0, next);                             /* clamp primero */
            if (UNIT_REGISTRY.isDiscrete(unit)) next = Math.round(next);  /* round después */
            return next;
        },

        /* Cambio de unidad con conversión previa. Usar cuando el usuario
           selecciona una unidad distinta a la actual para el mismo producto.
           Garantiza coherencia: 1 kg → 1000 gr (no "step en gr desde 1").   */
        stepWithConversion: function (qty, oldUnit, newUnit, dir) {
            var converted = UNIT_CONVERTER.convert(qty, oldUnit, newUnit);
            var base = (converted !== null) ? converted : 0;
            return this.stepQty(base, newUnit, dir);
        },

        /* Flujo completo con normalización: normalize → step → normalize.
           Retorna { qty, unit } — la unidad puede cambiar si la normalización
           lo requiere (ej: 950gr + step → 1000gr → { qty:1, unit:"kg" }).
           Usar en steppers de stock/pedido/recepcion/merma.                  */
        stepNormalized: function (qty, unit, dir) {
            /* 1. Normalizar estado actual */
            var n1  = UNIT_CONVERTER.normalize(qty, unit);
            /* 2. Aplicar step en escala normalizada */
            var stepped = this.stepQty(n1.qty, n1.unit, dir);
            /* 3. Normalizar resultado */
            var n2  = UNIT_CONVERTER.normalize(stepped, n1.unit);
            return { qty: n2.qty, unit: n2.unit };
        },

        /* Formatea la cantidad para mostrar en UI.
           Continuas (kg, lt…): muestra decimales solo si son significativos
             → 0.5 kg  → "0.5"   |   1 kg  → "1"   |   1.50 → "1.5"
           Discretas (unidad/es, bolsa/s…): siempre entero (Math.round)
             → 3.00 unidades → "3"  |  2.9 → "3"                              */
        formatQty: function (qty, unit) {
            var safe = (typeof qty === 'number' && !isNaN(qty)) ? qty : 0;
            if (UNIT_REGISTRY.isContinuous(unit)) {
                /* parseFloat elimina trailing zeros: 1.50 → "1.5",  1.00 → "1" */
                return String(parseFloat(safe.toFixed(2)));
            }
            return String(Math.round(safe));
        }
    };

        timeAgoStr: function(ts) {
            if (!ts) return 'Sin datos';
            var diffMs = Date.now() - new Date(ts).getTime();
            if (diffMs < 0) diffMs = 0;
            var diffHours = Math.floor(diffMs / 3600000);
            if (diffHours < 1) {
                var diffMins = Math.floor(diffMs / 60000);
                return diffMins <= 1 ? 'Hace un momento' : 'Hace ' + diffMins + ' min';
            } else if (diffHours < 24) {
                return 'Hace ' + diffHours + ' h';
            } else {
                var d = Math.floor(diffHours / 24);
                var h = diffHours % 24;
                var str = 'Hace ' + d + (d === 1 ? ' día' : ' días');
                if (h > 0) str += ', ' + h + ' h';
                return str;
            }

            if (!card) return;
            var isOpen = card.classList.contains('open');
            var container = card.parentElement;
            
            var openCards = container.querySelectorAll('.fede-accordion.open');
            for (var i = 0; i < openCards.length; i++) {

       Regla: UnitFreq NO convierte — solo sugiere unidad preferida.
         Flujo correcto al cambiar unidad:

           qty  = UNIT_CONVERTER.convert(qty, currentUnit, unit) || qty;
    ══════════════════════════════════════════════════════════════════════════ */
    var UnitFreq = {
        KEY:      'fede_unit_freq_v2',
        KEY_V1:   'fede_unit_freq',
        BOOT_KEY: 'fede_unit_freq_boot',

        _empty: function () {
            return { _v: '2', data: {}, lru: [] };

        _load: function () {
            try {

                if (!raw || raw._v !== '2') return this._migrate();
                return raw;
            } catch (e) {
                return this._empty();

        },

        _save: function (state) {
            try { localStorage.setItem(this.KEY, JSON.stringify(state)); }
            catch (e) {}
        },

        _migrate: function () {
            var state = this._empty();
            try {
                var v1 = JSON.parse(localStorage.getItem(this.KEY_V1));

                var prods = Object.keys(v1);

                    for (var mi = 0; mi < modes.length; mi++) {

                        var key  = prod + '_' + mode;

                var latest = JSON.parse(localStorage.getItem(this.KEY));
                if (latest && latest._v === '2' && latest.data) {
                    var lkeys = Object.keys(latest.data);
                    for (var li = 0; li < lkeys.length; li++) {
                        if (!state.data[lkeys[li]]) state.data[lkeys[li]] = {};
                        var src = latest.data[lkeys[li]];
                        var ukeys = Object.keys(src);
                        for (var ui = 0; ui < ukeys.length; ui++) {
                            if ((src[ukeys[ui]] || 0) > (state.data[lkeys[li]][ukeys[ui]] || 0)) {
                                state.data[lkeys[li]][ukeys[ui]] = src[ukeys[ui]];
                            }
                        }
                    }
                }
            } catch (e) {}

            if (!state.data[key]) state.data[key] = {};
            state.data[key][unit] = (state.data[key][unit] || 0) + 1;

            /* Mover al frente del LRU */
            var lru = state.lru;
            for (var i = lru.length - 1; i >= 0; i--) {
                if (lru[i] === key) { lru.splice(i, 1); break; }
            }
            lru.unshift(key);

            /* Evicción si supera límite */
            while (lru.length > this.LIMIT) {
                var removed = lru.pop();
                delete state.data[removed];
            }

            /* Anclar al LRU las keys que el merge introdujo pero no estaban en lru,
               para que queden sujetas a evicción normal y state.data no crezca sin límite */
            var lruSet = {};
            for (var li2 = 0; li2 < lru.length; li2++) lruSet[lru[li2]] = true;
            var dataKeys = Object.keys(state.data);
            for (var di = 0; di < dataKeys.length; di++) {
                if (!lruSet[dataKeys[di]]) lru.push(dataKeys[di]);
            }

            /* LRU stale cleanup: eliminar keys del LRU sin data correspondiente */
            var cleanLru = [];
            for (var ci = 0; ci < lru.length; ci++) {
                var ck = lru[ci];
                if (state.data[ck] && Object.keys(state.data[ck]).length > 0) {
                    cleanLru.push(ck);
                }
            }
            state.lru = cleanLru;

            this._save(state);
        },

        /* Retorna la unidad más usada para prodId+mode, o fallbackUnit */
        getPreferred: function (prodId, mode, fallbackUnit) {
            var state   = this._load();
            var key     = prodId + '_' + mode;
            var entry   = state.data[key];
            if (!entry) return fallbackUnit || null;

            var maxUnit  = fallbackUnit || null;
            var maxCount = -1;
            var unitKeys = Object.keys(entry);
            for (var i = 0; i < unitKeys.length; i++) {
                if (entry[unitKeys[i]] > maxCount) {
                    maxCount = entry[unitKeys[i]];
                    maxUnit  = unitKeys[i];
                }
            }
            return maxUnit;
        },

        /* Alias retrocompatibles para el código existente que llama record/getTop */
        record: function (prod, mode, unit) { this.bump(prod, mode, unit); },
        getTop: function (prod, mode)        { return this.getPreferred(prod, mode, null); },

        /* Rellena frecuencias desde historial de sesiones (idempotente via BOOT_KEY) */
        bootstrap: function (hist) {
            try { if (localStorage.getItem(this.BOOT_KEY)) return; }
            catch (e) { return; }
            /* BOOT_KEY se marca antes del loop: si algo falla a mitad,
               no se re-procesa el historial completo en la próxima carga */
            try { localStorage.setItem(this.BOOT_KEY, '1'); }
            catch (e) {}
            try {
                for (var hi = 0; hi < hist.length; hi++) {
                    var h = hist[hi];
                    if (!h.mode) continue;
                    var items = h.items || [];
                    for (var ii = 0; ii < items.length; ii++) {
                        var item = items[ii];
                        if (item.prod && item.unit) this.bump(item.prod, h.mode, item.unit);
                    }
                }
            } catch (e) {}
        }
    };

    function toggleAppFullscreen() {
        var doc = document.documentElement;
        var isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

        if (!isFS) {
            // ENTRAR en pantalla completa
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
            localStorage.setItem('fede_fullscreen', 'true');
        } else {
            // SALIR de pantalla completa
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            localStorage.setItem('fede_fullscreen', 'false');
        }
    }

            // Si GAS no devuelve recetas (excluidas del caché o primera sesión),
            // recuperarlas del snapshot. Si tampoco están en el snapshot, inicializar
            // como {} (no undefined) para que renderRecetarios muestre empty-state real.
            if (!CONFIG.recetas) {
                var _snapKeyR = 'fede_snapshot_' + activeSheetId;
                var _snapR = JSON.parse(localStorage.getItem(_snapKeyR) || 'null');
                CONFIG.recetas = (_snapR && _snapR.recetas) ? _snapR.recetas : {};

            var history = result.history || [];

                dbName = ssName;

            if (config.units && config.units.length) { units = config.units; }
            if (config.custom_units) { CUSTOM_UNITS = config.custom_units; }
            if (config.sr) {
                var srKeys = Object.keys(config.sr);
                for (var ski = 0; ski < srKeys.length; ski++) {
                    if (SR_CONFIG.hasOwnProperty(srKeys[ski])) {

                }
            }
            buildSearchIndex();
            if (Array.isArray(result.prod_log)) { PROD_DATA = result.prod_log; }
            // Guardar snapshot para uso offline

            var snapData = { cats: CATS, history: HIST, units: units, custom_units: CUSTOM_UNITS, ts: Date.now(),

                orderDays: CONFIG.orderDays || [1, 4], sr: CONFIG.sr || {},

            localStorage.removeItem('fede_history_backup');

    function updateAppIdentity() {
        var titleInput    = document.getElementById('cfg-app-title');
        var subtitleInput = document.getElementById('cfg-app-subtitle');
        var title    = titleInput    ? titleInput.value.trim()    : '';
        var subtitle = subtitleInput ? subtitleInput.value.trim() : '';

        // Fallback: si ambos campos están vacíos, usar el valor actual de CONFIG
        var hasTitle    = title    !== '';
        var hasSubtitle = subtitle !== '';

        if (!hasTitle && !hasSubtitle) {
            toast('Sin cambios');
            return;
        }

        var pending = 0;
        var failed  = false;

        function onSaveDone() {
            pending--;
            if (pending <= 0) {
                if (failed) { toast('⚠️ Error al guardar en servidor'); return; }
                toast('✓ Nombre guardado');
                // Persistir en snapshot para que la próxima sesión arranque con el valor correcto
                var snapKey = 'fede_snapshot_' + activeSheetId;
                var snap = JSON.parse(localStorage.getItem(snapKey) || '{}');
                snap.app_title    = CONFIG.app_title    || '';
                snap.app_subtitle = CONFIG.app_subtitle || '';
                localStorage.setItem(snapKey, JSON.stringify(snap));
                // Resetear estado del botón
                var btn = document.getElementById('btn-save-identity');
                if (btn) { btn.style.opacity = '0.4'; btn.style.pointerEvents = 'none'; }
                var prev = document.getElementById('identity-preview');
                if (prev) prev.style.display = 'none';
            }
        }
        function onSaveFail() { failed = true; onSaveDone(); }

        if (hasTitle) {
            CONFIG.app_title = title;
            var dispEl = document.getElementById('app-title-display');
            if (dispEl) dispEl.textContent = title;
            pending++;

    /* ── SCROLL BEHAVIORS: sticky search + scroll-to-top ───────────────────── */
    function initScrollBehaviors() {
        var relView = document.getElementById('view-relevamiento');
        var scrollTopBtn = document.getElementById('btn-scroll-top');
        if (!relView) return;

        // Medir altura real del AppBar para que el sticky search no se solape
        var appBar = document.getElementById('modo-app-bar');
        if (appBar) {
            var barH = appBar.offsetHeight;
            if (barH > 0) {
                document.documentElement.style.setProperty('--fede-app-bar-h', barH + 'px');
            }
        }

        var searchSection = null;

        window.addEventListener('scroll', function() {
            // Solo actuar cuando relevamiento está activo
            if (!relView.classList.contains('active')) {
                if (scrollTopBtn) scrollTopBtn.classList.remove('visible');
                return;
            }
            if (!searchSection) {
                searchSection = relView.querySelector('.fede-op2-search-section');
            }
            var st = window.scrollY || window.pageYOffset || 0;

            if (searchSection) {
                if (st > 10) {
                    searchSection.classList.add('is-floating');
                } else {
                    searchSection.classList.remove('is-floating');
                }
            }

            if (scrollTopBtn) {
                if (st > 300) {
                    scrollTopBtn.classList.add('visible');
                } else {
                    scrollTopBtn.classList.remove('visible');
                }
            }
        });

        if (scrollTopBtn) {
            scrollTopBtn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    }

    /**
     * CONTROLLER LAYER: Orchestrates product row rendering.
     * Uses defensive mapping to ensure one broken product doesn't crash the UI.
     */
    function renderProducts() {
        if (!activeCat || !CATS[activeCat]) return;
        var list = document.getElementById('prod-list');
        if (!list) return;

        var prods = (CATS[activeCat].prods || []).slice().sort();
        if (prods.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:var(--mcf-ink);border:4px dashed var(--mcf-ink);padding:60px;text-transform:uppercase;font-weight:900;font-family:var(--mcf-font-display);">Categoría Vacía</div>';
            return;
        }

        var htmlBuffer = [];
        prods.forEach(function (p) {
            try {
                var rowHtml = genProductRow(p);
                htmlBuffer.push(rowHtml);
            } catch (e) {
                console.error('❌ [ARCH-ERR] Failed to render product:', p, e.message);
                htmlBuffer.push('<div style="padding:10px; color:var(--red); border:1px solid var(--red); margin:5px 0;">Error cargando: ' + FeDe_Utils.sanitize(p) + '</div>');
            }
        });

        list.innerHTML = htmlBuffer.join('');
        renderFAB();
        refreshIcons(list);
        /* Poblar pack-hints para productos que ya tienen qty > 0 al renderizar */
        prods.forEach(function (p) {
            if (relData[p] && relData[p].qty > 0) updateProductRow(p);
        });
    }

    function genProductRow(p, prodUnits) {
        if (!Array.isArray(prodUnits)) prodUnits = getUnitsForProduct(activeCat, p);
        var ep = encodeURIComponent(p);
        var d = relData[p] || { qty: 0, unit: (prodUnits[0] || units[0]) };
        var is86 = d.qty === 86;
        var lastUsed = UNIT_MEM.get(p);
        var safeProd = FeDe_Utils.sanitize(p);
        var safeUnit = FeDe_Utils.sanitize(d.unit);

        var html = '<div data-prow="' + ep + '" class="prow ' + (d.qty > 0 ? 'has-qty' : '') + ' ' + (is86 ? 'is-86' : '') + '">' +
            '<!-- Badge de Unidad (Superior Derecha) -->' +
            '<div class="unit-badge">' + (is86 ? '86' : safeUnit) + '</div>' +

            '<!-- Nombre del Producto (Centrado) -->' +
            '<div class="pname">' + safeProd + '</div>' +
            
            '<!-- Sección de Cantidad (Stepper Central) -->' +
            '<div class="quantity-section">' +
                '<div class="stepper">' +
                    '<button class="stepper-btn" data-prod="' + ep + '" data-dir="-1" onclick="stepEl(this)">-</button>' +
                    '<div class="stepper-val" onclick="manualEl(this)" data-prod="' + ep + '">' +
                        '<div class="stepper-qty">' + (is86 ? '86' : (d.qty || '0')) + '</div>' +
                        '<div class="stepper-unit">' + (is86 ? 'AGOTADO' : safeUnit) + '</div>' +
                    '</div>' +
                    '<button class="stepper-btn" data-prod="' + ep + '" data-dir="1" onclick="stepEl(this)">+</button>' +
                '</div>' +
                '<div class="pack-hint" style="display:none"></div>' +
            '</div>' +

            '<!-- Selector de Unidades (Scroll Inferior) -->' +
            '<div class="units-section">' +
                '<div class="units-scroll">' +
                    prodUnits.map(function (u) {
                        var uSafe = FeDe_Utils.sanitize(u);
                        var activeClass = (d.unit === u ? 'active' : '');
                        var prefClass = (u === lastUsed ? 'is-preferred' : '');
                        return '<div class="unit-chip ' + activeClass + ' ' + prefClass + '" ' +
                            'data-prod="' + ep + '" data-unit="' + encodeURIComponent(u) + '" onclick="setUnitEl(this)">' +
                            (u === lastUsed ? '<i data-lucide="sparkles" style="width:12px;height:12px;margin-right:4px;"></i>' : '') + uSafe +
                            '</div>';
                    }).join('') +
                '</div>' +
            '</div>' +
            '</div>';
        return html;
    }

    /**
     * SURGICAL UPDATE: Updates only the necessary DOM elements instead of re-rendering the whole row.
     * This eliminates the lag during rapid increments/decrements.
     */
    /* Muestra el hint siempre que haya al menos 1 envase completo —
       incluso "= 1 maple" es útil como confirmación y atajo de conversión. */
    function shouldShowPackHint(suggestion, currentUnit, currentQty) {
        if (!suggestion) return false;
        if (suggestion.packQty === 0) return false;
        /* Suprimir si el hint sugiere exactamente lo que ya está activo */
        if (suggestion.packUnit === currentUnit && suggestion.packQty === currentQty) return false;
        return true;
    }

    /* "= 1 maple"  para exacto  |  "≈ 2 maples + 5"  para con resto */
    function buildPackHintText(suggestion, packUnit) {
        var label   = formatUnit(suggestion.packQty, packUnit);
        var prefix  = suggestion.remainder === 0 ? '= ' : '≈ ';
        var text    = prefix + suggestion.packQty + ' ' + label;
        if (suggestion.remainder > 0) text += ' + ' + UNIT_STEPPER.formatQty(suggestion.remainder, null);
        return text;
    }

    /* Aplica el hint al tap: convierte la qty al packUnit sugerido */
    function applyPackHint(prod, packUnit, packQty) {
        if (!relData[prod]) return;
        relData[prod].qty  = packQty;
        relData[prod].unit = packUnit;
        UNIT_MEM.save(prod, packUnit);
        UnitFreq.record(prod, currentMode || 'stock', packUnit);
        updateProductRow(prod);
        saveDraftDebounced();
    }

    function updateProductRow(p) {
        var ep = encodeURIComponent(p);
        var row = document.querySelector('[data-prow="' + ep + '"]');
        if (!row) return;

        var d = relData[p] || { qty: 0, unit: '' };
        // Si no tiene unidad (recién borrado), intentar recuperar la unidad por defecto
        if (!d.unit) {
            var units = getUnitsForProduct(activeCat, p);
            d.unit = units[0] || '';
        }

        var is86 = d.qty === 86;
        var safeUnit = FeDe_Utils.sanitize(d.unit);

        // 1. Clases de estado dinámico
        row.classList.toggle('has-qty', d.qty > 0);
        row.classList.toggle('is-86', is86);

        // 2. Badge de unidad (superior derecha)
        var badge = row.querySelector('.unit-badge');
        if (badge) badge.textContent = is86 ? '86' : safeUnit;

        // 3. Stepper: Cantidad central
        var sqty = row.querySelector('.stepper-qty');
        if (sqty) sqty.textContent = is86 ? '86' : (d.qty || '0');

        // 4. Stepper: Unidad debajo de cantidad
        var sunit = row.querySelector('.stepper-unit');
        if (sunit) sunit.textContent = is86 ? 'AGOTADO' : safeUnit;

        // 5. Chips de selección: Sincronizar estado 'active'
        var chips = row.querySelectorAll('.unit-chip');
        for (var i = 0; i < chips.length; i++) {
            var c = chips[i];
            var cUnit = decodeURIComponent(c.getAttribute('data-unit'));
            c.classList.toggle('active', cUnit === d.unit);
        }

        // 6. Hint de packaging — segunda capa, no intrusiva
        var hint = row.querySelector('.pack-hint');
        if (hint) {
            var showHint = false;
            if (!is86 && d.qty > 0) {
                var suggestion = PACK_CONVERTER.suggest(d.qty, d.unit, p);
                /* Fallback: si la unidad activa es un packUnit (ej: bolsa/s),
                   convertir a base y buscar un packUnit alternativo distinto al actual */
                if (!suggestion || (suggestion && suggestion.packUnit === d.unit)) {
                    var factors = PACK_CONVERTER.getFactors(p);
                    if (factors) {
                        var baseUnits = Object.keys(factors);
                        for (var bi = 0; bi < baseUnits.length; bi++) {
                            if (factors[baseUnits[bi]][d.unit] !== undefined) {
                                var qtyInBase = PACK_CONVERTER.convert(d.qty, d.unit, baseUnits[bi], p);
                                if (qtyInBase !== null) {
                                    var altSuggestion = PACK_CONVERTER.suggest(qtyInBase, baseUnits[bi], p);
                                    /* Solo usar si sugiere un envase diferente al activo */
                                    if (altSuggestion && altSuggestion.packUnit !== d.unit) {
                                        suggestion = altSuggestion;
                                    } else {
                                        suggestion = null;
                                    }
                                }
                                break;
                            }
                        }
                    }
                }
                if (shouldShowPackHint(suggestion, d.unit, d.qty)) {
                    var hintText = buildPackHintText(suggestion, suggestion.packUnit);
                    hint.innerHTML = hintText + ' <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>';
                    hint.setAttribute('data-prod',  encodeURIComponent(p));
                    hint.setAttribute('data-unit',  encodeURIComponent(suggestion.packUnit));
                    hint.setAttribute('data-qty',   suggestion.packQty);
                    hint.setAttribute('onclick', 'applyPackHint(decodeURIComponent(this.dataset.prod), decodeURIComponent(this.dataset.unit), +this.dataset.qty)');
                    hint.style.cursor = 'pointer';
                    showHint = true;
                }
            }
            hint.style.display = showHint ? '' : 'none';
        }
    }

    // filterProducts logic removed by user request.

    function formatUnit(q, u) {
        if (!u) return '';

        // Invariant metric abbreviations — never pluralize
        var uLow = u.toLowerCase();
        if (uLow === 'kg' || uLow === 'gr' || uLow === 'lt' || uLow === 'ml') return u;

        var pts = u.split('/');
        var sing = pts[0].trim();
        var singLower = sing.toLowerCase();

        // Si tiene formato con barra (ej: unidad/es), usamos la terminación
        var plur = pts.length > 1 ? sing + pts[1] : sing + 's';

        // Si es automático (sin barra), aplicamos reglas semánticas
        if (pts.length === 1) {
            // 1. Si ya termina en 's', no duplicar
            if (singLower.slice(-1) === 's') {
                plur = sing;
            } 
            // 2. Excepciones de terminaciones en español (unidad -> unidades)
            else if (singLower === 'unidad') plur = 'unidades';
            else if (singLower === 'porción' || singLower === 'porcion') plur = 'porciones';
            else if (singLower === 'bidón' || singLower === 'bidon') plur = 'bidones';
            else if (singLower === 'cajón' || singLower === 'cajon') plur = 'cajones';
            else if (singLower === 'pan') plur = 'panes';
        }

        return q === 1 ? sing : plur;
    }

    var UNIT_MAPPING = {
        "Huevos": UGRPS.EGGS,
        "Carnes": UGRPS.MEATS,
        "Aceite": UGRPS.LIQUIDS,
        "Lácteos": UGRPS.DAIRY,
        "Verduras": UGRPS.PRODUCE,
        "Cereales": UGRPS.DRY,
        "Frutas": UGRPS.PRODUCE,
        "Panes": UGRPS.BREADS,
        "Pescados": UGRPS.FISH,
        "Bebidas": UGRPS.LIQUIDS,
        "Condimentos": UGRPS.DRY,
        "Pastas": UGRPS.DRY,
        "Congelados": UGRPS.GENERIC
    };

    function getUnitsForProduct(catName, prodName, mode) {
        if (prodName === undefined) prodName = '';
        if (prodName && CUSTOM_UNITS[prodName] && CUSTOM_UNITS[prodName].length > 0) return CUSTOM_UNITS[prodName];

        var baseUnits = UNIT_MAPPING[catName] || UGRPS.GENERIC;
        var p = prodName.toLowerCase();

        // Lógica Predictiva por Keywords
        if (p.indexOf('aceite') !== -1) baseUnits = UGRPS.OILS;
        else if (p.indexOf('pescado') !== -1 || p.indexOf('salmón') !== -1 || p.indexOf('salmon') !== -1 || p.indexOf('trucha') !== -1) baseUnits = UGRPS.FISH;
        else if (p.indexOf(' pan ') !== -1 || p.indexOf('miñon') !== -1 || p.indexOf('flauta') !== -1 || p.indexOf('felipe') !== -1) baseUnits = UGRPS.BREADS;
        else if (p.indexOf('queso') !== -1 || p.indexOf('jamón') !== -1 || p.indexOf('fiambre') !== -1 || p.indexOf('salame') !== -1 || p.indexOf('horma') !== -1) baseUnits = UGRPS.DAIRY;
        else if (p.indexOf('carne') !== -1 || p.indexOf('pollo') !== -1 || p.indexOf('cerdo') !== -1 || p.indexOf('vaca') !== -1 || p.indexOf('bife') !== -1) baseUnits = UGRPS.MEATS;
        else if (p.indexOf('huevo') !== -1) baseUnits = UGRPS.EGGS;
        else if (p.indexOf('vino') !== -1 || p.indexOf('cerveza') !== -1 || p.indexOf('gaseosa') !== -1 || p.indexOf('agua') !== -1) baseUnits = UGRPS.LIQUIDS;
        else if (p.indexOf('harina') !== -1 || p.indexOf('arroz') !== -1 || p.indexOf('fideo') !== -1 || p.indexOf('seca') !== -1) baseUnits = UGRPS.DRY;
        else if (p.indexOf('papa') !== -1 || p.indexOf('tomate') !== -1 || p.indexOf('lechuga') !== -1 || p.indexOf('cebolla') !== -1) baseUnits = UGRPS.PRODUCE;

        // UnitFrequencyEngine: promover la unidad más usada por producto × modo
        var topUnit = UnitFreq.getTop(prodName, mode || 'stock') || UNIT_MEM.get(prodName);
        if (topUnit) {
            var finalUnits = baseUnits.slice();
            var idx = finalUnits.indexOf(topUnit);
            if (idx !== -1) finalUnits.splice(idx, 1);
            finalUnits.unshift(topUnit);
            return finalUnits;
        }

        return baseUnits;
    }

    var saveDraftDebounced = FeDe_Utils.debounce(saveDraft, 600);

    function setUnitEl(el) { setUnit(decodeURIComponent(el.dataset.prod), decodeURIComponent(el.dataset.unit)); }
    function setUnit(p, u) {
        if (!relData[p]) relData[p] = { qty: 0, unit: u };
        else relData[p].unit = u;
        UNIT_MEM.save(p, u);
        UnitFreq.record(p, 'stock', u);
        updateProductRow(p); saveDraftDebounced();
    }

    function stepEl(el) { stepProd(decodeURIComponent(el.dataset.prod), parseInt(el.dataset.dir)); }
    function stepProd(p, dir) {
        if (!relData[p]) relData[p] = { qty: 0, unit: getUnitsForProduct(activeCat, p)[0] };

        // Moverse entre 0 y 86
        if (dir === -1 && relData[p].qty === 0) {
            relData[p].qty = 86;
        } else if (relData[p].qty === 86) {
            relData[p].qty = 0;
        } else {
            var prevUnit = relData[p].unit;
            var sn = UNIT_STEPPER.stepNormalized(relData[p].qty, relData[p].unit, dir);
            relData[p].qty  = sn.qty;
            relData[p].unit = sn.unit;
            if (sn.unit !== prevUnit) {
                UNIT_MEM.save(p, sn.unit);
                UnitFreq.record(p, currentMode || 'stock', sn.unit);
            }
        }

        // Limpieza: Si vuelve a 0 real, eliminar del relevamiento
        var wasDeleted = false;
        if (relData[p].qty === 0) {
            delete relData[p];
            wasDeleted = true;
        }

        updateProductRow(p); 
        renderFAB(); 
        saveDraftDebounced();
    }

    function saveManualEntry() {

        var inp = document.getElementById('manual-entry-input');

        var cleanVal = (val || '').toString().replace(/[^\d.,]/g, '').replace(',', '.');

        if (!isNaN(n) && n >= 0) {
            if (!relData[p]) relData[p] = { qty: n, unit: (units && units[0]) || '' };

            else relData[p].qty = 86;
            updateProductRow(p); renderFAB(); saveDraft();

        closeManualEntryModal();

    function saveToCloud(doClear) {
        toggleSync(true, 'Guardando en la nube...');
        if (doClear === undefined) doClear = true;
        var items = [];
        var prods = Object.keys(relData);
        for (var i = 0; i < prods.length; i++) {
            var prod = prods[i];
            var d = relData[prod];
            if (d.qty === 0) continue; // ❌ No guardar ceros en la nube

            var cat = 'Otros';
            if (PROD_LOOKUP[prod]) cat = PROD_LOOKUP[prod].cat;
            items.push({ prod: prod, cat: cat, qty: d.qty, unit: d.unit });
        }
        if (!items.length) { 
            toggleSync(false);
            toast("⚠️ No hay datos para guardar"); 
            return; 
        }

        var entryId = IdGenerator.generateEntryId();
        var tEl = document.getElementById('hdr-turno');
        var turno = (tEl && tEl.textContent) ? tEl.textContent : 'Apertura';
        var entry = {
            id: entryId,
            fecha: new Date().toISOString(),
            turno: turno,
            mode: currentMode || 'stock',
            items: items,
            total: items.length,
            motivo: (currentMode === 'merma' && selectedMotivo) ? selectedMotivo : ''
        };

        // 🟢 AUTO-DISMISS ALERT: Si es un control de stock, descartamos la alerta obligatoria
        if ((currentMode || 'stock') === 'stock' && window.holidayAlert) {
            window.holidayAlert.dismissStockCard("CONTROL DE STOCK");
        }

        setSyncStatus('pending');
        FeDe_API.call('addHistoryEntry', entry, function() {
            toggleSync(false);
            /* Asignar _ts antes de insertar en HIST para que renderHistory
               lo ordene correctamente (sin _ts, sort usa 0 → queda fuera del histLimit) */
            entry._ts = new Date(entry.fecha).getTime();
            HIST.unshift(entry);
            buildHistIndex();           // actualiza HIST_INDEX + HIST_BY_PROD
            _histLastRenderedLen = -1;  // fuerza re-render en próxima visita al historial
            toast("✓ ¡Sincronizado!");
            if (doClear) {
                relData = {};
                localStorage.removeItem('fede_draft');
                renderFAB(); closeResumen(); goHome();
            }
            setSyncStatus('online');
            processOfflineQueue(); // Verificar si hay más
        }, function(err) {
            toggleSync(false);
            enqueueEntry(entry);
            if (doClear) {
                relData = {};
                localStorage.removeItem('fede_draft');
                renderFAB(); closeResumen(); goHome();
            }
            setSyncStatus('error');
        });
    }

    }

    var isSyncing = false;
    var _syncRetries = 0;
    function processOfflineQueue() {
        if (isSyncing || window.offlineQueue.length === 0) return;
        isSyncing = true;
        var entry = window.offlineQueue[0];

        FeDe_API.call('addHistoryEntry', entry, function () {
            _syncRetries = 0;
            window.offlineQueue.shift();
            localStorage.setItem('fede_offline_queue', JSON.stringify(window.offlineQueue));
            updateSyncBadge();
            /* Agregar a HIST si no está ya (puede llegar de sesión anterior sin _ts) */
            if (!HIST_INDEX || !HIST_INDEX[String(entry.id)]) {
                if (!entry._ts) entry._ts = new Date(entry.fecha).getTime();
                HIST.unshift(entry);
                buildHistIndex();
                _histLastRenderedLen = -1;
            }
            isSyncing = false;
            if (window.offlineQueue.length > 0) {
                setTimeout(processOfflineQueue, 500);
            } else {
                toast("✓ Datos guardados en el servidor");
            }
        }, function () {
            isSyncing = false;
            _syncRetries++;
            // Reintentar hasta 5 veces con backoff exponencial (2s, 4s, 8s, 16s, 32s)
            if (_syncRetries <= 5) {
                var delay = Math.min(2000 * Math.pow(2, _syncRetries - 1), 32000);
                toast("⚠️ Reintentando sync en " + Math.round(delay / 1000) + "s…");
                setTimeout(processOfflineQueue, delay);
            } else {
                _syncRetries = 0;
                toast("❌ No se pudo sincronizar. Se intentará al reconectar.", 5000);
            }
        });
    }

    function renderTree(filterTerm) {

        if (!ABC_DATA) ABC_DATA = computeABC();
        var term = '';
        var searchInp = document.getElementById('tree-search-inp');
        if (filterTerm !== undefined) term = filterTerm.toLowerCase().trim();
        else if (searchInp && searchInp.value) term = searchInp.value.toLowerCase().trim();

        // Strip accents for accent-insensitive matching
        var _strip = function(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, ''); };
        var normTerm = term ? _strip(term) : '';

        var sorted = Object.keys(CATS).sort(function (a, b) { return (CATS[a].order || 99) - (CATS[b].order || 99); });
        var html = '';
        var totalProds = 0;
        var visibleCats = 0;

        for (var i = 0; i < sorted.length; i++) {
            var cat = sorted[i];
            var ec = encodeURIComponent(cat);
            var allProds = CATS[cat].prods.slice().sort();
            totalProds += allProds.length;

            // Filter products by search term (accent-insensitive)
            var prods = allProds;
            if (normTerm) {
                prods = [];
                for (var fi = 0; fi < allProds.length; fi++) {
                    if (_strip(allProds[fi].toLowerCase()).indexOf(normTerm) !== -1) prods.push(allProds[fi]);
                }
                if (prods.length === 0 && _strip(cat.toLowerCase()).indexOf(normTerm) === -1) continue;
            }
            visibleCats++;

            var isOpen = term ? (prods.length > 0) : treeOpen[cat];
            var safeCat = FeDe_Utils.sanitize(cat);
            var icon = CATS[cat].icon || 'package';

            html += '<div class="tree-node">' +
                '<div class="tree-row" data-cat="' + ec + '" onclick="toggleTreeEl(this)">' +
                '<i data-lucide="' + (isOpen ? 'chevron-down' : 'chevron-right') + '" class="tree-chevron"></i>' +
                '<i data-lucide="' + icon + '" class="tree-cat-icon"></i>' +
                '<span class="tree-label">' + safeCat + '</span>' +
                '<span class="tree-count-badge">' + allProds.length + '</span>' +
                '<button data-cat="' + ec + '" onclick="event.stopPropagation();openEditCatEl(this)" class="tree-action-btn" aria-label="Editar categoría" style="margin-left:8px;">' +
                '<i data-lucide="pencil" style="width:13px;height:13px;"></i></button>' +
                '</div>' +
                '<div class="tree-children ' + (isOpen ? 'open' : '') + '">';

            for (var j = 0; j < prods.length; j++) {
                var p = prods[j];
                var ep = encodeURIComponent(p);
                var safeLeaf = FeDe_Utils.sanitize(p);
                var unitInfo = CUSTOM_UNITS[p] ? CUSTOM_UNITS[p].join(', ') : '';
                var abcEntry = ABC_DATA ? ABC_DATA[p] : null;
                var abcBadgeHtml = '';
                if (abcEntry) {
                    abcBadgeHtml = '<span data-abc-badge="' + ep + '" onclick="event.stopPropagation();openAbcSelector(\'' + ep + '\')">' +
                        _buildAbcBadgeHtml(abcEntry) + '</span>';
                }

                // Densidad Clínica: Click en la fila edita, menos iconos sueltos
                html += '<div class="tree-leaf" data-cat="' + ec + '" data-prod="' + ep + '" onclick="openEditProdEl(this)" style="cursor:pointer; padding-right:12px;">' +
                    '<div class="tree-leaf-info">' +
                    '<span class="tree-leaf-name">' + safeLeaf + '</span>' +
                    (unitInfo ? '<span class="tree-leaf-units">' + FeDe_Utils.sanitize(unitInfo) + '</span>' : '') +
                    '</div>' +
                    abcBadgeHtml +
                    '<i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--fede-on-surface-3);stroke-width:1.5;"></i>' +
                    '</div>';
            }

            html += '<div class="tree-add-form" style="border: 1px dashed var(--fede-border); background: transparent;">' +
                '<input data-cat="' + ec + '" class="form-input tree-add-inp tree-prod-inp" placeholder="+ Agregar producto..." onkeydown="if(event.key===\'Enter\') addProdInp(this)" style="background:transparent; border:none; box-shadow:none;">' +
                '<button data-cat="' + ec + '" onclick="addProdBtn(this)" class="tree-add-btn" aria-label="Agregar producto" style="background:var(--fede-surface-sunken);color:var(--fede-on-surface);">' +
                '<i data-lucide="plus" style="width:14px;height:14px;"></i></button>' +
                '</div></div></div>';
        }

        // Stats bar
        var statsHtml = '<div class="tree-stats-bar">' +
            '<span>' + visibleCats + ' categorías</span>' +
            '<span class="tree-stats-dot">·</span>' +
            '<span>' + totalProds + ' productos</span></div>';

        el.innerHTML = statsHtml + html;
        setTimeout(function () { refreshIcons(); }, 50);
    }

    function _addProd(cat, inp) {
        var v = inp.value.trim();
        if (!v) return;

        // Validar duplicado en misma categoría
        if (CATS[cat] && CATS[cat].prods && CATS[cat].prods.indexOf(v) !== -1) {
            toast('<i data-lucide="alert-triangle" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i> "' + v + '" ya existe en ' + cat);
            return;
        }

        var proceedCreation = function() {
            var btn = inp.parentElement.querySelector('.tree-add-btn');
            inp.disabled = true;
            if (btn) {
                btn.disabled = true;
                btn.style.opacity = '0.5';
            }
            toast('<i data-lucide="loader-2" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;animation:spin 2s linear infinite;"></i> Agregando...', 2000);

            FeDe_API.call('createProduct', { catName: cat, productName: v }, function(r) {
                CATS = r.data;
                if (typeof buildProdLookup === 'function') buildProdLookup();
                if (typeof buildSearchIndex === 'function') buildSearchIndex();
                inp.value = '';
                inp.disabled = false;
                if (btn) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
                renderTree();
                toast('<i data-lucide="check" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i> "' + v + '" añadido a ' + cat);
            }, function(err) {
                inp.disabled = false;
                if (btn) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
                toast('<i data-lucide="x" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i> Error: ' + err);
            });
        };

        // Validar duplicado cross-categoría y advertir
        var existsIn = _findProductCategory(v);
        if (existsIn && existsIn !== cat) {
            openFedeConfirm('Producto Duplicado', '"' + v + '" ya existe en ' + existsIn + '. ¿Crear también en ' + cat + '?', proceedCreation, "Crear de todos modos", true);
            return;
        }

        proceedCreation();
    }

    function _findProductCategory(prodName) {
        var catKeys = Object.keys(CATS);
        for (var i = 0; i < catKeys.length; i++) {
            var prods = CATS[catKeys[i]].prods || [];
            if (prods.indexOf(prodName) !== -1) return catKeys[i];
        }
        return null;
    }

    function _getAllKnownUnits() {
        var seen = {}, result = [];
        var sources = [units];
        var gKeys = Object.keys(UGRPS);
        for (var gi = 0; gi < gKeys.length; gi++) sources.push(UGRPS[gKeys[gi]]);
        var cKeys = Object.keys(CUSTOM_UNITS);
        for (var ci = 0; ci < cKeys.length; ci++) sources.push(CUSTOM_UNITS[cKeys[ci]]);
        for (var si = 0; si < sources.length; si++) {
            var arr = sources[si];
            if (!arr) continue;
            for (var i = 0; i < arr.length; i++) {
                if (!seen[arr[i]]) { seen[arr[i]] = 1; result.push(arr[i]); }
            }
        }
        return result;
    }

    /* ── DASHBOARD ── */
    var lastDashLoad = 0;

    function renderDashboard(force) {
        if (!force && lastDashLoad && (Date.now() - lastDashLoad < 60000)) return;
        
        var loader = document.getElementById('dash-loader');
        var content = document.getElementById('dash-content');
        
        if (loader) loader.classList.remove('hidden');
        if (content) content.classList.add('hidden');

        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    lastDashLoad = Date.now();
                    var data = res.data;

                    // METRICS
                    document.getElementById('card-totalitems').innerText = data.totalItems || '0';
                    document.getElementById('card-movtoday').innerText = data.movementsToday || '0';

                    // RECENT OPS
                    var recentList = document.getElementById('dash-recent-ops');
                    if (recentList) {
                        if (!data.recentOps || data.recentOps.length === 0) {
                            recentList.innerHTML = '<div style="font-size:12px;color:var(--fede-on-surface-3);padding:14px 0;font-style:italic;">Sin operaciones recientes</div>';
                        } else {
                            recentList.innerHTML = data.recentOps.map(function(op) {
                                var modeName = op.mode.charAt(0).toUpperCase() + op.mode.slice(1);
                                if (op.mode === 'produccion') modeName = 'Producción';
                                var timeLabel = FeDe_Utils.timeAgoStr(op.ts);
                                var accentColor = 'var(--fede-accent-' + op.mode + ')';
                                return '<div class="dash-sec-chip" style="border-left: 3px solid ' + accentColor + ';">' +
                                    '<span class="dash-sec-chip-name">' + modeName + '</span>' +
                                    '<span class="dash-sec-chip-time">' + timeLabel + '</span>' +
                                    '</div>';
                            }).join('');
                        }
                    }

                    // CALENDAR — fusionar datos del servidor con HIST local
                    // (HIST siempre refleja los registros más recientes de la sesión)
                    var _srvCal = data.calendar || {};
                    var _localCal = buildCalDataFromHist(new Date().getFullYear(), new Date().getMonth());
                    var _mergedCal = {};
                    var _calKeys = Object.keys(_srvCal).concat(Object.keys(_localCal));
                    for (var _ki = 0; _ki < _calKeys.length; _ki++) {
                        var _k = _calKeys[_ki];
                        if (_mergedCal[_k]) continue;
                        var _sm = _srvCal[_k] || [];
                        var _lm = _localCal[_k] || [];
                        var _combined = _sm.slice();
                        for (var _li = 0; _li < _lm.length; _li++) {
                            if (_combined.indexOf(_lm[_li]) === -1) _combined.push(_lm[_li]);
                        }
                        _mergedCal[_k] = _combined;
                    }
                    renderDashboardCalendar(_mergedCal);

                    // GOOGLE CALENDAR
                    fetchGoogleCalendar();

                    if (loader) loader.classList.add('hidden');
                    if (content) content.classList.remove('hidden');
                    
                    // RE-INIT LUCIDE
                    refreshIcons();
                }
            })
            .withFailureHandler(function(err) {
                console.error('Dash Error:', err);

    // Estado de navegación del calendario del dashboard
    var _calViewYear  = new Date().getFullYear();
    var _calViewMonth = new Date().getMonth();
    var _calDataCache = null; // calData del mes actual recibido del servidor

    function buildCalDataFromHist(year, month) {
        var result = {};
        if (!HIST || !HIST.length) return result;
        for (var i = 0; i < HIST.length; i++) {
            var h = HIST[i];
            var d = new Date(h.fecha);
            if (d.getFullYear() !== year || d.getMonth() !== month) continue;
            var mm = String(month + 1).padStart(2, '0');
            var dd = String(d.getDate()).padStart(2, '0');
            var key = year + '-' + mm + '-' + dd;
            var mode = (h.mode || 'stock').toLowerCase();
            if (!result[key]) result[key] = [];
            if (result[key].indexOf(mode) === -1) result[key].push(mode);
        }
        return result;
    }

    function dashCalNav(delta) {
        _calViewMonth += delta;
        if (_calViewMonth > 11) { _calViewMonth = 0;  _calViewYear++; }
        if (_calViewMonth < 0)  { _calViewMonth = 11; _calViewYear--; }
        var now = new Date();
        var isCurrentMonth = (_calViewYear === now.getFullYear() && _calViewMonth === now.getMonth());
        var data;
        if (isCurrentMonth) {
            // Siempre fusionar caché del servidor con HIST local para reflejar entradas nuevas
            var _ncBase = _calDataCache || {};
            var _ncLocal = buildCalDataFromHist(_calViewYear, _calViewMonth);
            data = {};
            var _ncKeys = Object.keys(_ncBase).concat(Object.keys(_ncLocal));
            for (var _nci = 0; _nci < _ncKeys.length; _nci++) {
                var _nck = _ncKeys[_nci];
                if (data[_nck]) continue;
                var _ncSrv = _ncBase[_nck] || [];
                var _ncLoc = _ncLocal[_nck] || [];
                var _ncComb = _ncSrv.slice();
                for (var _ncli = 0; _ncli < _ncLoc.length; _ncli++) {
                    if (_ncComb.indexOf(_ncLoc[_ncli]) === -1) _ncComb.push(_ncLoc[_ncli]);
                }
                data[_nck] = _ncComb;
            }
        } else {
            data = buildCalDataFromHist(_calViewYear, _calViewMonth);
        }
        renderDashboardCalendar(data, _calViewYear, _calViewMonth);
        refreshIcons();
    }

    function renderDashboardCalendar(calData, targetYear, targetMonth) {
        var grid = document.getElementById('dash-calendar');
        var calHeader = document.getElementById('dash-cal-month');
        if (!grid) return;

        var now = new Date();
        var year  = (targetYear  !== undefined) ? targetYear  : now.getFullYear();
        var month = (targetMonth !== undefined) ? targetMonth : now.getMonth();

        // Sincronizar estado de navegación con lo que se está mostrando
        _calViewYear  = year;
        _calViewMonth = month;

        // Cachear los datos del mes actual para poder volver a ellos
        var isCurrentMonth = (year === now.getFullYear() && month === now.getMonth());
        if (isCurrentMonth) _calDataCache = calData;

        if (calHeader) {
            var label = new Date(year, month, 1)
                .toLocaleDateString('es-AR', {month: 'long', year: 'numeric'})
                .replace(/^\w/, function(c) { return c.toUpperCase(); });
            // Indicar visualmente si es un mes pasado o futuro
            calHeader.textContent = isCurrentMonth ? label : label;
            calHeader.style.fontWeight = isCurrentMonth ? '' : '600';
            calHeader.style.color = isCurrentMonth ? '' : 'var(--fede-on-surface-2)';
        }

        grid.innerHTML = '';

        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var firstDay = new Date(year, month, 1).getDay();
        firstDay = firstDay === 0 ? 6 : firstDay - 1;

        for (var i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for (var day = 1; day <= daysInMonth; day++) {
            var mm = String(month + 1).padStart(2, '0');
            var dd = String(day).padStart(2, '0');
            var dateStr = year + '-' + mm + '-' + dd;
            var isToday = (year === now.getFullYear() && month === now.getMonth() && day === now.getDate());
            var modes = calData[dateStr] || [];
            var hasActivity = modes.length > 0;

            var dayDiv = document.createElement('div');
            var cls = 'cal-day';
            if (isToday) cls += ' today';
            if (hasActivity) cls += ' has-activity';
            dayDiv.className = cls;

            var numSpan = document.createElement('span');
            numSpan.textContent = day;
            dayDiv.appendChild(numSpan);

            if (hasActivity) {
                var dots = document.createElement('div');
                dots.className = 'cal-day-dots';
                for (var mi = 0; mi < Math.min(modes.length, 4); mi++) {
                    var dot = document.createElement('div');
                    dot.className = 'cal-dot cal-dot-' + modes[mi];
                    dots.appendChild(dot);
                }
                dayDiv.appendChild(dots);
            }

            (function(ds) {
                dayDiv.onclick = function() { openHistoryAtDate(ds); };
            })(dateStr);

            grid.appendChild(dayDiv);
        }
    }

    var histFilters = { mode: 'all', from: '', to: '', query: '' };

    var _histSearchTimer = null;     // C: debounce handle

    // E: índice id→entry — se reconstruye cuando HIST cambia
    var HIST_INDEX = {};
    function buildHistIndex() {
        HIST_INDEX = {};
        HIST_BY_PROD = {};
        for (var i = 0; i < HIST.length; i++) {
            var _e = HIST[i];
            if (!_e._ts) _e._ts = new Date(_e.fecha).getTime();

                if (!_p) continue;
                if (!HIST_BY_PROD[_p]) HIST_BY_PROD[_p] = [];
                HIST_BY_PROD[_p].push({
                    ts: _e._ts, mode: _e.mode,

    function setHistFilter(type, val, el) {
