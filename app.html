<script>
    /* ——————————————————————————————————————————————————————————————————————————
       FeDe Gastro Pro - v10.0.0 — FOCACCIA Edition
       —————————————————————————————————————————————————————————————————————————— */

    var CATS = {}, FAVS = [], HIST = [], relData = {}, currentMode = null, activeCat = null, CUSTOM_UNITS = {};
    var units = ["unidad/es", "kg", "litro/s", "porción/es", "pack/s", "atado/s", "frasco/s", "lata/s"];
    var treeOpen = {};
    var activeSheetId = localStorage.getItem('fede_active_sheet_id') || 'undefined';
    var dbName = 'Master';

    /* ── MEMORIA DE UNIDADES ── */
    var UNIT_MEM = {
        save: function (prod, unit) {
            var mem = JSON.parse(localStorage.getItem('fede_unit_mem') || '{}');
            mem[prod] = unit;
            localStorage.setItem('fede_unit_mem', JSON.stringify(mem));
        },
        get: function (prod) {
            var mem = JSON.parse(localStorage.getItem('fede_unit_mem') || '{}');
            return mem[prod] || null;
        }
    };

    /* ── GRUPOS DE UNIDADES INTELIGENTES ── */
    var UGRPS = {
        OILS: ["bidón/es", "litro/s", "botella/s", "kg"],
        LIQUIDS: ["litro/s", "botella/s", "lata/s"],
        PRODUCE: ["kg", "atado/s", "unidad/es", "cajón/es", "bolsa/s", "gr"],
        BREADS: ["unidad/es", "kg", "gr"],
        MEATS: ["kg", "pieza/s", "gr"],
        FISH: ["kg", "penca/s", "porción/es", "gr"],
        DAIRY: ["kg", "horma/s", "pieza/s", "gr", "unidad/es"],
        DRY: ["kg", "bolsa/s", "paquete/s", "gr"],
        EGGS: ["unidad/es", "docena", "maple"],
        UNITS: ["unidad/es", "pack/s", "docena"],
        GENERIC: ["unidad/es", "kg", "litro/s", "porción/es", "pack/s", "atado/s", "frasco/s", "lata/s"]
    };

    /* ── PANTALLA COMPLETA (Fullscreen API) ── */
    function toggleAppFullscreen() {
        var doc = document.documentElement;
        var isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

        if (!isFS) {
            // ENTRAR en pantalla completa
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
            localStorage.setItem('fede_fullscreen', 'true');
        } else {
            // SALIR de pantalla completa
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            localStorage.setItem('fede_fullscreen', 'false');
        }
    }

    // Actualizar icono cuando cambia el estado de fullscreen
    function onFullscreenChange() {
        var isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
        var btn = document.getElementById('btn-fullscreen');
        if (btn) {
            var icon = btn.querySelector('i');
            if (icon) {
                icon.setAttribute('data-lucide', isFS ? 'minimize' : 'maximize');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange', onFullscreenChange);

    // Auto-restaurar fullscreen en la primera interacción del usuario
    function autoRestoreFullscreen() {
        if (localStorage.getItem('fede_fullscreen') === 'true') {
            toggleAppFullscreen();
        }
        document.removeEventListener('click', autoRestoreFullscreen);
    }
    if (localStorage.getItem('fede_fullscreen') === 'true') {
        document.addEventListener('click', autoRestoreFullscreen, { once: true });
    }

    /* ── LOADER PROGRESS LOGIC ── */
    var _loaderPerc = 0;
    var _loaderInterval = null;

    function updateLoader(p, msg) {
        var elPerc = document.getElementById('loader-perc');
        var elStatus = document.getElementById('loader-status');
        if (elPerc) elPerc.textContent = Math.floor(p) + '%';
        if (elStatus && msg) elStatus.textContent = msg;
        _loaderPerc = p;
    }

    /* ── SISTEMA DE CONFIRMACIÓN ESTÉTICO ── */
    var confirmCallback = null;
    function fConfirm(config, onConfirm) {
        var modal = document.getElementById('confirm-modal');
        var title = document.getElementById('confirm-title');
        var msg = document.getElementById('confirm-msg');
        var btnOk = document.getElementById('confirm-ok');
        var btnCancel = document.getElementById('confirm-cancel');

        if (!modal) {
            if (confirm(config.message)) onConfirm();
            return;
        }

        title.textContent = config.title || "¿Estás seguro?";
        msg.textContent = config.message || "Esta acción no puede deshacerse.";
        btnOk.textContent = config.okText || "SÍ, ELIMINAR";
        
        // Estilo condicional del botón OK
        if (config.type === 'info') {
            btnOk.style.background = 'var(--primary)';
            btnOk.style.color = 'var(--bg)';
            btnOk.style.boxShadow = '0 4px 20px rgba(255, 255, 255, 0.2)';
        } else {
            btnOk.style.background = 'var(--red)';
            btnOk.style.color = 'white';
            btnOk.style.boxShadow = '0 8px 24px rgba(225, 29, 72, 0.4)';
        }

        confirmCallback = onConfirm;
        modal.classList.add('open');

        btnOk.onclick = function() {
            modal.classList.remove('open');
            if (confirmCallback) {
                var cb = confirmCallback;
                confirmCallback = null;
                cb();
            }
        };

        btnCancel.onclick = function() {
            modal.classList.remove('open');
            confirmCallback = null;
        };
    }

    /* ── SISTEMA DE SINCRONIZACIÓN (SYNC OVERLAY) ── */
    function toggleSync(show, text) {
        var overlay = document.getElementById('sync-overlay');
        var txtEl = document.getElementById('sync-text');
        if (!overlay) return;
        
        if (show) {
            if (txtEl) txtEl.textContent = (text || "Sincronizando...").toUpperCase();
            overlay.classList.add('open');
        } else {
            overlay.classList.remove('open');
        }
    }

    function startInertiaProgress() {
        if (_loaderInterval) clearInterval(_loaderInterval);
        _loaderInterval = setInterval(function() {
            if (_loaderPerc < 92) {
                var inc = (92 - _loaderPerc) / 50; // Desacelera a medida que se acerca al final
                updateLoader(_loaderPerc + inc);
            }
        }, 100);
    }

    /* ── INIT ── */
    window.addEventListener('DOMContentLoaded', function () {
        console.log("FeDe Gastro Pro v10.0.0 - FOCACCIA Edition");
        updateLoader(15, "Iniciando sistema...");
        updateTime();
        setInterval(updateTime, 10000);

        // 🎨 CARGAR PREFERENCIA DE TAMAÑO DE ICONOS
        loadIconSizePreference();

        // 🔔 INICIALIZAR HOLIDAY ALERT
        window.holidayAlert = new HolidayAlert();
        window.holidayHelper = new HolidayStockHelper();

        // 📦 COLA OFFLINE
        window.offlineQueue = JSON.parse(localStorage.getItem('fede_offline_queue') || '[]');
        updateSyncBadge();
        window.addEventListener('online', processOfflineQueue);

        loadLocalSnapshot();

        // ⏱️ TIMEOUT DE SEGURIDAD PARA EL LOADER (7s máximo)
        var loaderTimeout = setTimeout(function () {
            console.warn('⚠️ Loader timeout - ocultando manualmente');
            hideLoader();
        }, 7000);

        window.loaderTimeout = loaderTimeout;

        updateLoader(30, "Conectando con servidor...");
        startInertiaProgress();
        loadConfigFromGAS();
    });

    /**
     * 🎨 SISTEMA DE TAMAÑO GLOBAL DE ICONOS
     */
    function loadIconSizePreference() {
        var savedSize = localStorage.getItem('fede_icon_size') || 'medium';
        setGlobalIconSize(savedSize);
        console.log('🎨 Icon size cargado:', savedSize);
    }

    function setGlobalIconSize(size) {
        var validSizes = ['small', 'medium', 'large'];
        if (validSizes.indexOf(size) === -1) size = 'medium';

        document.documentElement.setAttribute('data-icon-size', size);
        localStorage.setItem('fede_icon_size', size);

        var sizeButtons = document.querySelectorAll('[data-icon-control]');
        for (var i = 0; i < sizeButtons.length; i++) {
            var btn = sizeButtons[i];
            btn.classList.remove('active');
            if (btn.getAttribute('data-icon-control') === size) btn.classList.add('active');
        }

        console.log('🎨 Icon size actualizado:', size);
        refreshIcons();
    }

    function renderIconSizeControls() {
        // Feature disabled intentionally
    }

    function loadLocalSnapshot() {
        var snapKey = 'fede_snapshot_' + activeSheetId;
        var snap = JSON.parse(localStorage.getItem(snapKey) || 'null');
        if (snap) {
            console.log('📦 [CACHE] Usando snapshot local');
            CATS = snap.cats || {};
            FAVS = snap.favs || [];
            HIST = snap.history || [];
            if (snap.units) units = snap.units;
            if (snap.custom_units) CUSTOM_UNITS = snap.custom_units;
            renderCatGrid();
            renderTree();
            renderHistory();
            updateDBLabel();
        }
    }

    var HOLIDAYS = {
        '04-02': 'Día de Malvinas',
        '04-03': 'Viernes Santo',
        '05-01': 'Día del Trabajador',
        '05-25': 'Revolución de Mayo',
        '06-20': 'Día de la Bandera',
        '07-09': 'Día de la Independencia',
        '12-25': 'Navidad'
    };

    function updateTime() {
        var now = new Date();
        var days = ['DOMINGO', 'LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'];
        var dayEl = document.getElementById('hdr-day');
        var homeDayEl = document.getElementById('home-day');

        var dateStr = now.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
        var fullDay = days[now.getDay()] + " " + dateStr;

        if (dayEl) dayEl.textContent = fullDay;
        if (homeDayEl) homeDayEl.textContent = fullDay;
    }

    function setSyncStatus(st) {
        // st: 'online' | 'pending' | 'error'
        var el = document.getElementById('sync-status');
        if (!el) return;
        el.className = 'sync-status ' + st;
        var icon = el.querySelector('i');
        if (icon) {
            if (st === 'online') icon.setAttribute('data-lucide', 'cloud-check');
            else if (st === 'pending') icon.setAttribute('data-lucide', 'cloud-upload');
            else icon.setAttribute('data-lucide', 'cloud-off');
            refreshIcons();
        }
    }


    function loadConfigFromGAS() {
        console.log('⟳ [LOAD] Iniciando carga desde GAS...', activeSheetId);
        updateDBLabel();
        google.script.run
            .withSuccessHandler(onConfigLoaded)
            .withFailureHandler(onConfigFailed)
            .getAppConfig(activeSheetId);
    }

    function onConfigLoaded(result) {
        console.log('✓ [LOAD] Config recibida:', result);
        // Cancelar timeout de seguridad
        if (window.loaderTimeout) clearTimeout(window.loaderTimeout);

        if (!result || !result.success) {
            console.error('❌ [LOAD] GAS devolvió error:', result ? result.error : 'Unknown');
            toast("❌ Error al cargar config");
            onConfigFailed(result ? result.error : "Unknown error");
            return;
        }
        var config = result.config;
        var history = result.history;
        var ssName = result.ssName;

        if (ssName) { dbName = ssName; updateDBLabel(); }
        if (config && config.cats) {
            CATS = config.cats;
            // 🎨 PATCH: Auto-update icons to requested set
            var iconPatch = {
                "Personal": "chess-pawn",
                "Verdulería": "carrot",
                "Pastas": "soup",
                "Bebidas": "bottle-wine",
                "Platos carta": "utensils-crossed"
            };
            var needsSave = false;
            Object.keys(iconPatch).forEach(function (cat) {
                if (CATS[cat] && CATS[cat].icon !== iconPatch[cat]) {
                    CATS[cat].icon = iconPatch[cat];
                    needsSave = true;
                }
            });
            if (needsSave) google.script.run.saveConfig('cats', CATS, activeSheetId);
        }
        if (config && config.favs) { FAVS = config.favs; }
        if (config && config.units && config.units.length) units = config.units;
        if (config && config.custom_units) CUSTOM_UNITS = config.custom_units;

        // 🆔 Identidad de la App
        if (config && config.app_title) {
            document.getElementById('app-title-display').textContent = config.app_title;
            var inp = document.getElementById('cfg-app-title');
            if (inp) inp.value = config.app_title;
        }
        if (config && config.app_subtitle) {
            document.getElementById('app-subtitle-display').textContent = config.app_subtitle;
            var inp = document.getElementById('cfg-app-subtitle');
            if (inp) inp.value = config.app_subtitle;
        }
        if (history) { HIST = history; renderHistory(); }

        // Guardar snapshot para uso offline
        var snapKey = 'fede_snapshot_' + activeSheetId;
        var snapData = { cats: CATS, favs: FAVS, history: HIST, units: units, custom_units: CUSTOM_UNITS, ts: Date.now() };
        localStorage.setItem(snapKey, JSON.stringify(snapData));

        renderCatGrid();
        renderTree();

        
        // Finalizar loader con éxito
        if (_loaderInterval) clearInterval(_loaderInterval);
        updateLoader(100, "Sincronizado");
        setTimeout(hideLoader, 400);

        // 🔄 Sincronizar identidad inicial
        refreshBrandingUI();

        setTimeout(function () {
            refreshIcons();
            checkDraft();
            renderHomeSummary(); // NUEVO: Llamar al resumen de home
        }, 100);
    }

    function onConfigFailed(error) {
        console.error('❌ Error GAS:', error);
        // Cancelar timeout de seguridad
        if (window.loaderTimeout) clearTimeout(window.loaderTimeout);

        toast("⚠️ No se pudo conectar con servidor");
        var backupCats = localStorage.getItem('fede_cats_backup');
        var backupHist = localStorage.getItem('fede_history_backup');
        if (backupCats) CATS = JSON.parse(backupCats);
        if (backupHist) HIST = JSON.parse(backupHist);
        hideLoader();
        refreshIcons();
        checkDraft();
    }

    function hideLoader() {
        var loader = document.getElementById('loader');
        if (loader) {
            loader.style.opacity = '0';
            loader.style.pointerEvents = 'none';
            setTimeout(function () {
                loader.style.display = 'none';
                console.log('✓ Loader ocultado');
            }, 500);
        } else {
            console.warn('⚠️ Elemento loader no encontrado');
        }
    }

    function saveCatsToGAS(cats) {
        google.script.run
            .withSuccessHandler(function (result) {
                if (result && result.success) {
                    toast('✓ Guardado en servidor');
                    localStorage.setItem('fede_cats_backup', JSON.stringify(cats));
                } else toast('❌ Error guardando');
            })
            .withFailureHandler(function (error) { toast('❌ Error de servidor'); })
            .saveConfig('cats', cats, activeSheetId);
    }

    function addEntryToGAS(entry) {
        google.script.run
            .withSuccessHandler(function (result) {
                if (result && result.success) {
                    toast('✓ Registrado');
                    loadConfigFromGAS();
                } else toast('❌ Error al guardar');
            })
            .withFailureHandler(function (error) { toast('❌ Error de servidor'); })
            .addHistoryEntry(entry, activeSheetId);
    }

    function deleteHistoryEntry(entryId) {
        google.script.run
            .withSuccessHandler(function (res) { if (res.success) { toast('✓ Borrado'); loadConfigFromGAS(); } })
            .deleteHistoryEntry(entryId, activeSheetId);
    }

    function deleteHistoryData(type) {
        google.script.run
            .withSuccessHandler(function (res) { if (res.success) { toast('✓ Historial limpiado'); loadConfigFromGAS(); } })
            .deleteHistory(type, activeSheetId);
    }

    function updateAppIdentity() {
        var title = document.getElementById('cfg-app-title').value;
        var subtitle = document.getElementById('cfg-app-subtitle').value;

        if (title) {
            document.getElementById('app-title-display').textContent = title;
            google.script.run.saveConfig('app_title', title, activeSheetId);
        }
        if (subtitle) {
            document.getElementById('app-subtitle-display').textContent = subtitle;
            google.script.run.saveConfig('app_subtitle', subtitle, activeSheetId);
        }
        toast("✓ Identidad actualizada");
    }

    function refreshBrandingUI() {
        var title = (document.getElementById('cfg-app-title') ? document.getElementById('cfg-app-title').value : null) || 'FEDE GASTRO PRO';
        var sub = (document.getElementById('cfg-app-subtitle') ? document.getElementById('cfg-app-subtitle').value : null) || "FOCACCIA EDITION";

        // Home
        var ht = document.getElementById('app-title-display');
        var hs = document.getElementById('app-subtitle-display');
        if (ht) ht.textContent = title;
        if (hs) hs.textContent = sub;

        // App Header
        var at = document.getElementById('app-hdr-title');
        var as = document.getElementById('app-hdr-subtitle');
        if (at) at.textContent = title;
        if (as) as.textContent = sub;
    }

    /* ── NAVEGACIÓN ── */
    function initRelevamiento(m) {
        enterMode(m);
        goTab('relevamiento');
        renderFAB();
    }

    // Mapa de colores por modo
    var MODE_CONFIG = {
        pedido: { label: 'PEDIDO', borderColor: 'var(--orange)', bg: 'var(--s1)' },
        stock: { label: 'STOCK', borderColor: 'var(--blue)', bg: 'var(--s1)' },
        entrante: { label: 'ENTRANTE', borderColor: 'var(--green)', bg: 'var(--s1)' },
        recepcion: { label: 'RECEPCIÓN', borderColor: 'var(--green)', bg: 'var(--s1)' },
        merma: { label: 'MERMA', borderColor: 'var(--violet)', bg: 'var(--s1)' },
    };

    function showModeTag(m) {
        var tag = document.getElementById('mode-tag');
        if (!tag) return;
        var cfg = MODE_CONFIG[m];
        if (cfg) {
            tag.textContent = cfg.label;
            tag.className = 'mode-tag-lg ' + m;
            tag.classList.remove('hidden');
        } else {
            tag.classList.add('hidden');
            tag.textContent = '';
        }
    }

    function hideModeTag() {
        var tag = document.getElementById('mode-tag');
        if (tag) { tag.classList.add('hidden'); tag.textContent = ''; }
    }

    function enterMode(m) {
        currentMode = m;
        var hdr = document.getElementById('app-header');
        var cfg = MODE_CONFIG[m] || {};

        // Quitar clases de tema previas
        document.body.classList.remove('theme-stock', 'theme-entrante', 'theme-pedido', 'theme-recepcion', 'theme-merma');
        if (m === 'pedido') document.body.classList.add('theme-pedido');
        if (m === 'stock') document.body.classList.add('theme-stock');
        if (m === 'entrante' || m === 'recepcion') document.body.classList.add('theme-recepcion');
        if (m === 'merma') document.body.classList.add('theme-merma');

        showModeTag(m);
        showContextBar(m);

        if (hdr) {
            hdr.style.borderBottom = '2px solid ' + (cfg.borderColor || 'var(--bd)');
            hdr.style.boxShadow = '0 2px 20px ' + (cfg.glow || 'transparent');
        }
    }

    function enterAdmin() {
        currentMode = null;
        document.getElementById('home').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        hideModeTag();
        var hdr = document.getElementById('app-header');
        if (hdr) { hdr.style.borderBottom = '1px solid var(--bd)'; hdr.style.boxShadow = 'none'; }
        goTab('datos');
        setTimeout(function () { renderIconSizeControls(); }, 100);
        refreshIcons();
    }

    function enterDashboard() {
        currentMode = null;
        document.getElementById('home').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        hideModeTag();
        var hdr = document.getElementById('app-header');
        if (hdr) { hdr.style.borderBottom = '1px solid var(--bd)'; hdr.style.boxShadow = 'none'; }
        setBreadcrumb('dashboard');
        goTab('dashboard');
        renderDashboard();
        refreshIcons();
    }

    function goHome() {
        if (currentMode && Object.keys(relData).length > 0) saveDraft();
        document.getElementById('app').classList.remove('visible');
        document.getElementById('home').classList.remove('hidden');
        var ps = document.getElementById('prod-section');
        if (ps) ps.classList.add('hidden');
        hideModeTag();
        hideContextBar();
        var hdr = document.getElementById('main-hdr');
        if (hdr) { hdr.style.borderBottom = ''; hdr.style.boxShadow = ''; }

        // Manejar estado de pestañas
        var views = document.querySelectorAll('.view');
        for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
        var tabs = document.querySelectorAll('.tab');
        for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
        var tabHome = document.getElementById('tab-home');
        if (tabHome) tabHome.classList.add('active');

        // Limpiar temas de modo
        document.body.classList.remove('theme-stock', 'theme-entrante', 'theme-pedido', 'theme-recepcion', 'theme-merma');
        currentMode = null;
        activeCat = null;
        checkDraft();
        refreshIcons();
        updateActivityIndicators();

        updateActivityIndicators();

        refreshBrandingUI();
    }

    /* ── BARRA CONTEXTUAL ── */
    function updateActivityIndicators() {
        var actH = document.getElementById('hdr-activity-indicator');
        // El indicador solo se activa si hay trabajo pendiente guardado
        var draftStr = localStorage.getItem('fede_draft');
        var draft = draftStr ? JSON.parse(draftStr) : null;
        var hasDraft = (draft && draft.items && Object.keys(draft.items).length > 0);

        if (hasDraft) {
            if (actH) {
                actH.classList.remove('hidden');
                actH.onclick = function () {
                    fConfirm({
                        title: 'Restaurar Trabajo',
                        message: '¿Deseas reanudar lo que estabas haciendo?',
                        okText: 'REANUDAR',
                        type: 'info'
                    }, restoreDraft);
                };
                actH.style.cursor = 'pointer';
                actH.title = "Continuar trabajo pendiente";
            }
        } else {
            if (actH) actH.classList.add('hidden');
        }
    }

    function showContextBar(m) {
        var bar = document.getElementById('ctx-bar');
        var tabs = document.getElementById('main-tabs');
        var fab = document.getElementById('fab');
        var hdrTitle = document.getElementById('app-hdr-title');
        var labels = { pedido: 'PEDIDO', stock: 'STOCK', recepcion: 'RECEPCIÓN', entrante: 'ENTRANTE', merma: 'MERMA' };

        if (bar) bar.classList.remove('hidden');
        if (tabs) tabs.style.display = 'none';
        if (fab) fab.classList.add('hidden');
        if (hdrTitle) hdrTitle.innerHTML = (labels[m] || m.toUpperCase());

        updateActivityIndicators();

        // ACTIVAR BÚSQUEDA PERSISTENTE
        var sContainer = document.getElementById('hdr-search-container');
        if (sContainer) {
            sContainer.classList.add('hdr-search-persistent');
            sContainer.classList.remove('hdr-search-hidden');
            document.getElementById('hdr-search-trigger').classList.add('hidden');
        }
    }

    function hideContextBar() {
        var bar = document.getElementById('ctx-bar');
        var tabs = document.getElementById('main-tabs');

        if (bar) bar.classList.add('hidden');
        if (tabs) tabs.style.display = '';

        // DESACTIVAR BÚSQUEDA PERSISTENTE
        var sContainer = document.getElementById('hdr-search-container');
        if (sContainer) {
            sContainer.classList.remove('hdr-search-persistent');
            sContainer.classList.add('hdr-search-hidden');
            document.getElementById('hdr-search-input').value = '';
            document.getElementById('hdr-search-res').style.display = 'none';
        }

        refreshBrandingUI();
    }

    updateActivityIndicators();


    function goTab(id) {
        var h = document.getElementById('home');
        var a = document.getElementById('app');
        if (h) h.classList.add('hidden');
        if (a) { a.classList.remove('hidden'); a.classList.add('visible'); }

        // Asegurar que la barra contextual se oculte si navegamos a pestañas globales (excepto relevamiento que la usa)
        if (id !== 'relevamiento') {

    function formatUnit(q, u) {
        if (!u) return '';
        var pts = u.split('/');
        var sing = pts[0].trim();
        var singLower = sing.toLowerCase();

        // Si tiene formato con barra (ej: unidad/es), usamos la terminación
        var plur = pts.length > 1 ? sing + pts[1] : sing + 's';

        // Si es automático (sin barra), aplicamos reglas semánticas
        if (pts.length === 1) {
            // 1. Si ya termina en 's', no duplicar
            if (singLower.slice(-1) === 's') {
                plur = sing;
            } 
            // 2. Excepciones de terminaciones en español (unidad -> unidades)
            else if (singLower === 'unidad') plur = 'unidades';
            else if (singLower === 'porción' || singLower === 'porcion') plur = 'porciones';
            else if (singLower === 'bidón' || singLower === 'bidon') plur = 'bidones';
            else if (singLower === 'cajón' || singLower === 'cajon') plur = 'cajones';
            else if (singLower === 'pan') plur = 'panes';
        }

        return q === 1 ? sing : plur;
    }

    var UNIT_MAPPING = {
        "Huevos": UGRPS.EGGS,
        "Carnes": UGRPS.MEATS,
        "Aceite": UGRPS.LIQUIDS,
        "Lácteos": UGRPS.DAIRY,
        "Verduras": UGRPS.PRODUCE,
        "Cereales": UGRPS.DRY,
        "Frutas": UGRPS.PRODUCE,
        "Panes": UGRPS.BREADS,
        "Pescados": UGRPS.FISH,
        "Bebidas": UGRPS.LIQUIDS,
        "Condimentos": UGRPS.DRY,
        "Pastas": UGRPS.DRY,
        "Congelados": UGRPS.GENERIC
    };

    function getUnitsForProduct(catName, prodName) {
        if (prodName === undefined) prodName = '';
        if (prodName && CUSTOM_UNITS[prodName] && CUSTOM_UNITS[prodName].length > 0) return CUSTOM_UNITS[prodName];

        var baseUnits = UNIT_MAPPING[catName] || UGRPS.GENERIC;
        var p = prodName.toLowerCase();

        // Lógica Predictiva por Keywords
        if (p.indexOf('aceite') !== -1) baseUnits = UGRPS.OILS;
        else if (p.indexOf('pescado') !== -1 || p.indexOf('salmón') !== -1 || p.indexOf('salmon') !== -1 || p.indexOf('trucha') !== -1) baseUnits = UGRPS.FISH;
        else if (p.indexOf('pan') !== -1 || p.indexOf('miñon') !== -1 || p.indexOf('flauta') !== -1 || p.indexOf('felipe') !== -1) baseUnits = UGRPS.BREADS;
        else if (p.indexOf('queso') !== -1 || p.indexOf('jamón') !== -1 || p.indexOf('fiambre') !== -1 || p.indexOf('salame') !== -1 || p.indexOf('horma') !== -1) baseUnits = UGRPS.DAIRY;
        else if (p.indexOf('carne') !== -1 || p.indexOf('pollo') !== -1 || p.indexOf('cerdo') !== -1 || p.indexOf('vaca') !== -1 || p.indexOf('bife') !== -1) baseUnits = UGRPS.MEATS;
        else if (p.indexOf('huevo') !== -1) baseUnits = UGRPS.EGGS;
        else if (p.indexOf('vino') !== -1 || p.indexOf('cerveza') !== -1 || p.indexOf('gaseosa') !== -1 || p.indexOf('agua') !== -1) baseUnits = UGRPS.LIQUIDS;
        else if (p.indexOf('harina') !== -1 || p.indexOf('arroz') !== -1 || p.indexOf('fideo') !== -1 || p.indexOf('seca') !== -1) baseUnits = UGRPS.DRY;
        else if (p.indexOf('papa') !== -1 || p.indexOf('tomate') !== -1 || p.indexOf('lechuga') !== -1 || p.indexOf('cebolla') !== -1) baseUnits = UGRPS.PRODUCE;

        // Memoria de Usuario (Promover la última usada)
        var lastUsed = UNIT_MEM.get(prodName);
        if (lastUsed) {
            var finalUnits = baseUnits.slice();
            var idx = finalUnits.indexOf(lastUsed);
            if (idx !== -1) {
                finalUnits.splice(idx, 1);
                finalUnits.unshift(lastUsed);
            } else {
                finalUnits.unshift(lastUsed);
            }
            return finalUnits;
        }

        return baseUnits;
    }

    function setUnitEl(el) { setUnit(decodeURIComponent(el.dataset.prod), decodeURIComponent(el.dataset.unit)); }
    function setUnit(p, u) {
        if (!relData[p]) relData[p] = { qty: 0, unit: u };
        else relData[p].unit = u;
        UNIT_MEM.save(p, u); // Guardar en memoria
        updateProductRow(p); saveDraft();
    }

    function stepEl(el) { stepProd(decodeURIComponent(el.dataset.prod), parseInt(el.dataset.dir)); }
    function stepProd(p, dir) {
        if (!relData[p]) relData[p] = { qty: 0, unit: getUnitsForProduct(activeCat, p)[0] };

        // Moverse entre 0 y 86
        if (dir === -1 && relData[p].qty === 0) {
            relData[p].qty = 86;
        } else if (relData[p].qty === 86) {
            relData[p].qty = 0; // Cualquier dirección saca de 86 a 0
        } else {
            var step = (relData[p].unit === 'kg' || relData[p].unit === 'litro/s') ? 0.5 : 1;
            relData[p].qty = Math.max(0, parseFloat((relData[p].qty + dir * step).toFixed(2)));
        }

        // Limpieza: Si vuelve a 0 real, eliminar del relevamiento
        if (relData[p].qty === 0) delete relData[p];

        updateProductRow(p); renderFAB(); saveDraft();
    }

    function manualEl(el) { manualEntry(decodeURIComponent(el.dataset.prod)); }
    function manualEntry(p) {
        var val = prompt("Cantidad para " + p + ":", (relData[p] ? relData[p].qty : ''));
        if (val === null) return;
        var n = parseFloat(val.replace(',', '.'));
        if (!isNaN(n) && n >= 0) {
            if (!relData[p]) relData[p] = { qty: n, unit: units[0] };
            else relData[p].qty = n;
            if (relData[p].qty === 0) delete relData[p];
            updateProductRow(p); renderFAB(); saveDraft();
        }
    }

    function renderFAB() {
        var count = 0;
        Object.keys(relData).forEach(function (p) { if (relData[p].qty !== 0) count++; });

        var fab = document.getElementById('fab');
        var ctxCount = document.getElementById('ctx-count');
        var ctxBtn = document.getElementById('ctx-listo-btn');

        // Actualizar contador en la barra contextual
        if (ctxCount) ctxCount.textContent = count;
        if (ctxBtn) {
            ctxBtn.disabled = count === 0;
            if (count === 0) {
                ctxBtn.style.opacity = '0.4';
                ctxBtn.style.filter = 'grayscale(1)';
            } else {
                ctxBtn.style.opacity = '1';
                ctxBtn.style.filter = 'none';
            }
        }

        // El FAB clásico solo se muestra si la ctx-bar está oculta (no en modo relevamiento)
        var ctxBar = document.getElementById('ctx-bar');
        var ctxActive = ctxBar && !ctxBar.classList.contains('hidden');
        if (!ctxActive) {
            if (count > 0) {
                if (fab) {
                    fab.classList.remove('hidden');
                    fab.style.opacity = '1';
                    fab.style.pointerEvents = 'auto';
                    document.getElementById('fab-count').textContent = count;
                }
            } else {
                if (fab) fab.classList.add('hidden');
            }
        } else {
            if (fab) fab.classList.add('hidden'); // FAB reemplazado por ctx-bar
        }
    }

    function sendWA() {
        var titleEl = document.getElementById('cfg-app-title');
        var title = (titleEl && titleEl.value) ? titleEl.value : 'FEDE GASTRO PRO';
        var now = new Date();
        var dateStr = now.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var timeStr = now.toLocaleTimeString('es-AR', { hour12: false, hour: '2-digit', minute: '2-digit' });

        var modeLabel = (currentMode || 'STOCK').toUpperCase();
        var msg = "*" + title + " - " + modeLabel + "*\n";
        if (currentMode === 'merma' && selectedMotivo) {
            msg += "_Motivo: " + selectedMotivo + "_\n";
        }
        msg += "_Fecha de registro: " + dateStr + " " + timeStr + "_\n\n";
        var byCat = {};
        Object.keys(relData).forEach(function (p) {
            var d = relData[p];
            if (d.qty === 0) return; // ❌ No enviar ceros a WhatsApp

            var cat = 'Otros';
            Object.keys(CATS).forEach(function (c) { if (CATS[c].prods.indexOf(p) !== -1) cat = c; });
            if (!byCat[cat]) byCat[cat] = [];
            byCat[cat].push({ p: p, d: d });
        });
        Object.keys(byCat).sort().forEach(function (cat) {
            msg += "*" + cat.toUpperCase() + "*\n";
            byCat[cat].forEach(function (i) {
                var qty86 = i.d.qty === 86;
                msg += "• " + i.p + ": " + (qty86 ? '⛔ 86' : i.d.qty + ' ' + formatUnit(i.d.qty, i.d.unit)) + "\n";
            });
            msg += '\n';
        });

        // AUTO-SAVE ON SEND
        saveToCloud(true);

        window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
        closeResumen();
    }

    function sendHistWA(id) {
        var h = null;
        for (var k = 0; k < HIST.length; k++) { if (HIST[k].id == id) { h = HIST[k]; break; } }
        if (!h) return;
        var items = Array.isArray(h.items) ? h.items : [];
        var titleEl = document.getElementById('cfg-app-title');
        var title = (titleEl && titleEl.value) ? titleEl.value : 'FEDE GASTRO PRO';

        var d = new Date(h.fecha);
        var dateStr = d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var timeStr = d.toLocaleTimeString('es-AR', { hour12: false, hour: '2-digit', minute: '2-digit' });

        var msg = "*" + title + " - HISTORIAL " + (h.mode || 'stock').toUpperCase() + "*\n";
        msg += "_Fecha de registro: " + dateStr + " " + timeStr + "_\n\n";
        var byCat = {};
        items.forEach(function (i) {
            if (!byCat[i.cat || 'Otros']) byCat[i.cat || 'Otros'] = [];
            byCat[i.cat || 'Otros'].push(i);
        });
        Object.keys(byCat).sort().forEach(function (cat) {

    function saveToCloud(doClear) {
        toggleSync(true, 'Guardando en la nube...');
        if (doClear === undefined) doClear = true;
        var items = [];
        var prods = Object.keys(relData);
        for (var i = 0; i < prods.length; i++) {
            var prod = prods[i];
            var d = relData[prod];
            if (d.qty === 0) continue; // ❌ No guardar ceros en la nube

            var cat = 'Otros';
            Object.keys(CATS).forEach(function (c) { if (CATS[c].prods.indexOf(prod) !== -1) cat = c; });
            items.push({ prod: prod, cat: cat, qty: d.qty, unit: d.unit });
        }
        if (!items.length) { toast("⚠️ No hay datos para guardar"); return; }

        var entryId = Date.now() + '-' + Math.random().toString(36).substr(2, 5);
        var tEl = document.getElementById('hdr-turno');
        var turno = (tEl && tEl.textContent) ? tEl.textContent : 'Apertura';
        var entry = {
            id: entryId,
            fecha: new Date().toISOString(),
            turno: turno,
            mode: currentMode || 'stock',
            items: items,
            total: items.length,
            motivo: (currentMode === 'merma' && selectedMotivo) ? selectedMotivo : ''
        };

        // 🟢 AUTO-DISMISS ALERT: Si es un control de stock, descartamos la alerta obligatoria
        if ((currentMode || 'stock') === 'stock' && window.holidayAlert) {
            window.holidayAlert.dismissStockCard("CONTROL DE STOCK");
        }

        setSyncStatus('pending');
        toggleSync(true, 'Guardando en la nube...');
        google.script.run
            .withSuccessHandler(function () {
                toggleSync(false);
                HIST.unshift(entry);
                toast("✓ ¡Sincronizado!");
                if (doClear) {
                    relData = {};
                    localStorage.removeItem('fede_draft');
                    renderFAB(); closeResumen(); goHome();
                }
                setSyncStatus('online');
                processOfflineQueue(); // Verificar si hay más
            })
            .withFailureHandler(function (err) {
                toggleSync(false);
                enqueueEntry(entry);
                if (doClear) {
                    relData = {};
                    localStorage.removeItem('fede_draft');
                    renderFAB(); closeResumen(); goHome();
                }
                setSyncStatus('error');
            })
            .addHistoryEntry(entry, activeSheetId);
    }

    function enqueueEntry(entry) {

    function renderDashboardCalendar() {
        var calEl = document.getElementById('dash-calendar');
        if (!calEl) return;

        var now = new Date();
        var year = now.getFullYear();
        var month = now.getMonth();
        var today = now.getDate();

        // Días del mes (Lunes a Domingo)
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var firstDayIndex = new Date(year, month, 1).getDay();
        var emptyStartDays = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

        // Map history entries
        var histByDate = {};
        if (HIST && HIST.length) {
            for (var k = 0; k < HIST.length; k++) {
                var h = HIST[k];
                var dObj = new Date(h.fecha);
                if (isNaN(dObj)) continue;
                
                var key = dObj.getFullYear() + '-' + 
                          ((dObj.getMonth() + 1) < 10 ? '0' + (dObj.getMonth() + 1) : (dObj.getMonth() + 1)) + '-' + 
                          (dObj.getDate() < 10 ? '0' + dObj.getDate() : dObj.getDate());
                
                if (!histByDate[key]) histByDate[key] = [];
                var mode = (h.modo || h.mode || 'stock').toLowerCase();
                if (histByDate[key].indexOf(mode) === -1) histByDate[key].push(mode);
            }
        }

        var html = '';
        for (var i = 0; i < emptyStartDays; i++) html += '<div class="cal-day empty"></div>';

        for (var d = 1; d <= daysInMonth; d++) {
            var mNum = month + 1;
            var curKey = year + '-' + (mNum < 10 ? '0' + mNum : mNum) + '-' + (d < 10 ? '0' + d : d);
            var isToday = (d === today && month === now.getMonth() && year === now.getFullYear());
            var activities = histByDate[curKey] || [];
            
            var dots = '';
            if (activities.indexOf('pedido') !== -1) dots += '<div class="cal-dot cal-dot-pedido"></div>';
            if (activities.indexOf('stock') !== -1) dots += '<div class="cal-dot cal-dot-stock"></div>';
            if (activities.indexOf('recepcion') !== -1 || activities.indexOf('entrante') !== -1) dots += '<div class="cal-dot cal-dot-recepcion"></div>';
            if (activities.indexOf('merma') !== -1) dots += '<div class="cal-dot cal-dot-merma"></div>';

            html += '<div class="cal-day ' + (isToday ? 'today' : '') + '" onclick="openHistoryAtDate(\'' + curKey + '\')">' +
                    '<span class="cal-date-num">' + d + '</span>' +
                    '<div class="cal-indicators">' + dots + '</div>' +
                    '</div>';
        }
        calEl.innerHTML = html;
    }

            var cat = catKeys[i];

                var p = CATS[cat].prods[j];

    /* ── HISTORIAL ── */
    var histFilters = { mode: 'all', from: '', to: '', query: '' };
    function setHistFilter(type, val, el) {
        histFilters[type] = val;
        if (el && el.parentNode) {
            var btns = el.parentNode.querySelectorAll('button');
            for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
            el.classList.add('active');
        }
        renderHistory();
    }

    var histLimit = 20;
    function renderHistory(loadMore) {
        if (loadMore === undefined) loadMore = false;
        if (!loadMore) histLimit = 20;
        var list = document.getElementById('hist-list');
        if (!list) return;

        // Bloqueo sutil de UI para feedback
        if (!loadMore) list.style.opacity = '0.5';

        var filtered = HIST.slice().sort(function (a, b) {
            var dateA = new Date(a.fecha);
            var dateB = new Date(b.fecha);
            return dateB - dateA;
        });

        // 1. Filtrar por Modo
        if (histFilters.mode !== 'all') {
            var modeToFilter = histFilters.mode;
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                var h = filtered[i];
                var m = (h.modo || h.mode || 'stock').toLowerCase();
                var match = false;
                if (modeToFilter === 'recepcion') match = (m === 'recepcion' || m === 'entrante');
                else match = (m === modeToFilter);
                if (match) newList.push(h);
            }
            filtered = newList;
        }

        // 2. Filtrar por Fechas usando hora local explícita
        if (histFilters.from) {
            var fromParts = histFilters.from.split('-');
            var fromD = new Date(fromParts[0], fromParts[1] - 1, fromParts[2], 0, 0, 0, 0);
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                if (new Date(filtered[i].fecha) >= fromD) newList.push(filtered[i]);
            }
            filtered = newList;
        }
        if (histFilters.to) {
            var toParts = histFilters.to.split('-');
            var toD = new Date(toParts[0], toParts[1] - 1, toParts[2], 23, 59, 59, 999);
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                if (new Date(filtered[i].fecha) <= toD) newList.push(filtered[i]);
            }
            filtered = newList;
        }

        // 3. Filtrar por Búsqueda (Soporta producto o categoría)
        if (histFilters.query) {
            var q = histFilters.query.toLowerCase();
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                var h = filtered[i];
                var match = false;
                var items = h.items || [];
                for (var j = 0; j < items.length; j++) {
                    if (items[j].prod.toLowerCase().indexOf(q) !== -1 || (items[j].cat && items[j].cat.toLowerCase().indexOf(q) !== -1)) {
                        match = true;
                        break;
                    }
                }
                if (match) newList.push(h);
            }
            filtered = newList;
        }

        var totalFound = filtered.length;
        var visible = filtered.slice(0, histLimit);

        if (!totalFound) {
            list.innerHTML = '<p style="text-align:center;padding:40px;color:var(--dim);">No hay registros ' + (histFilters.mode !== 'all' ? ('de ' + histFilters.mode) : '') + ' aún.</p>';
            list.style.opacity = '1';
            return;
        }

        var html = '';
        for (var i = 0; i < visible.length; i++) {
            var h = visible[i];
            var items = Array.isArray(h.items) ? h.items : [];
            var _m = (h.modo || h.mode || 'stock').toLowerCase();
            var _ms;
            if (_m === 'pedido') {
                _ms = { color: 'var(--orange)', bg: 'var(--bg-alt)', border: 'var(--orange)', label: '🟠 PEDIDO' };
            } else if (_m === 'stock') {
                _ms = { color: 'var(--blue)', bg: 'var(--bg-alt)', border: 'var(--blue)', label: '🔵 STOCK' };
            } else if (_m === 'merma') {
                _ms = { color: 'var(--violet)', bg: 'var(--bg-alt)', border: 'var(--violet)', label: '🟣 MERMA' };
            } else {
                _ms = { color: 'var(--green)', bg: 'var(--bg-alt)', border: 'var(--green)', label: '🟢 RECEPCIÓN' };
            }

            var motivoLine = (h.motivo) ? '<div style="font-size:11px; color:var(--violet); font-weight:700; margin-top:4px;">Motivo: ' + h.motivo + '</div>' : '';

            html += '<div class="dash-card" id="hist-card-' + h.id + '" onclick="toggleHistExpand(\'' + h.id + '\')">' +
                '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">' +
                '<span style="font-weight:800; color:' + _ms.color + '; background:' + _ms.bg + '; border:1px solid ' + _ms.border + '; padding:5px 14px; border-radius:14px; font-size:12px; font-family:\'Outfit\',sans-serif;">' + _ms.label + '</span>' +
                '<div style="display:flex; gap:8px;">' +
                '<button onclick="event.stopPropagation();editHistEntry(\'' + h.id + '\')" style="background:var(--s2); border:1px solid var(--bd); border-radius:8px; padding:6px 10px; color:var(--text); font-size:14px;">✏️</button>' +
                '<button onclick="event.stopPropagation();deleteHistEntryManual(\'' + h.id + '\')" style="background:rgba(224,82,82,0.1); border:1px solid var(--red); border-radius:8px; padding:6px 10px; color:var(--red); font-size:14px;">🗑️</button>' +
                '</div>' +
                '</div>' +
                '<div style="font-weight:800; font-size:20px; font-family:\'Outfit\',sans-serif; color:var(--text);">' + h.total + ' <span style="font-size:14px; font-weight:600; color:var(--dim);">items</span></div>' +
                '<div style="font-size:12px; color:var(--dim); font-weight:700; margin-top:2px;">' + new Date(h.fecha).toLocaleString('es-AR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) + '</div>' +
                motivoLine +
                '<div id="hist-expanded-' + h.id + '" class="hidden" style="margin-top:16px; padding-top:16px; border-top:1.5px solid var(--bd2); transition: all 0.3s ease;">' +
                '<!-- Lazy loaded items here -->' +
                '</div>' +
                '</div>';
        }

        if (totalFound > histLimit) {
            html += '<button onclick="histLimit += 20; renderHistory(true)" class="wa-btn" style="width:100%; margin-top:20px; background:var(--s2); border:1.5px solid var(--bd); color:var(--text2); font-size:12px; height:48px;">' +
                'MOSTRAR MÁS (' + (totalFound - histLimit) + ' restantes)' +
                '</button>';
        }

        list.innerHTML = html;
        list.style.opacity = '1';
        setTimeout(function () { refreshIcons(); }, 100);
    }

    function toggleHistExpand(id) {
        var el = document.getElementById('hist-expanded-' + id);
        if (!el) return;

        var isOpening = el.classList.contains('hidden');
        el.classList.toggle('hidden');

        if (isOpening && el.innerHTML.indexOf('Lazy loaded') !== -1) {
            var h = null;
            for (var i = 0; i < HIST.length; i++) { if (String(HIST[i].id) === String(id)) { h = HIST[i]; break; } }
            if (!h) return;
            var items = Array.isArray(h.items) ? h.items : [];

            var itemsHtml = '';
            for (var j = 0; j < items.length; j++) {

                itemsHtml += '<div class="edit-hist-row" style="display:flex; justify-content:space-between; align-items:center; font-size:14px; padding:8px 6px; border-bottom:1px solid var(--bd2); transition: background 0.15s;">' +
                    '<span style="color:var(--text2); font-weight:700;">' + it.prod + '</span>' +
                    '<span style="font-weight:900; font-family:\'Outfit\',sans-serif; color:' + (it.qty === 86 ? 'var(--red)' : 'var(--primary)') + '">' +
                    (it.qty === 86 ? '⛔ 86' : it.qty + ' ' + formatUnit(it.qty, it.unit)) +
                    '</span>' +
                    '</div>';
            }

            el.innerHTML = '<div style="display:flex; flex-direction:column; gap:0;">' + itemsHtml + '</div>' +
                '<button onclick="sendHistWA(\'' + h.id + '\'); event.stopPropagation();" ' +
                'style="width:100%; height:46px; display:flex; align-items:center; justify-content:center; gap:8px; background:#25D366; color:white; margin-top:16px; border-radius:12px; border:none; font-weight:900; font-size:13px; font-family:\'Outfit\',sans-serif; cursor:pointer;">' +
                '<i data-lucide="message-circle" style="width:18px;"></i> COMPARTIR POR WA' +

    function deleteHistEntryManual(id) {
        fConfirm({
            title: 'Eliminar Registro',
            message: '¿Estás seguro de querer borrar este reporte permanentemente de la base de datos?',
            okText: 'ELIMINAR'
        }, function() {
            toggleSync(true, 'Eliminando registro...');
            google.script.run
                .withSuccessHandler(function (r) {
                    toggleSync(false);
                    if (r && r.success) {
                        var newHist = [];
                        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id != id) newHist.push(HIST[i]); }
                        HIST = newHist;
                        renderHistory();
                        toast("✓ Registro eliminado del historial");
                    } else {
                        toast("❌ Error al eliminar");
                    }
                })
                .deleteHistoryEntry(id, activeSheetId);
        });
    }

    var editingHistId = null, editingHistItems = [], editingHistMode = 'stock';
    function editHistEntry(id) {
        var h = null;
        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id == id) { h = HIST[i]; break; } }
        if (!h) return;
        editingHistId = id;
        editingHistItems = JSON.parse(JSON.stringify(h.items));
        editingHistMode = (h.mode || 'stock').toLowerCase();
        if (editingHistMode === 'entrante') editingHistMode = 'recepcion';

        var dateInput = document.getElementById('edit-hist-date');
        if (dateInput && h.fecha) {
            var d = new Date(h.fecha);
            var local = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            dateInput.value = local;
        }

        var sInput = document.getElementById('edit-hist-search');
        if (sInput) sInput.value = '';
        var sResults = document.getElementById('edit-hist-search-results');
        if (sResults) { sResults.innerHTML = ''; sResults.style.display = 'none'; }

        renderEditHistItems();
        document.getElementById('modal-edit-hist').classList.add('open');
        setTimeout(function () { setEditMode(editingHistMode, false); }, 50);
        setTimeout(function () { refreshIcons(); }, 100);
    }

    function setEditMode(m, save) {
        if (save === undefined) save = true;
        if (save) editingHistMode = m;
        var active = save ? m : editingHistMode;
        var modes = ['pedido', 'stock', 'recepcion'];
        for (var i = 0; i < modes.length; i++) {
            var mode = modes[i];
            var btn = document.getElementById('edit-mode-' + mode);
            if (!btn) continue;
            var on = mode === active;
            btn.style.border = '2px solid ' + (on ? 'var(--' + (mode === 'recepcion' ? 'green' : (mode === 'stock' ? 'blue' : 'orange')) + ')' : 'var(--bd2)');
            btn.style.background = on ? 'var(--s2)' : 'var(--s1)';
            btn.style.opacity = on ? '1' : '0.4';
        }
    }
    function renderEditHistItems() {
        var html = '';
        for (var i = 0; i < editingHistItems.length; i++) {
            var item = editingHistItems[i];
            html += '<div class="edit-hist-row" style="display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid var(--bd); transition: background 0.15s;">' +
                '<div style="flex:1;"><div style="font-weight:700; font-size:14px; color:var(--text);">' + item.prod + '</div><div style="font-size:11px; color:var(--dim);">' + item.unit + '</div></div>' +
                '<div style="display:flex; align-items:center; gap:10px; background:var(--s2); border-radius:8px; padding:4px;">' +
                '<button onclick="stepEditHistItem(' + i + ', -1)" style="background:none; border:none; color:var(--text); font-size:18px; width:30px; cursor:pointer;">−</button>' +
                '<span style="font-weight:800; min-width:30px; text-align:center; color:var(--text);">' + item.qty + '</span>' +
                '<button onclick="stepEditHistItem(' + i + ', 1)" style="background:none; border:none; color:var(--text); font-size:18px; width:30px; cursor:pointer;">+</button>' +
                '</div>' +
                '<button onclick="editingHistItems.splice(' + i + ', 1); renderEditHistItems();" style="background:none; border:none; color:var(--red); padding-left:10px; cursor:pointer; font-size:16px;">✕</button>' +
                '</div>';
        }
        document.getElementById('edit-hist-body').innerHTML = html;
    }
    function stepEditHistItem(idx, dir) {
        var item = editingHistItems[idx];
        var step = (item.unit === 'kg' || item.unit === 'litro/s') ? 0.5 : 1;
        item.qty = Math.max(0, parseFloat((item.qty + dir * step).toFixed(2)));
        renderEditHistItems();
    }
    function saveHistoryEdit() {
        var orig = null;
        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id == editingHistId) { orig = HIST[i]; break; } }
        var dateInput = document.getElementById('edit-hist-date');
        var newFecha = (dateInput && dateInput.value) ? new Date(dateInput.value).toISOString() : orig.fecha;

        var entry = {};
        for (var k in orig) entry[k] = orig[k];
        entry.mode = editingHistMode;
        entry.items = editingHistItems;
        entry.total = editingHistItems.length;
        entry.fecha = newFecha;

        toast('⏳ Guardando...');
        google.script.run.withSuccessHandler(function () {
            google.script.run.withSuccessHandler(function () {
                loadConfigFromGAS();
                closeEditHistModal();
                toast('✓ Registro actualizado');
            }).deleteHistoryEntry(editingHistId, activeSheetId);
        }).addHistoryEntry(entry, activeSheetId);
    }
    function closeEditHistModal() { document.getElementById('modal-edit-hist').classList.remove('open'); }

    function shareEditHistWA() {
        if (!editingHistItems || !editingHistItems.length) return toast('No hay items para compartir');
        var titleEl = document.getElementById('cfg-app-title');
        var title = (titleEl && titleEl.value) ? titleEl.value : 'FEDE GASTRO PRO';

        var orig = null;
        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id == editingHistId) { orig = HIST[i]; break; } }
        var dateInput = document.getElementById('edit-hist-date');
        var d = (dateInput && dateInput.value) ? new Date(dateInput.value) : (orig ? new Date(orig.fecha) : new Date());

        var dateStr = d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var timeStr = d.toLocaleTimeString('es-AR', { hour12: false, hour: '2-digit', minute: '2-digit' });

        var msg = "*" + title + " - " + editingHistMode.toUpperCase() + "*\n";
        msg += "_Fecha de registro: " + dateStr + " " + timeStr + "_\n\n";
        var byCat = {};
        for (var i = 0; i < editingHistItems.length; i++) {
            var item = editingHistItems[i];
            var cat = item.cat || 'Otros';
            if (!byCat[cat]) byCat[cat] = [];
            byCat[cat].push(item);
        }
        var catKeys = Object.keys(byCat).sort();
        for (var j = 0; j < catKeys.length; j++) {
            var cat = catKeys[j];
            msg += "*" + cat.toUpperCase() + "*\n";
            for (var k = 0; k < byCat[cat].length; k++) {
                var it = byCat[cat][k];
                msg += "• " + it.prod + ": " + (it.qty === 86 ? '⛔ 86' : it.qty + ' ' + formatUnit(it.qty, it.unit)) + "\n";
            }
            msg += '\n';
        }
        window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
    }

    function searchEditHistProduct(q) {
        var res = document.getElementById('edit-hist-search-results');
        if (!q || q.length < 2) { if (res) res.style.display = 'none'; return; }

        var matches = [];
        var query = q.toLowerCase();

        var catKeys = Object.keys(CATS);
        for (var i = 0; i < catKeys.length; i++) {
            var cat = catKeys[i];
            for (var j = 0; j < CATS[cat].prods.length; j++) {
                var p = CATS[cat].prods[j];
                if (p.toLowerCase().indexOf(query) !== -1) {
                    var found = false;
                    for (var k = 0; k < editingHistItems.length; k++) { if (editingHistItems[k].prod === p) { found = true; break; } }
                    if (!found) matches.push({ prod: p, cat: cat });
                }
            }
        }

        if (!matches.length) { if (res) res.style.display = 'none'; return; }

        var matchHtml = '';
        var limited = matches.slice(0, 10);
        for (var l = 0; l < limited.length; l++) {
            var m = limited[l];
            matchHtml += '<div onclick="addHistEntryProduct(\'' + m.prod.replace(/'/g, "\\'") + '\', \'' + m.cat.replace(/'/g, "\\'") + '\')" ' +
                'style="padding:12px 16px; border-bottom:1px solid var(--bd2); cursor:pointer; font-size:14px; color:var(--text); font-weight:600; display:flex; justify-content:space-between; align-items:center;">' +
                '<span>' + m.prod + '</span>' +
                '<span style="font-size:10px; color:var(--primary); opacity:0.7;">' + m.cat + '</span>' +
                '</div>';
        }
        if (res) {
            res.innerHTML = matchHtml;
            res.style.display = 'block';
        }
    }

    function addHistEntryProduct(prod, cat) {
        var productUnits = getUnitsForProduct(cat, prod);
        var defaultUnit = productUnits[0];
        editingHistItems.push({
            prod: prod,
            qty: 1,
            unit: defaultUnit,
            cat: cat
        });

        UNIT_MEM.save(prod, defaultUnit);

        var sInput = document.getElementById('edit-hist-search');
        if (sInput) sInput.value = '';
        var sRes = document.getElementById('edit-hist-search-results');
        if (sRes) sRes.style.display = 'none';

        renderEditHistItems();
        toast("+ " + prod);
    }

    function fsStepProd(dir) {
        var prod = fsProducts[fsCurrentIdx];
        if (!relData[prod]) relData[prod] = { qty: 0, unit: getUnitsForProduct(fsCurrentCat, prod)[0] };
        var step = (relData[prod].unit === 'kg' || relData[prod].unit === 'litro/s') ? 0.5 : 1;
        relData[prod].qty = Math.max(0, parseFloat((relData[prod].qty + dir * step).toFixed(2)));
        if (relData[prod].qty === 0) delete relData[prod];
        renderFSProduct(); saveDraft();
    }

    function renderHomeSummary() {
        var el = document.getElementById('home-alerts-card');
        if (!el) return;

        var alerts = [];
        var now = new Date();

        // 1. Control obligatorio (domingo=0 o martes=2)
        var day = now.getDay();
        if (day === 0 || day === 2) {
            var isDone = sessionStorage.getItem('fede_stock_done') === 'CONTROL DE STOCK';
            if (!isDone) {
                alerts.push({ icon: 'clipboard-check', color: 'var(--blue)', title: 'Control obligatorio', desc: 'Requerido hoy' });
            }
        }

        // 2. Feriados próximos (usa función de holidays.html)
        if (typeof getUpcomingHolidays === 'function') {
            var upcoming = getUpcomingHolidays(7);
            for (var i = 0; i < upcoming.length; i++) {
                var h = upcoming[i];
                var diffMs = h.date.getTime() - now.getTime();
                var daysLeft = Math.ceil(diffMs / (1000 * 3600 * 24));
                var timeText = daysLeft <= 0 ? 'Es hoy' : (daysLeft === 1 ? 'Mañana' : 'En ' + daysLeft + ' días');
                alerts.push({ icon: 'calendar-clock', color: '#098b8c', title: h.name, desc: timeText });
            }
        }

        // 3. Días sin control de stock
        var lastStock = null;
        for (var j = 0; j < HIST.length; j++) {
            if (HIST[j].mode === 'stock') { lastStock = new Date(HIST[j].fecha); break; }
        }
        if (lastStock) {
            var daysSinceStock = Math.floor((now - lastStock) / (1000 * 3600 * 24));
            if (daysSinceStock >= 2) {
                alerts.push({ icon: 'alert-triangle', color: 'var(--warning)', title: 'Sin control de stock', desc: 'Último hace ' + daysSinceStock + ' días' });
            }
        } else if (HIST.length > 0) {
            alerts.push({ icon: 'alert-triangle', color: 'var(--warning)', title: 'Sin control de stock', desc: 'Nunca se registró uno' });
        }

        // 4. Días sin pedido
        var lastPedido = null;
        for (var k = 0; k < HIST.length; k++) {
            if (HIST[k].mode === 'pedido') { lastPedido = new Date(HIST[k].fecha); break; }
        }
        if (lastPedido) {
            var daysSincePedido = Math.floor((now - lastPedido) / (1000 * 3600 * 24));
            if (daysSincePedido >= 3) {
                alerts.push({ icon: 'package', color: 'var(--orange)', title: 'Sin pedido reciente', desc: 'Último hace ' + daysSincePedido + ' días' });
            }
        }

        // 5. Merma del día
        var todayStr = now.getFullYear() + '-' + (now.getMonth() + 1 < 10 ? '0' : '') + (now.getMonth() + 1) + '-' + (now.getDate() < 10 ? '0' : '') + now.getDate();
        var mermaItemsToday = 0;
        for (var m = 0; m < HIST.length; m++) {
            if (HIST[m].mode === 'merma' && HIST[m].fecha && HIST[m].fecha.indexOf(todayStr) === 0) {
                mermaItemsToday += (HIST[m].total || 0);
            }
        }
        if (mermaItemsToday > 0) {
            alerts.push({ icon: 'trending-down', color: 'var(--violet)', title: 'Merma registrada hoy', desc: mermaItemsToday + ' items perdidos' });
        }


        // Render
        var html = '<div class="alert-header"><i data-lucide="activity" style="width:14px; color:var(--dim);"></i> Centro Operativo</div>';

        if (alerts.length === 0) {
            html += '<div class="home-alert-ok">' +
                '<i data-lucide="check-circle" style="width:28px; height:28px; display:block; margin:0 auto 8px;"></i>' +
                '<div style="font-size:14px; font-weight:800;">Operación al día</div>' +
                '<div style="font-size:11px; color:var(--dim); margin-top:2px;">Sin alertas pendientes</div>' +
                '</div>';
        } else {
            var limit = Math.min(alerts.length, 4);
            for (var a = 0; a < limit; a++) {
                var al = alerts[a];
                html += '<div class="home-alert-item">' +
                    '<div class="home-alert-icon" style="background:' + al.color + '; background: color-mix(in srgb, ' + al.color + ' 15%, transparent);">' +
                    '<i data-lucide="' + al.icon + '" style="width:18px; color:' + al.color + ';"></i>' +
                    '</div>' +
                    '<div class="home-alert-text">' +
                    '<div class="home-alert-title">' + al.title + '</div>' +
                    '<div class="home-alert-desc">' + al.desc + '</div>' +
                    '</div>' +

    /**
     * 🔍 NORMALIZACIÓN (IGNORAR TILDES)
     */
    function normalizeStr(str) {
        if (!str) return '';
        return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function handleHdrSearch(q) {
        var res = document.getElementById('hdr-search-res');
        if (!q || q.length < 1) { res.style.display = 'none'; return; }

        var query = normalizeStr(q);
        var matches = [];

        // Buscamos en todas las categorías
        Object.keys(CATS).forEach(function (cat) {
            var prods = CATS[cat].prods || [];
            for (var i = 0; i < prods.length; i++) {
                var p = prods[i];
                if (normalizeStr(p).indexOf(query) !== -1) {
                    matches.push({ p: p, cat: cat });
                }
            }
        });

        if (matches.length === 0) {
            res.innerHTML = '<div style="padding:16px; text-align:center; color:var(--dim); font-size:12px; font-weight:700;">Sin resultados para "' + q + '"</div>';
            res.style.display = 'block';
            return;
        }

        var html = '';
        // Limitar a 10 resultados para rendimiento
        matches.slice(0, 10).forEach(function (m) {
            var ep = m.p.replace(/'/g, "\\'");
            var ec = m.cat.replace(/'/g, "\\'");
            html += '<div class="search-res-item" onclick="goToProduct(\'' + ep + '\', \'' + ec + '\')" style="padding: 16px; border-bottom: 1px solid var(--bd2); cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: var(--bg-alt);">' +
                '<div style="display:flex; flex-direction:column; gap:2px;">' +
                '<span style="font-weight:700; color:var(--text); font-size:15px;">' + m.p + '</span>' +
                '<span style="font-size:11px; color:var(--primary); text-transform:uppercase; font-weight:800; letter-spacing:1px; background:rgba(6,182,212,0.1); padding:2px 6px; border-radius:4px; align-self:flex-start;">' + m.cat + '</span>' +
                '</div>' +
                '<i data-lucide="chevron-right" style="width:16px; color:var(--dim);"></i>' +
                '</div>';
        });

        res.innerHTML = html;
        res.style.display = 'block';
        if (window.lucide) lucide.createIcons({ root: res });
    }

    function goToProduct(p, cat) {
        // 1. Cerrar búsqueda solo si no es persistente
        var container = document.getElementById('hdr-search-container');
        var isPersistent = container && container.classList.contains('hdr-search-persistent');

        if (!isPersistent) {
            toggleHdrSearch(false);
        } else {
            // Si es persistente, solo limpiamos para el siguiente item
            document.getElementById('hdr-search-input').value = '';
            document.getElementById('hdr-search-res').style.display = 'none';
        }

        // 2. Navegar a relevamiento si no estamos allí
        var isAppVisible = document.getElementById('app').classList.contains('visible');
        if (!isAppVisible) {
            goTab('relevamiento');
        }

        // 3. Abrir categoría (usando la función nativa selectCat)
        setTimeout(function () {
            selectCat(cat);

            // 4. Scroll al producto y resaltar
            setTimeout(function () {
                var el = document.querySelector('[data-prow="' + encodeURIComponent(p) + '"]');
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    var originalBorder = el.style.borderColor;
                    var originalBg = el.style.background;

                    el.style.background = 'var(--s2)';
                    el.style.borderColor = 'var(--primary)';
                    el.style.boxShadow = '0 0 20px rgba(6, 182, 212, 0.2)';

                    // Efecto flash
                    setTimeout(function () {
                        el.style.background = originalBg;
                        el.style.borderColor = originalBorder;
                        el.style.boxShadow = '';
                    }, 2000);
                }
            }, 500);
        }, 50);
    }

    // ── CONTROLAR STEPPER DE UN ÍTEM ──
    function orderStep(prodEncoded, delta) {
        var prod = decodeURIComponent(prodEncoded);
        var current = ORDER_QTY[prod] || 0;
        var next = Math.max(0, current + delta);

        // Incremento en 0.5 para cantidades < 5, en 1 para el resto
        if (delta !== 0) {
            var step = current < 5 ? 0.5 : 1;
            next = Math.max(0, current + (delta > 0 ? step : -step));
            // Redondear a 1 decimal
            next = Math.round(next * 10) / 10;
        }

        ORDER_QTY[prod] = next;
        var el = document.getElementById('oval-' + prodEncoded);
        if (el) el.textContent = next;
    }

        var now = new Date();
        var dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        var meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

        lines.push('🍽 *PEDIDO SEMANAL - FeDe*');
        lines.push('📅 ' + dias[now.getDay()] + ' ' + now.getDate() + ' ' + meses[now.getMonth()]);
        lines.push('');

        // Agrupar por categoría
        var grouped = ORDER_DATA ? ORDER_DATA.grouped : {};
        var catNames = Object.keys(grouped).sort();
        var hasItems = false;

        for (var c = 0; c < catNames.length; c++) {
            var catName = catNames[c];
            var items = grouped[catName];
            var catLines = [];

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var qty = ORDER_QTY[item.prod];
                if (qty === undefined || qty === null) qty = item.qty;
                if (qty <= 0) continue;

                var line = '   • ' + item.prod + ': *' + qty + ' ' + (item.unit || '') + '*';
                if (item.isAnchored) line += ' 📌';
                catLines.push(line);
                hasItems = true;
            }

            if (catLines.length > 0) {
                lines.push('*' + catName.toUpperCase() + '*');
                for (var j = 0; j < catLines.length; j++) lines.push(catLines[j]);
                lines.push('');
            }
        }

        if (!hasItems) {
            showToast('No hay ítems con cantidad > 0 para enviar.');
            return;
        }

        lines.push('_Generado por FeDe Gastro Pro FOCACCIA_');

        var msg = lines.join('\n');
        var waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
        window.open(waUrl, '_blank');
    }

    /* ── GESTIÓN DE ANCLAJES ── */
    function openOrderAnchorsConfig() {
        ORDER_ANCHORS = ORDER_DATA ? JSON.parse(JSON.stringify(ORDER_DATA.anchors || {})) : {};
        renderAnchorsConfig();
        var modal = document.getElementById('order-anchors-modal');
        if (modal) modal.classList.add('open');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function closeOrderAnchorsConfig(e) {
        var modal = document.getElementById('order-anchors-modal');
        if (!modal) return;
        if (!e || e.target === modal) modal.classList.remove('open');
    }

    function renderAnchorsConfig() {
        var listEl = document.getElementById('anchors-list-config');
        if (!listEl) return;
        var prods = Object.keys(ORDER_ANCHORS);
        if (prods.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; padding:20px; color:var(--dim); font-size:12px;">Sin anclajes configurados.</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < prods.length; i++) {
            var p = prods[i];
            var a = ORDER_ANCHORS[p];
            html += '<div class="anchor-config-row">';
            html += '<div style="flex:1; font-size:13px; font-weight:700; color:var(--text);">' + p + '</div>';
            html += '<div style="font-size:11px; color:#ca8a04; font-weight:800; margin-right:8px;">' + a.qty + ' ' + (a.unit || '') + '</div>';
            html += '<button onclick="removeAnchor(\'' + encodeURIComponent(p) + '\')" style="background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.3); color:var(--red); width:28px; height:28px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;">';
            html += '<i data-lucide="x" style="width:12px;"></i></button>';
            html += '</div>';
        }
        listEl.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function searchAnchorProduct(query) {
        var resultsEl = document.getElementById('anchor-search-results');
        if (!resultsEl) return;
        if (!query || query.length < 2) { resultsEl.style.display = 'none'; return; }

        var allProds = [];
        Object.keys(CATS).forEach(function(cat) {
            var prods = CATS[cat].prods || [];
            prods.forEach(function(p) { allProds.push(p); });
        });

        var q = query.toLowerCase();
        var matches = allProds.filter(function(p) { return p.toLowerCase().indexOf(q) !== -1; }).slice(0, 8);

        if (matches.length === 0) { resultsEl.style.display = 'none'; return; }

        var html = '';
        for (var i = 0; i < matches.length; i++) {
            var p = matches[i];
            html += '<div onclick="addAnchor(\'' + encodeURIComponent(p) + '\')" style="padding:12px 16px; border-bottom:1px solid var(--bd); cursor:pointer; font-size:13px; font-weight:600; color:var(--text);">' + p + '</div>';
        }
        resultsEl.innerHTML = html;
        resultsEl.style.display = 'block';
    }

    function addAnchor(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        var qty = parseFloat(prompt('Cantidad mínima fija para "' + prod + '":') || '0');
        if (!qty || qty <= 0) return;
        var unit = prompt('Unidad (ej: kg, unidad/es, cajón):') || 'unidad/es';

        ORDER_ANCHORS[prod] = { qty: qty, unit: unit };

        var inp = document.getElementById('anchor-search-inp');
        var results = document.getElementById('anchor-search-results');
        if (inp) inp.value = '';
        if (results) results.style.display = 'none';

        renderAnchorsConfig();
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function removeAnchor(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        delete ORDER_ANCHORS[prod];
        renderAnchorsConfig();
    }

    function saveAnchors() {
        toggleSync(true, 'Guardando anclajes...');
        google.script.run
            .withSuccessHandler(function(res) {
                toggleSync(false);
                if (res && res.success) {
                    if (ORDER_DATA) ORDER_DATA.anchors = ORDER_ANCHORS;
                    closeOrderAnchorsConfig();
                    showToast('📌 Anclajes guardados');
                } else {
                    toggleSync(false);
                    showToast('Error al guardar anclajes.');
                }
            })
            .withFailureHandler(function() {
                toggleSync(false);
                showToast('Error de conexión.');
            })
            .saveOrderAnchors(ORDER_ANCHORS, activeSheetId);
    }

    // Inicializar estado del botón al cargar
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(initOrderButtonState, 800);
    });

</script>
