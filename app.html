    var histLimit = 20;
    function renderHistory(loadMore, isFilterChange) {
        if (loadMore === undefined) loadMore = false;
        if (isFilterChange === undefined) isFilterChange = false;
        if (!loadMore) histLimit = 20;

        // F: skip re-render si HIST no cambió y no hay nuevo filtro
        if (!loadMore && !isFilterChange && HIST.length === _histLastRenderedLen) return;

        var list = document.getElementById('hist-list');
        if (!list) return;

        if (!loadMore) list.style.opacity = '0.5';

        // A: sort usando _ts pre-calculado (evita new Date() × N)
        var filtered = HIST.slice().sort(function(a, b) {
            return (b._ts || 0) - (a._ts || 0);
        });

        // D: filtro modo + rango fecha + query en un único O(n)
        var modeFilter = histFilters.mode;
        var fromMs = null, toMs = null;
        if (histFilters.from) {
            var fp = histFilters.from.split('-');
            fromMs = new Date(fp[0], fp[1] - 1, fp[2], 0, 0, 0, 0).getTime();
        }
        if (histFilters.to) {
            var tp = histFilters.to.split('-');
            toMs = new Date(tp[0], tp[1] - 1, tp[2], 23, 59, 59, 999).getTime();
        }
        var q = histFilters.query ? normalizeStr(histFilters.query.trim()) : '';
        var hasFilters = modeFilter !== 'all' || fromMs !== null || toMs !== null || q !== '';

        if (hasFilters) {
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                var h = filtered[i];

                if (modeFilter !== 'all') {
                    var m = normalizeStr((h.modo || h.mode || 'stock').toLowerCase());
                    var mok = (modeFilter === 'recepcion') ? (m === 'recepcion' || m === 'entrante') : (m === modeFilter);
                    if (!mok) continue;
                }

                var ts = h._ts || 0;
                if (fromMs !== null && ts < fromMs) continue;
                if (toMs !== null && ts > toMs) continue;

                if (q) {
                    var bestIdx = -1;
                    var items = h.items || [];
                    for (var j = 0; j < items.length; j++) {
                        var np = normalizeStr(items[j].prod);
                        var nc = items[j].cat ? normalizeStr(items[j].cat) : '';
                        var idxP = np.indexOf(q);
                        var idxC = nc.indexOf(q);
                        if (idxP !== -1) { bestIdx = (bestIdx === -1) ? idxP : Math.min(bestIdx, idxP); }
                        else if (idxC !== -1) { bestIdx = (bestIdx === -1) ? idxC : Math.min(bestIdx, idxC); }
                    }
                    if (bestIdx === -1) continue;
                    h._searchIdx = bestIdx;
                }

                newList.push(h);
            }

            if (q) {
                newList.sort(function(a, b) {
                    var sA = a._searchIdx === 0, sB = b._searchIdx === 0;
                    if (sA && !sB) return -1;
                    if (sB && !sA) return 1;
                    if (a._searchIdx !== b._searchIdx) return a._searchIdx - b._searchIdx;
                    return (b._ts || 0) - (a._ts || 0);
                });
            }
            filtered = newList;
        }

        // Deduplicar por ID
        var _seenIds = {};
        var _deduped = [];
        for (var di = 0; di < filtered.length; di++) {
            var _hid = String(filtered[di].id);
            if (!_seenIds[_hid]) { _seenIds[_hid] = true; _deduped.push(filtered[di]); }
        }
        filtered = _deduped;

        var totalFound = filtered.length;
        var visible = filtered.slice(0, histLimit);

        var countEl = document.getElementById('hist-result-count');
        if (countEl) {
            countEl.textContent = totalFound === 0 ? 'Sin resultados' : totalFound + ' registro' + (totalFound !== 1 ? 's' : '');
        }

        if (!totalFound) {
            list.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:48px 20px;color:var(--fede-on-surface-3);">' +
                '<i data-lucide="inbox" style="width:32px;height:32px;opacity:0.4;"></i>' +
                '<span style="font:var(--fede-label);font-weight:500;">Sin registros' + (histFilters.mode !== 'all' ? ' de ' + histFilters.mode : '') + '</span>' +
                '</div>';
            list.style.opacity = '1';
            if (lucide) lucide.createIcons({ nodes: [list] });
            return;
        }

        // G: sin animación en cambios de filtro (respuesta instantánea)
        var baseClass = isFilterChange ? 'mcf-hist-card' : 'mcf-hist-card mcf-appear';

        var html = '';
        for (var i = 0; i < visible.length; i++) {
            var h = visible[i];
            var _m = (h.modo || h.mode || 'stock').toLowerCase();
            var _label;
            if (_m === 'pedido') { _label = 'PEDIDO'; }
            else if (_m === 'stock') { _label = 'STOCK'; }
            else if (_m === 'merma') { _label = 'MERMA'; }
            else { _label = 'RECEPCIÓN'; }

            var dateObj = new Date(h._ts || h.fecha); // A: reutiliza _ts
            var dateStr = dateObj.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' }).toUpperCase();
            var timeStr = dateObj.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
            var totalItems = h.total || (h.items ? h.items.length : 0);
            var itemLabel = totalItems + ' ítem' + (totalItems !== 1 ? 's' : '');

            html += '<div class="' + baseClass + ' mcf-hist-card-' + _m + '" style="--delay:' + (i * 0.04) + 's" onclick="toggleHistExpand(\'' + h.id + '\')">' +
                '<div class="mcf-hist-header">' +
                  '<div class="mcf-hist-header-left">' +
                    '<span class="mcf-hist-mode-tag">' + _label + '</span>' +
                    '<span class="mcf-hist-count">' + itemLabel + '</span>' +
                    (h.motivo ? '<span style="font-size:10px;font-weight:600;color:var(--fede-warning);text-transform:uppercase;letter-spacing:0.05em;">· ' + FeDe_Utils.sanitize(h.motivo) + '</span>' : '') +
                  '</div>' +
                  '<div class="mcf-hist-header-right">' +
                    '<div class="mcf-hist-date-col">' +
                      '<div class="mcf-hist-date-day">' + dateStr + '</div>' +
                      '<div class="mcf-hist-time">' + timeStr + '</div>' +
                    '</div>' +
                    '<span class="hist-chevron" id="hist-chev-' + h.id + '"><i data-lucide="chevron-down" style="width:14px;height:14px;"></i></span>' +
                  '</div>' +
                '</div>' +
                '<div id="hist-expanded-' + h.id + '" class="mcf-hist-details"></div>' +
                '</div>';
        }

        if (totalFound > histLimit) {
            html += '<button onclick="histLimit += 20; renderHistory(true)" style="width:100%;padding:12px;background:var(--fede-surface);border:1px solid var(--fede-border);border-radius:var(--fede-r-md);font:var(--fede-label);font-weight:600;color:var(--fede-on-surface-2);cursor:pointer;margin-top:4px;">' +
                'Ver más (' + (totalFound - histLimit) + ' restantes)' +
                '</button>';
        }

        list.innerHTML = html;
        list.style.opacity = '1';
        _histLastRenderedLen = HIST.length; // F: marcar estado renderizado
        if (lucide) lucide.createIcons({ nodes: [list] });
    }

    var editingHistId = null, editingHistItems = [], editingHistMode = 'stock';

    function shareEditHistWA() {
        if (!editingHistItems || !editingHistItems.length) return toast('No hay items para compartir');
        var titleEl = document.getElementById('cfg-app-title');
        var title = (titleEl && titleEl.value) ? titleEl.value : 'FEDE GASTRO PRO';

        var orig = null;
        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id == editingHistId) { orig = HIST[i]; break; } }
        var dateInput = document.getElementById('edit-hist-date');
        var d = (dateInput && dateInput.value) ? new Date(dateInput.value) : (orig ? new Date(orig.fecha) : new Date());

        var dateStr = d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var timeStr = d.toLocaleTimeString('es-AR', { hour12: false, hour: '2-digit', minute: '2-digit' });

        var msg = "*" + title + " - " + editingHistMode.toUpperCase() + "*\n";
        msg += "_Fecha de registro: " + dateStr + " " + timeStr + "_\n\n";
        var byCat = {};
        for (var i = 0; i < editingHistItems.length; i++) {
            var item = editingHistItems[i];
            var cat = item.cat || 'Otros';
            if (!byCat[cat]) byCat[cat] = [];
            byCat[cat].push(item);
        }
        var catKeys = Object.keys(byCat).sort();
        for (var j = 0; j < catKeys.length; j++) {
            var cat = catKeys[j];
            msg += "*" + cat.toUpperCase() + "*\n";
            for (var k = 0; k < byCat[cat].length; k++) {
                var it = byCat[cat][k];

    function searchEditHistProduct(q) {
        var res = document.getElementById('edit-hist-search-results');
        if (!q || q.length < 2) { if (res) res.style.display = 'none'; return; }

        var matches = [];
        var query = q.toLowerCase();

        var catKeys = Object.keys(CATS);
        for (var i = 0; i < catKeys.length; i++) {
            var cat = catKeys[i];
            for (var j = 0; j < CATS[cat].prods.length; j++) {
                var p = CATS[cat].prods[j];
                if (p.toLowerCase().indexOf(query) !== -1) {
                    var found = false;
                    for (var k = 0; k < editingHistItems.length; k++) { if (editingHistItems[k].prod === p) { found = true; break; } }
                    if (!found) matches.push({ prod: p, cat: cat });
                }
            }
        }

        if (!matches.length) { if (res) res.style.display = 'none'; return; }

        var matchHtml = '';
        var limited = matches.slice(0, 10);
        for (var l = 0; l < limited.length; l++) {
            var m = limited[l];
            matchHtml += '<div onclick="addHistEntryProduct(\'' + m.prod.replace(/'/g, "\\'") + '\', \'' + m.cat.replace(/'/g, "\\'") + '\')" ' +
                'style="padding:12px 16px; border-bottom:1px solid var(--bd2); cursor:pointer; font-size:14px; color:var(--text); font-weight:600; display:flex; justify-content:space-between; align-items:center;">' +
                '<span>' + m.prod + '</span>' +
                '<span style="font-size:10px; color:var(--primary); opacity:0.7;">' + m.cat + '</span>' +
                '</div>';
        }
        if (res) {
            res.innerHTML = matchHtml;
            res.style.display = 'block';
        }
    }

        var defaultUnit = productUnits[0];
        editingHistItems.push({

    function fsSetUnit(u, prod) {
        if (!relData[prod]) relData[prod] = { qty: 0, unit: u };
        else relData[prod].unit = u;
        UNIT_MEM.save(prod, u);
        UnitFreq.record(prod, 'stock', u);
        renderFSProduct();
        saveDraft();
    }
    function fsStepProd(dir) {
        var prod = fsProducts[fsCurrentIdx];
        if (!relData[prod]) relData[prod] = { qty: 0, unit: getUnitsForProduct(fsCurrentCat, prod)[0] };
        var prevUnitF = relData[prod].unit;
        var snF = UNIT_STEPPER.stepNormalized(relData[prod].qty, relData[prod].unit, dir);
        relData[prod].qty  = snF.qty;
        relData[prod].unit = snF.unit;
        if (snF.unit !== prevUnitF) {
            UNIT_MEM.save(prod, snF.unit);
            UnitFreq.record(prod, currentMode || 'stock', snF.unit);
        }
        if (relData[prod].qty === 0) delete relData[prod];
        renderFSProduct(); saveDraft();
    }
    function fs86() { var p = fsProducts[fsCurrentIdx]; relData[p] = { qty: 86, unit: (relData[p] && relData[p].unit) || units[0] }; toast("⚠️ 86"); saveDraft(); setTimeout(function () { fsNext(); }, 500); }
    function fsNext() { if (fsCurrentIdx < fsProducts.length - 1) { fsCurrentIdx++; renderFSProduct(); } else { exitFullscreenMode(); toast("✓ Fin"); } }
    function fsPrev() { if (fsCurrentIdx > 0) { fsCurrentIdx--; renderFSProduct(); } }
    function fsManualEntry() {
        var p = fsProducts[fsCurrentIdx]; var val = prompt('Cantidad:', (relData[p] && relData[p].qty) || '');
        if (val !== null) {
            var n = parseFloat(val.replace(',', '.'));
            if (!isNaN(n)) { relData[p] = { qty: n, unit: (relData[p] && relData[p].unit) || units[0] }; renderFSProduct(); saveDraft(); }
        }
    }

    /**
     * 🧠 NUEVA IMPLEMENTACIÓN: Resumen de Inteligencia en Home
     */
    function renderHomeSummary() {
        var el = document.getElementById('home-alerts-card');
        if (!el) return;

        var isHidden = el.dataset.spHidden === '1';
        var alerts = [];
        var now = new Date();
        var _nowMs = now.getTime();

        // Pre-computar último stock y pedido desde HIST (fuente de verdad)
        var _lastStockMs = 0, _lastPedidoMs = 0;
        if (HIST && HIST.length) {
            for (var _si = 0; _si < HIST.length; _si++) {
                var _he = HIST[_si];
                var _ht = _he._ts || new Date(_he.fecha).getTime();
                if (_he.mode === 'stock' && _ht > _lastStockMs) _lastStockMs = _ht;
                if (_he.mode === 'pedido' && _ht > _lastPedidoMs) _lastPedidoMs = _ht;
            }
        }
        var _stockDoneToday  = _lastStockMs  > 0 && Math.floor((_nowMs - _lastStockMs)  / 86400000) === 0;
        var _pedidoDoneToday = _lastPedidoMs > 0 && Math.floor((_nowMs - _lastPedidoMs) / 86400000) === 0;

        // 1. Trabajo Pendiente (Draft)
        var draftStr = localStorage.getItem('fede_draft');
        var draft = draftStr ? JSON.parse(draftStr) : null;
        if (draft && draft.items && Object.keys(draft.items).length > 0) {
            alerts.unshift({ icon: 'database', color: 'amber', title: 'RESUMIR TRABAJO', desc: 'Borrador sin guardar', urgent: true, action: 'restoreDraft()' });
        }

        // 2. Próximo Pedido Programado
        var orderDays = (CONFIG.orderDays && CONFIG.orderDays.length > 0) ? CONFIG.orderDays : [1, 4];
        var todayIdx = now.getDay();
        var minDiff = 8;
        for (var i = 0; i < orderDays.length; i++) {
            var diff = (orderDays[i] - todayIdx + 7) % 7;
            if (diff < minDiff) minDiff = diff;
        }
        var orderDesc = minDiff === 0 ? 'HACER HOY' : (minDiff === 1 ? 'MAÑANA' : 'EN ' + minDiff + ' DÍAS');
        // Suprimir si el pedido ya se realizó hoy
        if (!_pedidoDoneToday) {
            alerts.push({ icon: minDiff === 0 ? 'truck' : 'clock', color: 'amber', title: 'Realizar pedido', desc: orderDesc, urgent: minDiff <= 1, action: "initRelevamiento('pedido')" });
        }

        // 3. Control obligatorio
        var day = now.getDay();
        if (day === 0 || day === 2) {
            // Verificar contra HIST (fuente de verdad) con sessionStorage como respaldo inmediato
            var isDone = _stockDoneToday || sessionStorage.getItem('fede_stock_done') === 'CONTROL DE STOCK';
            if (!isDone) {
                alerts.push({ icon: 'alert-octagon', color: 'slate', title: 'Control Obligatorio', desc: 'Falta registro de hoy', urgent: true, action: "initRelevamiento('stock')" });
            }
        }

        // 4. Feriados próximos
        if (typeof getUpcomingHolidays === 'function') {
            var upcoming = getUpcomingHolidays(7);
            for (var j = 0; j < upcoming.length; j++) {
                var h = upcoming[j];
                var diffMs = h.date.getTime() - now.getTime();
                var daysLeft = Math.ceil(diffMs / (1000 * 3600 * 24));
                var timeText = daysLeft <= 0 ? 'HOY' : (daysLeft === 1 ? 'MAÑANA' : 'EN ' + daysLeft + ' DÍAS');
                alerts.push({ icon: 'calendar', color: 'rose', title: h.name, desc: timeText });
            }
        }

        // 5. Eventos de Google Calendar
        if (window._gcalEvents && window._gcalEvents.length > 0) {
            for (var ci = 0; ci < window._gcalEvents.length; ci++) {
                var ev = window._gcalEvents[ci];
                var evStart = new Date(ev.start);
                var evDiffMs = evStart.getTime() - now.getTime();
                var evDaysLeft = Math.ceil(evDiffMs / (1000 * 3600 * 24));
                var evTime = ev.isAllDay ? '' : evStart.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                var evWhen = evDaysLeft <= 0 ? 'HOY' : (evDaysLeft === 1 ? 'MAÑANA' : 'EN ' + evDaysLeft + ' DÍAS');
                var evNote = ev.description ? ev.description.split('\n')[0].trim() : '';
                var evDesc = evWhen + (evTime ? ' · ' + evTime : '') + (evNote ? ' · ' + evNote : '');
                alerts.push({ icon: 'calendar-check', color: 'sage', title: ev.title, desc: evDesc, urgent: evDaysLeft <= 1 });
            }
        }

        // ── Drift ABC: productos cuya clase manual diverge del algoritmo ──
        var driftProds = _getDriftProds();
        if (driftProds.length > 0) {
            alerts.push({
                icon: 'trending-up',
                color: 'amber',
                title: driftProds.length + ' producto' + (driftProds.length > 1 ? 's' : '') + ' cambi' + (driftProds.length > 1 ? 'aron' : 'ó') + ' de clase ABC',
                desc: 'El algoritmo detectó nuevos patrones de uso.',
                urgent: false,
                action: 'openDriftReview()'
            });
        }

        var urgentCount = alerts.filter(function(a) { return a.urgent; }).length;
        var chevron = isHidden ? 'chevron-down' : 'chevron-up';

        function getAlertTones(color) {
            if (color === 'amber') return { accent: 'var(--fede-warning)', bg: 'rgba(217,119,6,0.1)' };
            if (color === 'rose')  return { accent: 'var(--fede-danger)',  bg: 'rgba(220,38,38,0.09)' };
            if (color === 'sage')  return { accent: 'var(--fede-success)', bg: 'rgba(22,163,74,0.09)' };
            return                         { accent: 'var(--fede-info)',    bg: 'rgba(37,99,235,0.09)' };
        }

        var badgeHtml = '';
        if (urgentCount > 0) {
            badgeHtml = '<span class="fede-alerts-header-badge">' + urgentCount + '</span>';
        } else if (alerts.length > 0) {
            badgeHtml = '<span class="fede-alerts-header-badge neutral">' + alerts.length + '</span>';
        }

        var html = '';
        
        // Header
        html += '<div class="fede-alerts-header" onclick="toggleHomeAlerts()">' +
                '  <div class="fede-alerts-header-group">' +
                '    <i data-lucide="bell-ring" class="fede-alerts-header-icon"></i>' +
                '    <span class="fede-alerts-header-label">Notificaciones operativas</span>' +
                badgeHtml +
                '  </div>' +
                '  <i data-lucide="' + chevron + '" style="width:15px;height:15px;color:var(--fede-surface);opacity:0.5;"></i>' +
                '</div>';

        // Panel de alertas
        if (!isHidden) {
            html += '<div class="fede-alerts-list">';
            if (alerts.length === 0) {
                html += '<div class="fede-alert-item">' +
                        '  <div class="fede-alert-item-accent" style="background:var(--fede-success)"></div>' +
                        '  <div class="fede-alert-item-body">' +
                        '    <div class="fede-alert-item-icon-box" style="background:rgba(22,163,74,0.1)">' +
                        '      <i data-lucide="check-circle-2" style="width:18px;height:18px;color:var(--fede-success);stroke-width:2;"></i>' +
                        '    </div>' +
                        '    <div class="fede-alert-item-content">' +
                        '      <div class="fede-alert-item-title">Operación al día</div>' +
                        '      <div class="fede-alert-item-desc">Sin alertas pendientes</div>' +
                        '    </div>' +
                        '  </div>' +
                        '</div>';
            } else {
                for (var k = 0; k < alerts.length; k++) {
                    var al = alerts[k];
                    var t = getAlertTones(al.color);
                    var clickStr = al.action ? ' onclick="' + al.action + '"' : '';
                    var actionArrow = al.action ? '<div class="fede-alert-item-action"><i data-lucide="chevron-right" style="width:14px;height:14px;color:' + t.accent + ';stroke-width:2.5;"></i></div>' : '';

                    html += '<div class="fede-alert-item"' + clickStr + '>' +
                            '  <div class="fede-alert-item-accent" style="background:' + t.accent + '"></div>' +
                            '  <div class="fede-alert-item-body">' +
                            '    <div class="fede-alert-item-icon-box" style="background:' + t.bg + '">' +
                            '      <i data-lucide="' + al.icon + '" style="width:18px;height:18px;color:' + t.accent + ';stroke-width:2;"></i>' +
                            '    </div>' +
                            '    <div class="fede-alert-item-content">' +
                            '      <div class="fede-alert-item-title">' + FeDe_Utils.sanitize(al.title) + '</div>' +
                            '      <div class="fede-alert-item-desc">' + FeDe_Utils.sanitize(al.desc) + '</div>' +
                            '    </div>' +
                            '    ' + actionArrow +
                            '  </div>' +
                            '</div>';
                }
            }
            html += '</div>';
        }

        el.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();

        // Poblar stat cards — reusar valores pre-computados al inicio
        var lastStockTs = _lastStockMs, lastPedidoTs = _lastPedidoMs;
        function _daysAgoStr(ts) {
            if (!ts) return 'Sin datos';
            var d = Math.floor((now - ts) / 86400000);
            return d === 0 ? 'Hoy' : d === 1 ? 'Hace 1 día' : 'Hace ' + d + ' días';
        }
        var statStock = document.getElementById('home-stat-stock');
        var statPedido = document.getElementById('home-stat-pedido');
        if (statStock) statStock.textContent = _daysAgoStr(lastStockTs);
        if (statPedido) statPedido.textContent = _daysAgoStr(lastPedidoTs);
    }

    /**

    function refreshGCalendar() {
        FeDe_API.call('getCalendarEvents', null, function(res) {
            // Cachear para renderHomeSummary
            window._gcalEvents = (res.success && res.events) ? res.events : [];

            // Actualizar panel de alertas del Home con los datos frescos
            try { renderHomeSummary(); } catch(e) {}

    function submitReservation() {
        var title = (document.getElementById('res-title').value || '').trim();
        var date  = document.getElementById('res-date').value;
        var time  = document.getElementById('res-time').value;
        var notes = (document.getElementById('res-notes').value || '').trim();
        var allDay = document.getElementById('res-allday').checked;

        if (!title) { toast('Ingresa un título para la reserva'); return; }
        if (!date)  { toast('Selecciona una fecha'); return; }

        var btn = document.getElementById('res-submit-btn');
        if (btn) btn.disabled = true;

        FeDe_API.call('saveReservation', { title: title, date: date, time: time, isAllDay: allDay, notes: notes }, function(res) {
            if (btn) btn.disabled = false;
            if (res && res.success) {
                toast('Reserva guardada en Calendar ✓');
                document.getElementById('reservation-overlay').classList.add('hidden');
                window._gcalEvents = null;
                refreshGCalendar();
            } else {
                toast('Error al guardar: ' + (res && res.message ? res.message : 'Error desconocido'));
            }
        }, function(err) {
            if (btn) btn.disabled = false;
            toast('Error de conexión con Calendar');
        });
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       MÓDULO DE PEDIDOS INTELIGENTE — FRONTEND ENGINE
       ═══════════════════════════════════════════════════════════════════════════ */

    var ORDER_QTY = {};        // Cantidades editadas por el usuario { prodName: qty }
    var ORDER_DATA = null;     // Respuesta del backend (cacheada - legacy, no usado en v2)
    var ORDER_ANCHORS = {};    // Anclajes en edición temporal
    var PACK_FACTORS_EDIT = {};  // Copia de trabajo del modal de pack factors
    var ABC_DATA = null;          // Clasificación ABC cacheada por sesión { prod: { clase, ... } }
    var ORDER_CONTRACTS = null;   // Input contracts cacheados por sesión (v3)
    var ORDER_TEMP_STOCK = {};    // Stock verificado manualmente en pantalla de verificación
    var ORDER_LT_DAYS = 4;     // Lead time en días hasta próximo pedido
    var ORDER_SESSION     = null;  // Output estructurado con audit trail (Módulo 5)

    var ORDER_DRAFT_KEY = 'fede_order_draft';   // localStorage key para las cantidades del borrador
    var ORDER_DATA_KEY  = 'fede_order_data';    // localStorage key para los datos del backend

    function getOrderContracts() {
        if (!ORDER_CONTRACTS) ORDER_CONTRACTS = buildInputContracts();
        return ORDER_CONTRACTS;
    }

    function saveOrderDraft() {
        try {
            localStorage.setItem(ORDER_DRAFT_KEY, JSON.stringify(ORDER_QTY));
        } catch(e) {}
    }

    function loadOrderDraft() {
        try {
            var saved = localStorage.getItem(ORDER_DRAFT_KEY);
            return saved ? JSON.parse(saved) : {};
        } catch(e) { return {}; }
    }

    function saveOrderDataCache(data) {
        try {
            // Guardar junto con timestamp del día (YYYY-MM-DD) para invalidar al día siguiente
            var today = new Date().toISOString().slice(0, 10);
            localStorage.setItem(ORDER_DATA_KEY, JSON.stringify({ date: today, data: data }));
        } catch(e) {}
    }

    function loadOrderDataCache() {
        try {
            var raw = localStorage.getItem(ORDER_DATA_KEY);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            var today = new Date().toISOString().slice(0, 10);
            // Solo válido si es del mismo día
            if (parsed.date === today) return parsed.data;
            return null;
        } catch(e) { return null; }
    }

    function clearOrderDraft() {
        try {
            localStorage.removeItem(ORDER_DRAFT_KEY);
            localStorage.removeItem(ORDER_DATA_KEY);
        } catch(e) {}
    }

    // ══════════════════════════════════════════════════════════════════════════
    // SMART REPLENISHMENT v3 — MÓDULO 1: INPUT CONTRACTS
    // ══════════════════════════════════════════════════════════════════════════

    var SR_CONFIG = {
        maxAgeDays:        90,
        A_freq_threshold:  0.70,
        A_merma_threshold: 0.30,
        B_freq_threshold:  0.30,
        safety_days_A:     2,
        safety_days_B:     3,
        safety_days_C:     0,
        z_A:               1.65,
        z_B:               1.28,
        z_C:               1.00,
        pax_baseline:      50
    };

    function buildInventorySnapshot() {
        var snapshot = {};
        var nowTs = Date.now();
        var catKeys = Object.keys(CATS);
        for (var ci = 0; ci < catKeys.length; ci++) {
            var cat = catKeys[ci];
            var prods = CATS[cat].prods || [];
            for (var pi = 0; pi < prods.length; pi++) {
                var prod = prods[pi];
                snapshot[prod] = {
                    sku_id:         prod,
                    sku_name:       prod,
                    current_stock:  null,
                    unit:           '',
                    last_count_ts:  0,
                    count_source:   'none',
                    snapshot_ts:    nowTs
                };
            }
        }
        // M1: Usar HIST_BY_PROD en lugar de scan reverso completo de HIST
        var snapKeys = Object.keys(snapshot);
        for (var ski = 0; ski < snapKeys.length; ski++) {
            var entries = HIST_BY_PROD[snapKeys[ski]];
            if (!entries) continue;
            for (var ei = entries.length - 1; ei >= 0; ei--) {
                var ent = entries[ei];
                if (ent.mode !== 'stock' && ent.mode !== 'recepcion') continue;
                if (ent.ts > snapshot[snapKeys[ski]].last_count_ts) {
                    snapshot[snapKeys[ski]].last_count_ts  = ent.ts;
                    snapshot[snapKeys[ski]].current_stock  = ent.qty !== undefined ? ent.qty : null;
                    snapshot[snapKeys[ski]].unit           = ent.unit || '';
                    snapshot[snapKeys[ski]].count_source   = ent.mode;
                }
                break; // Solo necesitamos el primer stock/recepcion encontrado
            }
        }
        return snapshot;
    }

    function buildMovementHistory(maxAgeDays) {
        var days = maxAgeDays || SR_CONFIG.maxAgeDays;
        var cutoff = Date.now() - days * 86400000;
        var result = [];
        for (var hi = 0; hi < HIST.length; hi++) {
            var h = HIST[hi];
            var hTs = new Date(h.fecha).getTime();
            if (hTs < cutoff) continue;
            var hItems = h.items || [];
            for (var hii = 0; hii < hItems.length; hii++) {
                var item = hItems[hii];
                result.push({
                    sku_id:     item.prod || '',
                    mode:       h.mode || 'stock',
                    qty:        item.qty !== undefined ? item.qty : 0,
                    unit:       item.unit || '',
                    ts:         hTs,
                    session_id: h.id || null
                });
            }
        }
        return result;
    }

    function buildSupplierConfig() {
        return {
            supplier_id:        'default',
            name:               'Proveedor principal',
            delivery_days_dow:  (CONFIG && CONFIG.orderDays) ? CONFIG.orderDays : [1, 4],
            lead_time_override: null,
            min_order_qty:      null,
            sync_ts:            null
        };
    }

    function buildEventContext(ltDays) {
        var days = ltDays || ORDER_LT_DAYS || 4;
        var now = new Date();
        var windowEnd = new Date(now.getTime() + days * 86400000);
        var events = [];
        if (window.gcal_events && Array.isArray(window.gcal_events)) {
            for (var ei = 0; ei < window.gcal_events.length; ei++) {
                var ev = window.gcal_events[ei];
                var evDate = ev.date ? new Date(ev.date) : null;
                if (!evDate || evDate < now || evDate > windowEnd) continue;
                var pax = ev.pax_estimated || ev.pax || null;
                var loadFactor = null;
                if (pax && SR_CONFIG.pax_baseline > 0) {
                    loadFactor = Math.round((pax / SR_CONFIG.pax_baseline) * 100) / 100;
                }
                events.push({
                    date:          ev.date,
                    name:          ev.title || ev.name || '',
                    pax_estimated: pax,
                    event_type:    ev.type || null,
                    load_factor:   loadFactor
                });
            }
        }
        return { events: events, pax_baseline: SR_CONFIG.pax_baseline };
    }

    function buildAbcConfig() {
        return {
            A_freq_threshold:  SR_CONFIG.A_freq_threshold,
            A_merma_threshold: SR_CONFIG.A_merma_threshold,
            B_freq_threshold:  SR_CONFIG.B_freq_threshold,
            max_age_days:      SR_CONFIG.maxAgeDays,
            safety_days:       SR_CONFIG.safety_days_A
        };
    }

    function buildProductionLog() {
        if (!PROD_DATA || PROD_DATA.length === 0) return null;
        var log = [];
        for (var i = 0; i < PROD_DATA.length; i++) {
            var lot = PROD_DATA[i];
            log.push({
                lot_id:          lot.lot_id || lot.id || '',
                sku_id:          lot.sku_id,
                recipe_consumed: lot.recipe_consumed || 0,
                actual_consumed: lot.actual_consumed || 0,
                units_produced:  lot.units_produced  || 0,
                production_ts:   lot.production_ts   || lot.ts || ''
            });
        }
        return log;
    }

    function buildFeedbackHistory() {
        var result = [];
        try {
            var prefix = 'fede_feedback_';
            for (var ki = 0; ki < localStorage.length; ki++) {
                var key = localStorage.key(ki);
                if (!key || key.indexOf(prefix) !== 0) continue;
                var raw = localStorage.getItem(key);
                if (!raw) continue;
                var entry = JSON.parse(raw);
                if (entry && entry.sku_id) result.push(entry);
            }
        } catch(e) {}
        result.sort(function(a, b) {
            return (b.session_date || '') > (a.session_date || '') ? 1 : -1;
        });
        return result;
    }

    function buildInputContracts() {
        var supplierCfg = buildSupplierConfig();
        return {
            inventory_snapshot: buildInventorySnapshot(),
            movement_history:   buildMovementHistory(SR_CONFIG.maxAgeDays),
            supplier_config:    supplierCfg,
            event_context:      buildEventContext(ORDER_LT_DAYS),
            abc_config:         buildAbcConfig(),
            production_log:     buildProductionLog(),
            feedback_history:   buildFeedbackHistory()
        };
    }

    // ══════════════════════════════════════════════════════════════════════════
    // SMART REPLENISHMENT v2
    // ══════════════════════════════════════════════════════════════════════════

    // ── Módulo 2 v3: Auto-clasificación ABC desde contratos ─────────────────

    function computeABC_v3(contracts) {
        var now = Date.now();
        var snap = contracts.inventory_snapshot || {};
        var moves = contracts.movement_history || [];
        var abcCfg = contracts.abc_config || {};

        // Pre-indexar movement_history por sku_id
        var byProd = {};
        for (var mi = 0; mi < moves.length; mi++) {
            var mv = moves[mi];
            var sk = mv.sku_id;
            if (!sk) continue;
            if (!byProd[sk]) byProd[sk] = [];
            byProd[sk].push(mv);
        }

        var freqA  = abcCfg.A_freq_threshold  || 0.70;
        var mermaA = abcCfg.A_merma_threshold || 0.30;
        var freqB  = abcCfg.B_freq_threshold  || 0.30;

        var abcOverrides = (CONFIG && CONFIG.abc_overrides) ? CONFIG.abc_overrides : {};
        var result = {};
        var catKeys = Object.keys(CATS);
        for (var ci = 0; ci < catKeys.length; ci++) {
            var cat = catKeys[ci];
            var prods = CATS[cat].prods || [];
            for (var pi = 0; pi < prods.length; pi++) {
                var prod = prods[pi];
                var prodMoves = byProd[prod] || [];

                // Paso 3 — métricas desde movement_history
                var nStock = 0, nMermaCnt = 0;
                var sumStockQty = 0, sumMermaQty = 0;
                for (var pmi = 0; pmi < prodMoves.length; pmi++) {
                    var m = prodMoves[pmi];
                    if (m.mode === 'stock') {
                        nStock++;
                        sumStockQty += m.qty || 0;
                    } else if (m.mode === 'merma') {
                        nMermaCnt++;
                        sumMermaQty += m.qty || 0;
                    }
                }
                var nTotal   = nStock + nMermaCnt;
                var freq      = nStock / Math.max(nTotal, 1);
                var mermaRate = sumMermaQty / Math.max(sumStockQty, 1);

                // Paso 4 — clasificación
                var clase;
                if (freq >= freqA || mermaRate >= mermaA) {
                    clase = 'A';
                } else if (freq >= freqB) {
                    clase = 'B';
                } else {
                    clase = 'C';
                }
                var conservative = (mermaRate >= mermaA && freq < 0.50);

                // Paso 5 — confianza desde inventory_snapshot
                var snapEntry = snap[prod] || {};
                var lastTs    = snapEntry.last_count_ts || 0;
                var ageDays   = lastTs > 0 ? Math.floor((now - lastTs) / 86400000) : 999;
                var ageMax    = clase === 'A' ? 7 : clase === 'B' ? 14 : 45;
                var confidence;
                if (ageDays <= ageMax) {
                    confidence = 'RELIABLE';
                } else if (ageDays <= ageMax * 2) {
                    confidence = 'PROJECTED';
                } else {
                    confidence = 'STALE';
                }

                // Paso 6 — z_base por clase
                var z_base = clase === 'A' ? SR_CONFIG.z_A :
                             clase === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C;

                // Paso 7 — modo MEASURED/INFERRED desde production_log (M3)
                var modo = 'INFERRED';
                var prodLog = contracts.production_log;
                if (prodLog) {
                    var lotCount = 0;
                    for (var li = 0; li < prodLog.length; li++) {
                        if (prodLog[li].sku_id === prod) lotCount++;
                    }
                    if (lotCount >= 2) modo = 'MEASURED';
                }

                // Paso 8 — anclaje suave: resolver override manual en el mismo paso
                var manual = abcOverrides[prod] ? abcOverrides[prod].clase : null;
                result[prod] = {
                    sku_id:       prod,
                    cat:          cat,
                    clase:        manual || clase,
                    clase_algo:   clase,
                    clase_manual: manual || null,
                    drift:        !!(manual && manual !== clase),
                    freq:         freq,
                    mermaRate:    mermaRate,
                    conservative: conservative,
                    ageDays:      ageDays,
                    confidence:   confidence,
                    lastTs:       lastTs,
                    z_base:       manual ? (manual === 'A' ? SR_CONFIG.z_A : manual === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C) : z_base,
                    modo:         modo
                };
            }
        }

        return result;
    }

    // ── Módulo 2 v2 (wrapper): delega a computeABC_v3 ───────────────────────

    var _computeAbcTimer = null;
    function computeABC() {
        if (_computeAbcTimer) {
            clearTimeout(_computeAbcTimer);
            _computeAbcTimer = null;
        }
        if (ABC_DATA) return ABC_DATA;
        _computeAbcTimer = setTimeout(function() { _computeAbcTimer = null; }, 300);
        return computeABC_v3(buildInputContracts());
    }

    function _getDriftProds() {
        if (!ABC_DATA) return [];
        var out = [];
        var keys = Object.keys(ABC_DATA);
        for (var i = 0; i < keys.length; i++) {
            if (ABC_DATA[keys[i]].drift) out.push(keys[i]);
        }
        return out;
    }

    // ── ABC Override / Anclaje suave ─────────────────────────────────────────

    function _applyOverridesToExisting() {
        if (!ABC_DATA) return;
        var overrides = CONFIG.abc_overrides || {};
        var keys = Object.keys(ABC_DATA);
        for (var i = 0; i < keys.length; i++) {
            var e = ABC_DATA[keys[i]];
            var manual = overrides[keys[i]] ? overrides[keys[i]].clase : null;
            e.clase_manual = manual || null;
            e.clase        = manual || e.clase_algo;
            e.drift        = !!(manual && manual !== e.clase_algo);
            e.z_base       = manual
                ? (manual === 'A' ? SR_CONFIG.z_A : manual === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C)
                : (e.clase_algo === 'A' ? SR_CONFIG.z_A : e.clase_algo === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C);
        }
    }

    function setAbcOverride(prod, clase) {
        if (!CONFIG.abc_overrides) CONFIG.abc_overrides = {};
        if (clase === 'auto') {
            delete CONFIG.abc_overrides[prod];
        } else {
            CONFIG.abc_overrides[prod] = { clase: clase, setTs: Date.now() };
        }
        _applyOverridesToExisting();
        toggleSync(true, 'Guardando clasificación...');
        FeDe_API.call('saveConfig', { key: 'abc_overrides', value: CONFIG.abc_overrides }, function() {
            toggleSync(false);
            showToast('Clasificación de ' + prod + ' guardada');
            ORDER_CONTRACTS = null;
        });
    }

    function openAbcSelector(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        if (!ABC_DATA) ABC_DATA = computeABC();
        var entry = ABC_DATA[prod] || {};
        var current = entry.clase_manual || 'auto';

        var chips = ['A', 'B', 'C', 'auto'];
        var labels = { A: 'Clase A', B: 'Clase B', C: 'Clase C', auto: 'Auto' };
        var chipsHtml = '';
        for (var ci = 0; ci < chips.length; ci++) {
            var c = chips[ci];
            var isActive = current === c;
            chipsHtml += '<span class="pf-chip' + (isActive ? ' active' : '') + '" ' +
                'onclick="_abcPickClase(\'' + encodeURIComponent(prod) + '\',\'' + c + '\')">' +
                labels[c] + '</span>';
        }

        var algoLabel = entry.clase_algo || '—';
        var html = '<div style="padding:16px;">' +
            '<div style="font:var(--fede-label);font-weight:700;color:var(--fede-on-surface);margin-bottom:4px;">' + FeDe_Utils.sanitize(prod) + '</div>' +
            '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-bottom:16px;">Algoritmo sugiere: <b>' + algoLabel + '</b></div>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">' + chipsHtml + '</div>' +
            '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">Auto = el algoritmo decide según historial</div>' +
            '</div>';

        var sheet = document.getElementById('abc-selector-sheet');
        if (!sheet) return;
        document.getElementById('abc-selector-body').innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [sheet] });
        sheet.classList.add('open');
    }

    function _abcPickClase(prodEncoded, clase) {
        var prod = decodeURIComponent(prodEncoded);
        setAbcOverride(prod, clase);
        var sheet = document.getElementById('abc-selector-sheet');
        if (sheet) sheet.classList.remove('open');
        var badge = document.querySelector('[data-abc-badge="' + prodEncoded + '"]');
        if (badge) _refreshAbcBadge(badge, prod);
    }

    function _refreshAbcBadge(badge, prod) {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var e = ABC_DATA[prod];
        if (!e) return;
        badge.innerHTML = _buildAbcBadgeHtml(e);
    }

    function _buildAbcBadgeHtml(e) {
        var label = e.clase;
        var style = 'display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font:var(--fede-caption);font-weight:700;cursor:pointer;';
        if (e.drift) {
            style += 'background:color-mix(in srgb,var(--fede-warning,#d97706) 15%,transparent);color:var(--fede-warning,#d97706);border:1px solid color-mix(in srgb,var(--fede-warning,#d97706) 40%,transparent);';
            return '<span style="' + style + '">' + label + ' ★ <span style="opacity:0.8">→' + e.clase_algo + '</span></span>';
        } else if (e.clase_manual) {
            style += 'background:color-mix(in srgb,var(--primary) 15%,transparent);color:var(--primary);border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);';
            return '<span style="' + style + '">' + label + ' ★</span>';
        } else {
            style += 'background:var(--fede-surface-sunken);color:var(--fede-on-surface-3);border:1px solid var(--fede-border);';
            return '<span style="' + style + '">' + label + '</span>';
        }
    }

    function openDriftReview() {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var driftProds = _getDriftProds();
        if (driftProds.length === 0) return;

        var html = '';
        for (var i = 0; i < driftProds.length; i++) {
            var p = driftProds[i];
            var e = ABC_DATA[p];
            var ep = encodeURIComponent(p);
            html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--fede-border);">' +
                '<div>' +
                    '<div style="font:var(--fede-label);font-weight:600;color:var(--fede-on-surface);">' + FeDe_Utils.sanitize(p) + '</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">Tu config: <b>' + e.clase_manual + '</b> · Algoritmo: <b>' + e.clase_algo + '</b></div>' +
                '</div>' +
                '<div style="display:flex;gap:6px;">' +
                    '<span class="pf-chip" style="font-size:12px;" onclick="_driftAccept(\'' + ep + '\')">Actualizar</span>' +
                    '<span class="pf-chip" style="font-size:12px;" onclick="_driftIgnore(\'' + ep + '\')">Mantener</span>' +
                '</div>' +
            '</div>';
        }
        html += '<div style="display:flex;gap:8px;margin-top:16px;">' +
            '<button class="fede-btn-primary" style="flex:1;" onclick="_driftAcceptAll()">Actualizar todo</button>' +
            '<button class="fede-btn-ghost" style="flex:1;" onclick="_closeDriftReview()">Ignorar todo</button>' +
        '</div>';

        var sheet = document.getElementById('abc-selector-sheet');
        if (!sheet) return;
        document.getElementById('abc-selector-body').innerHTML =
            '<div style="padding:16px;">' +
            '<div style="font:var(--fede-body);font-weight:700;color:var(--fede-on-surface);margin-bottom:16px;">Cambios detectados</div>' +
            html + '</div>';
        sheet.classList.add('open');
    }

    function _driftAccept(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        var e = ABC_DATA[prod];
        if (e) setAbcOverride(prod, e.clase_algo);
        openDriftReview();
    }

    function _driftIgnore(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        if (ABC_DATA[prod]) ABC_DATA[prod].drift = false;
        openDriftReview();
    }

    function _driftAcceptAll() {
        if (!ABC_DATA) return;
        var driftProds = _getDriftProds();
        for (var i = 0; i < driftProds.length; i++) {
            var p = driftProds[i];
            setAbcOverride(p, ABC_DATA[p].clase_algo);
        }
        _closeDriftReview();
    }

    function _closeDriftReview() {
        var sheet = document.getElementById('abc-selector-sheet');
        if (sheet) sheet.classList.remove('open');
    }

    // ── Módulo 2: Contexto de pedido ─────────────────────────────────────────

    function computeOrderContext() {
        if (!ABC_DATA) ABC_DATA = computeABC();

        var staleA = [], staleB = [], okA = 0;
        var prodKeys = Object.keys(ABC_DATA);
        for (var i = 0; i < prodKeys.length; i++) {
            var p = ABC_DATA[prodKeys[i]];
            if (p.clase === 'A') {
                if (p.confidence === 'STALE') staleA.push(prodKeys[i]);
                else okA++;
            } else if (p.clase === 'B' && p.confidence === 'STALE') {
                staleB.push(prodKeys[i]);
            }
        }

        var now = new Date();
        var orderDays = (CONFIG && CONFIG.orderDays) ? CONFIG.orderDays : [1, 4];
        var daysAway = 999;
        var nextDate = null;
        for (var d = 1; d <= 7; d++) {
            var candidate = new Date(now.getTime() + d * 86400000);
            if (orderDays.indexOf(candidate.getDay()) !== -1) {
                daysAway = d; nextDate = candidate; break;
            }
        }
        ORDER_LT_DAYS = daysAway < 999 ? daysAway : 4;

        var lt_source = (daysAway < 999) ? 'ventana_fija_proveedor' : 'default_sin_datos';
        ORDER_CONTRACTS = null;  // invalidar caché para que buildEventContext use el LT correcto

        var contracts = getOrderContracts();
        var events = (contracts.event_context && contracts.event_context.events) ? contracts.event_context.events : [];

        var periodoFin = now;
        var periodoInicio = new Date(now.getTime() - SR_CONFIG.maxAgeDays * 86400000);
        var produccionModo = 'INFERRED';
        var anomalias = [];
        try {
            for (var ki = 0; ki < localStorage.length; ki++) {
                var key = localStorage.key(ki);
                if (key && key.indexOf('fede_anomaly_') === 0) {
                    var raw = localStorage.getItem(key);
                    if (raw) anomalias.push(JSON.parse(raw));
                }
            }
        } catch(e) {}

        return {
            staleA: staleA,
            staleB: staleB,
            okA: okA,
            daysAway: daysAway,
            nextDate: nextDate,
            events: events,
            lt_source: lt_source,
            periodoInicio: periodoInicio,
            periodoFin: periodoFin,
            produccionModo: produccionModo,

    function getProductionEntries(skuId) {
        var entries = [];
        for (var i = 0; i < PROD_DATA.length; i++) {
            if (PROD_DATA[i].sku_id === skuId) entries.push(PROD_DATA[i]);
        }
        entries.sort(function(a, b) {
            return new Date(a.production_ts) - new Date(b.production_ts);
        });
        return entries;
    }

    function getDegradationLevel(skuId) {
        var entries = getProductionEntries(skuId);
        if (entries.length === 0) return 'FALLBACK_INFERRED';
        var now = Date.now();
        var MS_48H = 48 * 3600 * 1000;
        var hasFresh = false, hasStale = false;
        for (var i = 0; i < entries.length; i++) {
            var age = now - new Date(entries[i].production_ts).getTime();
            if (age < MS_48H) hasFresh = true;
            else hasStale = true;
        }
        if (hasFresh && !hasStale) return 'FULL_MEASURED';
        if (hasFresh)              return 'PARTIAL_MIXED';
        return 'FALLBACK_INFERRED';
    }

    function computeVirtualStock(skuId, currentStock, lastCountTs) {
        var entries = getProductionEntries(skuId);
        var lastCountTime = lastCountTs ? new Date(lastCountTs).getTime() : 0;
        var totalConsumed = 0;
        var lastEntryTime = 0;
        for (var i = 0; i < entries.length; i++) {
            var ets = new Date(entries[i].production_ts).getTime();
            if (ets > lastCountTime) {
                totalConsumed += entries[i].actual_consumed;
                if (ets > lastEntryTime) lastEntryTime = ets;
            }
        }
        var totalReceived = 0;
        for (var hi = 0; hi < HIST.length; hi++) {
            var h = HIST[hi];
            if (h.mode !== 'recepcion') continue;
            var hts = new Date(h.fecha).getTime();
            if (hts <= lastCountTime) continue;
            var hitems = h.items || [];
            for (var hii = 0; hii < hitems.length; hii++) {
                if (hitems[hii].prod === skuId) totalReceived += hitems[hii].qty || 0;
            }
        }
        var stockVirtual = currentStock - totalConsumed + totalReceived;
        var stalenessH = lastEntryTime > 0 ? (Date.now() - lastEntryTime) / 3600000 : 999;
        return {
            stock_virtual: Math.max(0, stockVirtual),
            staleness_h:   Math.round(stalenessH * 10) / 10,
            is_stale:      stalenessH > 48
        };
    }

    function computeEpsilonSeries(skuId) {
        var entries = getProductionEntries(skuId);
        if (entries.length === 0) return null;
        var now = Date.now();
        var MS_30D = 30 * 24 * 3600 * 1000;
        var MS_90D = 90 * 24 * 3600 * 1000;
        var eps30 = [], eps90 = [];
        var max30 = null;
        for (var i = 0; i < entries.length; i++) {
            var e = entries[i];
            if (!e.recipe_consumed || e.recipe_consumed === 0) continue;
            var eps_i = (e.actual_consumed - e.recipe_consumed) / e.recipe_consumed;
            var age = now - new Date(e.production_ts).getTime();
            if (age <= MS_30D) {
                eps30.push(eps_i);
                if (max30 === null || eps_i > max30) max30 = eps_i;
            }
            if (age <= MS_90D) eps90.push(eps_i);
        }
        function _mean(arr) {
            if (!arr.length) return null;
            var s = 0;
            for (var j = 0; j < arr.length; j++) s += arr[j];
            return Math.round(s / arr.length * 10000) / 10000;
        }
        var e30 = _mean(eps30);
        var e90 = _mean(eps90);
        return {
            eps_30d:     e30,
            eps_90d:     e90,
            eps_trend:   (e30 !== null && e90 !== null) ? Math.round((e30 - e90) * 10000) / 10000 : null,
            eps_max_30d: max30 !== null ? Math.round(max30 * 10000) / 10000 : null,
            n_lotes:     eps90.length
        };
    }

    // ── Módulo 8: Detección de Anomalías Sistémicas ──────────────────────────

    function computeAnomalyAlerts(skus) {
        var alerts = [];
        var ts = new Date().toISOString();
        for (var i = 0; i < skus.length; i++) {
            var s = skus[i];
            var eps = s.epsilon_stats;
            if (!eps || eps.n_lotes === null) continue;

            // M8-1: Merma sostenida — consumo real > 15% sobre ficha técnica
            if (eps.eps_30d !== null && eps.eps_30d > 0.15 && eps.n_lotes >= 5) {
                alerts.push({
                    rule:     'M8-1',
                    sku_id:   s.sku_id,
                    severity: eps.eps_30d >= 0.25 ? 'HIGH' : 'MEDIUM',
                    message:  'Merma sostenida: consumo real ' + Math.round(eps.eps_30d * 100) + '% sobre ficha técnica (ult. 30d, n=' + eps.n_lotes + ')',
                    eps_30d:  eps.eps_30d,
                    n_lotes:  eps.n_lotes,
                    detected_ts: ts
                });
            }

            // M8-2: Eficiencia anómala — consumo real < 10% bajo ficha técnica
            if (eps.eps_30d !== null && eps.eps_30d < -0.10 && eps.n_lotes >= 5) {
                alerts.push({
                    rule:     'M8-2',
                    sku_id:   s.sku_id,
                    severity: 'LOW',
                    message:  'Eficiencia anómala: consumo real ' + Math.abs(Math.round(eps.eps_30d * 100)) + '% bajo ficha técnica — revisar ficha o pesaje',
                    eps_30d:  eps.eps_30d,
                    n_lotes:  eps.n_lotes,
                    detected_ts: ts
                });
            }

            // M8-3: Tendencia creciente de merma
            if (eps.eps_trend !== null && eps.eps_trend > 0.05 && eps.eps_30d !== null && eps.eps_30d > 0.10) {
                alerts.push({
                    rule:     'M8-3',
                    sku_id:   s.sku_id,
                    severity: 'HIGH',
                    message:  'Tendencia creciente de merma: +' + Math.round(eps.eps_trend * 100) + '% vs base 90d — acción urgente',
                    eps_30d:  eps.eps_30d,
                    eps_trend: eps.eps_trend,
                    detected_ts: ts
                });
            }

            // M8-4: Spike puntual — algún lote en 30d superó 40% de desvío
            if (eps.eps_max_30d !== null && eps.eps_max_30d > 0.40) {
                alerts.push({
                    rule:     'M8-4',
                    sku_id:   s.sku_id,
                    severity: 'MEDIUM',
                    message:  'Spike puntual: un lote consumió ' + Math.round(eps.eps_max_30d * 100) + '% sobre ficha — revisar ese registro',
                    eps_max_30d: eps.eps_max_30d,
                    detected_ts: ts
                });
            }
        }
        return alerts;
    }

    function persistAnomalyAlerts(alerts) {
        try {
            // Limpiar alertas previas
            var toDelete = [];
            for (var ki = 0; ki < localStorage.length; ki++) {
                var k = localStorage.key(ki);
                if (k && k.indexOf('fede_anomaly_') === 0) toDelete.push(k);
            }
            for (var di = 0; di < toDelete.length; di++) localStorage.removeItem(toDelete[di]);
            // Guardar nuevas
            for (var ai = 0; ai < alerts.length; ai++) {
                var a = alerts[ai];
                var key = 'fede_anomaly_' + a.sku_id + '_' + a.rule;
                localStorage.setItem(key, JSON.stringify(a));
            }
        } catch(e) {}
    }

    function computeStructuredOutput(ctx) {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var contracts = getOrderContracts();

        var sessionId   = generateSessionId();
        var generatedTs = new Date().toISOString();
        var ltSrc       = ctx ? (ctx.lt_source || 'default_sin_datos') : 'default_sin_datos';

        var skus = [];
        var nReliable = 0, nProjected = 0, nStale = 0, nFeedback = 0, nMeasured = 0, nInferred = 0;
        var prodKeys = Object.keys(ABC_DATA);

        for (var i = 0; i < prodKeys.length; i++) {
            var prod = prodKeys[i];
            var abcEntry = ABC_DATA[prod];

            // Buscar currentStock y lastCountTs — siempre desde HIST para lastCountTs
            var currentStock = ORDER_TEMP_STOCK[prod] !== undefined ? ORDER_TEMP_STOCK[prod] : null;
            var lastCountTs = null;
            for (var hi = HIST.length - 1; hi >= 0; hi--) {
                var h = HIST[hi];
                if (h.mode !== 'stock') continue;
                var hitems = h.items || [];
                for (var hii = 0; hii < hitems.length; hii++) {
                    if (hitems[hii].prod === prod) {
                        if (currentStock === null) currentStock = hitems[hii].qty;
                        lastCountTs = h.fecha;
                        break;
                    }
                }
                if (lastCountTs !== null) break;
            }
            if (currentStock === null) currentStock = 0;

            // Módulo 7: modo de consumo y stock virtual
            var _degradLevel = getDegradationLevel(prod);
            var _isMeasured  = _degradLevel === 'FULL_MEASURED' || _degradLevel === 'PARTIAL_MIXED';
            var _vStockResult = null;
            var stockForCalc  = currentStock;
            if (_isMeasured) {
                _vStockResult = computeVirtualStock(prod, currentStock, lastCountTs);
                stockForCalc  = _vStockResult.stock_virtual;
            }
            var _epsSeries = computeEpsilonSeries(prod);

            var consumption = getConsumptionData_v3(prod, contracts);
            var qResult = computeOrderQty_v3(abcEntry, consumption, stockForCalc);
            var explanation = buildConsumptionExplanation(prod, abcEntry, qResult, consumption, currentStock);

            var skuOut = {
                sku_id:           prod,
                sku_name:         prod,
                clase:            abcEntry.clase,
                modo:             _isMeasured ? _degradLevel : 'INFERRED',
                confianza:        abcEntry.confidence,
                D_avg:            consumption ? consumption.D_avg : null,
                D_avg_ajustado:   qResult.feedback_flag ? qResult.D_used : null,
                D_recent_30d:     consumption ? consumption.D_recent_30d : null,
                CV:               consumption ? consumption.CV : null,
                z_factor:         qResult.z_used,
                z_source:         qResult.z_source,
                LT:               ORDER_LT_DAYS,
                lt_source:        ltSrc,
                SS:               qResult.SS,
                Q_star:           qResult.Q,
                current_stock:    currentStock,
                load_factor:      null,
                feedback_flag:    qResult.feedback_flag,
                unit:             consumption ? consumption.unit : '',
                explanation:      explanation,
                prompt_version:   '3.0',
                session_id:       sessionId,
                generated_ts:     generatedTs,
                epsilon_stats:    _epsSeries,
                stock_virtual:    _vStockResult ? _vStockResult.stock_virtual : null,
                staleness_h:      _vStockResult ? _vStockResult.staleness_h : null
            };

            if (abcEntry.confidence === 'RELIABLE')  nReliable++;
            else if (abcEntry.confidence === 'STALE') nStale++;
            else                                      nProjected++;

            if (qResult.feedback_flag) nFeedback++;
            if (_isMeasured) nMeasured++; else nInferred++;

            skus.push(skuOut);
        }

        var ltSummary = { override_manual: 0, ventana_fija: 0, mediana: 0, default: 0 };
        if (ltSrc === 'ventana_fija_proveedor') {
            ltSummary.ventana_fija = skus.length;
        } else {
            ltSummary.default = skus.length;
        }

        var feedbackApplied = [];
        for (var fi = 0; fi < skus.length; fi++) {
            if (skus[fi].feedback_flag) {
                feedbackApplied.push({ sku_id: skus[fi].sku_id, D_avg_old: skus[fi].D_avg, D_avg_new: skus[fi].D_avg_ajustado });
            }
        }

        // Módulo 6: reset de contador de feedback post-recalibración + hook H4
        for (var ri = 0; ri < feedbackApplied.length; ri++) {
            resetFeedbackForSku(feedbackApplied[ri].sku_id);
            _hookH4({
                sku_id:          feedbackApplied[ri].sku_id,
                D_avg_anterior:  feedbackApplied[ri].D_avg_old,
                D_avg_nuevo:     feedbackApplied[ri].D_avg_new,
                recalibrado_ts:  generatedTs,
                n_ajustes_usados: 3
            });
        }

        // Módulo 8: detección de anomalías sistémicas y persistencia
        var freshAnomalyAlerts = computeAnomalyAlerts(skus);
        persistAnomalyAlerts(freshAnomalyAlerts);

        var audit = {
            session_id:                   sessionId,
            generated_ts:                 generatedTs,
            prompt_version:               '3.0',
            total_skus:                   skus.length,
            skus_reliable:                nReliable,
            skus_projected:               nProjected,
            skus_stale:                   nStale,
            skus_feedback_applied:        nFeedback,
            skus_measured:                nMeasured,
            skus_inferred:                nInferred,
            anomaly_alerts:               freshAnomalyAlerts,
            feedback_retraining_applied:  feedbackApplied,
            lt_sources_summary:           ltSummary
        };

        return { skus: skus, audit: audit };
    }

    function renderOrderContext(ctx) {
        var listEl = document.getElementById('order-items-list');
        if (!listEl) return;
        var banner = document.getElementById('order-info-banner');
        if (!banner) return;

        var dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
        var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

        function fmtDate(d) {
            return d.getDate() + '/' + meses[d.getMonth()];
        }

    function renderVerificationScreen() {

                staleProds.push(prodKeys[i]);
            }
        }
        if (staleProds.length === 0) { renderSmartSuggestions(); return; }

        var now = Date.now();
        var html = '<div style="font-size:12px; color:var(--fede-on-surface-3); font-weight:600; margin-bottom:12px; padding-top:4px;">Ingresá el stock actual de estos productos:</div>';

        for (var si = 0; si < staleProds.length; si++) {

            var abcEntry = ABC_DATA[prod];

            var lastQty = 0, lastUnit = '', lastTs = abcEntry.lastTs || 0;
            for (var hi = HIST.length - 1; hi >= 0; hi--) {
                var h = HIST[hi];
                if (h.mode !== 'stock') continue;
                var hitems = h.items || [];
                for (var hii = 0; hii < hitems.length; hii++) {
                    if (hitems[hii].prod === prod) {
                        lastQty = hitems[hii].qty;
                        lastUnit = hitems[hii].unit || '';
                        break;
                    }
                }
                if (lastUnit) break;
            }
            var recepSince = 0;
            for (var ri = 0; ri < HIST.length; ri++) {
                var rh = HIST[ri];
                if (rh.mode !== 'recepcion') continue;
                if (new Date(rh.fecha).getTime() <= lastTs) continue;
                var rItems = rh.items || [];
                for (var rii = 0; rii < rItems.length; rii++) {
                    if (rItems[rii].prod === prod) { recepSince += rItems[rii].qty; break; }
                }
            }
            var expected = lastQty + recepSince;
            var initVal = ORDER_TEMP_STOCK[prod] !== undefined ? ORDER_TEMP_STOCK[prod] : '';

            html += '<div class="order-verify-row">';
            html += '<div class="order-verify-name">' + FeDe_Utils.sanitize(prod);
            html += '<div class="order-verify-meta">Hace ' + abcEntry.ageDays + 'd sin contar';
            if (recepSince > 0) html += ' · +' + recepSince + ' recibido';
            if (expected > 0) html += ' · Esperado: ~' + expected + (lastUnit ? ' ' + lastUnit : '');
            html += '</div></div>';
            html += '<div class="order-verify-stepper">';
            html += '<button onclick="verifyStep(\'' + prodEncoded + '\', -1)">−</button>';
            html += '<span id="vval-' + prodEncoded + '">' + (initVal !== '' ? initVal : '?') + '</span>';
            html += '<button onclick="verifyStep(\'' + prodEncoded + '\', 1)">+</button>';
            html += '</div></div>';

        html += '</div>';

        html += '<div style="display:flex; gap:10px; margin-top:12px;">';
        html += '<button class="btn-secondary-ctx" onclick="renderSmartSuggestions()" style="flex:1;">Saltar</button>';
        html += '<button class="btn-primary-ctx" onclick="renderSmartSuggestions()" style="flex:2;">Continuar →</button>';
        html += '</div>';

        listEl.innerHTML = html;
    }

    function verifyStep(prodEncoded, delta) {
        var prod = decodeURIComponent(prodEncoded);
        var el = document.getElementById('vval-' + prodEncoded);
        if (!el) return;
        var current = parseFloat(el.textContent);
        if (isNaN(current)) current = 0;
        var step = current < 5 ? 0.5 : 1;
        var next = Math.max(0, current + (delta > 0 ? step : -step));
        next = Math.round(next * 10) / 10;
        ORDER_TEMP_STOCK[prod] = next;
        el.textContent = next;
    }

    // ── Módulo 3 v3: Chain of Thought — funciones core ──────────────────────

    function getConsumptionData_v3(prod, contracts) {
        var moves = (contracts && contracts.movement_history) ? contracts.movement_history : [];
        var now = Date.now();
        var cutoff30 = now - 30 * 86400000;

        // Extraer stockEntries para este prod
        var stockEntries = [];
        for (var mi = 0; mi < moves.length; mi++) {
            var mv = moves[mi];
            if (mv.sku_id !== prod || mv.mode !== 'stock') continue;
            stockEntries.push({ ts: mv.ts, qty: mv.qty || 0, unit: mv.unit || '' });
        }
        stockEntries.sort(function(a, b) { return a.ts - b.ts; });
        if (stockEntries.length < 2) return null;

        var periods = [];
        var recentPeriods = [];
        var unit = stockEntries[stockEntries.length - 1].unit;

        for (var i = 1; i < stockEntries.length; i++) {
            var S0 = stockEntries[i-1].qty, t0 = stockEntries[i-1].ts;
            var S1 = stockEntries[i].qty,   t1 = stockEntries[i].ts;
            var dt = (t1 - t0) / 86400000;
            if (dt < 0.5) continue;

            var R = 0;
            for (var ri = 0; ri < moves.length; ri++) {
                var rm = moves[ri];
                if (rm.sku_id !== prod || rm.mode !== 'recepcion') continue;
                if (rm.ts <= t0 || rm.ts > t1) continue;
                R += rm.qty || 0;
            }
            var W = 0;
            for (var wi = 0; wi < moves.length; wi++) {
                var wm = moves[wi];
                if (wm.sku_id !== prod || wm.mode !== 'merma') continue;
                if (wm.ts <= t0 || wm.ts > t1) continue;
                W += wm.qty || 0;
            }

            var C_t = S0 + R - W - S1;
            if (C_t < 0) continue;
            var D_i = C_t / dt;
            periods.push({ val: D_i, t1: t1 });
        }
        if (periods.length < 2) return null;

        // Filtrar outliers
        var rawVals = [];
        for (var pi = 0; pi < periods.length; pi++) rawVals.push(periods[pi].val);
        var sortedRaw = rawVals.slice().sort(function(a,b){ return a - b; });
        var median = sortedRaw[Math.floor(sortedRaw.length / 2)];
        var valid = [], validRecent = [];
        for (var vi = 0; vi < periods.length; vi++) {
            if (periods[vi].val <= 3 * median) {
                valid.push(periods[vi].val);
                if (periods[vi].t1 >= cutoff30) validRecent.push(periods[vi].val);
            }
        }
        if (valid.length < 2) return null;

        var sum = 0;
        for (var si = 0; si < valid.length; si++) sum += valid[si];
        var D_avg = sum / valid.length;

        var varSum = 0;
        for (var vj = 0; vj < valid.length; vj++) varSum += Math.pow(valid[vj] - D_avg, 2);
        var sigma = Math.sqrt(varSum / valid.length);
        var CV = sigma / Math.max(D_avg, 0.001);

        // p25
        var sortedValid = valid.slice().sort(function(a,b){ return a-b; });
        var p25idx = Math.floor(0.25 * (sortedValid.length - 1));
        var p25 = sortedValid[p25idx];

        // D_recent_30d
        var D_recent_30d = D_avg;
        if (validRecent.length > 0) {
            var rSum = 0;
            for (var ri2 = 0; ri2 < validRecent.length; ri2++) rSum += validRecent[ri2];
            D_recent_30d = rSum / validRecent.length;
        }

        return { D_avg: D_avg, D_recent_30d: D_recent_30d, sigma: sigma, CV: CV, n: valid.length, p25: p25, unit: unit, periods: valid };
    }

    function computeOrderQty_v3(abcEntry, consumption, currentStock) {
        var LT = ORDER_LT_DAYS;
        var safetyDays = abcEntry.clase === 'A' ? SR_CONFIG.safety_days_A :
                         abcEntry.clase === 'B' ? SR_CONFIG.safety_days_B : SR_CONFIG.safety_days_C;
        var z_base = abcEntry.z_base || (abcEntry.clase === 'A' ? SR_CONFIG.z_A : abcEntry.clase === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C);

        // z dinámico por CV
        var CV = (consumption && consumption.CV) ? consumption.CV : 0;
        var z_used, z_source;
        if (CV > 0.5) {
            z_used = z_base * (1 + 0.5 * (CV - 0.5));
            if (z_used > z_base * 2.0) z_used = z_base * 2.0;
            z_source = 'dinamico_cv=' + CV.toFixed(2);
        } else {
            z_used = z_base;
            z_source = 'base_clase_' + abcEntry.clase;
        }

        // Safety stock
        var SS;
        if (consumption && consumption.n >= 3) {
            SS = z_used * consumption.sigma * Math.sqrt(LT);
        } else {
            SS = (consumption ? consumption.D_avg : 0) * safetyDays;
        }

        // D_base con flag conservative
        var D_base = (consumption && abcEntry.conservative && consumption.p25 > 0) ? consumption.p25 : (consumption ? consumption.D_avg : 0);

        // Feedback recalibración
        var feedback_flag = null;
        var D_used = D_base;
        try {
            var contracts = getOrderContracts();
            var fbHist = contracts.feedback_history || [];
            var cutoff30 = Date.now() - 30 * 86400000;
            var prod = abcEntry.sku_id || '';
            var dcEntries = [];
            for (var fi = 0; fi < fbHist.length; fi++) {
                var fb = fbHist[fi];
                if (fb.sku_id !== prod) continue;
                if (fb.reason_code !== 'demand_change') continue;
                var fbTs = fb.session_date ? new Date(fb.session_date).getTime() : 0;
                if (fbTs >= cutoff30) dcEntries.push(fb);
            }
            if (dcEntries.length >= 3) {
                var deltaSum = 0;
                for (var di = 0; di < dcEntries.length; di++) {
                    deltaSum += (dcEntries[di].adjusted_qty - dcEntries[di].suggested_qty);
                }
                var delta_D = (deltaSum / dcEntries.length) / Math.max(LT + safetyDays, 1);
                var D_calibrado = D_base + delta_D;
                if (D_calibrado < 0) D_calibrado = 0;
                if (D_calibrado > D_base * 3.0) D_calibrado = D_base * 3.0;
                D_used = D_calibrado;
                feedback_flag = 'D_AVG_RECALIBRADO_POR_FEEDBACK';
            }
        } catch(e) {}

        var need = D_used * (LT + safetyDays) + SS - (currentStock || 0);
        var Q_raw = Math.max(0, need);
        var Q = Q_raw < 10 ? Math.ceil(Q_raw * 2) / 2 : Math.ceil(Q_raw);

        return { Q: Q, z_used: z_used, z_source: z_source, SS: SS, safetyDays: safetyDays, D_used: D_used, feedback_flag: feedback_flag };
    }

    function buildConsumptionExplanation(prod, abcEntry, qResult, consumption, currentStock) {
        if (!consumption) {
            return 'Sin pares de conteo STOCK suficientes para calcular consumo.';
        }
        if (abcEntry && abcEntry.confidence === 'STALE') {
            var ageMax = abcEntry.clase === 'A' ? 7 : abcEntry.clase === 'B' ? 14 : 45;
            return 'Requiere conteo — último relevamiento hace más de ' + ageMax + ' días.';
        }
        var D_used   = qResult ? qResult.D_used   : consumption.D_avg;
        var z_source = qResult ? qResult.z_source  : '';
        var SS       = qResult ? qResult.SS        : 0;
        var safetyDays = qResult ? qResult.safetyDays : 2;
        var feedback_flag = qResult ? qResult.feedback_flag : null;

        var sigmaText = consumption.n >= 3 ? ' ±' + consumption.sigma.toFixed(2) : '';
        var unitTxt = consumption.unit ? ' ' + consumption.unit : '';
        var explanation = 'Consumo ~' + D_used.toFixed(2) + sigmaText + unitTxt + '/día (' + consumption.n + ' período' + (consumption.n !== 1 ? 's' : '') + '). ';
        explanation += 'Cubre ' + ORDER_LT_DAYS + 'd entrega + ' + SS.toFixed(1) + ' seguridad (' + z_source + ').';
        if (abcEntry && abcEntry.conservative) explanation += ' Pedido conservador (alta merma).';
        if (feedback_flag) explanation += ' [Demanda recalibrada por historial de ajustes]';
        return explanation;
    }

    function _sortedArray(arr) {
        var copy = arr.slice();
        copy.sort(function(a, b) { return a - b; });
        return copy;
    }

    function _percentile(arr, p) {
        if (!arr || arr.length === 0) return 0;
        var sorted = _sortedArray(arr);
        var idx = Math.floor(p / 100 * (sorted.length - 1));
        return sorted[idx];
    }

    function getConsumptionData(prod) {
        return getConsumptionData_v3(prod, getOrderContracts());

    function computeOrderQty(abcEntry, consumption, currentStock) {
        return computeOrderQty_v3(abcEntry, consumption, currentStock).Q;

    // ── Módulo 4: Render sugerencias smart ───────────────────────────────────

    var HiddenSkus = {
        _key: function() { return 'fede_hidden_skus_' + (typeof activeSheetId !== 'undefined' && activeSheetId ? activeSheetId : 'default'); },
        _data: null,
        _load: function() {
            if (!this._data) {
                try { this._data = JSON.parse(localStorage.getItem(this._key()) || '{}'); }
                catch(e) { this._data = {}; }
            }
            return this._data;
        },
        _persist: function() { try { localStorage.setItem(this._key(), JSON.stringify(this._data)); } catch(e) {} },
        has:    function(id) { return !!this._load()[id]; },
        add:    function(id) { this._load()[id] = 1; this._persist(); },
        remove: function(id) { delete this._load()[id]; this._persist(); },
        all:    function()   { return Object.keys(this._load()); },
        count:  function()   { return Object.keys(this._load()).length; },
        clear:  function()   { this._data = {}; this._persist(); },
        invalidateCache: function() { this._data = null; }
    };

    var ReactivatedSkus = {
        _key: function() { return 'fede_reactivated_skus_' + (typeof activeSheetId !== 'undefined' && activeSheetId ? activeSheetId : 'default'); },
        _data: null,
        _load: function() {
            if (!this._data) {
                try { this._data = JSON.parse(localStorage.getItem(this._key()) || '{}'); }
                catch(e) { this._data = {}; }
            }
            return this._data;
        },
        _persist: function() { try { localStorage.setItem(this._key(), JSON.stringify(this._data)); } catch(e) {} },
        has:    function(id) { return !!this._load()[id]; },
        add:    function(id) { this._load()[id] = 1; this._persist(); },
        remove: function(id) { delete this._load()[id]; this._persist(); },
        invalidateCache: function() { this._data = null; }
    };

    function hideSkuFromOrder(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        HiddenSkus.add(prod);
        renderSmartSuggestions();

    function unhideSkuFromOrder(prodEncoded) {
