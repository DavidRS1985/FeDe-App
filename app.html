<script>
    /* ——————————————————————————————————————————————————————————————————————————
       FeDe Gastro Pro - v11.0.18 — FOCACCIA Edition
       —————————————————————————————————————————————————————————————————————————— */

    var CATS = {}, HIST = [], relData = {}, currentMode = null, activeCat = null, CUSTOM_UNITS = {}, CONFIG = {};
    var units = ["unidad/es", "kg", "litro/s", "porción/es", "pack/s", "atado/s", "frasco/s", "lata/s"];
    var treeOpen = {};
    var activeSheetId = localStorage.getItem('fede_active_sheet_id') || 'undefined';
    var dbName = 'Master';
    
    /* ── UTILIDADES DE SEGURIDAD Y RENDIMIENTO ── */
    var FeDe_Utils = {
        sanitize: function(str) {
            if (typeof str !== 'string') return str;
            var temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        },
        debounce: function(func, wait) {
            var timeout;
            return function() {
                var context = this, args = arguments;
                clearTimeout(timeout);
                timeout = setTimeout(function() {
                    func.apply(context, args);
                }, wait);
            };
        },
        generateEntryId: function() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }
    };

    var IdGenerator = {
        generateEntryId: FeDe_Utils.generateEntryId
    };

    /**
     * API ADAPTER (Interface Adapter): Centraliza llamadas al servidor.
     */
    var FeDe_API = {
        call: function(serverName, params, success, failure) {
            var runner = google.script.run
                .withSuccessHandler(function(res) {
                    if (res && res.success === false) {
                        if (failure) failure(res.error || 'Error desconocido');
                        else showToast(res.error || 'Error en el servidor', 'error');
                    } else if (success) {
                        success(res);
                    }
                })
                .withFailureHandler(function(err) {
                    if (failure) failure(err.message);
                    else showToast('Error de conexión: ' + err.message, 'error');
                });
            
            // Ejecución dinámica
            if (params !== undefined && params !== null) {
                runner[serverName](params, activeSheetId);
            } else {
                runner[serverName](activeSheetId);
            }
        }
    };

    /* ── MEMORIA DE UNIDADES ── */
    var UNIT_MEM = {
        save: function (prod, unit) {
            var mem = JSON.parse(localStorage.getItem('fede_unit_mem') || '{}');
            mem[prod] = unit;
            localStorage.setItem('fede_unit_mem', JSON.stringify(mem));
        },
        get: function (prod) {
            var mem = JSON.parse(localStorage.getItem('fede_unit_mem') || '{}');
            return mem[prod] || null;
        }
    };

    /* ── GRUPOS DE UNIDADES INTELIGENTES ── */
    var UGRPS = {
        OILS: ["bidón/es", "litro/s", "botella/s", "kg"],
        LIQUIDS: ["litro/s", "botella/s", "lata/s"],
        PRODUCE: ["kg", "atado/s", "unidad/es", "cajón/es", "bolsa/s", "gr"],
        BREADS: ["unidad/es", "kg", "gr"],
        MEATS: ["kg", "pieza/s", "gr"],
        FISH: ["kg", "penca/s", "porción/es", "gr"],
        DAIRY: ["kg", "horma/s", "pieza/s", "gr", "unidad/es"],
        DRY: ["kg", "bolsa/s", "paquete/s", "gr"],
        EGGS: ["unidad/es", "docena", "maple"],
        UNITS: ["unidad/es", "pack/s", "docena"],
        GENERIC: ["unidad/es", "kg", "litro/s", "porción/es", "pack/s", "atado/s", "frasco/s", "lata/s"]
    };

    /* ── PANTALLA COMPLETA (Fullscreen API) ── */
    function toggleAppFullscreen() {
        var doc = document.documentElement;
        var isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

        if (!isFS) {
            // ENTRAR en pantalla completa
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
            localStorage.setItem('fede_fullscreen', 'true');
        } else {
            // SALIR de pantalla completa
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            localStorage.setItem('fede_fullscreen', 'false');
        }
    }

    // Actualizar icono cuando cambia el estado de fullscreen
    function onFullscreenChange() {
        var isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
        var btn = document.getElementById('btn-fullscreen');
        if (btn) {
            var icon = btn.querySelector('i');
            if (icon) {
                icon.setAttribute('data-lucide', isFS ? 'minimize' : 'maximize');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange', onFullscreenChange);

    // Auto-restaurar fullscreen en la primera interacción del usuario
    // Fullscreen auto-restore disabled by user request.

    /* ── LOADER PROGRESS LOGIC ── */
    var _loaderPerc = 0;
    var _loaderInterval = null;

    function updateLoader(p, msg) {
        var elPerc = document.getElementById('loader-perc');
        var elStatus = document.getElementById('loader-status');
        if (elPerc) elPerc.textContent = Math.floor(p) + '%';
        if (elStatus && msg) elStatus.textContent = msg;
        _loaderPerc = p;
    }

    /* ── SISTEMA DE CONFIRMACIÓN ESTÉTICO ── */
    var confirmCallback = null;
    function fConfirm(config, onConfirm) {
        var modal = document.getElementById('confirm-modal');
        var title = document.getElementById('confirm-title');
        var msg = document.getElementById('confirm-msg');
        var btnOk = document.getElementById('confirm-ok');
        var btnCancel = document.getElementById('confirm-cancel');

        if (!modal) {
            if (confirm(config.message)) onConfirm();
            return;
        }

        title.textContent = config.title || "¿Estás seguro?";
        msg.textContent = config.message || "Esta acción no puede deshacerse.";
        btnOk.textContent = config.okText || "SÍ, ELIMINAR";
        
        // Estilo condicional del botón OK
        if (config.type === 'info') {
            btnOk.style.background = 'var(--primary)';
            btnOk.style.color = 'var(--bg)';
            btnOk.style.boxShadow = '0 4px 20px rgba(255, 255, 255, 0.2)';
        } else {
            btnOk.style.background = 'var(--red)';
            btnOk.style.color = 'white';
            btnOk.style.boxShadow = '0 8px 24px rgba(225, 29, 72, 0.4)';
        }

        confirmCallback = onConfirm;
        modal.classList.add('open');

        btnOk.onclick = function() {
            modal.classList.remove('open');
            if (confirmCallback) {
                var cb = confirmCallback;
                confirmCallback = null;
                cb();
            }
        };

        btnCancel.onclick = function() {
            modal.classList.remove('open');
            confirmCallback = null;
        };
    }

    /* ── SISTEMA DE SINCRONIZACIÓN (SYNC OVERLAY) ── */
    function toggleSync(show, text) {
        var overlay = document.getElementById('sync-overlay');
        var txtEl = document.getElementById('sync-text');
        if (!overlay) return;
        
        if (show) {
            if (txtEl) txtEl.textContent = (text || "Sincronizando...").toUpperCase();
            overlay.classList.add('open');
        } else {
            overlay.classList.remove('open');
        }
    }

    function startInertiaProgress() {
        if (_loaderInterval) clearInterval(_loaderInterval);
        _loaderInterval = setInterval(function() {
            if (_loaderPerc < 92) {
                var inc = (92 - _loaderPerc) / 50; // Desacelera a medida que se acerca al final
                updateLoader(_loaderPerc + inc);
            }
        }, 100);
    }

    /* ── INIT ── */
    window.addEventListener('DOMContentLoaded', function () {
        console.log("FeDe Gastro Pro v11.0.18 - FOCACCIA Edition");
        updateLoader(15, "Iniciando sistema...");
        updateTime();
        setInterval(updateTime, 10000);

        // 🎨 CARGAR PREFERENCIA DE TAMAÑO DE ICONOS
        loadIconSizePreference();

        // 🔔 INICIALIZAR HOLIDAY ALERT
        window.holidayAlert = new HolidayAlert();
        window.holidayHelper = new HolidayStockHelper();

        // 📦 COLA OFFLINE
        window.offlineQueue = JSON.parse(localStorage.getItem('fede_offline_queue') || '[]');
        updateSyncBadge();
        window.addEventListener('online', processOfflineQueue);

        loadLocalSnapshot();

        // ⏱️ TIMEOUT DE SEGURIDAD PARA EL LOADER (7s máximo)
        var loaderTimeout = setTimeout(function () {
            console.warn('⚠️ Loader timeout - ocultando manualmente');
            hideLoader();
        }, 7000);

        window.loaderTimeout = loaderTimeout;

        updateLoader(30, "Conectando con servidor...");
        startInertiaProgress();
        loadConfigFromGAS();
    });

    /**
     * 🎨 SISTEMA DE TAMAÑO GLOBAL DE ICONOS
     */
    function loadIconSizePreference() {
        var savedSize = localStorage.getItem('fede_icon_size') || 'medium';
        setGlobalIconSize(savedSize);
        console.log('🎨 Icon size cargado:', savedSize);
    }

    function setGlobalIconSize(size) {
        var validSizes = ['small', 'medium', 'large'];
        if (validSizes.indexOf(size) === -1) size = 'medium';

        document.documentElement.setAttribute('data-icon-size', size);
        localStorage.setItem('fede_icon_size', size);

        var sizeButtons = document.querySelectorAll('[data-icon-control]');
        for (var i = 0; i < sizeButtons.length; i++) {
            var btn = sizeButtons[i];
            btn.classList.remove('active');
            if (btn.getAttribute('data-icon-control') === size) btn.classList.add('active');
        }

        console.log('🎨 Icon size actualizado:', size);
        refreshIcons();
    }

    function renderIconSizeControls() {
        // Feature disabled intentionally
    }

    function loadLocalSnapshot() {
        var snapKey = 'fede_snapshot_' + activeSheetId;
        var snap = JSON.parse(localStorage.getItem(snapKey) || 'null');
        if (snap) {
            console.log('📦 [CACHE] Usando snapshot local');
            CATS = snap.cats || {};
            FAVS = snap.favs || [];
            HIST = snap.history || [];
            if (snap.units) units = snap.units;
            if (snap.custom_units) CUSTOM_UNITS = snap.custom_units;
            renderCatGrid();
            renderTree();
            renderHistory();
            updateDBLabel();
        }
    }

    var HOLIDAYS = {
        '04-02': 'Día de Malvinas',
        '04-03': 'Viernes Santo',
        '05-01': 'Día del Trabajador',
        '05-25': 'Revolución de Mayo',
        '06-20': 'Día de la Bandera',
        '07-09': 'Día de la Independencia',
        '12-25': 'Navidad'
    };

    function updateTime() {
        var now = new Date();
        var days = ['DOMINGO', 'LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'];
        var dayEl = document.getElementById('hdr-day');
        var homeDayEl = document.getElementById('home-day');

        var dateStr = now.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
        var fullDay = days[now.getDay()] + " " + dateStr;

        if (dayEl) dayEl.textContent = fullDay;
        if (homeDayEl) homeDayEl.textContent = fullDay;
    }

    function setSyncStatus(st) {
        // st: 'online' | 'pending' | 'error'
        var el = document.getElementById('sync-status');
        if (!el) return;
        el.className = 'sync-status ' + st;
        var icon = el.querySelector('i');
        if (icon) {
            if (st === 'online') icon.setAttribute('data-lucide', 'cloud-check');
            else if (st === 'pending') icon.setAttribute('data-lucide', 'cloud-upload');
            else icon.setAttribute('data-lucide', 'cloud-off');
            refreshIcons();
        }
    }


    function loadConfigFromGAS() {
        console.log('⟳ [LOAD] Iniciando carga (Refactored Flow)...', activeSheetId);
        updateDBLabel();
        FeDe_API.call('getAppConfig', null, onConfigLoaded, function(err) {
            onConfigFailed(err);
        });
    }

    function onConfigLoaded(result) {
        console.log('✓ [LOAD] Config recibida:', result);
        // Cancelar timeout de seguridad
        if (window.loaderTimeout) clearTimeout(window.loaderTimeout);
        if (_loaderInterval) clearInterval(_loaderInterval);

        if (!result || !result.success) {
            console.error('❌ [LOAD] GAS devolvió error:', result ? result.error : 'Unknown');
            onConfigFailed(result ? result.error : 'Unknown error');
            return;
        }

        try {
            CONFIG = result.config || {};
            var config = CONFIG;
            var history = result.history || [];
            var ssName = result.ssName;

            if (ssName) {
                dbName = ssName;
                updateDBLabel();
                // Actualizar nombre de unidad activa en Home si existe el elemento
                var sheetNameEl = document.getElementById('active-sheet-name');
                if (sheetNameEl) sheetNameEl.textContent = ssName.toUpperCase();
            }

            if (config.cats) { CATS = config.cats; }
            if (config.units && config.units.length) { units = config.units; }
            if (config.custom_units) { CUSTOM_UNITS = config.custom_units; }

            // 🆔 Identidad de la App — acceso defensivo con null-check
            var titleVal = config.app_title || 'FeDe';
            var subtitleVal = config.app_subtitle || 'Gastro PRO';

            // App Header (siempre presente)
            var appHdrTitle = document.getElementById('app-hdr-title');
            var appHdrSub = document.getElementById('app-hdr-subtitle');
            if (appHdrTitle) appHdrTitle.textContent = titleVal;
            if (appHdrSub) appHdrSub.textContent = subtitleVal;

            // Settings inputs (opcionales)
            var cfgTitle = document.getElementById('cfg-app-title');
            var cfgSub = document.getElementById('cfg-app-subtitle');
            if (cfgTitle) cfgTitle.value = titleVal;
            if (cfgSub) cfgSub.value = subtitleVal;

            // Elementos legacy (pueden no existir)
            var legacyTitle = document.getElementById('app-title-display');
            var legacySub = document.getElementById('app-subtitle-display');
            if (legacyTitle) legacyTitle.textContent = titleVal;
            if (legacySub) legacySub.textContent = subtitleVal;

        } catch(e) {
            console.error('❌ [onConfigLoaded] Error aplicando config UI:', e.message);
        }

        try {
            if (result.history) { HIST = result.history; renderHistory(); }
            // Guardar snapshot para uso offline
            var snapKey = 'fede_snapshot_' + activeSheetId;
            var snapData = { cats: CATS, history: HIST, units: units, custom_units: CUSTOM_UNITS, ts: Date.now() };
            localStorage.setItem(snapKey, JSON.stringify(snapData));
            renderCatGrid();
            renderTree();
        } catch(e) {
            console.error('❌ [onConfigLoaded] Error renderizando datos:', e.message);
        }

        // Finalizar loader con éxito — SIEMPRE ejecutar esto
        updateLoader(100, 'Sistema listo');
        setTimeout(hideLoader, 300);

        // Callbacks post-carga secundarios — aislados para que errores no bloqueen
        setTimeout(function () {
            try { refreshIcons(); } catch(e) {}
            try { checkDraft(); } catch(e) {}
            try { renderHomeSummary(); } catch(e) { console.warn('renderHomeSummary falló:', e.message); }
            try { refreshGCalendar(); } catch(e) {}
            try { refreshBrandingUI(); } catch(e) {}
        }, 150);
    }

    function onConfigFailed(error) {
        console.error('❌ Error GAS:', error);
        // Cancelar timeout de seguridad
        if (window.loaderTimeout) clearTimeout(window.loaderTimeout);

        toast("⚠️ No se pudo conectar con servidor");
        var backupCats = localStorage.getItem('fede_cats_backup');
        var backupHist = localStorage.getItem('fede_history_backup');
        if (backupCats) CATS = JSON.parse(backupCats);
        if (backupHist) HIST = JSON.parse(backupHist);
        hideLoader();
        refreshIcons();
        checkDraft();
    }

    function hideLoader() {
        var loader = document.getElementById('loader');
        if (loader) {
            loader.style.opacity = '0';
            loader.style.pointerEvents = 'none';
            setTimeout(function () {
                loader.style.display = 'none';
                console.log('✓ Loader ocultado');
            }, 500);
        } else {
            console.warn('⚠️ Elemento loader no encontrado');
        }
    }

    function saveCatsToGAS(cats) {
        FeDe_API.call('saveConfig', { key: 'cats', value: cats }, function (result) {
            toast('✓ Guardado en servidor');
            localStorage.setItem('fede_cats_backup', JSON.stringify(cats));
        });
    }

    function addEntryToGAS(entry) {
        FeDe_API.call('addHistoryEntry', entry, function (result) {
            toast('✓ Registrado');
            loadConfigFromGAS();
        });
    }

    function deleteHistoryEntry(entryId) {
        FeDe_API.call('deleteHistoryEntry', entryId, function (res) {
            toast('✓ Borrado');
            loadConfigFromGAS();
        });
    }

    function deleteHistoryData(type) {
        FeDe_API.call('deleteHistory', type, function (res) {
            toast('✓ Historial limpiado'); 
            loadConfigFromGAS();
        });
    }

    function updateAppIdentity() {
        var title = document.getElementById('cfg-app-title').value;
        var subtitle = document.getElementById('cfg-app-subtitle').value;

        if (title) {
            document.getElementById('app-title-display').textContent = title;
            FeDe_API.call('saveConfig', { key: 'app_title', value: title });
        }
        if (subtitle) {
            document.getElementById('app-subtitle-display').textContent = subtitle;
            FeDe_API.call('saveConfig', { key: 'app_subtitle', value: subtitle });
        }
        toast("✓ Identidad actualizada");
    }

    function refreshBrandingUI() {
        var title = (document.getElementById('cfg-app-title') ? document.getElementById('cfg-app-title').value : null) || 'FEDE GASTRO PRO';
        var sub = (document.getElementById('cfg-app-subtitle') ? document.getElementById('cfg-app-subtitle').value : null) || "FOCACCIA EDITION";

        // Home
        var ht = document.getElementById('app-title-display');
        var hs = document.getElementById('app-subtitle-display');
        if (ht) ht.textContent = title;
        if (hs) hs.textContent = sub;

        // App Header
        var at = document.getElementById('app-hdr-title');
        var as = document.getElementById('app-hdr-subtitle');
        if (at) at.textContent = title;
        if (as) as.textContent = sub;
    }

    /**
     * CAMBIO DE ESTÉTICA DEL SISTEMA
     */
    function setSystemTheme(themeName) {
        if (themeName === APP_THEME) {
            toast('El tema ' + themeName.toUpperCase() + ' ya está activo');
            return;
        }

        var isMcf = (themeName === 'mcf');
        fConfirm({
            title: isMcf ? 'Activar McFetridge Method' : 'Restaurar Zinc Industrial',
            message: isMcf ? 'Esta nueva estética optimiza el contraste y la geometría. La aplicación se reiniciará para aplicar los cambios.' : 'Volverás a la estética clásica de v10. La aplicación se reiniciará.',
            okText: isMcf ? 'ACTIVAR MÉTODO' : 'RESTAURAR ZINC',
            type: 'info'
        }, function() {
            toggleSync(true, 'Aplicando diseño...');
            // Guardar preferencia en configuración para persistencia global
            FeDe_API.call('saveConfig', { key: 'app_theme', value: themeName }, function(res) {
                var base = window.location.href.split('?')[0];
                window.location.href = base + '?style=' + themeName;
            });
        });
    }

    function initThemeUI() {
        var btnZinc = document.getElementById('theme-btn-zinc');
        var btnMcf = document.getElementById('theme-btn-mcf');
        if (!btnZinc || !btnMcf) return;

        [btnZinc, btnMcf].forEach(function(b) {
            b.style.border = '2px solid var(--bd)';
            b.style.background = 'var(--s2)';
            var s = b.querySelector('span');
            if (s) s.style.color = 'var(--text)';
        });

        var active = (APP_THEME === 'mcf') ? btnMcf : btnZinc;
        var accent = (APP_THEME === 'mcf') ? '#1a1a1a' : 'var(--primary)';
        active.style.border = '3px solid ' + accent;
        active.style.background = 'var(--s1)';
        var span = active.querySelector('span');
        if (span) span.style.color = accent;
    }

    /* ── NAVEGACIÓN ── */
    function initRelevamiento(m) {
        enterMode(m);
        goTab('relevamiento');
        renderFAB();
    }

    // Mapa de colores por modo
    var MODE_CONFIG = {
        pedido: { label: 'PEDIDO', borderColor: 'var(--mcf-rose)', bg: 'var(--mcf-paper)' },
        stock: { label: 'STOCK', borderColor: 'var(--mcf-slate)', bg: 'var(--mcf-paper)' },
        entrante: { label: 'ENTRANTE', borderColor: 'var(--mcf-sage)', bg: 'var(--mcf-paper)' },
        recepcion: { label: 'RECEPCIÓN', borderColor: 'var(--mcf-sage)', bg: 'var(--mcf-paper)' },
        merma: { label: 'MERMA', borderColor: 'var(--mcf-mauve)', bg: 'var(--mcf-paper)' },
    };

    function showModeTag(m) {
        var tag = document.getElementById('mode-tag');
        if (!tag) return;
        var cfg = MODE_CONFIG[m];
        if (cfg) {
            tag.textContent = cfg.label;
            tag.className = 'mode-tag-lg ' + m;
            tag.classList.remove('hidden');
        } else {
            tag.classList.add('hidden');
            tag.textContent = '';
        }
    }

    function hideModeTag() {
        var tag = document.getElementById('mode-tag');
        if (tag) { tag.classList.add('hidden'); tag.textContent = ''; }
    }

    function enterMode(m) {
        currentMode = m;
        var hdr = document.getElementById('app-header');
        var cfg = MODE_CONFIG[m] || {};

        // Quitar clases de tema previas
        document.body.classList.remove('theme-stock', 'theme-entrante', 'theme-pedido', 'theme-recepcion', 'theme-merma');
        if (m === 'pedido') document.body.classList.add('theme-pedido');
        if (m === 'stock') document.body.classList.add('theme-stock');
        if (m === 'entrante' || m === 'recepcion') document.body.classList.add('theme-recepcion');
        if (m === 'merma') document.body.classList.add('theme-merma');

        showModeTag(m);
        showContextBar(m);

        if (hdr) {
            hdr.style.borderBottom = '2px solid ' + (cfg.borderColor || 'var(--bd)');
            hdr.style.boxShadow = '0 2px 20px ' + (cfg.glow || 'transparent');
        }
    }

    function enterAdmin() {
        currentMode = null;
        document.getElementById('home').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        hideModeTag();
        var hdr = document.getElementById('app-header');
        if (hdr) { hdr.style.borderBottom = '1px solid var(--bd)'; hdr.style.boxShadow = 'none'; }
        goTab('datos');
        renderTree();
        initThemeUI();
        setTimeout(function () { renderIconSizeControls(); }, 100);
        refreshIcons();
    }

    function enterDashboard() {
        currentMode = null;
        document.getElementById('home').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        hideModeTag();
        var hdr = document.getElementById('app-header');
        if (hdr) { hdr.style.borderBottom = '1px solid var(--bd)'; hdr.style.boxShadow = 'none'; }
        setBreadcrumb('dashboard');
        goTab('dashboard');
        renderDashboard();
        refreshIcons();
    }

    function goHome() {
        if (document.activeElement && document.activeElement.tagName === 'INPUT') document.activeElement.blur();
        if (currentMode && Object.keys(relData).length > 0) saveDraft();
        document.getElementById('app').classList.remove('visible');
        document.getElementById('home').classList.remove('hidden');
        var ps = document.getElementById('prod-section');
        if (ps) ps.classList.add('hidden');
        hideModeTag();
        hideContextBar();
        var hdr = document.getElementById('main-hdr');
        if (hdr) { hdr.style.borderBottom = ''; hdr.style.boxShadow = ''; }

        // Manejar estado de pestañas
        var views = document.querySelectorAll('.view');
        for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
        var tabs = document.querySelectorAll('.tab');

    /**
     * CONTROLLER LAYER: Orchestrates product row rendering.
     * Uses defensive mapping to ensure one broken product doesn't crash the UI.
     */
    function renderProducts() {
        if (!activeCat || !CATS[activeCat]) return;
        var list = document.getElementById('prod-list');
        if (!list) return;

        var prods = (CATS[activeCat].prods || []).slice().sort();
        if (prods.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:var(--mcf-ink);border:4px dashed var(--mcf-ink);padding:60px;text-transform:uppercase;font-weight:900;font-family:var(--mcf-font-display);">Categoría Vacía</div>';
            return;
        }

        var htmlBuffer = [];
        prods.forEach(function (p) {
            try {
                var rowHtml = genProductRow(p);
                htmlBuffer.push(rowHtml);
            } catch (e) {
                console.error('❌ [ARCH-ERR] Failed to render product:', p, e.message);
                htmlBuffer.push('<div style="padding:10px; color:var(--red); border:1px solid var(--red); margin:5px 0;">Error cargando: ' + FeDe_Utils.sanitize(p) + '</div>');
            }
        });

        list.innerHTML = htmlBuffer.join('');
        renderFAB();
        refreshIcons(list);
    }

    function genProductRow(p, prodUnits) {
        if (!Array.isArray(prodUnits)) prodUnits = getUnitsForProduct(activeCat, p);
        var ep = encodeURIComponent(p);
        var d = relData[p] || { qty: 0, unit: (prodUnits[0] || units[0]) };
        var is86 = d.qty === 86;
        var lastUsed = UNIT_MEM.get(p);
        var safeProd = FeDe_Utils.sanitize(p);

        var html = '<div data-prow="' + ep + '" class="prow ' + (d.qty > 0 ? 'has-qty' : '') + ' ' + (is86 ? 'is-86' : '') + '">' +
            '<!-- FILA 1: NOMBRE -->' +
            '<div class="pname">' + safeProd + '</div>' +
            
            '<!-- FILA 2: STEPPER -->' +
            '<div class="stepper">' +
            '<button class="step-btn" data-prod="' + ep + '" data-dir="-1" onclick="stepEl(this)">−</button>' +
            '<div class="pqty-box" onclick="manualEl(this)" data-prod="' + ep + '" style="touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; cursor:pointer;">' +
            '<div>' + (is86 ? '86' : (d.qty || '0')) + '</div>' +
            '<div style="font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-top:2px;">' + (is86 ? 'AGOTADO' : FeDe_Utils.sanitize(d.unit)) + '</div>' +
            '</div>' +
            '<button class="step-btn" data-prod="' + ep + '" data-dir="1" onclick="stepEl(this)">+</button>' +
            '</div>' +

            '<!-- FILA 3: UNIDADES (Flow-based) -->' +
            '<div class="unit-row">' +
            prodUnits.map(function (u) {
                var safeUnit = FeDe_Utils.sanitize(u);
                return '<div class="uchip ' + (d.unit === u ? 'active' : '') + ' ' + (u === lastUsed ? 'is-preferred' : '') + '" ' +
                    'data-prod="' + ep + '" data-unit="' + encodeURIComponent(u) + '" onclick="setUnitEl(this)">' +
                    (u === lastUsed ? '<i data-lucide="sparkles" style="width:12px;height:12px;margin-right:4px;"></i>' : '') + safeUnit +
                    '</div>';
            }).join('') +
            '</div>' +
            '</div>';
        return html;
    }

    function updateProductRow(p) {
        var ep = encodeURIComponent(p);
        var el = document.querySelector('[data-prow="' + ep + '"]');
        if (el) {
            el.outerHTML = genProductRow(p);
            // Re-renderizar iconos solo en ese elemento si fuera necesario (aquí no hay iconos vinculados a valores dinámicos pero por precaución:)
            // refreshIcons(document.querySelector('[data-prow="' + ep + '"]'));
        }
    }

    var refreshIcons = FeDe_Utils.debounce(function(root) {

            lucide.createIcons({ root: root });

        }
    }, 50);

    // filterProducts logic removed by user request.

    function formatUnit(q, u) {
        if (!u) return '';
        var pts = u.split('/');
        var sing = pts[0].trim();
        var singLower = sing.toLowerCase();

        // Si tiene formato con barra (ej: unidad/es), usamos la terminación
        var plur = pts.length > 1 ? sing + pts[1] : sing + 's';

        // Si es automático (sin barra), aplicamos reglas semánticas
        if (pts.length === 1) {
            // 1. Si ya termina en 's', no duplicar
            if (singLower.slice(-1) === 's') {
                plur = sing;
            } 
            // 2. Excepciones de terminaciones en español (unidad -> unidades)
            else if (singLower === 'unidad') plur = 'unidades';
            else if (singLower === 'porción' || singLower === 'porcion') plur = 'porciones';
            else if (singLower === 'bidón' || singLower === 'bidon') plur = 'bidones';
            else if (singLower === 'cajón' || singLower === 'cajon') plur = 'cajones';
            else if (singLower === 'pan') plur = 'panes';
        }

        return q === 1 ? sing : plur;
    }

    var UNIT_MAPPING = {
        "Huevos": UGRPS.EGGS,
        "Carnes": UGRPS.MEATS,
        "Aceite": UGRPS.LIQUIDS,
        "Lácteos": UGRPS.DAIRY,
        "Verduras": UGRPS.PRODUCE,
        "Cereales": UGRPS.DRY,
        "Frutas": UGRPS.PRODUCE,
        "Panes": UGRPS.BREADS,
        "Pescados": UGRPS.FISH,
        "Bebidas": UGRPS.LIQUIDS,
        "Condimentos": UGRPS.DRY,
        "Pastas": UGRPS.DRY,
        "Congelados": UGRPS.GENERIC
    };

    function getUnitsForProduct(catName, prodName) {
        if (prodName === undefined) prodName = '';
        if (prodName && CUSTOM_UNITS[prodName] && CUSTOM_UNITS[prodName].length > 0) return CUSTOM_UNITS[prodName];

        var baseUnits = UNIT_MAPPING[catName] || UGRPS.GENERIC;
        var p = prodName.toLowerCase();

        // Lógica Predictiva por Keywords
        if (p.indexOf('aceite') !== -1) baseUnits = UGRPS.OILS;
        else if (p.indexOf('pescado') !== -1 || p.indexOf('salmón') !== -1 || p.indexOf('salmon') !== -1 || p.indexOf('trucha') !== -1) baseUnits = UGRPS.FISH;
        else if (p.indexOf('pan') !== -1 || p.indexOf('miñon') !== -1 || p.indexOf('flauta') !== -1 || p.indexOf('felipe') !== -1) baseUnits = UGRPS.BREADS;
        else if (p.indexOf('queso') !== -1 || p.indexOf('jamón') !== -1 || p.indexOf('fiambre') !== -1 || p.indexOf('salame') !== -1 || p.indexOf('horma') !== -1) baseUnits = UGRPS.DAIRY;
        else if (p.indexOf('carne') !== -1 || p.indexOf('pollo') !== -1 || p.indexOf('cerdo') !== -1 || p.indexOf('vaca') !== -1 || p.indexOf('bife') !== -1) baseUnits = UGRPS.MEATS;
        else if (p.indexOf('huevo') !== -1) baseUnits = UGRPS.EGGS;
        else if (p.indexOf('vino') !== -1 || p.indexOf('cerveza') !== -1 || p.indexOf('gaseosa') !== -1 || p.indexOf('agua') !== -1) baseUnits = UGRPS.LIQUIDS;
        else if (p.indexOf('harina') !== -1 || p.indexOf('arroz') !== -1 || p.indexOf('fideo') !== -1 || p.indexOf('seca') !== -1) baseUnits = UGRPS.DRY;
        else if (p.indexOf('papa') !== -1 || p.indexOf('tomate') !== -1 || p.indexOf('lechuga') !== -1 || p.indexOf('cebolla') !== -1) baseUnits = UGRPS.PRODUCE;

        // Memoria de Usuario (Promover la última usada)
        var lastUsed = UNIT_MEM.get(prodName);
        if (lastUsed) {
            var finalUnits = baseUnits.slice();
            var idx = finalUnits.indexOf(lastUsed);
            if (idx !== -1) {
                finalUnits.splice(idx, 1);
                finalUnits.unshift(lastUsed);
            } else {
                finalUnits.unshift(lastUsed);
            }
            return finalUnits;
        }

        return baseUnits;
    }

    function setUnitEl(el) { setUnit(decodeURIComponent(el.dataset.prod), decodeURIComponent(el.dataset.unit)); }
    function setUnit(p, u) {
        if (!relData[p]) relData[p] = { qty: 0, unit: u };
        else relData[p].unit = u;
        UNIT_MEM.save(p, u); // Guardar en memoria
        updateProductRow(p); saveDraft();
    }

    function stepEl(el) { stepProd(decodeURIComponent(el.dataset.prod), parseInt(el.dataset.dir)); }
    function stepProd(p, dir) {
        if (!relData[p]) relData[p] = { qty: 0, unit: getUnitsForProduct(activeCat, p)[0] };

        // Moverse entre 0 y 86
        if (dir === -1 && relData[p].qty === 0) {
            relData[p].qty = 86;
        } else if (relData[p].qty === 86) {
            relData[p].qty = 0; // Cualquier dirección saca de 86 a 0
        } else {
            var step = (relData[p].unit === 'kg' || relData[p].unit === 'litro/s') ? 0.5 : 1;
            relData[p].qty = Math.max(0, parseFloat((relData[p].qty + dir * step).toFixed(2)));
        }

        // Limpieza: Si vuelve a 0 real, eliminar del relevamiento
        if (relData[p].qty === 0) delete relData[p];

        updateProductRow(p); renderFAB(); saveDraft();
    }

    var _currentManualProd = null;
    function manualEl(el) { manualEntry(decodeURIComponent(el.dataset.prod)); }
    function manualEntry(p) {
        if (!p) return;
        _currentManualProd = p;
        var currentQty = (relData[p] && relData[p].qty !== undefined) ? relData[p].qty : '';
        
        document.getElementById('manual-entry-title').textContent = p;
        var inp = document.getElementById('manual-entry-input');
        inp.value = currentQty;
        
        var modal = document.getElementById('modal-manual-entry');
        if (modal) {
            modal.style.display = 'block';
            setTimeout(function() {
                modal.classList.add('active');
                inp.focus();
                inp.select(); // auto-select para sobreescribir rápido
            }, 10);
        }
    }

    function closeManualEntryModal(e) {
        if (e && e.target && e.target.id === 'manual-entry-input') return; // Evitar cierre si hace tap repetido adentro
        var modal = document.getElementById('modal-manual-entry');
        if (modal) {
            modal.classList.remove('active');
            setTimeout(function() { modal.style.display = 'none'; }, 300);
        }
        _currentManualProd = null;
        var inp = document.getElementById('manual-entry-input');
        if (inp) inp.blur();
    }

    function saveManualEntry() {
        var p = _currentManualProd;
        if (!p) return closeManualEntryModal();
        
        var inp = document.getElementById('manual-entry-input');
        var val = inp.value;
        
        // Sanitización básica de entrada manual
        var cleanVal = (val || '').toString().replace(/[^\d.,]/g, '').replace(',', '.');
        var n = parseFloat(cleanVal);
        
        if (!isNaN(n) && n >= 0) {
            if (!relData[p]) relData[p] = { qty: n, unit: (units && units[0]) || '' };
            else relData[p].qty = n;
            if (relData[p].qty === 0) delete relData[p];
            updateProductRow(p); renderFAB(); saveDraft();
        } else if (val.trim().toUpperCase() === '86' || n === 86) {
            if (!relData[p]) relData[p] = { qty: 86, unit: (units && units[0]) || '' };
            else relData[p].qty = 86;
            updateProductRow(p); renderFAB(); saveDraft();
        }
        
        closeManualEntryModal();
    }

    function renderFAB() {
        var count = 0;
        Object.keys(relData).forEach(function (p) { if (relData[p].qty !== 0) count++; });

        var fab = document.getElementById('fab');
        var ctxCount = document.getElementById('ctx-count');
        var ctxBtn = document.getElementById('ctx-listo-btn');

        // Actualizar contador en la barra contextual
        if (ctxCount) ctxCount.textContent = count;
        if (ctxBtn) {
            ctxBtn.disabled = count === 0;
            if (count === 0) {
                ctxBtn.style.opacity = '0.4';
                ctxBtn.style.filter = 'grayscale(1)';
            } else {
                ctxBtn.style.opacity = '1';
                ctxBtn.style.filter = 'none';
            }
        }

        // El FAB clásico solo se muestra si la ctx-bar está oculta (no en modo relevamiento)
        var ctxBar = document.getElementById('ctx-bar');
        var ctxActive = ctxBar && !ctxBar.classList.contains('hidden');
        if (!ctxActive) {
            if (count > 0) {
                if (fab) {
                    fab.classList.remove('hidden');
                    fab.style.opacity = '1';
                    fab.style.pointerEvents = 'auto';
                    document.getElementById('fab-count').textContent = count;
                }
            } else {
                if (fab) fab.classList.add('hidden');
            }
        } else {
            if (fab) fab.classList.add('hidden'); // FAB reemplazado por ctx-bar
        }
    }

    function openResumen() {

    function saveToCloud(doClear) {
        toggleSync(true, 'Guardando en la nube...');
        if (doClear === undefined) doClear = true;
        var items = [];
        var prods = Object.keys(relData);
        for (var i = 0; i < prods.length; i++) {
            var prod = prods[i];
            var d = relData[prod];
            if (d.qty === 0) continue; // ❌ No guardar ceros en la nube

            var cat = 'Otros';
            Object.keys(CATS).forEach(function (c) { if (CATS[c].prods.indexOf(prod) !== -1) cat = c; });
            items.push({ prod: prod, cat: cat, qty: d.qty, unit: d.unit });
        }
        if (!items.length) { 
            toggleSync(false);
            toast("⚠️ No hay datos para guardar"); 
            return; 
        }

        var entryId = IdGenerator.generateEntryId();
        var tEl = document.getElementById('hdr-turno');
        var turno = (tEl && tEl.textContent) ? tEl.textContent : 'Apertura';
        var entry = {
            id: entryId,
            fecha: new Date().toISOString(),
            turno: turno,
            mode: currentMode || 'stock',
            items: items,
            total: items.length,
            motivo: (currentMode === 'merma' && selectedMotivo) ? selectedMotivo : ''
        };

        // 🟢 AUTO-DISMISS ALERT: Si es un control de stock, descartamos la alerta obligatoria
        if ((currentMode || 'stock') === 'stock' && window.holidayAlert) {
            window.holidayAlert.dismissStockCard("CONTROL DE STOCK");
        }

        setSyncStatus('pending');
        FeDe_API.call('addHistoryEntry', entry, function() {
            toggleSync(false);
            HIST.unshift(entry);
            toast("✓ ¡Sincronizado!");
            if (doClear) {
                relData = {};
                localStorage.removeItem('fede_draft');
                renderFAB(); closeResumen(); goHome();
            }
            setSyncStatus('online');
            processOfflineQueue(); // Verificar si hay más
        }, function(err) {
            toggleSync(false);
            enqueueEntry(entry);
            if (doClear) {
                relData = {};
                localStorage.removeItem('fede_draft');
                renderFAB(); closeResumen(); goHome();
            }
            setSyncStatus('error');
        });
    }

    function enqueueEntry(entry) {
        window.offlineQueue.push(entry);
        localStorage.setItem('fede_offline_queue', JSON.stringify(window.offlineQueue));
        updateSyncBadge();
        toast("⚠️ Sin conexión. Guardado en cola local.");
    }

    function updateSyncBadge() {

        if (badge && count) {
            if (window.offlineQueue.length > 0) {
                badge.classList.remove('hidden');
                count.textContent = window.offlineQueue.length;
            } else {
                badge.classList.add('hidden');
            }
        }
    }

    var isSyncing = false;
    function processOfflineQueue() {
        if (isSyncing || window.offlineQueue.length === 0) return;
        isSyncing = true;
        var entry = window.offlineQueue[0];

        FeDe_API.call('addHistoryEntry', entry, function () {
            window.offlineQueue.shift();
            localStorage.setItem('fede_offline_queue', JSON.stringify(window.offlineQueue));
            updateSyncBadge();
            isSyncing = false;
            if (window.offlineQueue.length > 0) processOfflineQueue();
            else toast("✓ Todos los datos sincronizados");
        }, function () {
            isSyncing = false;
        });
    }

    function renderDashboardCalendar() {
        var calEl = document.getElementById('dash-calendar');
        if (!calEl) return;

        var now = new Date();
        var year = now.getFullYear();
        var month = now.getMonth();
        var today = now.getDate();

        // Días del mes (Lunes a Domingo)
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var firstDayIndex = new Date(year, month, 1).getDay();
        var emptyStartDays = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

        // Map history entries
        var histByDate = {};
        if (HIST && HIST.length) {
            for (var k = 0; k < HIST.length; k++) {
                var h = HIST[k];
                var dObj = new Date(h.fecha);
                if (isNaN(dObj)) continue;
                
                var key = dObj.getFullYear() + '-' + 
                          ((dObj.getMonth() + 1) < 10 ? '0' + (dObj.getMonth() + 1) : (dObj.getMonth() + 1)) + '-' + 
                          (dObj.getDate() < 10 ? '0' + dObj.getDate() : dObj.getDate());
                
                if (!histByDate[key]) histByDate[key] = [];
                var mode = (h.modo || h.mode || 'stock').toLowerCase();
                if (histByDate[key].indexOf(mode) === -1) histByDate[key].push(mode);
            }
        }

        var html = '';
        for (var i = 0; i < emptyStartDays; i++) html += '<div class="cal-day empty"></div>';

        for (var d = 1; d <= daysInMonth; d++) {
            var mNum = month + 1;
            var curKey = year + '-' + (mNum < 10 ? '0' + mNum : mNum) + '-' + (d < 10 ? '0' + d : d);
            var isToday = (d === today && month === now.getMonth() && year === now.getFullYear());
            var activities = histByDate[curKey] || [];
            
            var dots = '';
            if (activities.indexOf('pedido') !== -1) dots += '<div class="cal-dot cal-dot-pedido"></div>';
            if (activities.indexOf('stock') !== -1) dots += '<div class="cal-dot cal-dot-stock"></div>';
            if (activities.indexOf('recepcion') !== -1 || activities.indexOf('entrante') !== -1) dots += '<div class="cal-dot cal-dot-recepcion"></div>';
            if (activities.indexOf('merma') !== -1) dots += '<div class="cal-dot cal-dot-merma"></div>';

            html += '<div class="cal-day ' + (isToday ? 'today' : '') + '" onclick="openHistoryAtDate(\'' + curKey + '\')">' +
                    '<span class="cal-date-num">' + d + '</span>' +
                    '<div class="cal-indicators">' + dots + '</div>' +
                    '</div>';
        }
        calEl.innerHTML = html;
    }

    function openHistoryAtDate(dateStr) {
        histFilters.from = dateStr;
        histFilters.to = dateStr;
        histFilters.mode = 'all'; // Asegurar que vemos todo

        // Actualizar visualmente los inputs y selectores
        var dateFrom = document.getElementById('hist-date-from');
        var dateTo = document.getElementById('hist-date-to');
        var modeFilter = document.getElementById('hist-mode-filter');

        if (dateFrom) dateFrom.value = dateStr;

    function setHistFilter(type, val, el) {

        if (el && el.parentNode) {

    var histLimit = 20;
    function renderHistory(loadMore) {
        if (loadMore === undefined) loadMore = false;
        if (!loadMore) histLimit = 20;
        var list = document.getElementById('hist-list');
        if (!list) return;

        // Bloqueo sutil de UI para feedback
        if (!loadMore) list.style.opacity = '0.5';

        var filtered = HIST.slice().sort(function (a, b) {
            var dateA = new Date(a.fecha);
            var dateB = new Date(b.fecha);
            return dateB - dateA;
        });

        // 1. Filtrar por Modo
        if (histFilters.mode !== 'all') {
            var modeToFilter = histFilters.mode;
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                var h = filtered[i];
                var m = (h.modo || h.mode || 'stock').toLowerCase();
                var match = false;
                if (modeToFilter === 'recepcion') match = (m === 'recepcion' || m === 'entrante');
                else match = (m === modeToFilter);
                if (match) newList.push(h);
            }
            filtered = newList;
        }

        // 2. Filtrar por Fechas usando hora local explícita
        if (histFilters.from) {
            var fromParts = histFilters.from.split('-');
            var fromD = new Date(fromParts[0], fromParts[1] - 1, fromParts[2], 0, 0, 0, 0);
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                if (new Date(filtered[i].fecha) >= fromD) newList.push(filtered[i]);
            }
            filtered = newList;
        }
        if (histFilters.to) {
            var toParts = histFilters.to.split('-');
            var toD = new Date(toParts[0], toParts[1] - 1, toParts[2], 23, 59, 59, 999);
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                if (new Date(filtered[i].fecha) <= toD) newList.push(filtered[i]);
            }
            filtered = newList;
        }

        // 3. Filtrar por Búsqueda (Soporta producto o categoría con Motor PRO)
        if (histFilters.query) {
            var q = normalizeStr(histFilters.query.trim());
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                var h = filtered[i];
                var bestIdx = -1;
                var items = h.items || [];
                
                for (var j = 0; j < items.length; j++) {
                    var np = normalizeStr(items[j].prod);
                    var nc = items[j].cat ? normalizeStr(items[j].cat) : '';
                    
                    var idxP = np.indexOf(q);
                    var idxC = nc.indexOf(q);
                    
                    if (idxP !== -1) {
                        bestIdx = (bestIdx === -1) ? idxP : Math.min(bestIdx, idxP);
                    } else if (idxC !== -1) {
                        bestIdx = (bestIdx === -1) ? idxC : Math.min(bestIdx, idxC);
                    }
                }

                if (bestIdx !== -1) {
                    h._searchIdx = bestIdx;
                    newList.push(h);
                }
            }

            // Aplicar Relevancia PRO preservando fecha en empate
            newList.sort(function(a, b) {
                var startsA = a._searchIdx === 0;
                var startsB = b._searchIdx === 0;
                
                // 1. Prioridad: comienza exactamente con la palabra
                if (startsA && !startsB) return -1;
                if (startsB && !startsA) return 1;
                
                // 2. Prioridad: posición del match (más cercano a 0)
                if (a._searchIdx !== b._searchIdx) return a._searchIdx - b._searchIdx;
                
                // 3. Prioridad: más reciente primero (mantener orden cronológico del historial)
                var dateA = new Date(a.fecha);
                var dateB = new Date(b.fecha);
                return dateB - dateA;
            });
            filtered = newList;
        }

        var totalFound = filtered.length;
        var visible = filtered.slice(0, histLimit);

        if (!totalFound) {
            list.innerHTML = '<p style="text-align:center;padding:40px;color:var(--dim);">No hay registros ' + (histFilters.mode !== 'all' ? ('de ' + histFilters.mode) : '') + ' aún.</p>';
            list.style.opacity = '1';
            return;
        }

        var html = '';
        for (var i = 0; i < visible.length; i++) {
            var h = visible[i];
            var items = Array.isArray(h.items) ? h.items : [];
            var _m = (h.modo || h.mode || 'stock').toLowerCase();
            var _ms;
            if (_m === 'pedido') {
                _ms = { color: 'var(--orange)', bg: 'var(--bg-alt)', border: 'var(--orange)', label: '🟠 PEDIDO' };
            } else if (_m === 'stock') {
                _ms = { color: 'var(--blue)', bg: 'var(--bg-alt)', border: 'var(--blue)', label: '🔵 STOCK' };
            } else if (_m === 'merma') {
                _ms = { color: 'var(--violet)', bg: 'var(--bg-alt)', border: 'var(--violet)', label: '🟣 MERMA' };
            } else {
                _ms = { color: 'var(--green)', bg: 'var(--bg-alt)', border: 'var(--green)', label: '🟢 RECEPCIÓN' };
            }

            var motivoLine = (h.motivo) ? '<div style="font-size:11px; color:var(--violet); font-weight:700; margin-top:4px;">Motivo: ' + h.motivo + '</div>' : '';

            html += '<div class="dash-card" id="hist-card-' + h.id + '" onclick="toggleHistExpand(\'' + h.id + '\')">' +
                '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">' +
                '<span style="font-weight:800; color:' + _ms.color + '; background:' + _ms.bg + '; border:1px solid ' + _ms.border + '; padding:5px 14px; border-radius:14px; font-size:12px; font-family:\'Outfit\',sans-serif;">' + _ms.label + '</span>' +
                '<div style="display:flex; gap:8px;">' +
                '<button onclick="event.stopPropagation();editHistEntry(\'' + h.id + '\')" style="background:var(--s2); border:1px solid var(--bd); border-radius:8px; padding:6px 10px; color:var(--text); font-size:14px;">✏️</button>' +
                '<button onclick="event.stopPropagation();deleteHistEntryManual(\'' + h.id + '\')" style="background:rgba(224,82,82,0.1); border:1px solid var(--red); border-radius:8px; padding:6px 10px; color:var(--red); font-size:14px;">🗑️</button>' +
                '</div>' +
                '</div>' +
                '<div style="font-weight:800; font-size:20px; font-family:\'Outfit\',sans-serif; color:var(--text);">' + h.total + ' <span style="font-size:14px; font-weight:600; color:var(--dim);">items</span></div>' +
                '<div style="font-size:12px; color:var(--dim); font-weight:700; margin-top:2px;">' + new Date(h.fecha).toLocaleString('es-AR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) + '</div>' +
                motivoLine +
                '<div id="hist-expanded-' + h.id + '" class="hidden" style="margin-top:16px; padding-top:16px; border-top:1.5px solid var(--bd2); transition: all 0.3s ease;">' +
                '<!-- Lazy loaded items here -->' +
                '</div>' +
                '</div>';
        }

        if (totalFound > histLimit) {
            html += '<button onclick="histLimit += 20; renderHistory(true)" class="wa-btn" style="width:100%; margin-top:20px; background:var(--s2); border:1.5px solid var(--bd); color:var(--text2); font-size:12px; height:48px;">' +
                'MOSTRAR MÁS (' + (totalFound - histLimit) + ' restantes)' +
                '</button>';
        }

        list.innerHTML = html;
        list.style.opacity = '1';
        setTimeout(function () { refreshIcons(); }, 100);
    }

    function searchEditHistProduct(q) {
        var res = document.getElementById('edit-hist-search-results');
        if (!q || q.length < 2) { if (res) res.style.display = 'none'; return; }

        var matches = [];
        var query = q.toLowerCase();

        var catKeys = Object.keys(CATS);
        for (var i = 0; i < catKeys.length; i++) {
            var cat = catKeys[i];
            for (var j = 0; j < CATS[cat].prods.length; j++) {
                var p = CATS[cat].prods[j];
                if (p.toLowerCase().indexOf(query) !== -1) {
                    var found = false;
                    for (var k = 0; k < editingHistItems.length; k++) { if (editingHistItems[k].prod === p) { found = true; break; } }
                    if (!found) matches.push({ prod: p, cat: cat });
                }
            }
        }

        if (!matches.length) { if (res) res.style.display = 'none'; return; }

        var matchHtml = '';
        var limited = matches.slice(0, 10);
        for (var l = 0; l < limited.length; l++) {
            var m = limited[l];
            matchHtml += '<div onclick="addHistEntryProduct(\'' + m.prod.replace(/'/g, "\\'") + '\', \'' + m.cat.replace(/'/g, "\\'") + '\')" ' +
                'style="padding:12px 16px; border-bottom:1px solid var(--bd2); cursor:pointer; font-size:14px; color:var(--text); font-weight:600; display:flex; justify-content:space-between; align-items:center;">' +
                '<span>' + m.prod + '</span>' +
                '<span style="font-size:10px; color:var(--primary); opacity:0.7;">' + m.cat + '</span>' +
                '</div>';
        }
        if (res) {
            res.innerHTML = matchHtml;
            res.style.display = 'block';
        }
    }

    function addHistEntryProduct(prod, cat) {
        var productUnits = getUnitsForProduct(cat, prod);
        var defaultUnit = productUnits[0];
        editingHistItems.push({
            prod: prod,
            qty: 1,
            unit: defaultUnit,
            cat: cat
        });

        UNIT_MEM.save(prod, defaultUnit);

        var sInput = document.getElementById('edit-hist-search');
        if (sInput) sInput.value = '';
        var sRes = document.getElementById('edit-hist-search-results');
        if (sRes) sRes.style.display = 'none';

        renderEditHistItems();
        toast("+ " + prod);

    function toast(m, d) { if (d === undefined) d = 2500; var t = document.getElementById('toast'); if (t) { t.textContent = m; t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, d); } }

    /* ── FULLSCREEN ── */
    var fsCurrentCat = null, fsProducts = [], fsCurrentIdx = 0;
    function enterFullscreenMode() { if (!activeCat) return toast("Selecciona categoría"); fsCurrentCat = activeCat; fsProducts = (CATS[fsCurrentCat].prods || []).slice().sort(); fsCurrentIdx = 0; document.getElementById('prod-fullscreen').classList.add('active'); renderFSProduct(); }
    function exitFullscreenMode() { document.getElementById('prod-fullscreen').classList.remove('active'); saveDraft(); renderFAB(); }
    function renderFSProduct() {
        var prod = fsProducts[fsCurrentIdx];
        var d = relData[prod] || { qty: 0, unit: getUnitsForProduct(fsCurrentCat, prod)[0] };
        document.getElementById('prod-fs-cat').textContent = fsCurrentCat.toUpperCase();
        document.getElementById('prod-fs-name-sm').textContent = prod;
        document.getElementById('prod-fs-name').textContent = prod;

        var lastUsed = UNIT_MEM.get(prod);
        var pUnits = getUnitsForProduct(fsCurrentCat, prod);
        var unitHtml = '';
        for (var i = 0; i < pUnits.length; i++) {
            var u = pUnits[i];
            unitHtml += '<div class="prod-fs-uchip ' + (d.unit === u ? 'active' : '') + ' ' + (u === lastUsed ? 'is-preferred' : '') + '" ' +
                'onclick="fsSetUnit(\'' + u + '\', \'' + prod.replace(/'/g, "\\'") + '\')">' +
                (u === lastUsed ? '<i data-lucide="sparkles" style="width:10px;height:10px;margin-right:2px;"></i>' : '') + u +
                '</div>';
        }
        document.getElementById('prod-fs-unit-row').innerHTML = unitHtml;

        setTimeout(function () { refreshIcons(); }, 50);

        var v = document.getElementById('prod-fs-stepval');
        if (d.qty === 86) { v.textContent = '86'; v.classList.add('is-86'); }
        else { v.textContent = d.qty || '—'; v.classList.remove('is-86'); }
        document.getElementById('prod-fs-counter').textContent = (fsCurrentIdx + 1) + ' / ' + fsProducts.length;
    }
    function fsSetUnit(u, prod) {
        if (!relData[prod]) relData[prod] = { qty: 0, unit: u };
        else relData[prod].unit = u;
        UNIT_MEM.save(prod, u);
        renderFSProduct();
        saveDraft();
    }
    function fsStepProd(dir) {
        var prod = fsProducts[fsCurrentIdx];
        if (!relData[prod]) relData[prod] = { qty: 0, unit: getUnitsForProduct(fsCurrentCat, prod)[0] };
        var step = (relData[prod].unit === 'kg' || relData[prod].unit === 'litro/s') ? 0.5 : 1;
        relData[prod].qty = Math.max(0, parseFloat((relData[prod].qty + dir * step).toFixed(2)));
        if (relData[prod].qty === 0) delete relData[prod];
        renderFSProduct(); saveDraft();
    }
    function fs86() { var p = fsProducts[fsCurrentIdx]; relData[p] = { qty: 86, unit: (relData[p] && relData[p].unit) || units[0] }; toast("⚠️ 86"); saveDraft(); setTimeout(function () { fsNext(); }, 500); }
    function fsNext() { if (fsCurrentIdx < fsProducts.length - 1) { fsCurrentIdx++; renderFSProduct(); } else { exitFullscreenMode(); toast("✓ Fin"); } }
    function fsPrev() { if (fsCurrentIdx > 0) { fsCurrentIdx--; renderFSProduct(); } }
    function fsManualEntry() {
        var p = fsProducts[fsCurrentIdx]; var val = prompt('Cantidad:', (relData[p] && relData[p].qty) || '');
        if (val !== null) {
            var n = parseFloat(val.replace(',', '.'));
            if (!isNaN(n)) { relData[p] = { qty: n, unit: (relData[p] && relData[p].unit) || units[0] }; renderFSProduct(); saveDraft(); }
        }
    }

    function renderHomeSummary() {
        var el = document.getElementById('home-alerts-card');
        if (!el) return;

        var alerts = [];
        var now = new Date();

        // 1. Trabajo Pendiente (Draft) - HIGHEST PRIORITY
        var draftStr = localStorage.getItem('fede_draft');
        var draft = draftStr ? JSON.parse(draftStr) : null;
        if (draft && draft.items && Object.keys(draft.items).length > 0) {
            alerts.unshift({ 
                icon: 'database', 
                color: 'var(--mcf-amber)', 
                title: 'RESUMIR TRABAJO', 
                desc: 'Borrador sin guardar detectado', 
                urgent: true,
                action: 'restoreDraft'
            });
        }

        // 2. Próximo Pedido Programado
        var orderDays = (CONFIG.orderDays && CONFIG.orderDays.length > 0) ? CONFIG.orderDays : [1, 4];
        var todayIdx = now.getDay();
        var minDiff = 8;
        for (var i = 0; i < orderDays.length; i++) {
            var diff = (orderDays[i] - todayIdx + 7) % 7;
            if (diff < minDiff) minDiff = diff;
        }

        var orderTitle = 'Próximo Pedido';
        var orderDesc = minDiff === 0 ? 'HACER HOY' : (minDiff === 1 ? 'MAÑANA' : 'En ' + minDiff + ' días');
        alerts.push({ 
            icon: minDiff === 0 ? 'truck' : 'clock', 
            color: 'var(--mcf-amber)', 
            title: orderTitle, 
            desc: orderDesc, 
            urgent: minDiff <= 1,
            action: "initRelevamiento('pedido')" 
        });

        // 3. Control obligatorio (ej: Domingos y Martes)
        var day = now.getDay();
        if (day === 0 || day === 2) {
            var isDone = sessionStorage.getItem('fede_stock_done') === 'CONTROL DE STOCK';
            if (!isDone) {
                alerts.push({ 
                    icon: 'alert-octagon', 
                    color: 'var(--mcf-slate)', 
                    title: 'Control Obligatorio', 
                    desc: 'Falta registro de hoy', 
                    urgent: true,
                    action: "initRelevamiento('stock')"
                });
            }
        }

        // 4. Feriados próximos
        if (typeof getUpcomingHolidays === 'function') {
            var upcoming = getUpcomingHolidays(7);
            for (var i = 0; i < upcoming.length; i++) {
                var h = upcoming[i];
                var diffMs = h.date.getTime() - now.getTime();
                var daysLeft = Math.ceil(diffMs / (1000 * 3600 * 24));
                var timeText = daysLeft <= 0 ? 'Es hoy' : (daysLeft === 1 ? 'Mañana' : 'En ' + daysLeft + ' días');
                alerts.push({ icon: 'calendar', color: 'var(--mcf-rose)', title: h.name, desc: timeText });
            }
        }

        // Render with Toggle Support
        var isExpanded = el.classList.contains('expanded');
        var html = '<div class="mcf-status-title" onclick="toggleHomeAlerts()" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">' +
                   '<div style="display:flex; align-items:center; gap:12px;">' +
                   '<i data-lucide="zap" style="width:16px;"></i>' +
                   'ALERTAS OPERATIVAS' +
                   '</div>' +
                   '<i data-lucide="' + (isExpanded ? 'chevron-up' : 'chevron-down') + '" style="width:16px; opacity:0.5;"></i>' +
                   '</div>';

        html += '<div id="home-alerts-content" class="mcf-alerts-collapsible ' + (isExpanded ? 'expanded' : '') + '">';
        
        if (alerts.length === 0) {
            html += '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px; text-align:center;">' +
                '<div style="font-size:32px; margin-bottom:12px;">✅</div>' +
                '<div style="font-weight:900; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Operación al día</div>' +
                '</div>';
        } else {
            alerts.forEach(function(al) {
                var clickAttr = al.action ? 'onclick="' + al.action + '"' : '';
                html += '<div class="home-alert-item ' + (al.urgent ? 'urgent' : '') + '" ' + clickAttr + ' style="' + (al.action ? 'cursor:pointer;' : '') + '">' +
                    '<div class="home-alert-icon" style="background:' + al.color + '22; border: 2px solid ' + al.color + ';">' +
                    '<i data-lucide="' + al.icon + '" style="width:22px; color:var(--mcf-ink);"></i>' +
                    '</div>' +
                    '<div class="home-alert-text">' +
                    '<div class="home-alert-title">' + al.title + '</div>' +
                    '<div class="home-alert-desc">' + al.desc + '</div>' +
                    '</div>' +
                    (al.urgent ? '<div class="mcf-urgent-indicator">!</div>' : '') +
                    '</div>';
            });
        }
        html += '</div>';

        el.innerHTML = html;
        if (window.lucide) lucide.createIcons();
    }

    /* ═══════════════════════════════════════════════════════════════════════════

       ═══════════════════════════════════════════════════════════════════════════ */

    var ORDER_QTY = {};       // Cantidades editadas por el usuario { prodName: qty }
    var ORDER_DATA = null;    // Respuesta del backend (cacheada)
    var ORDER_ANCHORS = {};   // Anclajes en edición temporal

    var ORDER_DRAFT_KEY = 'fede_order_draft';   // localStorage key para las cantidades del borrador
    var ORDER_DATA_KEY  = 'fede_order_data';    // localStorage key para los datos del backend

    function saveOrderDraft() {
        try {
            localStorage.setItem(ORDER_DRAFT_KEY, JSON.stringify(ORDER_QTY));
        } catch(e) {}
    }

    function loadOrderDraft() {
        try {
            var saved = localStorage.getItem(ORDER_DRAFT_KEY);
            return saved ? JSON.parse(saved) : {};
        } catch(e) { return {}; }
    }

    function saveOrderDataCache(data) {
        try {
            // Guardar junto con timestamp del día (YYYY-MM-DD) para invalidar al día siguiente
            var today = new Date().toISOString().slice(0, 10);
            localStorage.setItem(ORDER_DATA_KEY, JSON.stringify({ date: today, data: data }));
        } catch(e) {}
    }

    function loadOrderDataCache() {
        try {
            var raw = localStorage.getItem(ORDER_DATA_KEY);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            var today = new Date().toISOString().slice(0, 10);
            // Solo válido si es del mismo día
            if (parsed.date === today) return parsed.data;
            return null;
        } catch(e) { return null; }
    }

    function clearOrderDraft() {
        try {
            localStorage.removeItem(ORDER_DRAFT_KEY);
            localStorage.removeItem(ORDER_DATA_KEY);
        } catch(e) {}
    }

            btn.style.color = '#7c2d12';

            btn.style.color = '#7f1d1d';
