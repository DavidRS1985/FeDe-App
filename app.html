    // ── RENDERIZAR LISTA DE SUGERENCIAS ──
    function renderOrderModule(res) {
        var loading = document.getElementById('order-loading');
        var content = document.getElementById('order-content');
        var listEl = document.getElementById('order-items-list');
        var missingAlert = document.getElementById('order-missing-alert');
        var missingListEl = document.getElementById('order-missing-list');

        loading.style.display = 'none';
        content.classList.remove('hidden');

        // Alerta de productos faltantes
        if (res.missingProds && res.missingProds.length > 0) {
            missingAlert.classList.remove('hidden');
            var missingHtml = '';
            for (var m = 0; m < res.missingProds.length; m++) {
                var mp = res.missingProds[m];
                var missDays = Math.round((new Date() - new Date(mp.lastSeen)) / (24 * 3600 * 1000));
                missingHtml += '• ' + mp.prod + ' <span style="color:var(--red);">(' + missDays + ' días sin actividad)</span><br>';
            }
            if (missingListEl) missingListEl.innerHTML = missingHtml;
        } else {
            missingAlert.classList.add('hidden');
        }

        // Cargar borrador guardado para precargar cantidades editadas
        var savedQty = loadOrderDraft();

        // Lista agrupada por categoría
        var grouped = res.grouped || {};
        var catNames = Object.keys(grouped).sort();
        var html = '';

        for (var c = 0; c < catNames.length; c++) {
            var catName = catNames[c];
            var items = grouped[catName];
            if (!items || items.length === 0) continue;

            html += '<div style="margin-bottom:8px;">';
            html += '<div class="order-cat-header">';
            html += '<span class="order-cat-label">' + catName + '</span>';
            html += '<span style="font-size:10px; color:var(--dim); font-weight:700;">' + items.length + ' ítem' + (items.length > 1 ? 's' : '') + '</span>';
            html += '</div>';

            for (var i = 0; i < items.length; i++) {
                var item = items[i];

                // Cantidad: respetar borrador guardado, sino usar sugerida del backend
                var initQty = (savedQty[item.prod] !== undefined) ? savedQty[item.prod] : item.qty;
                ORDER_QTY[item.prod] = initQty;

                // ── Badge de tipo ──
                var itemBadge = '';
                if (item.isAnchored) {
                    itemBadge = '<span class="order-item-badge badge-anchor">📌 Anclado</span>';
                } else if (item.dataPoints > 0) {
                    itemBadge = '<span class="order-item-badge badge-avg">~prom.</span>';
                }

                // ── Chip de STOCK ACTUAL (color según frescura del dato) ──
                var stockChip = '';
                if (item.lastStock !== null && item.lastStock !== undefined) {
                    var stockDaysAgo = item.lastStockDate
                        ? Math.round((new Date() - new Date(item.lastStockDate)) / (24 * 3600 * 1000))
                        : 999;
                    var chipColor, chipBg, chipBorder;
                    if (stockDaysAgo <= 3) {
                        chipColor = '#166534'; chipBg = 'rgba(22,163,74,0.12)'; chipBorder = 'rgba(22,163,74,0.35)';
                    } else if (stockDaysAgo <= 7) {
                        chipColor = '#854d0e'; chipBg = 'rgba(234,179,8,0.12)'; chipBorder = 'rgba(234,179,8,0.35)';
                    } else {
                        chipColor = '#6b7280'; chipBg = 'rgba(107,114,128,0.1)'; chipBorder = 'rgba(107,114,128,0.25)';
                    }
                    var stockUnitStr = item.lastStockUnit || item.unit || '';
                    stockChip = '<div style="display:inline-flex; align-items:center; gap:4px; margin-top:4px; padding:3px 8px; border-radius:6px; background:' + chipBg + '; border:1px solid ' + chipBorder + '; color:' + chipColor + '; font-size:10px; font-weight:800;">' +
                        '📦 Stock: ' + item.lastStock + ' ' + stockUnitStr +
                        ' <span style="opacity:0.7; font-weight:600;">(hace ' + stockDaysAgo + 'd)</span>' +
                        '</div>';
                } else {
                    stockChip = '<div style="display:inline-flex; align-items:center; gap:4px; margin-top:4px; padding:3px 8px; border-radius:6px; background:rgba(220,38,38,0.07); border:1px solid rgba(220,38,38,0.2); color:#9ca3af; font-size:10px; font-weight:700;">📦 Sin stock registrado</div>';
                }

                var subText = item.unit;
                if (item.suggested > 0) subText += ' · Prom: ' + item.suggested + '/sem';
                if (item.dataPoints > 0) subText += ' · ' + item.dataPoints + ' reg.';

                html += '<div class="order-item-row" id="orow-' + encodeURIComponent(item.prod) + '">';
                html += '<div class="order-item-name">' + item.prod + ' ' + itemBadge + '<div class="order-item-sub">' + subText + '</div>' + stockChip + '</div>';
                html += '<div class="order-stepper">';
                html += '<button class="order-step-btn" onclick="orderStep(\'' + encodeURIComponent(item.prod) + '\', -1)">−</button>';
                html += '<div class="order-step-val" id="oval-' + encodeURIComponent(item.prod) + '">' + initQty + '</div>';
                html += '<button class="order-step-btn" onclick="orderStep(\'' + encodeURIComponent(item.prod) + '\', 1)">+</button>';
                html += '</div>';
                html += '</div>';
            }
            html += '</div>';
        }

        if (!html) {
            html = '<div style="text-align:center; padding:48px 24px; color:var(--dim);">';
            html += '<i data-lucide="inbox" style="width:40px; height:40px; margin-bottom:12px; opacity:0.4;"></i>';
            html += '<div style="font-size:13px; font-weight:700;">No hay datos suficientes aún.<br>Registrá algunas recepciones primero.</div>';
            html += '</div>';
        }

        if (listEl) listEl.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();
        // Guardar borrador inicial si no había uno previo
        saveOrderDraft();
    }


    // ── CONTROLAR STEPPER DE UN ÍTEM ──
    function orderStep(prodEncoded, delta) {
        var prod = decodeURIComponent(prodEncoded);
        var current = ORDER_QTY[prod] || 0;

        // Incremento en 0.5 para cantidades < 5, en 1 para el resto
        var step = current < 5 ? 0.5 : 1;
        var next = Math.max(0, current + (delta > 0 ? step : -step));
        next = Math.round(next * 10) / 10;

        ORDER_QTY[prod] = next;
        var el = document.getElementById('oval-' + prodEncoded);
        if (el) el.textContent = next;

        // Persistir en localStorage inmediatamente
        saveOrderDraft();
    }

    // ── ENVIAR PEDIDO POR WHATSAPP ──
    function sendOrderByWA() {
        var lines = [];
        var now = new Date();
        var dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        var meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

        lines.push('🍽 *PEDIDO SEMANAL - FeDe*');
        lines.push('📅 ' + dias[now.getDay()] + ' ' + now.getDate() + ' ' + meses[now.getMonth()]);
        lines.push('');

        // Agrupar por categoría
        var grouped = ORDER_DATA ? ORDER_DATA.grouped : {};
        var catNames = Object.keys(grouped).sort();
        var hasItems = false;

        for (var c = 0; c < catNames.length; c++) {
            var catName = catNames[c];
            var items = grouped[catName];
            var catLines = [];

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var qty = ORDER_QTY[item.prod];
                if (qty === undefined || qty === null) qty = item.qty;
                if (qty <= 0) continue;

                var line = '   • ' + item.prod + ': *' + qty + ' ' + (item.unit || '') + '*';
                if (item.isAnchored) line += ' 📌';
                catLines.push(line);
                hasItems = true;
            }

            if (catLines.length > 0) {
                lines.push('*' + catName.toUpperCase() + '*');
                for (var j = 0; j < catLines.length; j++) lines.push(catLines[j]);
                lines.push('');
            }
        }

        if (!hasItems) {
            showToast('No hay ítems con cantidad > 0 para enviar.');
            return;
        }

        lines.push('_Generado por FeDe Gastro Pro FOCACCIA_');

        var msg = lines.join('\n');
        var waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
        window.open(waUrl, '_blank');
        // Limpiar borrador después de enviar
        clearOrderDraft();
        showToast('✅ Pedido enviado — borrador limpiado');
    }

    /* ── GESTIÓN DE ANCLAJES ── */
    function openOrderAnchorsConfig() {
        ORDER_ANCHORS = ORDER_DATA ? JSON.parse(JSON.stringify(ORDER_DATA.anchors || {})) : {};
        renderAnchorsConfig();
        var modal = document.getElementById('order-anchors-modal');
        if (modal) modal.classList.add('open');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function closeOrderAnchorsConfig(e) {
        var modal = document.getElementById('order-anchors-modal');
        if (!modal) return;
        if (!e || e.target === modal) modal.classList.remove('open');
    }

    function renderAnchorsConfig() {
        var listEl = document.getElementById('anchors-list-config');
        if (!listEl) return;
        var prods = Object.keys(ORDER_ANCHORS);
        if (prods.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; padding:20px; color:var(--dim); font-size:12px;">Sin anclajes configurados.</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < prods.length; i++) {
            var p = prods[i];
            var a = ORDER_ANCHORS[p];
            html += '<div class="anchor-config-row">';
            html += '<div style="flex:1; font-size:13px; font-weight:700; color:var(--text);">' + p + '</div>';
            html += '<div style="font-size:11px; color:#ca8a04; font-weight:800; margin-right:8px;">' + a.qty + ' ' + (a.unit || '') + '</div>';
            html += '<button onclick="removeAnchor(\'' + encodeURIComponent(p) + '\')" style="background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.3); color:var(--red); width:28px; height:28px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;">';
            html += '<i data-lucide="x" style="width:12px;"></i></button>';
            html += '</div>';
        }
        listEl.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function searchAnchorProduct(query) {
        var resultsEl = document.getElementById('anchor-search-results');
        if (!resultsEl) return;
        if (!query || query.length < 2) { resultsEl.style.display = 'none'; return; }

        var allProds = [];
        Object.keys(CATS).forEach(function(cat) {
            var prods = CATS[cat].prods || [];
            prods.forEach(function(p) { allProds.push(p); });
        });

        var q = query.toLowerCase();
        var matches = allProds.filter(function(p) { return p.toLowerCase().indexOf(q) !== -1; }).slice(0, 8);

        if (matches.length === 0) { resultsEl.style.display = 'none'; return; }

        var html = '';
        for (var i = 0; i < matches.length; i++) {
            var p = matches[i];
            html += '<div onclick="addAnchor(\'' + encodeURIComponent(p) + '\')" style="padding:12px 16px; border-bottom:1px solid var(--bd); cursor:pointer; font-size:13px; font-weight:600; color:var(--text);">' + p + '</div>';
        }
        resultsEl.innerHTML = html;
        resultsEl.style.display = 'block';
    }

    function addAnchor(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        var qty = parseFloat(prompt('Cantidad mínima fija para "' + prod + '":') || '0');
        if (!qty || qty <= 0) return;
        var unit = prompt('Unidad (ej: kg, unidad/es, cajón):') || 'unidad/es';

        ORDER_ANCHORS[prod] = { qty: qty, unit: unit };

        var inp = document.getElementById('anchor-search-inp');
        var results = document.getElementById('anchor-search-results');
        if (inp) inp.value = '';
        if (results) results.style.display = 'none';

        renderAnchorsConfig();
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function removeAnchor(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        delete ORDER_ANCHORS[prod];
        renderAnchorsConfig();
    }

    function saveAnchors() {
        toggleSync(true, 'Guardando anclajes...');
        FeDe_API.call('saveOrderAnchors', ORDER_ANCHORS, function(res) {
            toggleSync(false);
            if (ORDER_DATA) ORDER_DATA.anchors = ORDER_ANCHORS;
            closeOrderAnchorsConfig();
            showToast('Anclajes guardados');
        });
    }

    function initOrderDaysUI() {
        var container = document.getElementById('cfg-order-days');
        if (!container) return;
        var days = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
        var currentDays = CONFIG.orderDays || [1, 4];
        var html = '';
        days.forEach(function(d, idx) {
            var active = currentDays.indexOf(idx) !== -1;
            html += '<div onclick="toggleOrderDay(' + idx + ')" class="cchip ' + (active ? 'active' : '') + '" style="width:40px;height:40px;display:flex !important;justify-content:center;align-items:center;font-size:14px;font-weight:900;">' + d + '</div>';
        });
        container.innerHTML = html;
    }

    function toggleOrderDay(idx) {
        if (!CONFIG.orderDays) CONFIG.orderDays = [1, 4];
        var pos = CONFIG.orderDays.indexOf(idx);
        if (pos === -1) CONFIG.orderDays.push(idx); else CONFIG.orderDays.splice(pos, 1);
        initOrderDaysUI();
        FeDe_API.call('saveConfig', { key: 'orderDays', value: CONFIG.orderDays }, function(res) {
            toast('Calendario actualizado');
            renderHomeSummary();
        });
    }

    /**
     * 🔍 SISTEMA DE BÚSQUEDA EXPANSIVA PRO (Adaptado)
     */
    function toggleHdrSearch(open) {
        var container = document.getElementById('mcf-bottom-search-bar');
        var input = document.getElementById('hdr-search-input');
        var results = document.getElementById('hdr-search-res');
        var clearBtn = document.getElementById('mcf-search-clear');

        if (!container) return;

        if (open) {
            container.classList.add('hdr-search-active');
            container.classList.remove('hdr-search-hidden');
            setTimeout(function () { if(input) input.focus(); }, 300);
        } else {
            container.classList.remove('hdr-search-active');
            if (!container.classList.contains('hdr-search-persistent')) {
                container.classList.add('hdr-search-hidden');
            }
            if(input) input.value = '';
            if(results) { results.style.display = 'none'; results.innerHTML = ''; }
            if(clearBtn) clearBtn.style.display = 'none';
        }
    }

    // Auto-colapsar al hacer click fuera
    window.addEventListener('pointerdown', function(e) {
        var container = document.getElementById('mcf-bottom-search-bar');
        var isTrigger = e.target.closest && e.target.closest('[onclick*="toggleHdrSearch"]');
        
        if (container && !container.classList.contains('hdr-search-hidden') && !container.contains(e.target) && !isTrigger) {
            // Blur first to hide virtual keyboard on mobile
            var searchInput = document.getElementById('hdr-search-input');
            if (searchInput) searchInput.blur();
            
            if (!container.classList.contains('hdr-search-persistent')) {
                toggleHdrSearch(false);
            } else {
                // Modo persistente: solo cerrar lista de resultados
                var resEl = document.getElementById('hdr-search-res');
                if (resEl) resEl.style.display = 'none';
            }
        }
    });

    /**
     * 🔍 NORMALIZACIÓN (IGNORAR TILDES)
     */
    function normalizeStr(str) {
        if (!str) return '';
        return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function handleHdrSearch(val) {
        var resEl = document.getElementById('hdr-search-res');
        var clearBtn = document.getElementById('mcf-search-clear');
        if (clearBtn) clearBtn.style.display = (val ? 'block' : 'none');
        
        if (!resEl) return;
        if (!val || val.length < 1) { 
            resEl.innerHTML = ''; 
            resEl.style.display = 'none'; 
            return; 
        }
        
        var query = normalizeStr(val.trim());
        var matches = [];
        
        if (typeof CATS !== 'object' || !CATS) return;

        Object.keys(CATS).forEach(function(cat) {
            var catObj = CATS[cat];
            var prods = (catObj && catObj.prods) ? catObj.prods : [];
            
            for (var i = 0; i < prods.length; i++) {
                var p = prods[i];
                if (typeof p === 'string') {
                    var np = normalizeStr(p);
                    var idx = np.indexOf(query);
                    if (idx !== -1) {
                        matches.push({ name: p, cat: cat.toUpperCase(), idx: idx });
                    }
                }
            }
        });

        // 🧠 Relevancia PRO (Prioridad exactitud corta y al inicio)
        matches.sort(function(a, b) {
            var startsA = a.idx === 0;
            var startsB = b.idx === 0;
            if (startsA && !startsB) return -1;
            if (startsB && !startsA) return 1;
            if (a.idx !== b.idx) return a.idx - b.idx;
            return a.name.length - b.name.length;
        });

        if (matches.length === 0) {
            resEl.innerHTML = '<div style="padding:16px; text-align:center; color:var(--dim); font-size:12px; font-weight:700;">Sin resultados para "' + FeDe_Utils.sanitize(val) + '"</div>';
            resEl.style.display = 'block';
            return;
        }

        var displayMatches = matches.slice(0, 15).reverse();
        if (displayMatches.length > 0 && query.length > 2) {
            if (navigator.vibrate) navigator.vibrate(5);
        }

        var html = '';
        displayMatches.forEach(function(m) {
            // Encode data for safe attribute storage (fixes touch event issues)
            var eProdName = encodeURIComponent(m.name);
            var eCatName = encodeURIComponent(m.cat);
            // Sanitize output to prevent XSS
            var safeName = FeDe_Utils.sanitize(m.name);
            var safeCat = FeDe_Utils.sanitize(m.cat);
            html += '<div class="mcf-res-item" data-prod-name="' + eProdName + '" data-cat-name="' + eCatName + '" role="button" tabindex="0">' +
                    '<span class="mcf-res-name">' + safeName + '</span>' +
                    '<span class="mcf-res-cat">' + safeCat + '</span>' +
                    '</div>';
        });
        
        if (resEl) {
            resEl.innerHTML = html;
            resEl.style.display = (html ? 'block' : 'none');
            // Force scroll to bottom for thumb-proximity
            resEl.scrollTop = resEl.scrollHeight;
            
            // 🎯 EVENT DELEGATION: Handle search item selection via click
            // Using click with touch-action: manipulation provides instant response and preserves mobile scrolling
            resEl.querySelectorAll('.mcf-res-item').forEach(function(item) {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var prodName = decodeURIComponent(this.dataset.prodName);
                    var catName = decodeURIComponent(this.dataset.catName);
                    selectSearchItem(prodName, catName);
                });
                
                // Keyboard support (Enter key)
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        e.stopPropagation();
                        var prodName = decodeURIComponent(this.dataset.prodName);
                        var catName = decodeURIComponent(this.dataset.catName);
                        selectSearchItem(prodName, catName);
                    }
                });
            });
        }
    }

    /**
     * SEARCH CONTROLLER: Selection logic with industrial mobile mechanics.
     */
    function selectSearchItem(prod, cat) {
        if (navigator.vibrate) navigator.vibrate([15, 30]);

        // 1. UI Reset & Authority Clearance
        var inp = document.getElementById('hdr-search-input');
        var resEl = document.getElementById('hdr-search-res');
        var clearBtn = document.getElementById('mcf-search-clear');
        if (inp) { inp.value = ''; inp.blur(); }
        if (resEl) { resEl.style.display = 'none'; resEl.innerHTML = ''; }
        if (clearBtn) clearBtn.style.display = 'none';

        if (typeof exitFullscreenMode === 'function') exitFullscreenMode();
        
        // 2. Data Resolution
        var targetCat = null;
        Object.keys(CATS).forEach(function(c) {
            if (c.toUpperCase() === cat.toUpperCase()) targetCat = c;
        });

        if (!targetCat) {
            toast("⚠️ Error de arquitectura: Categoría desconocida");
            return;
        }

        // 3. Navigation Trigger
        if (!currentMode) {
            var lastMode = localStorage.getItem('fede_last_mode') || 'pedido';
            initRelevamiento(lastMode);
        } else {
            goTab('relevamiento');
        }
        
        // Immediate Category Switch
        selectCat(targetCat);
        
        // 4. Polling Seeker securely by data-attribute
        var attempts = 0;
        var safeSelector = '[data-prow="' + encodeURIComponent(prod) + '"]';
        
        if (window._mcf_search_seeker) clearInterval(window._mcf_search_seeker);
        window._mcf_search_seeker = setInterval(function() {
            attempts++;
            var target = document.querySelector(safeSelector);

            if (target) {
                clearInterval(window._mcf_search_seeker);
                
                // Asegurar que el elemento es visible antes de hacer smooth scroll
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('mcf-found-highlight');
                
                setTimeout(function(){ 
                    target.classList.remove('mcf-found-highlight');
                }, 1500);
            }

            if (attempts > 40) {
                clearInterval(window._mcf_search_seeker);
                console.warn("Element not found after 40 attempts:", prod);
            }
        }, 120);
    }

    function clearHdrSearch() {
        var inp = document.getElementById('hdr-search-input');
        var resEl = document.getElementById('hdr-search-res');
        var clearBtn = document.getElementById('mcf-search-clear');
        if (inp) { inp.value = ''; inp.focus(); }
        if (resEl) { resEl.style.display = 'none'; resEl.innerHTML = ''; }
        if (clearBtn) clearBtn.style.display = 'none';
        if (navigator.vibrate) navigator.vibrate(10);
    }

    // Inicializar estado del botón al cargar
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(initOrderButtonState, 800);
    });

</script>
