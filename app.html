        var qtyVal     = data ? (data.qty || '') : '';
        var unitVal    = data ? FeDe_Utils.sanitize(data.unit) : '';

        var units = [];

        }
        var unitOpts = '';
        for (var o = 0; o < units.length; o++) {
            unitOpts += '<option value="' + units[o] + '"' + (units[o] === unitVal ? ' selected' : '') + '>' + units[o] + '</option>';
        }

        var row =
            '<div class="ing-card" id="ing-row-' + idx + '">' +

                        '<div class="ing-search-results" id="ing-res-' + idx + '"></div>' +

                    '</button>' +

                '<!-- línea 2: cantidad + unidad + factor -->' +

                    '<input type="number" id="ing-qty-' + idx + '" value="' + qtyVal + '" min="0" step="1" placeholder="Cant." class="ing-qty-input">' +
                    '<select id="ing-unit-' + idx + '" class="ing-unit-select">' +
                        unitOpts +

                        '<input type="range" id="ing-factor-' + idx + '" min="10" max="100" step="5" value="' + factorVal + '" ' +
                            'class="ing-factor-range" ' +

    function _ingSearchProd(inputEl, idx) {
        var query = inputEl.value;
        var resultsEl = document.getElementById('ing-res-' + idx);
        if (!resultsEl) return;
        if (!query || query.length < 2) { resultsEl.style.display = 'none'; return; }

        var allProds = [];
        var cats = Object.keys(CATS);
        for (var i = 0; i < cats.length; i++) {
            var prods = CATS[cats[i]].prods || [];
            for (var k = 0; k < prods.length; k++) allProds.push(prods[k]);
        }

        var q = query.toLowerCase();
        var matches = [];
        for (var m = 0; m < allProds.length; m++) {
            if (allProds[m].toLowerCase().indexOf(q) !== -1) {
                matches.push(allProds[m]);
                if (matches.length >= 8) break;
            }
        }

        if (matches.length === 0) { resultsEl.style.display = 'none'; return; }

        var html = '';
        for (var n = 0; n < matches.length; n++) {
            var p = matches[n];
            var ps = p.replace(/'/g, "\\'");
            html += '<div class="ing-search-opt" onclick="_ingPickProd(\'' + ps + '\',' + idx + ')">' + FeDe_Utils.sanitize(p) + '</div>';
        }
        resultsEl.innerHTML = html;
        resultsEl.style.display = 'block';
    }

    function _ingPickProd(prod, idx) {

        var res = document.getElementById('ing-res-' + idx);
        if (inp) inp.value = prod;
        if (res) res.style.display = 'none';
    }

    function _onRecetaPhotoSelected(input, recetaName) {
        var file = input.files && input.files[0];
        if (!file) return;
        var area = document.getElementById('re-photo-area');
        if (!area) return;

        var spinnerHtml =
            '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--fede-on-surface-3);">' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:fede-spin 1s linear infinite;">' +
                    '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>' +
                '</svg>' +
                '<span style="font:var(--fede-caption);font-weight:600;">Comprimiendo...</span>' +
            '</div>';
        var errorHtml =
            '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--fede-danger, #e05252);cursor:pointer;">' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
                '<span style="font:var(--fede-caption);font-weight:600;">Error. Tocá para reintentar.</span>' +
            '</div>';

        area.innerHTML = spinnerHtml;

        // Usar FileReader como path principal: compatible con todos los WebViews GAS (Android/iOS)
        // URL.createObjectURL puede fallar silenciosamente en el WebView embebido de GAS
        var reader = new FileReader();
        reader.onload = function(e) {
            var srcData = e.target.result; // data URI completo
            var img = new Image();
            img.onload = function() {
                var MAX = 1000; // px máximo por lado
                var w = img.width, h = img.height;
                if (w > MAX || h > MAX) {
                    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                    else        { w = Math.round(w * MAX / h); h = MAX; }
                }
                var canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                var dataUrl = canvas.toDataURL('image/jpeg', 0.78);

                // Segunda pasada si supera ~700KB base64 (≈ 525KB binario)
                if (dataUrl.length > 900000) {
                    dataUrl = canvas.toDataURL('image/jpeg', 0.55);
                }

                area.innerHTML = spinnerHtml.replace('Comprimiendo...', 'Subiendo...');

                var uploadTimeout = setTimeout(function() {
                    area.innerHTML = errorHtml;
                    showToast('Tiempo de espera agotado. Intentá con una foto más pequeña.');
                }, 90000);

                FeDe_API.call('uploadRecetaPhoto',
                    { base64: dataUrl, mimeType: 'image/jpeg', recetaName: recetaName || 'receta' },
                    function(result) {
                        clearTimeout(uploadTimeout);
                        // result llega aquí solo si success === true (FeDe_API filtra el error al failure handler)
                        var url = result && result.url;
                        if (!url) {
                            area.innerHTML = errorHtml;
                            showToast('Error al subir: respuesta inválida del servidor');
                            return;
                        }
                        if (recetaName && CONFIG.recetas && CONFIG.recetas[recetaName]) {
                            var recetas = JSON.parse(JSON.stringify(CONFIG.recetas));
                            recetas[recetaName].photo = url;
                            FeDe_API.call('saveConfig', { key: 'recetas', value: recetas }, function() {
                                CONFIG.recetas = recetas;
                                // Actualizar snapshot para que persista tras recargar
                                try {
                                    var activeId = localStorage.getItem('fede_active_sheet_id') || 'default';
                                    var snapKey = 'fede_snapshot_' + activeId;
                                    var snap = JSON.parse(localStorage.getItem(snapKey) || '{}');
                                    snap.recetas = recetas;
                                    localStorage.setItem(snapKey, JSON.stringify(snap));
                                } catch(e) {}
                                showToast('Foto guardada');
                            }, null);
                        }
                        area.innerHTML =
                            '<div style="position:relative;width:100%;border-radius:var(--fede-r-sm,8px);overflow:hidden;">' +
                                '<img src="' + url + '" style="width:100%;max-height:160px;object-fit:cover;display:block;" alt="Foto receta" onerror="_onRecetaPhotoImgError(this)">' +
                                '<div style="position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(0,0,0,.52);">' +
                                    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
                                    '<span style="font-size:.68rem;font-weight:600;color:rgba(255,255,255,.88);letter-spacing:.02em;">Guardado en Drive</span>' +
                                '</div>' +
                            '</div>';
                    },
                    function(err) {
                        clearTimeout(uploadTimeout);
                        var errMsg = typeof err === 'string' ? err : (err && err.message) || 'revisá tu red';
                        area.innerHTML =
                            '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--fede-danger,#e05252);padding:8px;text-align:center;">' +
                                '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
                                '<span style="font:var(--fede-caption);font-weight:600;">Error al subir</span>' +
                                '<span style="font:var(--fede-caption);word-break:break-word;max-width:240px;color:var(--fede-on-surface-2);">' + errMsg + '</span>' +
                            '</div>';
                    }
                );
            };
            img.onerror = function() {
                area.innerHTML = errorHtml;
                showToast('No se pudo procesar la imagen.');
            };
            img.src = srcData;
        };
        reader.onerror = function() {
            area.innerHTML = errorHtml;
            showToast('No se pudo leer el archivo.');
        };
        reader.readAsDataURL(file);
    }

    function _submitRecetaEditor(originalName) {
        var nameEl    = document.getElementById('re-name');
        var yieldsEl  = document.getElementById('re-yields');
        var yieldUEl  = document.getElementById('re-yieldunit');
        if (!nameEl || !yieldsEl || !yieldUEl) return;

        var name = nameEl.value.trim();
        if (!name) return showToast('Ingresá el nombre de la receta');

        var yields = parseFloat(yieldsEl.value);
        if (isNaN(yields) || yields <= 0) return showToast('Rinde inválido');

        var ingredients = [];
        var rows = document.querySelectorAll('[id^="ing-row-"]');
        for (var i = 0; i < rows.length; i++) {
            var rowId = rows[i].id.replace('ing-row-', '');
            var prodEl = document.getElementById('ing-prod-' + rowId);
            var qtyEl  = document.getElementById('ing-qty-'  + rowId);
            var unitEl = document.getElementById('ing-unit-' + rowId);
            if (!prodEl || !qtyEl || !unitEl) continue;
            var factorEl = document.getElementById('ing-factor-' + rowId);
            var p = prodEl.value.trim();
            var q = parseFloat(qtyEl.value);
            var u = unitEl.value;
            var f = factorEl ? (parseInt(factorEl.value, 10) / 100) : 1;
            if (!p || isNaN(q) || q <= 0) continue;
            ingredients.push({ prod: p, qty: q, unit: u, factor: f });
        }

        if (ingredients.length === 0) return showToast('Agregá al menos un ingrediente');

        var existingReceta = (CONFIG.recetas || {})[originalName] || (CONFIG.recetas || {})[name] || {};
        var data = {
            name: name,
            yields: yields,
            yieldUnit: yieldUEl.value.trim() || 'unidades',
            ingredients: ingredients,
            procedure: existingReceta.procedure || '',
            photo: existingReceta.photo || '',
            active: true,
            updatedAt: new Date().toISOString()
        };

        saveReceta(data, originalName);
    }

    function saveReceta(data, originalName) {
        var recetas = CONFIG.recetas ? JSON.parse(JSON.stringify(CONFIG.recetas)) : {};
        if (originalName && originalName !== data.name) delete recetas[originalName];
        recetas[data.name] = data;
        toggleSync(true, 'Guardando receta...');
        FeDe_API.call('saveConfig', { key: 'recetas', value: recetas }, function() {
            CONFIG.recetas = recetas;
            toggleSync(false);
            closeRecetaEditor();
            renderRecetarios();
            showToast('Receta guardada');
        });
    }

    function deleteReceta(name) {
        fConfirm({ title: 'Eliminar receta', message: '¿Eliminar "' + name + '"? Esta acción no se puede deshacer.', okText: 'Eliminar', type: 'danger' }, function() {
            var recetas = CONFIG.recetas ? JSON.parse(JSON.stringify(CONFIG.recetas)) : {};
            delete recetas[name];
            FeDe_API.call('saveConfig', { key: 'recetas', value: recetas }, function() {
                CONFIG.recetas = recetas;
                closeRecetaEditor();
                renderRecetarios();
                showToast('Receta eliminada');
            });
        });
    }

    function shareReceta() {
        var name = currentRecetaName;
        var r = (CONFIG.recetas || {})[name];
        if (!r) return;

        // Limpia marcadores Markdown de IA para texto plano legible en WhatsApp
        function cleanMd(str) {
            if (!str) return '';
            return str
                .replace(/#{1,6}\s*/g, '')       // encabezados ##
                .replace(/\*\*(.*?)\*\*/g, '$1') // **bold**
                .replace(/__(.*?)__/g, '$1')      // __bold__
                .replace(/\*(.*?)\*/g, '$1')      // *italic* (texto, no formato WA)
                .replace(/^[-*]\s+/gm, '• ')      // listas a bullet
                .trim();
        }

        // Formatea cantidad: 0 o falsy = c/n, float redondea a 2 decimales
        function fmtQty(ing) {
            if (!ing.qty || ing.qty === 0) return 'c/n';
            var q = Math.round(ing.qty * 100) / 100;
            return q + ' ' + (ing.unit || '');
        }

        var lines = [];
        lines.push('🍽 *' + r.name + '*');
        lines.push('Rinde: ' + (r.yields || 1) + ' ' + (r.yieldUnit || 'unidades'));
        lines.push('');
        lines.push('*Ingredientes:*');
        var ings = r.ingredients || [];
        for (var i = 0; i < ings.length; i++) {
            lines.push('• ' + ings[i].prod + ' — ' + fmtQty(ings[i]));
        }
        if (r.procedure && r.procedure.trim()) {
            lines.push('');
            lines.push('*Procedimiento:*');
            lines.push(cleanMd(r.procedure));
        }
        lines.push('');
        lines.push('_Compartido desde FeDe Gastro Pro_');
        var text = lines.join('\n');

        // Mismo patrón que sendHistWA: wa.me directo, funciona igual en móvil y desktop
        window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }

        lucide.createIcons({ nodes: [appBar] });

        // Ingredientes
        var ings = r.ingredients || [];
        var baseYields = (r.yields && r.yields > 0) ? r.yields : 1;
        var ingsHtml = _buildIngsHtml(ings, baseYields, baseYields);

    function _buildIngsHtml(ings, baseYields, currentPorciones) {
        var factor = (baseYields > 0 && currentPorciones > 0) ? (currentPorciones / baseYields) : 1;
        var html = '';
        for (var i = 0; i < ings.length; i++) {
            var ing = ings[i];
            var rawQty = parseFloat(ing.qty) || 0;
            var scaledQty = rawQty > 0 ? Math.round(rawQty * factor * 1000) / 1000 : rawQty;
            var qtyDisplay = scaledQty > 0 ? scaledQty : (ing.qty || '');
            var factorPct = Math.round((ing.factor || 1) * 100);
            var factorBadge = factorPct < 100
                ? '<span class="receta-detail-factor-badge">' + factorPct + '%</span>'
                : '';

            // Equivalencia en masa para ingredientes en volumen
            var massEquiv = '';
            var ingUnit = _normVolumeUnit(ing.unit);
            var ingMeta = UNIT_REGISTRY.get(ingUnit);
            if (ingMeta && ingMeta.dimension === 'volume' && scaledQty) {
                var grResult = UNIT_CONVERTER.convertSmart(scaledQty, ingUnit, 'gr', ing.prod || '');
                if (grResult !== null) {
                    var massStr = grResult >= 1000
                        ? parseFloat((grResult / 1000).toFixed(3)) + ' kg'
                        : parseFloat(grResult.toFixed(1)) + ' g';
                    massEquiv = '<span style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-left:4px;">≈ ' + massStr + '</span>';
                }
            }

            html +=
                '<div class="receta-detail-ing-row">' +
                    '<span class="receta-detail-ing-name">' + FeDe_Utils.sanitize(ing.prod) + '</span>' +
                    '<span class="receta-detail-ing-qty" style="display:flex;align-items:center;gap:0;">' +
                        qtyDisplay + ' ' + FeDe_Utils.sanitize(ing.unit || '') + factorBadge + massEquiv +
                    '</span>' +
                '</div>';
        }
        return html;
    }

    function recalcPorciones(delta, newVal) {
        var inp = document.getElementById('receta-porciones-inp');
        if (!inp) return;
        var baseYields = parseFloat(inp.dataset.baseYields) || 1;
        var current;
        if (delta !== 0) {
            current = parseFloat(inp.value) || baseYields;
            current = Math.max(0.5, current + delta);
            inp.value = current;
        } else {
            current = parseFloat(newVal) || baseYields;
            if (current < 0.5) current = 0.5;
            inp.value = current;
        }

        var r = (CONFIG.recetas || {})[currentRecetaName];
        if (!r) return;
        var ings = r.ingredients || [];
        var ingsList = document.getElementById('receta-ings-list');
        if (!ingsList) return;
        var html = _buildIngsHtml(ings, baseYields, current);
        ingsList.innerHTML = html || '<div style="font:var(--fede-body);color:var(--fede-on-surface-3);font-style:italic;">Sin ingredientes.</div>';

        // Actualizar label de rinde
        var rindeLabel = document.getElementById('receta-rinde-label');
        if (rindeLabel) {
            var yieldUnit = FeDe_Utils.sanitize(r.yieldUnit || 'unidades');
            rindeLabel.innerHTML = current + ' ' + yieldUnit;
        }
    }

    // ── Markdown renderer liviano ─────────────────────────────────────────────
    function _fedeMarkdown(text) {
        if (!text) return '';
        var lines = text.split('\n');
        var html = '';
        var inList = false;
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            // Encabezados
            if (/^### /.test(line)) {
                if (inList) { html += '</ul>'; inList = false; }
                html += '<h4 style="font-size:13px;font-weight:700;color:var(--fede-on-surface);margin:14px 0 4px;">' + _mdInline(line.slice(4)) + '</h4>';
            } else if (/^## /.test(line)) {
                if (inList) { html += '</ul>'; inList = false; }
                html += '<h3 style="font-size:15px;font-weight:700;color:var(--fede-on-surface);margin:16px 0 6px;">' + _mdInline(line.slice(3)) + '</h3>';
            } else if (/^# /.test(line)) {
                if (inList) { html += '</ul>'; inList = false; }
                html += '<h2 style="font-size:17px;font-weight:800;color:var(--fede-on-surface);margin:0 0 8px;">' + _mdInline(line.slice(2)) + '</h2>';
            // Lista con guion o asterisco
            } else if (/^[-*] /.test(line)) {
                if (!inList) { html += '<ul style="margin:6px 0 6px 16px;padding:0;">'; inList = true; }
                html += '<li style="font-size:14px;color:var(--fede-on-surface);line-height:1.6;margin-bottom:2px;">' + _mdInline(line.slice(2)) + '</li>';
            // Lista numerada
            } else if (/^\d+\. /.test(line)) {
                if (!inList) { html += '<ol style="margin:6px 0 6px 16px;padding:0;">'; inList = true; }
                html += '<li style="font-size:14px;color:var(--fede-on-surface);line-height:1.6;margin-bottom:2px;">' + _mdInline(line.replace(/^\d+\. /, '')) + '</li>';
            // Línea vacía
            } else if (line.trim() === '') {
                if (inList) { html += '</ul>'; inList = false; }
                html += '<div style="height:6px;"></div>';
            // Párrafo normal
            } else {
                if (inList) { html += '</ul>'; inList = false; }
                html += '<p style="font-size:14px;color:var(--fede-on-surface);line-height:1.6;margin:0 0 4px;">' + _mdInline(line) + '</p>';
            }
        }
        if (inList) html += '</ul>';
        return html;
    }
    function _mdInline(text) {
        return text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code style="background:var(--fede-surface-sunken);padding:1px 5px;border-radius:3px;font-size:12px;">$1</code>');
    }

    }

    function _processImportJson(raw) {
        raw = raw || '';
        var btn     = document.getElementById('ij-btn-import');
        var preview = document.getElementById('ij-preview');

        if (!raw) {
            _setImportJsonUI('idle', '');
            if (btn) btn.disabled = true;
            if (preview) preview.style.display = 'none';
            _importJsonParsed = null;
            return;
        }

        var data;
        try {
            data = JSON.parse(raw);
        } catch (e) {
            _setImportJsonUI('invalid', 'JSON invalido — ' + e.message.split('\n')[0]);
            if (btn) btn.disabled = true;
            if (preview) preview.style.display = 'none';
            _importJsonParsed = null;
            return;
        }

        if (!data.name || typeof data.name !== 'string' || !data.name.trim()) {
            _setImportJsonUI('invalid', 'Falta el campo "name"');
            if (btn) btn.disabled = true;
            if (preview) preview.style.display = 'none';
            _importJsonParsed = null;
            return;
        }
        if (!Array.isArray(data.ingredients) || data.ingredients.length === 0) {
            _setImportJsonUI('invalid', 'Falta "ingredients" o esta vacio');
            if (btn) btn.disabled = true;
            if (preview) preview.style.display = 'none';
            _importJsonParsed = null;
            return;
        }

        _importJsonParsed = data;
        _setImportJsonUI('valid', 'JSON valido');
        if (btn) btn.disabled = false;

        if (preview) {
            var nameEl  = document.getElementById('ij-preview-name');
            var ingEl   = document.getElementById('ij-preview-ing');
            var rindeEl = document.getElementById('ij-preview-rinde');
            if (nameEl)  nameEl.textContent  = data.name.trim();
            if (ingEl)   ingEl.textContent   = data.ingredients.length + ' ingrediente' + (data.ingredients.length !== 1 ? 's' : '');
            if (rindeEl) rindeEl.textContent = 'Rinde ' + (parseFloat(data.yields) || 1) + ' ' + (data.yieldUnit || 'unidades');
            preview.style.display = '';
            lucide.createIcons({ nodes: [preview] });
        }
    }

    function _setImportJsonUI(state, msg) {

        if (wrap) {

    function _getPlanPeriodRange(periodo) {
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        if (periodo === 'hoy') {
            var s = today.getFullYear() + '-' + _pad2(today.getMonth() + 1) + '-' + _pad2(today.getDate());
            return { start: s, end: s, label: 'Hoy' };
        }
        if (periodo === 'semana') {
            var dow = today.getDay();
            var diffLun = (dow === 0 ? -6 : 1 - dow);
            var lun = new Date(today); lun.setDate(today.getDate() + diffLun);
            var dom = new Date(lun); dom.setDate(lun.getDate() + 6);
            var sl = lun.getFullYear() + '-' + _pad2(lun.getMonth() + 1) + '-' + _pad2(lun.getDate());
            var sd = dom.getFullYear() + '-' + _pad2(dom.getMonth() + 1) + '-' + _pad2(dom.getDate());
            return { start: sl, end: sd, label: 'Esta semana' };
        }
        if (periodo === 'mes') {
            var ym = today.getFullYear() + '-' + _pad2(today.getMonth() + 1);
            var ultimo = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            var su = ultimo.getFullYear() + '-' + _pad2(ultimo.getMonth() + 1) + '-' + _pad2(ultimo.getDate());
            return { start: ym + '-01', end: su, label: 'Este mes' };
        }
        var s2 = today.getFullYear() + '-' + _pad2(today.getMonth() + 1) + '-' + _pad2(today.getDate());
        return { start: s2, end: s2, label: 'Hoy' };
    }

    function _pad2(n) { return n < 10 ? '0' + n : '' + n; }

    var _planCurrentPeriodo = 'hoy';

    function selectPlanPeriodo(periodo) {
        _planCurrentPeriodo = periodo;
        var periodos = ['hoy', 'semana', 'mes'];
        for (var i = 0; i < periodos.length; i++) {
            var el = document.getElementById('plan-chip-' + periodos[i]);
            if (el) el.classList.toggle('plan-chip--active', periodos[i] === periodo);
        }
        var range = _getPlanPeriodRange(periodo);
        _prodCurrentDate = range.start;
        renderPlanDiario();
    }

                '<div style="padding:2px 20px 10px;">' +
                    '<div style="font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:4px;">Producción</div>' +
                    '<div style="font-size:26px;font-weight:800;letter-spacing:-0.8px;color:var(--fede-on-surface);line-height:1.05;margin-bottom:10px;">Plan del Día</div>' +
                    /* Chips de periodo inline */
                    '<div style="display:flex;gap:6px;">' +
                        '<button id="plan-chip-hoy" onclick="selectPlanPeriodo(\'hoy\')" class="plan-period-chip' + (periodo === 'hoy' ? ' plan-chip--active' : '') + '">Hoy</button>' +
                        '<button id="plan-chip-semana" onclick="selectPlanPeriodo(\'semana\')" class="plan-period-chip' + (periodo === 'semana' ? ' plan-chip--active' : '') + '">Semana</button>' +
                        '<button id="plan-chip-mes" onclick="selectPlanPeriodo(\'mes\')" class="plan-period-chip' + (periodo === 'mes' ? ' plan-chip--active' : '') + '">Mes</button>' +
                    '</div>' +

                /* Fade-out inferior */
                '<div style="height:10px;background:linear-gradient(to bottom,var(--fede-surface),var(--fede-bg));pointer-events:none;"></div>';
            lucide.createIcons({ nodes: [appBar] });
        }

        var tabBar = document.getElementById('produccion-tabs-bar');
        if (tabBar) tabBar.style.display = 'flex';

        var content = document.getElementById('produccion-content');
        if (!content) return;

        var items = [];
        if (periodo === 'hoy') {
            var plan = _getPlanDiario(dateStr);
            items = plan.items || [];
        } else {
            var planRange = range;
            var cur = new Date(planRange.start + 'T12:00:00');
            var endD = new Date(planRange.end + 'T12:00:00');
            while (cur <= endD) {
                var ds = cur.getFullYear() + '-' + _pad2(cur.getMonth() + 1) + '-' + _pad2(cur.getDate());
                var dp = _getPlanDiario(ds);
                if (dp && dp.items) {
                    for (var pi = 0; pi < dp.items.length; pi++) {
                        var cloned = {};
                        for (var pk in dp.items[pi]) { if (dp.items[pi].hasOwnProperty(pk)) cloned[pk] = dp.items[pi][pk]; }
                        cloned._dateStr = ds;
                        items.push(cloned);
                    }
                }
                cur.setDate(cur.getDate() + 1);
            }
        }

        var alerts = _checkTodayPlanAlerts();
        var alertHtml = '';
        if (dateStr === _getTodayStr() && alerts.length > 0) {
            alertHtml = '<div class="plan-stock-alert">' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fede-danger,#dc2626)" stroke-width="2.5" style="flex-shrink:0;margin-top:1px;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
                '<div>' +
                    '<div style="font:var(--fede-label);font-weight:700;color:var(--fede-danger,#dc2626);">Stock insuficiente</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-2);">' + alerts.length + ' receta' + (alerts.length !== 1 ? 's' : '') + ' sin stock para completar el plan</div>' +
                '</div>' +
            '</div>';
        }

        if (items.length === 0) {
            content.innerHTML = alertHtml +
                '<div class="fede-empty-state">' +
                    '<div class="fede-empty-state__icon">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="180" height="172" viewBox="0 0 200 180" fill="none">' +
                            '<defs>' +
                                '<linearGradient id="pgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">' +
                                    '<stop offset="0%" stop-color="var(--primary)" stop-opacity="0.18"/>' +
                                    '<stop offset="100%" stop-color="var(--primary)" stop-opacity="0.04"/>' +
                                '</linearGradient>' +
                                '<linearGradient id="pgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">' +
                                    '<stop offset="0%" stop-color="var(--primary)" stop-opacity="1"/>' +
                                    '<stop offset="100%" stop-color="var(--primary)" stop-opacity="0.55"/>' +
                                '</linearGradient>' +
                                '<linearGradient id="pgGrad3" x1="0%" y1="0%" x2="0%" y2="100%">' +
                                    '<stop offset="0%" stop-color="var(--fede-surface)"/>' +
                                    '<stop offset="100%" stop-color="var(--fede-surface)" stop-opacity="0.85"/>' +
                                '</linearGradient>' +
                                '<filter id="pgShadow" x="-20%" y="-20%" width="140%" height="140%">' +
                                    '<feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="var(--primary)" flood-opacity="0.18"/>' +
                                '</filter>' +
                            '</defs>' +
                            '<!-- Halos -->' +
                            '<circle cx="100" cy="86" r="66" fill="url(#pgGrad1)"/>' +
                            '<circle cx="100" cy="86" r="48" fill="url(#pgGrad1)"/>' +
                            '<!-- Rounded square con gradiente -->' +
                            '<rect x="64" y="50" width="72" height="72" rx="20" fill="url(#pgGrad2)" filter="url(#pgShadow)"/>' +
                            '<!-- Panel interior -->' +
                            '<rect x="76" y="62" width="48" height="48" rx="8" fill="url(#pgGrad3)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>' +
                            '<!-- Chef hat: base y cuerpo -->' +
                            '<rect x="86" y="84" width="28" height="8" rx="2" fill="rgba(255,255,255,0.85)"/>' +
                            '<path d="M90 84 Q90 70 100 70 Q110 70 110 84" fill="rgba(255,255,255,0.85)"/>' +
                            '<circle cx="94" cy="75" r="5" fill="rgba(255,255,255,0.5)"/>' +
                            '<circle cx="106" cy="75" r="5" fill="rgba(255,255,255,0.5)"/>' +
                            '<circle cx="100" cy="72" r="5.5" fill="rgba(255,255,255,0.7)"/>' +
                            '<!-- Líneas de vapor -->' +
                            '<path d="M93 66 Q94 62 93 58" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>' +
                            '<path d="M100 64 Q101 60 100 56" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" fill="none"/>' +
                            '<path d="M107 66 Q108 62 107 58" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>' +
                            '<!-- Decorativos flotantes -->' +
                            '<rect x="144" y="52" width="30" height="12" rx="6" fill="var(--fede-surface)" stroke="var(--fede-border)" stroke-width="1"/>' +
                            '<circle cx="148" cy="58" r="3" fill="var(--primary)" opacity="0.5"/>' +
                            '<rect x="152" y="55.5" width="16" height="2.5" rx="1.25" fill="var(--fede-border)"/>' +
                            '<rect x="26" y="78" width="24" height="10" rx="5" fill="var(--fede-surface)" stroke="var(--fede-border)" stroke-width="1"/>' +
                            '<rect x="31" y="82" width="14" height="2" rx="1" fill="var(--fede-border)"/>' +
                            '<circle cx="158" cy="108" r="5" fill="var(--primary)" opacity="0.15"/>' +
                            '<circle cx="38" cy="112" r="3.5" fill="var(--primary)" opacity="0.12"/>' +
                            '<circle cx="168" cy="72" r="2.5" fill="var(--primary)" opacity="0.2"/>' +
                        '</svg>' +
                    '</div>' +
                    '<p class="fede-empty-state__title">Sin recetas para hoy</p>' +
                    '<p class="fede-empty-state__body">Tocá + Agregar para planificar el menú del día.</p>' +
                    '<button onclick="openAddPlanItem()" style="margin-top:20px;background:var(--primary);color:#fff;border:none;border-radius:var(--fede-r-md);padding:12px 24px;font:var(--fede-label);font-weight:700;cursor:pointer;touch-action:manipulation;">+ Agregar receta al plan</button>' +
                '</div>';
            return;
        }

        var html = alertHtml;
        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            var done = it.qty_done || 0;
            var planned = it.qty_planned || 1;
            var statusClass = it.status || 'pending';
            var receta = CONFIG.recetas && CONFIG.recetas[it.recipe];
            var yieldUnit = receta ? (receta.yieldUnit || 'unidades') : 'unidades';
            var itemDateLabel = '';
            if (periodo !== 'hoy' && it._dateStr) {
                var dobj = new Date(it._dateStr + 'T12:00:00');
                var dias2 = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
                var meses2 = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
                itemDateLabel = '<div style="font:var(--fede-caption);color:var(--primary);font-weight:600;margin-bottom:4px;">' + dias2[dobj.getDay()] + ' ' + dobj.getDate() + ' ' + meses2[dobj.getMonth()] + '</div>';
            }

            var statusBadge = '';
            if (statusClass === 'done') {
                statusBadge = '<span style="font:var(--fede-caption);font-weight:700;color:#0d9488;background:color-mix(in srgb,#0d9488 12%,transparent);padding:3px 8px;border-radius:10px;">✓ Completado</span>';
            } else if (statusClass === 'partial') {
                statusBadge = '<span style="font:var(--fede-caption);font-weight:700;color:var(--fede-warning,#d97706);background:color-mix(in srgb,var(--fede-warning,#d97706) 12%,transparent);padding:3px 8px;border-radius:10px;">' + done + '/' + planned + ' listos</span>';
            } else if (statusClass === 'cancelled') {
                statusBadge = '<span style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);background:var(--fede-surface-2);padding:3px 8px;border-radius:10px;">Cancelado</span>';
            } else {
                statusBadge = '<span style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);background:var(--fede-surface-2);padding:3px 8px;border-radius:10px;">0/' + planned + ' listos</span>';
            }

            var execBtns = '';
            if (statusClass !== 'done' && statusClass !== 'cancelled') {
                var its = it.id.replace(/'/g, "\\'");
                execBtns = '<div style="display:flex;gap:8px;margin-top:8px;">' +
                    '<button onclick="openExecSheet(\'' + its + '\')" style="flex:1;background:var(--primary);color:#fff;border:none;border-radius:var(--fede-r-sm);padding:10px;font:var(--fede-label);font-weight:700;cursor:pointer;">✓ Registrar</button>' +
                    '<button onclick="cancelPlanItem(\'' + its + '\')" style="background:none;border:1px solid var(--fede-border);border-radius:var(--fede-r-sm);padding:10px 14px;font:var(--fede-caption);color:var(--fede-on-surface-3);cursor:pointer;">Cancelar</button>' +
                '</div>';
            }

            html += '<div class="plan-item-card status-' + statusClass + '">' +
                itemDateLabel +
                '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">' +
                    '<div>' +
                        '<div style="font:var(--fede-body);font-weight:700;color:var(--fede-on-surface);margin-bottom:2px;">' + FeDe_Utils.sanitize(it.recipe) + '</div>' +
                        '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">Planificado: ' + planned + ' ' + FeDe_Utils.sanitize(yieldUnit) + '</div>' +
                    '</div>' +
                    statusBadge +
                '</div>' +
                (it.executions && it.executions.length > 0 ? _renderExecSummary(it.executions) : '') +
                execBtns +
            '</div>';
        }
        content.innerHTML = html;
    }

    function _renderExecSummary(executions) {
        var html = '<div style="border-top:1px solid var(--fede-border);margin-top:8px;padding-top:8px;">';
        for (var i = 0; i < executions.length; i++) {
            var ex = executions[i];
            var ts = ex.ts ? new Date(ex.ts).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '';
            html += '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">× ' + ex.qty + ' — ' + (ex.workers || []).join(', ') + (ts ? ' · ' + ts : '') + '</div>';
        }
        return html + '</div>';
    }

    function _changeProdDate(val) {
        _prodCurrentDate = val;
        if (_prodCurrentTab === 'plan') renderPlanDiario();
        else if (_prodCurrentTab === 'persona') { var _rpd = _getPlanPeriodRange(_planCurrentPeriodo || 'hoy'); renderByWorker(_rpd.start, _rpd.end); }
    }

    function openAddPlanItem() {
        var sheet = document.getElementById('add-plan-item-sheet');
        var body = document.getElementById('add-plan-item-body');
        if (!sheet || !body) return;

        var recetas = CONFIG.recetas || {};
        var names = Object.keys(recetas);
        var opts = '';
        for (var i = 0; i < names.length; i++) {
            opts += '<option value="' + names[i].replace(/"/g, '&quot;') + '">' + FeDe_Utils.sanitize(names[i]) + '</option>';
        }

        body.innerHTML =
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
                '<div style="font:var(--fede-h2);font-weight:800;color:var(--fede-on-surface);">Agregar al plan</div>' +
                '<button onclick="closeAddPlanItem()" style="background:none;border:none;padding:6px;cursor:pointer;color:var(--fede-on-surface-3);display:flex;align-items:center;border-radius:var(--fede-r-sm);" aria-label="Cerrar">' +
                    '<i data-lucide="x" style="width:20px;height:20px;stroke-width:2;"></i>' +
                '</button>' +
            '</div>' +
            '<div style="margin-bottom:16px;">' +
                '<label style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:6px;">Receta</label>' +
                '<select id="api-recipe-sel" onchange="_apiUpdatePreview()" style="width:100%;padding:11px 12px;border:1px solid var(--fede-border);border-radius:var(--fede-r-md);font:var(--fede-body);background:var(--fede-surface-2);color:var(--fede-on-surface);-webkit-appearance:none;appearance:none;cursor:pointer;">' +
                    '<option value="">— Elegí una receta —</option>' + opts +
                '</select>' +
            '</div>' +
            '<div style="margin-bottom:20px;">' +
                '<label style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:10px;">Porciones a preparar</label>' +
                '<div style="display:flex;align-items:center;justify-content:center;gap:16px;">' +
                    '<button onclick="_apiQtyDelta(-1)" style="width:52px;height:52px;border:1px solid var(--fede-border);border-radius:50%;background:var(--fede-surface-2);font-size:26px;line-height:1;cursor:pointer;color:var(--fede-on-surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;">−</button>' +
                    '<div style="min-width:64px;text-align:center;">' +
                        '<div id="api-qty-display" style="font-size:32px;font-weight:800;color:var(--fede-on-surface);line-height:1;">1</div>' +
                        '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-top:2px;">porciones</div>' +
                    '</div>' +
                    '<button onclick="_apiQtyDelta(1)" style="width:52px;height:52px;border:1px solid var(--fede-border);border-radius:50%;background:var(--fede-surface-2);font-size:26px;line-height:1;cursor:pointer;color:var(--fede-on-surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;">+</button>' +
                '</div>' +
                '<input type="hidden" id="api-qty" value="1">' +
            '</div>' +
            '<div id="api-viab-preview" style="margin-bottom:20px;"></div>' +
            '<div style="display:flex;flex-direction:column;gap:8px;">' +
                '<button onclick="_submitAddPlanItem()" style="width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--fede-r-md);padding:14px;font:var(--fede-label);font-weight:700;cursor:pointer;min-height:48px;">Agregar al plan</button>' +
                '<button onclick="closeAddPlanItem()" style="width:100%;background:none;color:var(--fede-on-surface-3);border:1px solid var(--fede-border);border-radius:var(--fede-r-md);padding:13px;font:var(--fede-label);font-weight:600;cursor:pointer;min-height:48px;">Cancelar</button>' +
            '</div>';
        lucide.createIcons({ nodes: [body] });

        sheet.classList.add('open');
        _apiUpdatePreview();
    }

    function _apiQtyDelta(d) {
        var inp = document.getElementById('api-qty');
        var disp = document.getElementById('api-qty-display');
        if (!inp) return;
        var newVal = Math.max(1, (parseInt(inp.value) || 1) + d);
        inp.value = newVal;
        if (disp) disp.textContent = newVal;
        _apiUpdatePreview();
    }

    function _apiUpdatePreview() {
        var sel = document.getElementById('api-recipe-sel');
        var qtyEl = document.getElementById('api-qty');
        var preview = document.getElementById('api-viab-preview');
        if (!sel || !qtyEl || !preview) return;
        var name = sel.value;
        var qty = parseInt(qtyEl.value) || 1;
        if (!name || !CONFIG.recetas || !CONFIG.recetas[name]) { preview.innerHTML = ''; return; }
        var receta = CONFIG.recetas[name];
        var viab = calcViabilidad(receta, qty);

        var hasProblems = !viab.viable;
        var badgeHtml = '';
        if (hasProblems) {
            badgeHtml = '<div style="display:flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--fede-danger,#dc2626) 10%,transparent);border:1px solid color-mix(in srgb,var(--fede-danger,#dc2626) 30%,transparent);border-radius:var(--fede-r-sm);padding:8px 12px;margin-bottom:10px;">' +
                '<span style="font-size:16px;">⚠</span>' +
                '<span style="font:var(--fede-caption);font-weight:700;color:var(--fede-danger,#dc2626);">Stock insuficiente — máx. ' + viab.maxProducible + ' ' + FeDe_Utils.sanitize(receta.yieldUnit || 'porciones') + '</span>' +
            '</div>';
        }

        var html = '<div>' +
            '<div style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">Ingredientes necesarios</div>' +
            badgeHtml +
            '<div style="background:var(--fede-surface-2);border:1px solid var(--fede-border);border-radius:var(--fede-r-md);overflow:hidden;">';

        for (var i = 0; i < viab.ingredients.length; i++) {
            var ing = viab.ingredients[i];
            var neededQty = ing.neededQty;
            var neededUnit = FeDe_Utils.sanitize(ing.neededUnit || '');
            var neededStr = (neededQty !== null && neededQty !== undefined && neededQty !== '') ? (neededQty + (neededUnit ? ' ' + neededUnit : '')) : '—';

            var icon = '';
            var nameColor = 'var(--fede-on-surface)';
            var qtyColor = 'var(--fede-on-surface-3)';

            if (ing.status === 'ok') {
                icon = '<span style="color:#0d9488;margin-left:6px;font-size:13px;">✓</span>';
            } else if (ing.status === 'low' || ing.status === 'critical') {
                icon = '<span style="color:var(--fede-warning,#d97706);margin-left:6px;font-size:13px;">⚠</span>';
                qtyColor = 'var(--fede-warning,#d97706)';
            } else if (ing.status === 'none' || ing.status === 'unknown' || ing.stockQty === null) {
                qtyColor = 'var(--fede-on-surface-3)';
                /* Solo '—' si qty no existe en la receta; si existe, mostrarla en gris */
                if (!ing.neededQty || ing.neededQty === 0) neededStr = '—';
            }

            var border = (i < viab.ingredients.length - 1) ? 'border-bottom:1px solid var(--fede-border);' : '';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;' + border + '">' +
                '<span style="font:var(--fede-caption);color:' + nameColor + ';">' + FeDe_Utils.sanitize(ing.prod) + '</span>' +
                '<div style="display:flex;align-items:center;">' +
                    '<span style="font:var(--fede-caption);font-weight:600;color:' + qtyColor + ';">' + neededStr + '</span>' +
                    icon +
                '</div>' +
            '</div>';
        }

        html += '</div></div>';
        preview.innerHTML = html;
    }

    function _submitAddPlanItem() {
        var sel = document.getElementById('api-recipe-sel');
        var qtyEl = document.getElementById('api-qty');
        if (!sel || !qtyEl || !sel.value) return showToast('Elegí una receta');
        var name = sel.value;
        var qty = parseInt(qtyEl.value) || 1;
        var dateStr = _prodCurrentDate || _getTodayStr();
        var plan = _getPlanDiario(dateStr);
        if (!plan.items) plan.items = [];
        if (!plan.created_at) plan.created_at = new Date().toISOString();
        plan.items.push({
            id: 'plan-item-' + Date.now(),
            recipe: name,
            qty_planned: qty,
            qty_done: 0,
            status: 'pending',
            executions: []
        });
        _savePlanLocal(dateStr, plan);
        _syncPlanToGAS(dateStr, plan);
        closeAddPlanItem();
        renderPlanDiario();
        updateAgBadgeProduccion();
    }

    function closeAddPlanItem() {
        var sheet = document.getElementById('add-plan-item-sheet');
        if (sheet) sheet.classList.remove('open');
    }

    function cancelPlanItem(itemId) {
        var dateStr = _prodCurrentDate || _getTodayStr();
        var plan = _getPlanDiario(dateStr);
        var item = _findPlanItem(plan, itemId);
        if (!item) return;
        fConfirm({ title: 'Cancelar ítem', message: '¿Cancelar "' + item.recipe + '" del plan?', okText: 'Cancelar ítem' }, function() {
            item.status = 'cancelled';
            _savePlanLocal(dateStr, plan);
            _syncPlanToGAS(dateStr, plan);
            renderPlanDiario();
        });
    }

    function openExecSheet(itemId) {
        var sheet = document.getElementById('exec-confirm-sheet');
        var body = document.getElementById('exec-confirm-body');
        if (!sheet || !body) return;

        var dateStr = _prodCurrentDate || _getTodayStr();
        var plan = _getPlanDiario(dateStr);
        var item = _findPlanItem(plan, itemId);
        if (!item) return;

        var receta = CONFIG.recetas && CONFIG.recetas[item.recipe];
        if (!receta) return showToast('Receta no encontrada');

        var maxQty = (item.qty_planned || 1) - (item.qty_done || 0);
        var workers = CONFIG.workers || [];
        var workerChips = '';
        for (var w = 0; w < workers.length; w++) {
            workerChips += '<span class="worker-chip" onclick="_execToggleWorker(this)">' + FeDe_Utils.sanitize(workers[w]) + '</span>';
        }

        var viab = calcViabilidad(receta, 1);
        var ingRows = '';
        for (var i = 0; i < viab.ingredients.length; i++) {
            var ing = viab.ingredients[i];
            var cls = ing.status === 'ok' ? 'viab-ok' : ing.status === 'low' ? 'viab-low' : (ing.status === 'none' ? 'viab-none' : 'viab-unk');
            ingRows += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--fede-border);">' +
                '<span class="' + cls + '" style="font:var(--fede-caption);">' + FeDe_Utils.sanitize(ing.prod) + '</span>' +
                '<span style="font:var(--fede-caption);color:var(--fede-on-surface-3);">' +
                    (ing.stockQty !== null ? ing.stockQty + ' ' + FeDe_Utils.sanitize(ing.stockUnit || '') : '?') +
                '</span>' +
            '</div>';
        }

        body.innerHTML =
            '<div style="font:var(--fede-h2);font-weight:800;color:var(--fede-on-surface);margin-bottom:4px;">' + FeDe_Utils.sanitize(item.recipe) + '</div>' +
            '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-bottom:18px;">Registrar producción completada</div>' +

            '<div style="margin-bottom:14px;">' +
                '<label style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Cantidad producida</label>' +
                '<div style="display:flex;align-items:center;gap:12px;">' +
                    '<button onclick="_execQtyDelta(-1)" style="width:40px;height:40px;border:1px solid var(--fede-border);border-radius:50%;background:var(--fede-surface);font-size:20px;cursor:pointer;color:var(--fede-on-surface);">−</button>' +
                    '<input id="exec-qty" type="number" min="1" max="' + maxQty + '" value="' + Math.min(1, maxQty) + '" style="width:60px;text-align:center;padding:8px;border:1px solid var(--fede-border);border-radius:var(--fede-r-sm);font:var(--fede-body);background:var(--fede-surface);color:var(--fede-on-surface);">' +
                    '<button onclick="_execQtyDelta(1)" style="width:40px;height:40px;border:1px solid var(--fede-border);border-radius:50%;background:var(--fede-surface);font-size:20px;cursor:pointer;color:var(--fede-on-surface);">+</button>' +
                    '<span style="font:var(--fede-caption);color:var(--fede-on-surface-3);">máx. ' + maxQty + '</span>' +
                '</div>' +
            '</div>' +

            '<div style="margin-bottom:14px;">' +
                '<label style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">¿Quién lo hizo?</label>' +
                (workers.length > 0
                    ? '<div id="exec-workers-chips" style="display:flex;flex-wrap:wrap;gap:8px;">' + workerChips + '</div>'
                    : '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);padding:8px 0;">' +
                        'Sin trabajadores cargados. ' +
                        '<span onclick="goTab(\'datos\')" style="color:var(--primary);font-weight:600;cursor:pointer;text-decoration:underline;">Agregar en Ajustes</span>' +
                      '</div>' +
                      '<div id="exec-workers-chips" style="display:none;"></div>') +
            '</div>' +

            (ingRows ?
                '<div style="margin-bottom:18px;">' +
                    '<div style="font:var(--fede-caption);font-weight:700;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Ingredientes a descontar (por unidad)</div>' +
                    ingRows +
                '</div>'
            : '') +

            '<div style="display:flex;gap:8px;">' +
                '<button onclick="executeProduccion(\'' + itemId.replace(/'/g, "\\'") + '\')" style="flex:1;background:var(--primary);color:#fff;border:none;border-radius:var(--fede-r-md);padding:13px;font:var(--fede-label);font-weight:700;cursor:pointer;">Confirmar Producción</button>' +
                '<button onclick="closeExecSheet()" style="flex:1;background:var(--fede-surface-2);color:var(--fede-on-surface);border:none;border-radius:var(--fede-r-md);padding:13px;font:var(--fede-label);font-weight:600;cursor:pointer;">Cancelar</button>' +
            '</div>';

        sheet.classList.add('open');
    }

    function _execToggleWorker(el) {
        el.classList.toggle('active');
    }

    function _execQtyDelta(d) {
        var inp = document.getElementById('exec-qty');
        if (!inp) return;
        var max = parseInt(inp.max) || 99;
        inp.value = Math.max(1, Math.min(max, (parseInt(inp.value) || 1) + d));
    }

    function closeExecSheet() {
        var sheet = document.getElementById('exec-confirm-sheet');
        if (sheet) sheet.classList.remove('open');
    }

    function executeProduccion(itemId) {
        var dateStr = _prodCurrentDate || _getTodayStr();
        var plan = _getPlanDiario(dateStr);
        var item = _findPlanItem(plan, itemId);
        if (!item) return;

        var receta = CONFIG.recetas && CONFIG.recetas[item.recipe];
        if (!receta) return showToast('Receta no encontrada');

        var qtyEl = document.getElementById('exec-qty');
        var qty = parseInt(qtyEl ? qtyEl.value : 1) || 1;

        var selectedWorkers = [];
        var chips = document.querySelectorAll('#exec-workers-chips .worker-chip.active');
        for (var w = 0; w < chips.length; w++) {
            selectedWorkers.push(chips[w].textContent.trim());
        }
        var hasWorkers = (CONFIG.workers || []).length > 0;
        if (hasWorkers && selectedWorkers.length === 0) {
            return showToast('Seleccioná al menos un trabajador');
        }

        var _submitYields = (receta.yields && receta.yields > 0) ? receta.yields : 1;
        var consumed = [];
        for (var i = 0; i < receta.ingredients.length; i++) {
            var ing = receta.ingredients[i];
            consumed.push({ prod: ing.prod, qty: Math.round(ing.qty / _submitYields * qty * 1000) / 1000, unit: ing.unit, consumed: true });
        }

        var turnoEl = document.getElementById('hdr-turno');
        var entry = {
            id: Date.now() + '-prod',
            fecha: new Date().toISOString(),
            mode: 'produccion',
            recipe: item.recipe,
            qty_produced: qty,
            workers: selectedWorkers,
            turno: (turnoEl && turnoEl.textContent) ? turnoEl.textContent.trim() : 'Sin turno',
            total: qty,
            items: consumed
        };

        toggleSync(true, 'Registrando producción...');
        FeDe_API.call('addHistoryEntry', entry, function() {
            HIST.unshift(entry);

            item.qty_done = (item.qty_done || 0) + qty;
            item.status = item.qty_done >= item.qty_planned ? 'done' : 'partial';
            if (!item.executions) item.executions = [];
            item.executions.push({ id: entry.id, qty: qty, workers: selectedWorkers, ts: entry.fecha, historyId: entry.id });

            _savePlanLocal(dateStr, plan);
            _syncPlanToGAS(dateStr, plan);

            FeDe_API.call('saveProductionLot', {
                sku_id: item.recipe,
                recipe_consumed: receta.ingredients.length,
                actual_consumed: qty,
                units_produced: qty,
                station: selectedWorkers.join(', ')
            }, function() {
                toggleSync(false);
                closeExecSheet();
                renderPlanDiario();
                updateAgBadgeProduccion();
                showToast('Registrado · ' + consumed.length + ' ingredientes descontados del stock');
            });
        });
    }

    // ── Módulo 6: Vista por persona + historial ──────────────────────────────

    function renderByWorker(startStr, endStr) {
        endStr = endStr || startStr;
        var content = document.getElementById('produccion-content');
        if (!content) return;

        var entries = [];
        for (var i = 0; i < HIST.length; i++) {
            var h = HIST[i];
            if (h.mode !== 'produccion') continue;
            if (startStr && !(h.fecha >= startStr && h.fecha <= endStr + 'T23:59:59')) continue;
            entries.push(h);
        }

        if (entries.length === 0) {
            content.innerHTML =
                '<div class="fede-empty-state">' +
                    '<div class="fede-empty-state__icon">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140" fill="none">' +
                            '<circle cx="70" cy="32" r="14" stroke="var(--fede-on-surface-3)" stroke-width="1.8" fill="none"/>' +
                            '<path d="M44 72 Q44 54 70 54 Q96 54 96 72 L96 90 Q96 96 90 96 L50 96 Q44 96 44 90 Z" stroke="var(--fede-on-surface-3)" stroke-width="1.8" fill="none"/>' +
                            '<path d="M58 96 L58 108 M82 96 L82 108" stroke="var(--fede-on-surface-3)" stroke-width="1.8" stroke-linecap="round"/>' +
                            '<rect x="54" y="62" width="32" height="4" rx="2" stroke="var(--fede-on-surface-3)" stroke-width="1.4" fill="none"/>' +
                            '<ellipse cx="70" cy="108" rx="22" ry="5" stroke="var(--fede-on-surface-3)" stroke-width="1.4" fill="none"/>' +
                            '<ellipse cx="70" cy="103" rx="18" ry="6" stroke="var(--primary)" stroke-width="1.8" fill="none"/>' +
                            '<path d="M58 103 Q64 99 70 103 Q76 107 82 103" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" fill="none"/>' +
                            '<line x1="70" y1="97" x2="70" y2="95" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round"/>' +
                        '</svg>' +
                    '</div>' +
                    '<p class="fede-empty-state__title">Sin producciones asignadas</p>' +
                    '<p class="fede-empty-state__body">Agregá recetas al plan para ver el desglose por persona.</p>' +
                '</div>';
            return;
        }

        var byWorker = {};
        for (var j = 0; j < entries.length; j++) {
            var e = entries[j];
            var workers = e.workers && e.workers.length > 0 ? e.workers : ['Sin asignar'];
            for (var k = 0; k < workers.length; k++) {
                var wname = workers[k];
                if (!byWorker[wname]) byWorker[wname] = [];
                byWorker[wname].push(e);
            }
        }

        var html = '';
        var wnames = Object.keys(byWorker);
        for (var wi = 0; wi < wnames.length; wi++) {
            var wn = wnames[wi];
            var wEntries = byWorker[wn];
            html += '<div style="background:var(--fede-surface);border:1px solid var(--fede-border);border-radius:var(--fede-r-md);padding:14px;margin-bottom:10px;">' +
                '<div style="font:var(--fede-label);font-weight:700;color:var(--primary);margin-bottom:10px;">' + FeDe_Utils.sanitize(wn) + '</div>';
            for (var ei = 0; ei < wEntries.length; ei++) {
                var en = wEntries[ei];
                var ts = en.fecha ? new Date(en.fecha).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '';
                html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--fede-border);">' +
                    '<span style="font:var(--fede-body);color:var(--fede-on-surface);">' + FeDe_Utils.sanitize(en.recipe || '?') + '</span>' +
                    '<span style="font:var(--fede-caption);color:var(--fede-on-surface-3);">× ' + (en.qty_produced || en.total || 1) + (ts ? '  · ' + ts : '') + '</span>' +
                '</div>';
            }
            html += '</div>';
        }
        content.innerHTML = html;
    }

    function renderProdHistorial() {
        var content = document.getElementById('produccion-content');
        if (!content) return;

        var entries = [];
        for (var i = 0; i < HIST.length; i++) {
            if (HIST[i].mode === 'produccion') entries.push(HIST[i]);
        }

        if (entries.length === 0) {
            content.innerHTML = '<div style="text-align:center;padding:40px 16px;font:var(--fede-body);color:var(--fede-on-surface-3);">Sin producciones registradas.</div>';
            return;
        }

        var html = '';
        for (var j = 0; j < entries.length; j++) {
            var e = entries[j];
            var fecha = e.fecha ? new Date(e.fecha).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' }) : '?';
            var hora  = e.fecha ? new Date(e.fecha).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '';
            html += '<div style="background:var(--fede-surface);border:1px solid var(--fede-border);border-radius:var(--fede-r-md);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">' +
                '<div>' +
                    '<div style="font:var(--fede-label);font-weight:700;color:var(--fede-on-surface);">' + FeDe_Utils.sanitize(e.recipe || '?') + '</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">' + ((e.workers || []).join(', ') || 'Sin asignar') + '</div>' +
                '</div>' +
                '<div style="text-align:right;">' +
                    '<div style="font:var(--fede-body);font-weight:700;color:var(--primary);">× ' + (e.qty_produced || e.total || 1) + '</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">' + fecha + (hora ? ' · ' + hora : '') + '</div>' +
                '</div>' +
            '</div>';
        }
        content.innerHTML = html;
    }

    // ── Módulo 7: Badge home ──────────────────────────────────────────────────

    function updateAgBadgeProduccion() {
        var el = document.getElementById('ag-badge-produccion');
        if (!el) return;
        var today = _getTodayStr();
        var plan = _getPlanDiario(today);
        var items = plan.items || [];
        if (items.length === 0) { el.textContent = 'Plan del día'; return; }
        var done = 0;
        for (var i = 0; i < items.length; i++) {
            if (items[i].status === 'done') done++;
        }
        el.textContent = done + '/' + items.length + ' listos';
    }

</script>
