    var histLimit = 20;
    function renderHistory(loadMore, isFilterChange) {
        if (loadMore === undefined) loadMore = false;
        if (isFilterChange === undefined) isFilterChange = false;
        if (!loadMore) histLimit = 20;

        // F: skip re-render si HIST no cambió y no hay nuevo filtro
        if (!loadMore && !isFilterChange && HIST.length === _histLastRenderedLen) return;

        var list = document.getElementById('hist-list');
        if (!list) return;

        // Si la app aún no terminó de cargar, mostrar skeleton en lugar de lista vacía
        if (!_appReady && HIST.length === 0) {
            list.innerHTML =
                '<div style="display:flex;flex-direction:column;gap:10px;padding:8px 0;">' +
                    '<div style="height:64px;background:var(--fede-surface);border-radius:var(--fede-r-md);opacity:0.5;animation:fede-pulse 1.2s ease-in-out infinite;"></div>' +
                    '<div style="height:64px;background:var(--fede-surface);border-radius:var(--fede-r-md);opacity:0.4;animation:fede-pulse 1.2s ease-in-out infinite 0.2s;"></div>' +
                    '<div style="height:64px;background:var(--fede-surface);border-radius:var(--fede-r-md);opacity:0.3;animation:fede-pulse 1.2s ease-in-out infinite 0.4s;"></div>' +
                    '<div style="text-align:center;padding:8px;font:var(--fede-caption);color:var(--fede-on-surface-3);">Cargando historial...</div>' +
                '</div>';
            list.style.opacity = '1';
            return;
        }

        if (!loadMore) list.style.opacity = '0.5';

        // A: sort usando _ts pre-calculado (evita new Date() × N)
        var filtered = HIST.slice().sort(function(a, b) {
            return (b._ts || 0) - (a._ts || 0);
        });

        // D: filtro modo + rango fecha + query en un único O(n)
        var modeFilter = histFilters.mode;
        var fromMs = null, toMs = null;
        if (histFilters.from) {
            var fp = histFilters.from.split('-');
            fromMs = new Date(fp[0], fp[1] - 1, fp[2], 0, 0, 0, 0).getTime();
        }
        if (histFilters.to) {
            var tp = histFilters.to.split('-');
            toMs = new Date(tp[0], tp[1] - 1, tp[2], 23, 59, 59, 999).getTime();
        }
        var q = histFilters.query ? normalizeStr(histFilters.query.trim()) : '';
        var hasFilters = modeFilter !== 'all' || fromMs !== null || toMs !== null || q !== '';

        if (hasFilters) {
            var newList = [];
            for (var i = 0; i < filtered.length; i++) {
                var h = filtered[i];

                if (modeFilter !== 'all') {
                    var m = normalizeStr((h.modo || h.mode || 'stock').toLowerCase());
                    var mok = (modeFilter === 'recepcion') ? (m === 'recepcion' || m === 'entrante') : (m === modeFilter);
                    if (!mok) continue;
                }

                var ts = h._ts || 0;
                if (fromMs !== null && ts < fromMs) continue;
                if (toMs !== null && ts > toMs) continue;

                if (q) {
                    var bestIdx = -1;
                    var items = h.items || [];
                    for (var j = 0; j < items.length; j++) {
                        var np = normalizeStr(items[j].prod);
                        var nc = items[j].cat ? normalizeStr(items[j].cat) : '';
                        var idxP = np.indexOf(q);
                        var idxC = nc.indexOf(q);
                        if (idxP !== -1) { bestIdx = (bestIdx === -1) ? idxP : Math.min(bestIdx, idxP); }
                        else if (idxC !== -1) { bestIdx = (bestIdx === -1) ? idxC : Math.min(bestIdx, idxC); }
                    }
                    if (bestIdx === -1) continue;
                    h._searchIdx = bestIdx;
                }

                newList.push(h);
            }

            if (q) {
                newList.sort(function(a, b) {
                    var sA = a._searchIdx === 0, sB = b._searchIdx === 0;
                    if (sA && !sB) return -1;
                    if (sB && !sA) return 1;
                    if (a._searchIdx !== b._searchIdx) return a._searchIdx - b._searchIdx;
                    return (b._ts || 0) - (a._ts || 0);
                });
            }
            filtered = newList;
        }

        // Deduplicar por ID
        var _seenIds = {};
        var _deduped = [];
        for (var di = 0; di < filtered.length; di++) {
            var _hid = String(filtered[di].id);
            if (!_seenIds[_hid]) { _seenIds[_hid] = true; _deduped.push(filtered[di]); }
        }
        filtered = _deduped;

        var totalFound = filtered.length;
        var visible = filtered.slice(0, histLimit);

        var countEl = document.getElementById('hist-result-count');
        if (countEl) {
            countEl.textContent = totalFound === 0 ? 'Sin resultados' : totalFound + ' registro' + (totalFound !== 1 ? 's' : '');
        }

        if (!totalFound) {
            list.innerHTML = '<div style="text-align:center;padding:56px 20px;">' +
                '<div style="font-size:36px;font-weight:800;color:var(--fede-border);letter-spacing:-1px;margin-bottom:8px;">—</div>' +
                '<div style="font-size:14px;font-weight:600;color:var(--fede-on-surface-2);margin-bottom:4px;">Sin registros</div>' +
                '<div style="font-size:12px;color:var(--fede-on-surface-3);">' + (histFilters.mode !== 'all' ? histFilters.mode.toUpperCase() + ' SIN COINCIDENCIAS' : 'FILTRO O RANGO SIN COINCIDENCIAS') + '</div>' +
                '</div>';
            list.style.opacity = '1';
            return;
        }

        var _HIST_ICONS = {
            pedido:     { icon: 'shopping-cart', cls: 'pedido',    label: 'Pedido'     },
            stock:      { icon: 'package',       cls: 'stock',     label: 'Stock'      },
            recepcion:  { icon: 'truck',         cls: 'recepcion', label: 'Recepcion'  },
            entrante:   { icon: 'truck',         cls: 'recepcion', label: 'Recepcion'  },
            merma:      { icon: 'trash-2',       cls: 'merma',     label: 'Merma'      },
            produccion: { icon: 'chef-hat',      cls: 'produccion',label: 'Produccion' }
        };

        var today = new Date();
        var yesterday = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1);

        // Agrupar visible por fecha
        var groups = [];
        var groupMap = {};
        for (var i = 0; i < visible.length; i++) {
            var h = visible[i];
            var dateObj = new Date(h._ts || h.fecha);
            var dateKey = dateObj.toDateString();
            if (!groupMap[dateKey]) {
                var dateLabel;
                if (dateKey === today.toDateString()) {
                    dateLabel = 'HOY';
                } else if (dateKey === yesterday.toDateString()) {
                    dateLabel = 'AYER';
                } else {
                    dateLabel = dateObj.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
                }
                groupMap[dateKey] = { label: dateLabel, items: [] };
                groups.push(groupMap[dateKey]);
            }
            groupMap[dateKey].items.push(h);
        }

        var html = '';
        for (var gi = 0; gi < groups.length; gi++) {
            var grp = groups[gi];
            html += '<div class="fede-hist-date-group">' + grp.label + '</div>';
            for (var ii = 0; ii < grp.items.length; ii++) {
                var h = grp.items[ii];
                var _m = (h.modo || h.mode || 'stock').toLowerCase();
                var _info = _HIST_ICONS[_m] || { icon: 'package', cls: 'stock', label: 'Stock' };
                var timeStr = new Date(h._ts || h.fecha).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
                var totalItems = h.total || (h.items ? h.items.length : 0);
                var itemLabel = totalItems + ' item' + (totalItems !== 1 ? 's' : '');

                html += '<div class="fede-hist-card" onclick="toggleHistExpand(\'' + h.id + '\')">' +
                    '<div class="fede-hist-icon fede-hist-icon-' + _info.cls + '">' +
                        '<i data-lucide="' + _info.icon + '" style="width:18px;height:18px;stroke-width:1.8;"></i>' +
                    '</div>' +
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">' +
                            '<span class="fede-hist-badge fede-hist-badge-' + _info.cls + '">' + _info.label + '</span>' +
                            (h.motivo ? '<span style="font-size:9px;font-weight:600;color:var(--fede-warning);">' + FeDe_Utils.sanitize(h.motivo) + '</span>' : '') +
                        '</div>' +
                        '<div style="font-size:12px;color:var(--fede-on-surface-3);">' + itemLabel + '</div>' +
                    '</div>' +
                    '<div style="text-align:right;flex-shrink:0;">' +
                        '<div style="font-size:11px;font-weight:600;color:var(--fede-on-surface-2);">' + timeStr + '</div>' +
                    '</div>' +
                    '<span class="fede-hist-chevron" id="hist-chev-' + h.id + '">' +
                        '<i data-lucide="chevron-down" style="width:14px;height:14px;"></i>' +
                    '</span>' +
                '</div>' +
                '<div id="hist-expanded-' + h.id + '" class="fede-hist-expanded"></div>';
            }
        }

        if (totalFound > histLimit) {
            html += '<button onclick="histLimit += 20; renderHistory(true)" style="width:100%;padding:14px;background:transparent;border:none;border-top:1px solid var(--fede-border);font-size:13px;font-weight:600;color:var(--fede-on-surface-3);cursor:pointer;margin-top:8px;">' +
                'Ver mas · ' + (totalFound - histLimit) + ' restantes' +
                '</button>';
        }

        list.innerHTML = html;
        list.style.opacity = '1';
        _histLastRenderedLen = HIST.length; // F: marcar estado renderizado
        if (lucide) lucide.createIcons({ nodes: [list] });
    }

    function toggleHistExpand(id) {
        var el = document.getElementById('hist-expanded-' + id);
        if (!el) return;
        var chevron = document.getElementById('hist-chev-' + id);
        var isOpening = !el.classList.contains('expanded');
        el.classList.toggle('expanded');
        if (chevron) chevron.classList.toggle('rotated', isOpening);

        if (isOpening && !el.dataset.loaded) {
            var h = HIST_INDEX[String(id)];
            if (!h) return;
            var items = Array.isArray(h.items) ? h.items : [];

            var itemsHtml = '';
            for (var j = 0; j < items.length; j++) {
                var it = items[j];
                var isSpecial = it.qty === 86;
                itemsHtml += '<div class="hist-item-row">' +
                    '<span class="hist-item-name">' + FeDe_Utils.sanitize(it.prod || '') + '</span>' +
                    '<span class="hist-item-qty' + (isSpecial ? ' hist-item-qty--special' : '') + '">' +
                    (isSpecial ? '86' : UNIT_STEPPER.formatQty(it.qty, it.unit) + ' ' + formatUnit(it.qty, it.unit)) +
                    '</span>' +

    var editingHistId = null, editingHistItems = [], editingHistMode = 'stock';
    function editHistEntry(id) {
        var h = null;
        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id == id) { h = HIST[i]; break; } }
        if (!h) return;
        editingHistId = id;
        editingHistItems = JSON.parse(JSON.stringify(h.items));
        editingHistMode = (h.mode || 'stock').toLowerCase();
        if (editingHistMode === 'entrante') editingHistMode = 'recepcion';

        if (h.fecha) {
            var d = new Date(h.fecha);
            var local = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            var dateD = document.getElementById('edit-hist-date-d');
            var dateT = document.getElementById('edit-hist-date-t');
            if (dateD) dateD.value = local.slice(0, 10);
            if (dateT) dateT.value = local.slice(11, 16);
        }

        var sInput = document.getElementById('edit-hist-search');
        if (sInput) sInput.value = '';
        var sResults = document.getElementById('edit-hist-search-results');
        if (sResults) { sResults.innerHTML = ''; sResults.style.display = 'none'; }

        renderEditHistItems();
        document.getElementById('modal-edit-hist').classList.add('open');
        document.body.style.overflow = 'hidden';
        setTimeout(function () { setEditMode(editingHistMode, false); }, 50);
        setTimeout(function () { refreshIcons(); }, 100);
    }

    function setEditMode(m, save) {
        if (save === undefined) save = true;
        if (save) editingHistMode = m;
        var active = save ? m : editingHistMode;
        var modes = ['pedido', 'stock', 'recepcion'];
        for (var i = 0; i < modes.length; i++) {
            var mode = modes[i];
            var btn = document.getElementById('edit-mode-' + mode);
            if (!btn) continue;
            var on = mode === active;
            btn.style.border = '2px solid ' + (on ? 'var(--' + (mode === 'recepcion' ? 'green' : (mode === 'stock' ? 'blue' : 'orange')) + ')' : 'var(--bd2)');
            btn.style.background = on ? 'var(--s2)' : 'var(--s1)';
            btn.style.opacity = on ? '1' : '0.4';
        }
    }

            html += '<div class="mcf-edit-row">' +
                '<div class="mcf-edit-row-info">' +

    function stepEditHistItem(idx, dir) {

    function _getEditHistDate(fallback) {

        if (!editingHistId) return toast('Error: sin registro seleccionado');
        if (!editingHistItems || editingHistItems.length === 0) return toast('El registro no puede quedar vacío');

        var btn = document.querySelector('#modal-edit-hist .btn-confirm');
        if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

        var patch = {
            fecha : _getEditHistDate(null),
            mode  : editingHistMode,
            items : editingHistItems,
            total : editingHistItems.length
        };

        FeDe_API.call('updateHistoryEntry', { entryId: editingHistId, patch: patch }, function (res) {
            if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; }

            loadConfigFromGAS();

        if (!editingHistItems || !editingHistItems.length) return toast('No hay items para compartir');
        var orig = null;
        for (var si = 0; si < HIST.length; si++) { if (HIST[si].id == editingHistId) { orig = HIST[si]; break; } }
        if (orig && JSON.stringify(editingHistItems) !== JSON.stringify(orig.items)) {
            toast('Compartiendo cambios aún no guardados');

        var title = (CONFIG && CONFIG.app_title) ? CONFIG.app_title : 'FEDE GASTRO PRO';

        for (var i = 0; i < HIST.length; i++) { if (HIST[i].id == editingHistId) { orig = HIST[i]; break; } }

        var dateStr = d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var timeStr = d.toLocaleTimeString('es-AR', { hour12: false, hour: '2-digit', minute: '2-digit' });

        for (var j = 0; j < catKeys.length; j++) {

    function searchEditHistProduct(q) {
        var res = document.getElementById('edit-hist-search-results');
        if (!q || q.length < 2) { if (res) res.style.display = 'none'; return; }

        var inEdit = {};
        for (var k = 0; k < editingHistItems.length; k++) inEdit[editingHistItems[k].prod] = true;

        var matches = [];
        var query = q.toLowerCase();
        var catKeys = Object.keys(CATS);
        outer: for (var i = 0; i < catKeys.length; i++) {
            var cat = catKeys[i];
            var prods = CATS[cat].prods || [];
            for (var j = 0; j < prods.length; j++) {
                var p = prods[j];
                if (!inEdit[p] && p.toLowerCase().indexOf(query) !== -1) {
                    matches.push({ prod: p, cat: cat });
                    if (matches.length >= 10) break outer;
                }
            }
        }

        if (!matches.length) { if (res) res.style.display = 'none'; return; }

        var matchHtml = '';
        for (var l = 0; l < matches.length; l++) {
            var m = matches[l];
            matchHtml += '<div onclick="addHistEntryProduct(\'' + m.prod.replace(/'/g, "\\'") + '\', \'' + m.cat.replace(/'/g, "\\'") + '\')" ' +
                'style="padding:12px 16px; border-bottom:1px solid var(--bd2); cursor:pointer; font-size:14px; color:var(--text); font-weight:600; display:flex; justify-content:space-between; align-items:center;">' +
                '<span>' + m.prod + '</span>' +
                '<span style="font-size:10px; color:var(--primary); opacity:0.7;">' + m.cat + '</span>' +
                '</div>';
        }
        if (res) {
            res.innerHTML = matchHtml;
            res.style.display = 'block';
        }
    }

    function fsStepProd(dir) {
        var prod = fsProducts[fsCurrentIdx];
        if (!relData[prod]) relData[prod] = { qty: 0, unit: getUnitsForProduct(fsCurrentCat, prod)[0] };
        var prevUnitF = relData[prod].unit;
        var snF = UNIT_STEPPER.stepNormalized(relData[prod].qty, relData[prod].unit, dir);
        relData[prod].qty  = snF.qty;
        relData[prod].unit = snF.unit;
        if (snF.unit !== prevUnitF) {
            UNIT_MEM.save(prod, snF.unit);
            UnitFreq.record(prod, currentMode || 'stock', snF.unit);
        }
        if (relData[prod].qty === 0) delete relData[prod];
        renderFSProduct(); saveDraft();
    }

    }

    /**

     */
    function renderHomeSummary() {
        var el = document.getElementById('home-alerts-card');
        if (!el) return;

        var isHidden = el.dataset.spHidden === '1';
        var alerts = [];
        var now = new Date();
        var _nowMs = now.getTime();

        // Pre-computar último stock y pedido desde HIST (fuente de verdad)
        var _lastStockMs = 0, _lastPedidoMs = 0;
        if (HIST && HIST.length) {
            for (var _si = 0; _si < HIST.length; _si++) {
                var _he = HIST[_si];
                var _ht = _he._ts || new Date(_he.fecha).getTime();
                if (_he.mode === 'stock' && _ht > _lastStockMs) _lastStockMs = _ht;
                if (_he.mode === 'pedido' && _ht > _lastPedidoMs) _lastPedidoMs = _ht;
            }
        }
        var _stockDoneToday  = _lastStockMs  > 0 && Math.floor((_nowMs - _lastStockMs)  / 86400000) === 0;
        var _pedidoDoneToday = _lastPedidoMs > 0 && Math.floor((_nowMs - _lastPedidoMs) / 86400000) === 0;

        // 1. Trabajo Pendiente (Draft)
        var draftStr = localStorage.getItem('fede_draft');
        var draft = draftStr ? JSON.parse(draftStr) : null;
        if (draft && draft.items && Object.keys(draft.items).length > 0) {
            alerts.unshift({ icon: 'database', color: 'amber', title: 'RESUMIR TRABAJO', desc: 'Borrador sin guardar', urgent: true, action: 'restoreDraft()' });
        }

        // 2. Próximo Pedido Programado
        var orderDays = (CONFIG.orderDays && CONFIG.orderDays.length > 0) ? CONFIG.orderDays : [1, 4];
        var todayIdx = now.getDay();
        var minDiff = 8;
        for (var i = 0; i < orderDays.length; i++) {
            var diff = (orderDays[i] - todayIdx + 7) % 7;
            if (diff < minDiff) minDiff = diff;
        }
        var orderDesc = minDiff === 0 ? 'HACER HOY' : (minDiff === 1 ? 'MAÑANA' : 'EN ' + minDiff + ' DÍAS');
        // Suprimir si el pedido ya se realizó hoy
        if (!_pedidoDoneToday) {
            alerts.push({ icon: minDiff === 0 ? 'truck' : 'clock', color: 'amber', title: 'Realizar pedido', desc: orderDesc, urgent: minDiff <= 1, action: "initRelevamiento('pedido')" });
        }

        // 3. Control obligatorio
        var day = now.getDay();
        if (day === 0 || day === 2) {
            // Verificar contra HIST (fuente de verdad) con sessionStorage como respaldo inmediato
            var isDone = _stockDoneToday || sessionStorage.getItem('fede_stock_done') === 'CONTROL DE STOCK';
            if (!isDone) {
                alerts.push({ icon: 'alert-octagon', color: 'slate', title: 'Control Obligatorio', desc: 'Falta registro de hoy', urgent: true, action: "initRelevamiento('stock')" });
            }
        }

        // 4. Feriados próximos
        if (typeof getUpcomingHolidays === 'function') {
            var upcoming = getUpcomingHolidays(7);
            for (var j = 0; j < upcoming.length; j++) {
                var h = upcoming[j];
                var diffMs = h.date.getTime() - now.getTime();
                var daysLeft = Math.ceil(diffMs / (1000 * 3600 * 24));
                var timeText = daysLeft <= 0 ? 'HOY' : (daysLeft === 1 ? 'MAÑANA' : 'EN ' + daysLeft + ' DÍAS');
                alerts.push({ icon: 'calendar', color: 'rose', title: h.name, desc: timeText });
            }
        }

        // 5. Eventos de Google Calendar
        if (window._gcalEvents && window._gcalEvents.length > 0) {
            for (var ci = 0; ci < window._gcalEvents.length; ci++) {
                var ev = window._gcalEvents[ci];
                var evStart = new Date(ev.start);
                var evDiffMs = evStart.getTime() - now.getTime();
                var evDaysLeft = Math.ceil(evDiffMs / (1000 * 3600 * 24));
                var evTime = ev.isAllDay ? '' : evStart.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                var evWhen = evDaysLeft <= 0 ? 'HOY' : (evDaysLeft === 1 ? 'MAÑANA' : 'EN ' + evDaysLeft + ' DÍAS');
                var evNote = ev.description ? ev.description.split('\n')[0].trim() : '';
                var evDesc = evWhen + (evTime ? ' · ' + evTime : '') + (evNote ? ' · ' + evNote : '');
                var safeEvId = (ev.eventId || '').replace(/'/g, "\\'");
                alerts.push({
                    icon: 'calendar-check', color: 'sage',
                    title: ev.title, desc: evDesc, urgent: evDaysLeft <= 1,
                    action: 'closeHomeNotifications();goTab(\'reservas\')'
                });
            }
        }

        // ── Drift ABC: productos cuya clase manual diverge del algoritmo ──
        var driftProds = _getDriftProds();
        if (driftProds.length > 0) {
            alerts.push({
                icon: 'trending-up',
                color: 'amber',
                title: driftProds.length + ' producto' + (driftProds.length > 1 ? 's' : '') + ' cambi' + (driftProds.length > 1 ? 'aron' : 'ó') + ' de clase ABC',
                desc: 'El algoritmo detectó nuevos patrones de uso.',
                urgent: false,
                action: 'openDriftReview()'
            });
        }

        // ── Plan de producción: ingredientes insuficientes ──
        try {
            var planAlerts = _checkTodayPlanAlerts();
            if (planAlerts.length > 0) {
                alerts.push({
                    icon: 'chef-hat',
                    color: 'rose',
                    title: planAlerts.length + ' receta' + (planAlerts.length !== 1 ? 's' : '') + ' sin stock suficiente',
                    desc: 'Revisá el plan de producción de hoy.',
                    urgent: true,
                    action: 'initProduccion()'
                });
            }
        } catch(e) {}

        var urgentCount = alerts.filter(function(a) { return a.urgent; }).length;
        var chevron = isHidden ? 'chevron-down' : 'chevron-up';

        function getAlertTones(color) {
            if (color === 'amber') return { accent: 'var(--fede-warning)', bg: 'rgba(217,119,6,0.1)' };
            if (color === 'rose')  return { accent: 'var(--fede-danger)',  bg: 'rgba(220,38,38,0.09)' };
            if (color === 'sage')  return { accent: 'var(--fede-success)', bg: 'rgba(22,163,74,0.09)' };
            return                         { accent: 'var(--fede-info)',    bg: 'rgba(37,99,235,0.09)' };
        }

        var badgeHtml = '';
        if (urgentCount > 0) {
            badgeHtml = '<span class="fede-alerts-header-badge">' + urgentCount + '</span>';
        } else if (alerts.length > 0) {
            badgeHtml = '<span class="fede-alerts-header-badge neutral">' + alerts.length + '</span>';
        }

        var html = '';
        
        // Header
        html += '<div class="fede-alerts-header" onclick="toggleHomeAlerts()">' +
                '  <div class="fede-alerts-header-group">' +
                '    <i data-lucide="bell-ring" class="fede-alerts-header-icon"></i>' +
                '    <span class="fede-alerts-header-label">Notificaciones operativas</span>' +
                badgeHtml +
                '  </div>' +

    /* ── Últimos registros en el Home ─────────────────────────────────────────
       Muestra hasta 3 entradas recientes del HIST con mini-tarjeta.
       Sin lucide icons para evitar overhead — usa emojis/carácter como fallback.
    ──────────────────────────────────────────────────────────────────────── */
    function renderHomeRecents() {
        var el = document.getElementById('home-recent-hist');
        if (!el) return;

        var _MODE_CFG = {
            pedido:    { label: 'Pedido',     icon: 'shopping-cart', color: '#2563eb', bg: 'rgba(37,99,235,0.10)'  },
            stock:     { label: 'Stock',      icon: 'package',       color: '#16a34a', bg: 'rgba(22,163,74,0.10)'  },
            recepcion: { label: 'Recepción',  icon: 'truck',         color: '#7c3aed', bg: 'rgba(124,58,237,0.10)' },
            entrante:  { label: 'Recepción',  icon: 'truck',         color: '#7c3aed', bg: 'rgba(124,58,237,0.10)' },
            merma:     { label: 'Merma',      icon: 'trash-2',       color: '#d97706', bg: 'rgba(217,119,6,0.10)'  },
            produccion:{ label: 'Producción', icon: 'chef-hat',      color: '#0d9488', bg: 'rgba(13,148,136,0.10)' }
        };

        if (!HIST || HIST.length === 0) {
            el.innerHTML =
                '<div style="text-align:center;padding:28px 0 8px;">' +
                    '<div style="font-size:32px;font-weight:800;letter-spacing:-1px;color:var(--fede-border);margin-bottom:8px;">—</div>' +
                    '<div style="font-size:13px;color:var(--fede-on-surface-3);">Sin actividad registrada aún</div>' +
                '</div>';
            return;
        }

        var sorted = HIST.slice().sort(function(a, b) { return (b._ts || 0) - (a._ts || 0); });
        var recent = sorted.slice(0, 4);
        var html = '<div style="display:flex;flex-direction:column;gap:0;">';

        for (var i = 0; i < recent.length; i++) {
            var h = recent[i];
            var m = ((h.modo || h.mode) || 'stock').toLowerCase();
            var cfg = _MODE_CFG[m] || { label: m, icon: 'circle', color: '#888', bg: 'rgba(136,136,136,0.10)' };
            var dateObj = new Date(h._ts || h.fecha);
            var isToday = (new Date()).toDateString() === dateObj.toDateString();
            var dateStr = isToday
                ? 'Hoy'
                : dateObj.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short' });
            var timeStr = dateObj.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
            var totalItems = h.total || (h.items ? h.items.length : 0);
            var isLast = (i === recent.length - 1);

            html +=
                '<div onclick="goTab(\'historial\')" style="display:flex;align-items:center;gap:14px;' +
                    'padding:12px 0;cursor:pointer;touch-action:manipulation;' +
                    (isLast ? '' : 'border-bottom:1px solid var(--fede-border);') + '">' +
                    /* Ícono con color de modo */
                    '<div style="width:40px;height:40px;border-radius:var(--fede-r-md);flex-shrink:0;' +
                        'background:' + cfg.bg + ';display:flex;align-items:center;justify-content:center;">' +
                        '<i data-lucide="' + cfg.icon + '" style="width:18px;height:18px;color:' + cfg.color + ';stroke-width:1.8;"></i>' +
                    '</div>' +
                    /* Info principal */
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">' +
                            '<span style="font-size:13px;font-weight:700;color:var(--fede-on-surface);">' + cfg.label + '</span>' +
                            '<span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;' +
                                'background:' + cfg.bg + ';color:' + cfg.color + ';">' +
                                totalItems + ' ítem' + (totalItems !== 1 ? 's' : '') +
                            '</span>' +
                        '</div>' +
                        '<div style="font-size:11px;color:var(--fede-on-surface-3);">' + dateStr + ' · ' + timeStr + '</div>' +
                    '</div>' +
                    '<i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--fede-border);stroke-width:2.5;flex-shrink:0;"></i>' +
                '</div>';
        }

        html += '</div>';
        el.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [el] });
    }

    function runSystemTest() {
        var resEl = document.getElementById('test-results');
        if (!resEl) return;
        resEl.innerHTML = "> INICIALIZANDO SECUENCIA DE DIAGNÓSTICO…<br>> ESPERANDO RESPUESTA DE NÚCLEO…";
        resEl.classList.remove('hidden');

        var log = [];
        function addLog(msg, success) { 
            var status = success ? '[OK]' : '[FAIL]';
            var color = success ? '#00FF41' : 'var(--mcf-rose)';
            log.push('<div style="display:flex; justify-content:space-between; gap:10px;">' +
                '<span>> ' + msg.toUpperCase() + '</span>' +
                '<span style="font-weight:950; color:' + color + '">' + status + '</span>' +
                '</div>');
            resEl.innerHTML = log.join('');
        }

        try {
            // 1. Integridad de Datos Local
            var catCount = Object.keys(CATS).length;
            addLog("Estructura de Datos Local", catCount > 0);

            // 2. Persistencia Local
            localStorage.setItem('fede_diag_test', '1');
            var localOK = localStorage.getItem('fede_diag_test') === '1';
            localStorage.removeItem('fede_diag_test');
            addLog("LocalStorage R/W Access", localOK);

            // 3. Estructura DOM (Critical Checks)
            var missing = [];
            ['home', 'app', 'mcf-bottom-search-bar'].forEach(function(id) {
                if (!document.getElementById(id)) missing.push(id);
            });
            addLog("Integridad de Interfaz", missing.length === 0);

            // 4. Versión y Build
            addLog("Build v12.0.0 Smart Replenishment", true);

            // 5. Conectividad con Servidor (Async)
            addLog("Cloud Handshake...", true);
            
            FeDe_API.call('getAppConfig', null, function(r) {
                addLog("Servidor GAS (Uplink Stable)", true);
                addLog("Auth Token Status", true);
                toast("✓ Diagnóstico completado");
            }, function(err) {
                addLog("Servidor GAS Error: " + err, false);
            });

        } catch (e) {
            addLog("SYSTEM EXCEPTION: " + e.message, false);
        }
    }
    /**
     * 📅 INTEGRACIÓN CON GOOGLE CALENDAR
     */
    function refreshGCalendar() {
        FeDe_API.call('getCalendarEvents', null, function(res) {
            // Cachear para renderHomeSummary
            window._gcalEvents = (res.success && res.events) ? res.events : [];

            // Actualizar panel de alertas del Home con los datos frescos
            try { renderHomeSummary(); } catch(e) {}

            // Si el widget del dashboard está visible, actualizarlo también
            var listEl = document.getElementById('dash-gcal-list');
            if (!listEl) return;

            if (window._gcalEvents.length === 0) {
                listEl.innerHTML = '<div style="font-size:12px; color:var(--muted); text-align:center; padding:10px;">No hay eventos esta semana</div>';
                return;
            }

            var html = '';
            window._gcalEvents.forEach(function(ev) {
                var start = new Date(ev.start);
                var timeStr = ev.isAllDay ? 'TODO EL DÍA' : start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                html += '<div class="gcal-item">' +
                            '<div class="gcal-time">' + timeStr + '</div>' +
                            '<div class="gcal-title">' + ev.title + '</div>' +
                        '</div>';
            });
            listEl.innerHTML = html;
        }, function(err) {
            window._gcalEvents = [];
            var listEl = document.getElementById('dash-gcal-list');
            if (listEl) listEl.innerHTML = '<div style="font-size:10px; color:var(--red); text-align:center;">Error: Google Calendar no responde</div>';
        });
    }

    function openReservationModal() {
        var overlay = document.getElementById('reservation-overlay');
        if (!overlay) return;
        // Set today as default date
        var today = new Date();
        var yyyy = today.getFullYear();
        var mm = String(today.getMonth() + 1).padStart(2, '0');
        var dd = String(today.getDate()).padStart(2, '0');
        var dateInput = document.getElementById('res-date');
        if (dateInput) dateInput.value = yyyy + '-' + mm + '-' + dd;
        var timeInput = document.getElementById('res-time');
        if (timeInput) timeInput.value = '20:00';
        var titleInput = document.getElementById('res-title');
        if (titleInput) { titleInput.value = ''; titleInput.focus(); }
        var notesInput = document.getElementById('res-notes');
        if (notesInput) notesInput.value = '';
        var allDay = document.getElementById('res-allday');
        if (allDay) allDay.checked = false;
        var timeGroup = document.getElementById('res-time-group');
        if (timeGroup) timeGroup.style.display = '';
        overlay.classList.remove('hidden');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function closeReservationModal(e) {
        if (e && e.target !== document.getElementById('reservation-overlay')) return;
        document.getElementById('reservation-overlay').classList.add('hidden');
    }

    function toggleReservationAllDay() {
        var allDay = document.getElementById('res-allday');
        var timeGroup = document.getElementById('res-time-group');
        if (timeGroup) timeGroup.style.display = allDay && allDay.checked ? 'none' : '';
    }

    function submitReservation() {
        var title = (document.getElementById('res-title').value || '').trim();
        var date  = document.getElementById('res-date').value;
        var time  = document.getElementById('res-time').value;
        var notes = (document.getElementById('res-notes').value || '').trim();
        var allDay = document.getElementById('res-allday').checked;

        if (!title) { toast('Ingresa un título para la reserva'); return; }
        if (!date)  { toast('Selecciona una fecha'); return; }

        var btn = document.getElementById('res-submit-btn');
        if (btn) btn.disabled = true;

        FeDe_API.call('saveReservation', { title: title, date: date, time: time, isAllDay: allDay, notes: notes }, function(res) {
            if (btn) btn.disabled = false;
            if (res && res.success) {
                toast('Reserva guardada en Calendar ✓');
                document.getElementById('reservation-overlay').classList.add('hidden');
                window._gcalEvents = null;
                refreshGCalendar();
                // Si estamos en la vista de reservas, refrescar la lista
                if (document.getElementById('view-reservas') &&
                    document.getElementById('view-reservas').classList.contains('active')) {
                    renderReservas();
                }
            } else {
                toast('Error al guardar: ' + (res && res.message ? res.message : 'Error desconocido'));
            }
        }, function(err) {
            if (btn) btn.disabled = false;
            toast('Error de conexión con Calendar');
        });
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       MÓDULO DE RESERVAS — Vista de lista y gestión

    /* renderReservas() — Obtiene eventos del Calendar y los renderiza como lista
       expandible en #reservas-list. Usa window._gcalEvents como cache. */
    function renderReservas() {
        var el = document.getElementById('reservas-list');
        if (!el) return;

        el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:16px;color:var(--fede-on-surface-3);">' +
            '<i data-lucide="loader" style="width:16px;height:16px;animation:spin 1s linear infinite;"></i>' +
            '<span style="font:var(--fede-label);">Cargando reservas...</span></div>';
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [el] });

        FeDe_API.call('getCalendarEvents', {}, function(res) {
            if (!res || !res.success) {
                el.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--fede-on-surface-3);font:var(--fede-label);">' +
                    '⚠ No se pudo cargar el calendario</div>';
                return;
            }
            window._gcalEvents = res.events || [];
            _renderReservasList(el, window._gcalEvents);
        }, function() {
            el.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--fede-danger);font:var(--fede-label);">' +
                'Error de conexión con Calendar</div>';
        });
    }

    function _renderReservasList(el, events) {
        var now = new Date();
        var todayStr = now.toISOString().split('T')[0];

        // Separar próximas y pasadas (hasta 7 días atrás)
        var proximas = [], pasadas = [];
        for (var i = 0; i < events.length; i++) {
            var ev = events[i];
            var evDate = ev.start ? ev.start.split('T')[0] : '';
            if (evDate >= todayStr) proximas.push(ev);
            else pasadas.push(ev);
        }
        // Ordenar próximas asc, pasadas desc
        proximas.sort(function(a, b) { return a.start > b.start ? 1 : -1; });
        pasadas.sort(function(a, b) { return a.start < b.start ? 1 : -1; });

        if (proximas.length === 0 && pasadas.length === 0) {
            el.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 24px;color:var(--fede-on-surface-3);">' +
                '<i data-lucide="calendar-x" style="width:36px;height:36px;opacity:0.4;"></i>' +
                '<span style="font:var(--fede-label);font-weight:500;text-align:center;">Sin reservas próximas</span>' +
                '<button onclick="openReservationModal()" style="display:flex;align-items:center;gap:6px;background:var(--fede-accent-stock);color:#fff;border:none;border-radius:var(--fede-r-md);padding:10px 18px;font:var(--fede-label);font-weight:600;cursor:pointer;">' +
                '<i data-lucide="plus" style="width:16px;height:16px;stroke-width:2.5;"></i>Agendar primera reserva</button></div>';
            if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [el] });
            return;
        }

        var html = '';

        if (proximas.length > 0) {
            html += '<div style="font:var(--fede-caption);font-weight:600;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Próximas</div>';
            for (var j = 0; j < proximas.length; j++) html += _buildReservaCard(proximas[j], false);
        }

        if (pasadas.length > 0) {
            html += '<div style="font:var(--fede-caption);font-weight:600;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.5px;margin-top:8px;margin-bottom:4px;">Recientes</div>';
            for (var k = 0; k < Math.min(pasadas.length, 5); k++) html += _buildReservaCard(pasadas[k], true);
        }

        el.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [el] });
    }

    /* Mapa global eventId → objeto evento, para edición segura sin JSON inline */
    var _reservaEvMap = {};

    function _buildReservaCard(ev, isPast) {
        // Guardar objeto en mapa para acceso seguro desde onclick
        if (ev.eventId) _reservaEvMap[ev.eventId] = ev;

        var dateObj   = new Date(ev.start);
        var day       = dateObj.getDate();
        var monthStr  = dateObj.toLocaleDateString('es-AR', { month: 'short' }).toUpperCase();
        var weekDay   = dateObj.toLocaleDateString('es-AR', { weekday: 'short' }).toUpperCase();
        var timeStr   = ev.isAllDay ? 'Todo el día' :
            dateObj.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

        var safeTitle = FeDe_Utils.sanitize(ev.title || 'Sin título');
        var safeNotes = FeDe_Utils.sanitize(ev.description || '');
        var safeId    = FeDe_Utils.sanitize(ev.eventId || '');
        var cardId    = 'rcard-' + (ev.eventId || day + monthStr).replace(/[^a-zA-Z0-9]/g, '_');

        var accentColor = isPast ? 'var(--fede-on-surface-3)' : 'var(--fede-accent-stock)';

        return '<div class="fede-reserva-card" id="' + cardId + '" onclick="_toggleReservaCard(\'' + cardId + '\')"' +
            ' style="background:var(--fede-surface);border:1px solid var(--fede-border);border-radius:var(--fede-r-md);' +
            'overflow:hidden;cursor:pointer;border-left:3px solid ' + accentColor + ';opacity:' + (isPast ? '0.65' : '1') + ';">' +
            /* Header siempre visible */
            '<div style="padding:12px 14px;display:flex;gap:12px;align-items:flex-start;">' +
                '<div style="text-align:center;min-width:36px;">' +
                    '<div style="font-size:22px;font-weight:800;color:var(--fede-on-surface);line-height:1;">' + day + '</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);font-size:10px;">' + monthStr + '</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);font-size:9px;">' + weekDay + '</div>' +
                '</div>' +
                '<div style="flex:1;min-width:0;">' +
                    '<div style="font-size:14px;font-weight:600;color:var(--fede-on-surface);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + safeTitle + '</div>' +
                    '<div style="font:var(--fede-caption);color:' + accentColor + ';margin-top:2px;font-weight:500;">' + timeStr + '</div>' +
                    (safeNotes ? '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + safeNotes + '</div>' : '') +
                '</div>' +
                '<i data-lucide="chevron-down" style="width:16px;height:16px;color:var(--fede-on-surface-3);flex-shrink:0;transition:transform 0.2s;" id="' + cardId + '-chev"></i>' +
            '</div>' +
            /* Detalle expandible */
            '<div id="' + cardId + '-exp" style="display:none;padding:0 14px 14px;border-top:1px solid var(--fede-border);">' +
                (safeNotes ?
                    '<div style="margin:12px 0 8px;">' +
                        '<div style="font:var(--fede-caption);font-weight:600;color:var(--fede-on-surface-3);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">Notas</div>' +
                        '<div style="font:var(--fede-label);color:var(--fede-on-surface-2);white-space:pre-wrap;">' + safeNotes + '</div>' +
                    '</div>'
                : '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin:10px 0;">Sin notas operativas.</div>') +
                (ev.location ?
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-bottom:8px;">📍 ' + FeDe_Utils.sanitize(ev.location) + '</div>'
                : '') +
                (safeId ?
                    '<div style="display:flex;gap:8px;margin-top:8px;">' +
                        '<button onclick="event.stopPropagation();openEditReserva(_reservaEvMap[\'' + safeId.replace(/'/g, "\\'") + '\'])" ' +
                        'style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;' +
                        'background:rgba(22,163,74,0.08);color:var(--fede-accent-stock);' +
                        'border:1px solid rgba(22,163,74,0.2);border-radius:var(--fede-r-sm);padding:8px 14px;font:var(--fede-label);' +
                        'font-weight:600;cursor:pointer;touch-action:manipulation;">' +
                        '<i data-lucide="pencil" style="width:14px;height:14px;stroke-width:2;"></i>Editar</button>' +
                        (!isPast ?
                        '<button onclick="event.stopPropagation();deleteReserva(\'' + safeId.replace(/'/g, "\\'") + '\')" ' +
                        'style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;' +
                        'background:rgba(220,38,38,0.08);color:var(--fede-danger);' +
                        'border:1px solid rgba(220,38,38,0.2);border-radius:var(--fede-r-sm);padding:8px 14px;font:var(--fede-label);' +
                        'font-weight:600;cursor:pointer;touch-action:manipulation;">' +
                        '<i data-lucide="trash-2" style="width:14px;height:14px;stroke-width:2;"></i>Eliminar</button>'
                        : '') +
                    '</div>'
                : '') +
            '</div>' +
        '</div>';
    }

        var chev = document.getElementById(cardId + '-chev');

        var open = exp.style.display === 'none' || exp.style.display === '';

    function openEditReserva(ev) {
        var overlay = document.getElementById('edit-reservation-overlay');
        if (!overlay) return;

        document.getElementById('edit-res-eventId').value = ev.eventId || '';
        document.getElementById('edit-res-title').value   = ev.title  || '';
        document.getElementById('edit-res-notes').value   = ev.description || '';

        // Fecha
        var startDate = ev.start ? ev.start.split('T')[0] : '';
        document.getElementById('edit-res-date').value = startDate;

        // Hora
        var isAllDay = !!ev.isAllDay;
        document.getElementById('edit-res-allday').checked = isAllDay;
        var timeGrp = document.getElementById('edit-res-time-group');
        if (timeGrp) timeGrp.style.display = isAllDay ? 'none' : '';

        if (!isAllDay && ev.start && ev.start.indexOf('T') !== -1) {

            document.getElementById('edit-res-time').value = timePart.substring(0, 5);
        }

        overlay.classList.remove('hidden');
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [overlay] });

    function closeEditReserva() {
        var overlay = document.getElementById('edit-reservation-overlay');
        if (overlay) overlay.classList.add('hidden');
    }

    function toggleEditReservaAllDay() {
        var allDay  = document.getElementById('edit-res-allday');
        var timeGrp = document.getElementById('edit-res-time-group');
        if (timeGrp) timeGrp.style.display = (allDay && allDay.checked) ? 'none' : '';

    function submitEditReserva() {
        var eventId = document.getElementById('edit-res-eventId').value;
        var title   = (document.getElementById('edit-res-title').value || '').trim();
        var date    = document.getElementById('edit-res-date').value;
        var time    = document.getElementById('edit-res-time').value;
        var notes   = (document.getElementById('edit-res-notes').value || '').trim();
        var isAllDay = document.getElementById('edit-res-allday').checked;

        if (!title) { toast('Ingresa un título'); return; }
        if (!date)  { toast('Selecciona una fecha'); return; }

        var btn = document.getElementById('edit-res-submit-btn');
        if (btn) btn.disabled = true;

        FeDe_API.call('updateReservation', { eventId: eventId, title: title, date: date, time: time, isAllDay: isAllDay, notes: notes },
            function(res) {
                if (btn) btn.disabled = false;
                if (res && res.success) {
                    toast('Reserva actualizada ✓');
                    closeEditReserva();
                    window._gcalEvents = null;
                    renderReservas();
                    refreshGCalendar();

                    toast('Error al guardar: ' + ((res && res.error) || 'desconocido'));

            function() {
                if (btn) btn.disabled = false;
                toast('Error de conexión');
            }

            function() {

    /* ═══════════════════════════════════════════════════════════════════════════
       MÓDULO DE PEDIDOS INTELIGENTE — FRONTEND ENGINE

    var ORDER_QTY = {};        // Cantidades editadas por el usuario { prodName: qty }
    var ORDER_DATA = null;     // Respuesta del backend (cacheada - legacy, no usado en v2)
    var ORDER_ANCHORS = {};    // Anclajes en edición temporal
    var PACK_FACTORS_EDIT = {};  // Copia de trabajo del modal de pack factors
    var ABC_DATA = null;          // Clasificación ABC cacheada por sesión { prod: { clase, ... } }
    var ORDER_CONTRACTS = null;   // Input contracts cacheados por sesión (v3)
    var ORDER_TEMP_STOCK = {};    // Stock verificado manualmente en pantalla de verificación
    var ORDER_LT_DAYS = 4;     // Lead time en días hasta próximo pedido
    var ORDER_SESSION     = null;  // Output estructurado con audit trail (Módulo 5)

    var ORDER_DRAFT_KEY = 'fede_order_draft';   // localStorage key para las cantidades del borrador
    var ORDER_DATA_KEY  = 'fede_order_data';    // localStorage key para los datos del backend

    function getOrderContracts() {
        if (!ORDER_CONTRACTS) ORDER_CONTRACTS = buildInputContracts();

    function saveOrderDataCache(data) {

            // Guardar junto con timestamp del día (YYYY-MM-DD) para invalidar al día siguiente
            var today = new Date().toISOString().slice(0, 10);
            localStorage.setItem(ORDER_DATA_KEY, JSON.stringify({ date: today, data: data }));
        } catch(e) {}
    }

    function loadOrderDataCache() {
        try {
            var raw = localStorage.getItem(ORDER_DATA_KEY);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            var today = new Date().toISOString().slice(0, 10);
            // Solo válido si es del mismo día
            if (parsed.date === today) return parsed.data;

    function clearOrderDraft() {

    // ══════════════════════════════════════════════════════════════════════════
    // SMART REPLENISHMENT v3 — MÓDULO 1: INPUT CONTRACTS
    // ══════════════════════════════════════════════════════════════════════════

    var SR_CONFIG = {
        maxAgeDays:        90,
        A_freq_threshold:  0.70,
        A_merma_threshold: 0.30,
        B_freq_threshold:  0.30,
        safety_days_A:     2,
        safety_days_B:     3,
        safety_days_C:     0,
        z_A:               1.65,
        z_B:               1.28,
        z_C:               1.00,
        pax_baseline:      50
    };

    function buildInventorySnapshot() {
        var snapshot = {};
        var nowTs = Date.now();
        var catKeys = Object.keys(CATS);
        for (var ci = 0; ci < catKeys.length; ci++) {
            var cat = catKeys[ci];
            var prods = CATS[cat].prods || [];
            for (var pi = 0; pi < prods.length; pi++) {
                var prod = prods[pi];
                snapshot[prod] = {
                    sku_id:         prod,
                    sku_name:       prod,
                    current_stock:  null,
                    unit:           '',
                    last_count_ts:  0,
                    count_source:   'none',
                    snapshot_ts:    nowTs
                };
            }
        }
        // M1: Usar HIST_BY_PROD en lugar de scan reverso completo de HIST
        var snapKeys = Object.keys(snapshot);
        for (var ski = 0; ski < snapKeys.length; ski++) {
            var entries = HIST_BY_PROD[snapKeys[ski]];
            if (!entries) continue;
            for (var ei = entries.length - 1; ei >= 0; ei--) {
                var ent = entries[ei];
                if (ent.mode !== 'stock' && ent.mode !== 'recepcion') continue;
                if (ent.ts > snapshot[snapKeys[ski]].last_count_ts) {
                    snapshot[snapKeys[ski]].last_count_ts  = ent.ts;
                    snapshot[snapKeys[ski]].current_stock  = ent.qty !== undefined ? ent.qty : null;
                    snapshot[snapKeys[ski]].unit           = ent.unit || '';
                    snapshot[snapKeys[ski]].count_source   = ent.mode;
                }
                break; // Solo necesitamos el primer stock/recepcion encontrado
            }
        }
        return snapshot;
    }

    function buildMovementHistory(maxAgeDays) {
        var days = maxAgeDays || SR_CONFIG.maxAgeDays;
        var cutoff = Date.now() - days * 86400000;
        var result = [];
        for (var hi = 0; hi < HIST.length; hi++) {
            var h = HIST[hi];
            var hTs = new Date(h.fecha).getTime();
            if (hTs < cutoff) continue;
            var hItems = h.items || [];
            for (var hii = 0; hii < hItems.length; hii++) {
                var item = hItems[hii];
                result.push({
                    sku_id:     item.prod || '',
                    mode:       h.mode || 'stock',
                    qty:        item.qty !== undefined ? item.qty : 0,
                    unit:       item.unit || '',
                    ts:         hTs,
                    session_id: h.id || null
                });
            }
        }
        return result;
    }

    function buildSupplierConfig() {
        return {
            supplier_id:        'default',
            name:               'Proveedor principal',
            delivery_days_dow:  (CONFIG && CONFIG.orderDays) ? CONFIG.orderDays : [1, 4],
            lead_time_override: null,
            min_order_qty:      null,
            sync_ts:            null
        };
    }

    function buildEventContext(ltDays) {
        var days = ltDays || ORDER_LT_DAYS || 4;
        var now = new Date();
        var windowEnd = new Date(now.getTime() + days * 86400000);
        var events = [];
        if (window.gcal_events && Array.isArray(window.gcal_events)) {
            for (var ei = 0; ei < window.gcal_events.length; ei++) {
                var ev = window.gcal_events[ei];
                var evDate = ev.date ? new Date(ev.date) : null;
                if (!evDate || evDate < now || evDate > windowEnd) continue;
                var pax = ev.pax_estimated || ev.pax || null;
                var loadFactor = null;
                if (pax && SR_CONFIG.pax_baseline > 0) {
                    loadFactor = Math.round((pax / SR_CONFIG.pax_baseline) * 100) / 100;
                }
                events.push({
                    date:          ev.date,
                    name:          ev.title || ev.name || '',
                    pax_estimated: pax,
                    event_type:    ev.type || null,
                    load_factor:   loadFactor
                });
            }
        }
        return { events: events, pax_baseline: SR_CONFIG.pax_baseline };
    }

    function buildAbcConfig() {
        return {
            A_freq_threshold:  SR_CONFIG.A_freq_threshold,
            A_merma_threshold: SR_CONFIG.A_merma_threshold,
            B_freq_threshold:  SR_CONFIG.B_freq_threshold,
            max_age_days:      SR_CONFIG.maxAgeDays,
            safety_days:       SR_CONFIG.safety_days_A
        };
    }

    function buildProductionLog() {
        if (!PROD_DATA || PROD_DATA.length === 0) return null;
        var log = [];
        for (var i = 0; i < PROD_DATA.length; i++) {
            var lot = PROD_DATA[i];
            log.push({
                lot_id:          lot.lot_id || lot.id || '',
                sku_id:          lot.sku_id,
                recipe_consumed: lot.recipe_consumed || 0,
                actual_consumed: lot.actual_consumed || 0,
                units_produced:  lot.units_produced  || 0,
                production_ts:   lot.production_ts   || lot.ts || ''
            });
        }
        return log;
    }

    function buildFeedbackHistory() {
        var result = [];
        try {
            var prefix = 'fede_feedback_';
            for (var ki = 0; ki < localStorage.length; ki++) {
                var key = localStorage.key(ki);
                if (!key || key.indexOf(prefix) !== 0) continue;
                var raw = localStorage.getItem(key);
                if (!raw) continue;
                var entry = JSON.parse(raw);
                if (entry && entry.sku_id) result.push(entry);
            }
        } catch(e) {}
        result.sort(function(a, b) {
            return (b.session_date || '') > (a.session_date || '') ? 1 : -1;
        });
        return result;
    }

    function buildInputContracts() {
        var supplierCfg = buildSupplierConfig();
        return {
            inventory_snapshot: buildInventorySnapshot(),
            movement_history:   buildMovementHistory(SR_CONFIG.maxAgeDays),
            supplier_config:    supplierCfg,
            event_context:      buildEventContext(ORDER_LT_DAYS),
            abc_config:         buildAbcConfig(),
            production_log:     buildProductionLog(),
            feedback_history:   buildFeedbackHistory()
        };
    }

    // ══════════════════════════════════════════════════════════════════════════
    // SMART REPLENISHMENT v2
    // ══════════════════════════════════════════════════════════════════════════

    // ── Módulo 2 v3: Auto-clasificación ABC desde contratos ─────────────────

    function computeABC_v3(contracts) {
        var now = Date.now();
        var snap = contracts.inventory_snapshot || {};
        var moves = contracts.movement_history || [];
        var abcCfg = contracts.abc_config || {};

        // Pre-indexar movement_history por sku_id
        var byProd = {};
        for (var mi = 0; mi < moves.length; mi++) {
            var mv = moves[mi];
            var sk = mv.sku_id;
            if (!sk) continue;
            if (!byProd[sk]) byProd[sk] = [];
            byProd[sk].push(mv);
        }

        var freqA  = abcCfg.A_freq_threshold  || 0.70;
        var mermaA = abcCfg.A_merma_threshold || 0.30;
        var freqB  = abcCfg.B_freq_threshold  || 0.30;

        var abcOverrides = (CONFIG && CONFIG.abc_overrides) ? CONFIG.abc_overrides : {};
        var result = {};
        var catKeys = Object.keys(CATS);
        for (var ci = 0; ci < catKeys.length; ci++) {
            var cat = catKeys[ci];
            var prods = CATS[cat].prods || [];
            for (var pi = 0; pi < prods.length; pi++) {
                var prod = prods[pi];
                var prodMoves = byProd[prod] || [];

                // Paso 3 — métricas desde movement_history
                var nStock = 0, nMermaCnt = 0;
                var sumStockQty = 0, sumMermaQty = 0;
                for (var pmi = 0; pmi < prodMoves.length; pmi++) {
                    var m = prodMoves[pmi];
                    if (m.mode === 'stock') {
                        nStock++;
                        sumStockQty += m.qty || 0;
                    } else if (m.mode === 'merma') {
                        nMermaCnt++;
                        sumMermaQty += m.qty || 0;
                    }
                }
                var nTotal   = nStock + nMermaCnt;
                var freq      = nStock / Math.max(nTotal, 1);
                var mermaRate = sumMermaQty / Math.max(sumStockQty, 1);

                // Paso 4 — clasificación
                var clase;
                if (freq >= freqA || mermaRate >= mermaA) {
                    clase = 'A';
                } else if (freq >= freqB) {
                    clase = 'B';
                } else {
                    clase = 'C';
                }
                var conservative = (mermaRate >= mermaA && freq < 0.50);

                // Paso 5 — confianza desde inventory_snapshot
                var snapEntry = snap[prod] || {};
                var lastTs    = snapEntry.last_count_ts || 0;
                var ageDays   = lastTs > 0 ? Math.floor((now - lastTs) / 86400000) : 999;
                var ageMax    = clase === 'A' ? 7 : clase === 'B' ? 14 : 45;
                var confidence;
                if (ageDays <= ageMax) {
                    confidence = 'RELIABLE';
                } else if (ageDays <= ageMax * 2) {
                    confidence = 'PROJECTED';
                } else {
                    confidence = 'STALE';
                }

                // Paso 6 — z_base por clase
                var z_base = clase === 'A' ? SR_CONFIG.z_A :
                             clase === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C;

                // Paso 7 — modo MEASURED/INFERRED desde production_log (M3)
                var modo = 'INFERRED';
                var prodLog = contracts.production_log;
                if (prodLog) {
                    var lotCount = 0;
                    for (var li = 0; li < prodLog.length; li++) {
                        if (prodLog[li].sku_id === prod) lotCount++;
                    }
                    if (lotCount >= 2) modo = 'MEASURED';
                }

                // Paso 8 — anclaje suave: resolver override manual en el mismo paso
                var manual = abcOverrides[prod] ? abcOverrides[prod].clase : null;
                result[prod] = {
                    sku_id:       prod,
                    cat:          cat,
                    clase:        manual || clase,
                    clase_algo:   clase,
                    clase_manual: manual || null,
                    drift:        !!(manual && manual !== clase),
                    freq:         freq,
                    mermaRate:    mermaRate,
                    conservative: conservative,
                    ageDays:      ageDays,
                    confidence:   confidence,
                    lastTs:       lastTs,
                    z_base:       manual ? (manual === 'A' ? SR_CONFIG.z_A : manual === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C) : z_base,
                    modo:         modo
                };
            }
        }

        return result;
    }

    // ── Módulo 2 v2 (wrapper): delega a computeABC_v3 ───────────────────────

    var _computeAbcTimer = null;
    function computeABC() {
        if (_computeAbcTimer) {
            clearTimeout(_computeAbcTimer);
            _computeAbcTimer = null;
        }
        if (ABC_DATA) return ABC_DATA;
        _computeAbcTimer = setTimeout(function() { _computeAbcTimer = null; }, 300);
        return computeABC_v3(buildInputContracts());
    }

    function _getDriftProds() {
        if (!ABC_DATA) return [];
        var out = [];
        var keys = Object.keys(ABC_DATA);
        for (var i = 0; i < keys.length; i++) {
            if (ABC_DATA[keys[i]].drift) out.push(keys[i]);
        }
        return out;
    }

    // ── ABC Override / Anclaje suave ─────────────────────────────────────────

    function _applyOverridesToExisting() {
        if (!ABC_DATA) return;
        var overrides = CONFIG.abc_overrides || {};
        var keys = Object.keys(ABC_DATA);
        for (var i = 0; i < keys.length; i++) {
            var e = ABC_DATA[keys[i]];
            var manual = overrides[keys[i]] ? overrides[keys[i]].clase : null;
            e.clase_manual = manual || null;
            e.clase        = manual || e.clase_algo;
            e.drift        = !!(manual && manual !== e.clase_algo);
            e.z_base       = manual
                ? (manual === 'A' ? SR_CONFIG.z_A : manual === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C)
                : (e.clase_algo === 'A' ? SR_CONFIG.z_A : e.clase_algo === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C);
        }
    }

    function setAbcOverride(prod, clase) {
        if (!CONFIG.abc_overrides) CONFIG.abc_overrides = {};
        if (clase === 'auto') {
            delete CONFIG.abc_overrides[prod];
        } else {
            CONFIG.abc_overrides[prod] = { clase: clase, setTs: Date.now() };
        }
        _applyOverridesToExisting();
        toggleSync(true, 'Guardando clasificación...');
        FeDe_API.call('saveConfig', { key: 'abc_overrides', value: CONFIG.abc_overrides }, function() {
            toggleSync(false);
            showToast('Clasificación de ' + prod + ' guardada');
            ORDER_CONTRACTS = null;
        });
    }

    function openAbcSelector(prodEncoded) {
        var prod = decodeURIComponent(prodEncoded);
        if (!ABC_DATA) ABC_DATA = computeABC();
        var entry = ABC_DATA[prod] || {};
        var current = entry.clase_manual || 'auto';

        var chips = ['A', 'B', 'C', 'auto'];
        var labels = { A: 'Clase A', B: 'Clase B', C: 'Clase C', auto: 'Auto' };
        var chipsHtml = '';
        for (var ci = 0; ci < chips.length; ci++) {
            var c = chips[ci];
            var isActive = current === c;
            chipsHtml += '<span class="pf-chip' + (isActive ? ' active' : '') + '" ' +
                'onclick="_abcPickClase(\'' + encodeURIComponent(prod) + '\',\'' + c + '\')">' +
                labels[c] + '</span>';
        }

        var algoLabel = entry.clase_algo || '—';
        var html = '<div style="padding:16px;">' +
            '<div style="font:var(--fede-label);font-weight:700;color:var(--fede-on-surface);margin-bottom:4px;">' + FeDe_Utils.sanitize(prod) + '</div>' +
            '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);margin-bottom:16px;">Algoritmo sugiere: <b>' + algoLabel + '</b></div>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">' + chipsHtml + '</div>' +
            '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">Auto = el algoritmo decide según historial</div>' +
            '</div>';

        var sheet = document.getElementById('abc-selector-sheet');
        if (!sheet) return;
        document.getElementById('abc-selector-body').innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [sheet] });
        sheet.classList.add('open');
    }

    function _abcPickClase(prodEncoded, clase) {
        var prod = decodeURIComponent(prodEncoded);
        setAbcOverride(prod, clase);
        var sheet = document.getElementById('abc-selector-sheet');
        if (sheet) sheet.classList.remove('open');
        var badge = document.querySelector('[data-abc-badge="' + prodEncoded + '"]');
        if (badge) _refreshAbcBadge(badge, prod);
    }

    function _refreshAbcBadge(badge, prod) {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var e = ABC_DATA[prod];
        if (!e) return;
        badge.innerHTML = _buildAbcBadgeHtml(e);
    }

    function _buildAbcBadgeHtml(e) {
        var label = e.clase;
        var style = 'display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font:var(--fede-caption);font-weight:700;cursor:pointer;';
        if (e.drift) {
            style += 'background:color-mix(in srgb,var(--fede-warning,#d97706) 15%,transparent);color:var(--fede-warning,#d97706);border:1px solid color-mix(in srgb,var(--fede-warning,#d97706) 40%,transparent);';
            return '<span style="' + style + '">' + label + ' ★ <span style="opacity:0.8">→' + e.clase_algo + '</span></span>';
        } else if (e.clase_manual) {
            style += 'background:color-mix(in srgb,var(--primary) 15%,transparent);color:var(--primary);border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);';
            return '<span style="' + style + '">' + label + ' ★</span>';
        } else {
            style += 'background:var(--fede-surface-sunken);color:var(--fede-on-surface-3);border:1px solid var(--fede-border);';
            return '<span style="' + style + '">' + label + '</span>';
        }
    }

    function openDriftReview() {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var driftProds = _getDriftProds();
        if (driftProds.length === 0) return;

        var html = '';
        for (var i = 0; i < driftProds.length; i++) {
            var p = driftProds[i];
            var e = ABC_DATA[p];
            var ep = encodeURIComponent(p);
            html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--fede-border);">' +
                '<div>' +
                    '<div style="font:var(--fede-label);font-weight:600;color:var(--fede-on-surface);">' + FeDe_Utils.sanitize(p) + '</div>' +
                    '<div style="font:var(--fede-caption);color:var(--fede-on-surface-3);">Tu config: <b>' + e.clase_manual + '</b> · Algoritmo: <b>' + e.clase_algo + '</b></div>' +
                '</div>' +

    function computeOrderContext() {
        if (!ABC_DATA) ABC_DATA = computeABC();

        var staleA = [], staleB = [], okA = 0;
        var prodKeys = Object.keys(ABC_DATA);
        for (var i = 0; i < prodKeys.length; i++) {
            var p = ABC_DATA[prodKeys[i]];
            if (p.clase === 'A') {
                if (p.confidence === 'STALE') staleA.push(prodKeys[i]);
                else okA++;
            } else if (p.clase === 'B' && p.confidence === 'STALE') {
                staleB.push(prodKeys[i]);
            }
        }

        var now = new Date();
        var orderDays = (CONFIG && CONFIG.orderDays) ? CONFIG.orderDays : [1, 4];
        var daysAway = 999;
        var nextDate = null;
        for (var d = 1; d <= 7; d++) {
            var candidate = new Date(now.getTime() + d * 86400000);
            if (orderDays.indexOf(candidate.getDay()) !== -1) {
                daysAway = d; nextDate = candidate; break;
            }
        }
        ORDER_LT_DAYS = daysAway < 999 ? daysAway : 4;

        var lt_source = (daysAway < 999) ? 'ventana_fija_proveedor' : 'default_sin_datos';
        ORDER_CONTRACTS = null;  // invalidar caché para que buildEventContext use el LT correcto

        var contracts = getOrderContracts();
        var events = (contracts.event_context && contracts.event_context.events) ? contracts.event_context.events : [];

        var periodoFin = now;
        var periodoInicio = new Date(now.getTime() - SR_CONFIG.maxAgeDays * 86400000);
        var produccionModo = 'INFERRED';
        var anomalias = [];
        try {
            for (var ki = 0; ki < localStorage.length; ki++) {
                var key = localStorage.key(ki);
                if (key && key.indexOf('fede_anomaly_') === 0) {
                    var raw = localStorage.getItem(key);
                    if (raw) anomalias.push(JSON.parse(raw));
                }
            }
        } catch(e) {}

        return {
            staleA: staleA,
            staleB: staleB,
            okA: okA,
            daysAway: daysAway,
            nextDate: nextDate,
            events: events,
            lt_source: lt_source,
            periodoInicio: periodoInicio,
            periodoFin: periodoFin,
            produccionModo: produccionModo,
            anomalias: anomalias
        };
    }

    function getProductionEntries(skuId) {
        var entries = [];
        for (var i = 0; i < PROD_DATA.length; i++) {
            if (PROD_DATA[i].sku_id === skuId) entries.push(PROD_DATA[i]);
        }
        entries.sort(function(a, b) {
            return new Date(a.production_ts) - new Date(b.production_ts);
        });
        return entries;
    }

    function getDegradationLevel(skuId) {
        var entries = getProductionEntries(skuId);
        if (entries.length === 0) return 'FALLBACK_INFERRED';
        var now = Date.now();
        var MS_48H = 48 * 3600 * 1000;
        var hasFresh = false, hasStale = false;
        for (var i = 0; i < entries.length; i++) {
            var age = now - new Date(entries[i].production_ts).getTime();
            if (age < MS_48H) hasFresh = true;
            else hasStale = true;
        }
        if (hasFresh && !hasStale) return 'FULL_MEASURED';
        if (hasFresh)              return 'PARTIAL_MIXED';
        return 'FALLBACK_INFERRED';
    }

    function computeVirtualStock(skuId, currentStock, lastCountTs) {
        var entries = getProductionEntries(skuId);
        var lastCountTime = lastCountTs ? new Date(lastCountTs).getTime() : 0;
        var totalConsumed = 0;
        var lastEntryTime = 0;
        for (var i = 0; i < entries.length; i++) {
            var ets = new Date(entries[i].production_ts).getTime();
            if (ets > lastCountTime) {
                totalConsumed += entries[i].actual_consumed;
                if (ets > lastEntryTime) lastEntryTime = ets;
            }
        }
        var totalReceived = 0;
        for (var hi = 0; hi < HIST.length; hi++) {
            var h = HIST[hi];
            if (h.mode !== 'recepcion') continue;
            var hts = new Date(h.fecha).getTime();
            if (hts <= lastCountTime) continue;
            var hitems = h.items || [];
            for (var hii = 0; hii < hitems.length; hii++) {
                if (hitems[hii].prod === skuId) totalReceived += hitems[hii].qty || 0;
            }
        }
        var stockVirtual = currentStock - totalConsumed + totalReceived;
        var stalenessH = lastEntryTime > 0 ? (Date.now() - lastEntryTime) / 3600000 : 999;
        return {
            stock_virtual: Math.max(0, stockVirtual),
            staleness_h:   Math.round(stalenessH * 10) / 10,
            is_stale:      stalenessH > 48
        };
    }

    function computeEpsilonSeries(skuId) {
        var entries = getProductionEntries(skuId);
        if (entries.length === 0) return null;
        var now = Date.now();
        var MS_30D = 30 * 24 * 3600 * 1000;
        var MS_90D = 90 * 24 * 3600 * 1000;
        var eps30 = [], eps90 = [];
        var max30 = null;
        for (var i = 0; i < entries.length; i++) {
            var e = entries[i];
            if (!e.recipe_consumed || e.recipe_consumed === 0) continue;
            var eps_i = (e.actual_consumed - e.recipe_consumed) / e.recipe_consumed;
            var age = now - new Date(e.production_ts).getTime();
            if (age <= MS_30D) {
                eps30.push(eps_i);
                if (max30 === null || eps_i > max30) max30 = eps_i;
            }
            if (age <= MS_90D) eps90.push(eps_i);
        }
        function _mean(arr) {
            if (!arr.length) return null;
            var s = 0;
            for (var j = 0; j < arr.length; j++) s += arr[j];
            return Math.round(s / arr.length * 10000) / 10000;
        }
        var e30 = _mean(eps30);
        var e90 = _mean(eps90);
        return {
            eps_30d:     e30,
            eps_90d:     e90,
            eps_trend:   (e30 !== null && e90 !== null) ? Math.round((e30 - e90) * 10000) / 10000 : null,
            eps_max_30d: max30 !== null ? Math.round(max30 * 10000) / 10000 : null,
            n_lotes:     eps90.length
        };
    }

    // ── Módulo 8: Detección de Anomalías Sistémicas ──────────────────────────

    function computeAnomalyAlerts(skus) {
        var alerts = [];
        var ts = new Date().toISOString();
        for (var i = 0; i < skus.length; i++) {
            var s = skus[i];
            var eps = s.epsilon_stats;
            if (!eps || eps.n_lotes === null) continue;

            // M8-1: Merma sostenida — consumo real > 15% sobre ficha técnica
            if (eps.eps_30d !== null && eps.eps_30d > 0.15 && eps.n_lotes >= 5) {
                alerts.push({
                    rule:     'M8-1',
                    sku_id:   s.sku_id,
                    severity: eps.eps_30d >= 0.25 ? 'HIGH' : 'MEDIUM',
                    message:  'Merma sostenida: consumo real ' + Math.round(eps.eps_30d * 100) + '% sobre ficha técnica (ult. 30d, n=' + eps.n_lotes + ')',
                    eps_30d:  eps.eps_30d,
                    n_lotes:  eps.n_lotes,
                    detected_ts: ts
                });
            }

            // M8-2: Eficiencia anómala — consumo real < 10% bajo ficha técnica
            if (eps.eps_30d !== null && eps.eps_30d < -0.10 && eps.n_lotes >= 5) {
                alerts.push({
                    rule:     'M8-2',
                    sku_id:   s.sku_id,
                    severity: 'LOW',
                    message:  'Eficiencia anómala: consumo real ' + Math.abs(Math.round(eps.eps_30d * 100)) + '% bajo ficha técnica — revisar ficha o pesaje',
                    eps_30d:  eps.eps_30d,
                    n_lotes:  eps.n_lotes,
                    detected_ts: ts
                });
            }

            // M8-3: Tendencia creciente de merma
            if (eps.eps_trend !== null && eps.eps_trend > 0.05 && eps.eps_30d !== null && eps.eps_30d > 0.10) {
                alerts.push({
                    rule:     'M8-3',
                    sku_id:   s.sku_id,
                    severity: 'HIGH',
                    message:  'Tendencia creciente de merma: +' + Math.round(eps.eps_trend * 100) + '% vs base 90d — acción urgente',
                    eps_30d:  eps.eps_30d,
                    eps_trend: eps.eps_trend,
                    detected_ts: ts
                });
            }

            // M8-4: Spike puntual — algún lote en 30d superó 40% de desvío
            if (eps.eps_max_30d !== null && eps.eps_max_30d > 0.40) {
                alerts.push({
                    rule:     'M8-4',
                    sku_id:   s.sku_id,
                    severity: 'MEDIUM',
                    message:  'Spike puntual: un lote consumió ' + Math.round(eps.eps_max_30d * 100) + '% sobre ficha — revisar ese registro',
                    eps_max_30d: eps.eps_max_30d,
                    detected_ts: ts
                });
            }
        }
        return alerts;
    }

    function persistAnomalyAlerts(alerts) {
