    function computeStructuredOutput(ctx) {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var contracts = getOrderContracts();

        var sessionId   = generateSessionId();
        var generatedTs = new Date().toISOString();
        var ltSrc       = ctx ? (ctx.lt_source || 'default_sin_datos') : 'default_sin_datos';

        var skus = [];
        var nReliable = 0, nProjected = 0, nStale = 0, nFeedback = 0, nMeasured = 0, nInferred = 0;
        var prodKeys = Object.keys(ABC_DATA);

        for (var i = 0; i < prodKeys.length; i++) {
            var prod = prodKeys[i];
            var abcEntry = ABC_DATA[prod];

            // Buscar currentStock y lastCountTs — siempre desde HIST para lastCountTs
            var currentStock = ORDER_TEMP_STOCK[prod] !== undefined ? ORDER_TEMP_STOCK[prod] : null;
            var lastCountTs = null;
            for (var hi = HIST.length - 1; hi >= 0; hi--) {
                var h = HIST[hi];
                if (h.mode !== 'stock') continue;
                var hitems = h.items || [];
                for (var hii = 0; hii < hitems.length; hii++) {
                    if (hitems[hii].prod === prod) {
                        if (currentStock === null) currentStock = hitems[hii].qty;
                        lastCountTs = h.fecha;
                        break;
                    }
                }
                if (lastCountTs !== null) break;
            }
            if (currentStock === null) currentStock = 0;

            // Módulo 7: modo de consumo y stock virtual
            var _degradLevel = getDegradationLevel(prod);
            var _isMeasured  = _degradLevel === 'FULL_MEASURED' || _degradLevel === 'PARTIAL_MIXED';
            var _vStockResult = null;
            var stockForCalc  = currentStock;
            if (_isMeasured) {
                _vStockResult = computeVirtualStock(prod, currentStock, lastCountTs);
                stockForCalc  = _vStockResult.stock_virtual;
            }
            var _epsSeries = computeEpsilonSeries(prod);

            var consumption = getConsumptionData_v3(prod, contracts);
            var qResult = computeOrderQty_v3(abcEntry, consumption, stockForCalc);
            var explanation = buildConsumptionExplanation(prod, abcEntry, qResult, consumption, currentStock);

            var skuOut = {
                sku_id:           prod,
                sku_name:         prod,
                clase:            abcEntry.clase,
                modo:             _isMeasured ? _degradLevel : 'INFERRED',
                confianza:        abcEntry.confidence,
                D_avg:            consumption ? consumption.D_avg : null,
                D_avg_ajustado:   qResult.feedback_flag ? qResult.D_used : null,
                D_recent_30d:     consumption ? consumption.D_recent_30d : null,
                CV:               consumption ? consumption.CV : null,
                z_factor:         qResult.z_used,
                z_source:         qResult.z_source,
                LT:               ORDER_LT_DAYS,
                lt_source:        ltSrc,
                SS:               qResult.SS,
                Q_star:           qResult.Q,
                current_stock:    currentStock,
                load_factor:      null,
                feedback_flag:    qResult.feedback_flag,
                unit:             consumption ? consumption.unit : '',
                explanation:      explanation,
                prompt_version:   '3.0',
                session_id:       sessionId,
                generated_ts:     generatedTs,
                epsilon_stats:    _epsSeries,
                stock_virtual:    _vStockResult ? _vStockResult.stock_virtual : null,
                staleness_h:      _vStockResult ? _vStockResult.staleness_h : null
            };

            if (abcEntry.confidence === 'RELIABLE')  nReliable++;
            else if (abcEntry.confidence === 'STALE') nStale++;
            else                                      nProjected++;

            if (qResult.feedback_flag) nFeedback++;
            if (_isMeasured) nMeasured++; else nInferred++;

            skus.push(skuOut);
        }

        var ltSummary = { override_manual: 0, ventana_fija: 0, mediana: 0, default: 0 };
        if (ltSrc === 'ventana_fija_proveedor') {
            ltSummary.ventana_fija = skus.length;
        } else {
            ltSummary.default = skus.length;
        }

        var feedbackApplied = [];
        for (var fi = 0; fi < skus.length; fi++) {
            if (skus[fi].feedback_flag) {
                feedbackApplied.push({ sku_id: skus[fi].sku_id, D_avg_old: skus[fi].D_avg, D_avg_new: skus[fi].D_avg_ajustado });
            }
        }

        // Módulo 6: reset de contador de feedback post-recalibración + hook H4
        for (var ri = 0; ri < feedbackApplied.length; ri++) {
            resetFeedbackForSku(feedbackApplied[ri].sku_id);
            _hookH4({
                sku_id:          feedbackApplied[ri].sku_id,
                D_avg_anterior:  feedbackApplied[ri].D_avg_old,
                D_avg_nuevo:     feedbackApplied[ri].D_avg_new,
                recalibrado_ts:  generatedTs,
                n_ajustes_usados: 3
            });
        }

        // Módulo 8: detección de anomalías sistémicas y persistencia
        var freshAnomalyAlerts = computeAnomalyAlerts(skus);
        persistAnomalyAlerts(freshAnomalyAlerts);

        var audit = {
            session_id:                   sessionId,
            generated_ts:                 generatedTs,
            prompt_version:               '3.0',
            total_skus:                   skus.length,
            skus_reliable:                nReliable,
            skus_projected:               nProjected,
            skus_stale:                   nStale,
            skus_feedback_applied:        nFeedback,
            skus_measured:                nMeasured,
            skus_inferred:                nInferred,
            anomaly_alerts:               freshAnomalyAlerts,
            feedback_retraining_applied:  feedbackApplied,
            lt_sources_summary:           ltSummary
        };

        return { skus: skus, audit: audit };
    }

    function renderVerificationScreen() {
        if (!ABC_DATA) ABC_DATA = computeABC();

        if (!listEl) return;

        var staleProds = [];
        var prodKeys = Object.keys(ABC_DATA);
        for (var i = 0; i < prodKeys.length; i++) {
            if (ABC_DATA[prodKeys[i]].clase === 'A' && ABC_DATA[prodKeys[i]].confidence === 'STALE') {
                staleProds.push(prodKeys[i]);
            }
        }
        if (staleProds.length === 0) { renderSmartSuggestions(); return; }

        var now = Date.now();
        var html = '<div style="font-size:12px; color:var(--fede-on-surface-3); font-weight:600; margin-bottom:12px; padding-top:4px;">Ingresá el stock actual de estos productos:</div>';
        html += '<div class="order-verify-card">';

        for (var si = 0; si < staleProds.length; si++) {
            var prod = staleProds[si];
            var abcEntry = ABC_DATA[prod];

            var lastQty = 0, lastUnit = '', lastTs = abcEntry.lastTs || 0;
            for (var hi = HIST.length - 1; hi >= 0; hi--) {

                for (var hii = 0; hii < hitems.length; hii++) {

                        lastQty = hitems[hii].qty;
                        lastUnit = hitems[hii].unit || '';
                        break;
                    }
                }
                if (lastUnit) break;
            }
            var recepSince = 0;
            for (var ri = 0; ri < HIST.length; ri++) {
                var rh = HIST[ri];
                if (rh.mode !== 'recepcion') continue;
                if (new Date(rh.fecha).getTime() <= lastTs) continue;
                var rItems = rh.items || [];
                for (var rii = 0; rii < rItems.length; rii++) {
                    if (rItems[rii].prod === prod) { recepSince += rItems[rii].qty; break; }
                }

            var expected = lastQty + recepSince;

            html += '</div></div>';

            html += '<span id="vval-' + prodEncoded + '">' + (initVal !== '' ? initVal : '?') + '</span>';

        html += '<button class="btn-primary-ctx" onclick="renderSmartSuggestions()" style="flex:2;">Continuar →</button>';

    function verifyStep(prodEncoded, delta) {
        var prod = decodeURIComponent(prodEncoded);
        var el = document.getElementById('vval-' + prodEncoded);
        if (!el) return;
        var current = parseFloat(el.textContent);
        if (isNaN(current)) current = 0;
        var step = current < 5 ? 0.5 : 1;
        var next = Math.max(0, current + (delta > 0 ? step : -step));
        next = Math.round(next * 10) / 10;
        ORDER_TEMP_STOCK[prod] = next;
        el.textContent = next;
    }

    // ── Módulo 3 v3: Chain of Thought — funciones core ──────────────────────

    function getConsumptionData_v3(prod, contracts) {
        var moves = (contracts && contracts.movement_history) ? contracts.movement_history : [];
        var now = Date.now();
        var cutoff30 = now - 30 * 86400000;

        // Extraer stockEntries para este prod
        var stockEntries = [];
        for (var mi = 0; mi < moves.length; mi++) {
            var mv = moves[mi];
            if (mv.sku_id !== prod || mv.mode !== 'stock') continue;
            stockEntries.push({ ts: mv.ts, qty: mv.qty || 0, unit: mv.unit || '' });
        }
        stockEntries.sort(function(a, b) { return a.ts - b.ts; });
        if (stockEntries.length < 2) return null;

        var periods = [];
        var recentPeriods = [];
        var unit = stockEntries[stockEntries.length - 1].unit;

        for (var i = 1; i < stockEntries.length; i++) {
            var S0 = stockEntries[i-1].qty, t0 = stockEntries[i-1].ts;
            var S1 = stockEntries[i].qty,   t1 = stockEntries[i].ts;
            var dt = (t1 - t0) / 86400000;
            if (dt < 0.5) continue;

            var R = 0;
            for (var ri = 0; ri < moves.length; ri++) {
                var rm = moves[ri];
                if (rm.sku_id !== prod || rm.mode !== 'recepcion') continue;
                if (rm.ts <= t0 || rm.ts > t1) continue;
                R += rm.qty || 0;
            }
            var W = 0;
            for (var wi = 0; wi < moves.length; wi++) {
                var wm = moves[wi];
                if (wm.sku_id !== prod || wm.mode !== 'merma') continue;
                if (wm.ts <= t0 || wm.ts > t1) continue;
                W += wm.qty || 0;
            }

            var C_t = S0 + R - W - S1;
            if (C_t < 0) continue;
            var D_i = C_t / dt;
            periods.push({ val: D_i, t1: t1 });
        }
        if (periods.length < 2) return null;

        // Filtrar outliers
        var rawVals = [];
        for (var pi = 0; pi < periods.length; pi++) rawVals.push(periods[pi].val);
        var sortedRaw = rawVals.slice().sort(function(a,b){ return a - b; });
        var median = sortedRaw[Math.floor(sortedRaw.length / 2)];
        var valid = [], validRecent = [];
        for (var vi = 0; vi < periods.length; vi++) {
            if (periods[vi].val <= 3 * median) {
                valid.push(periods[vi].val);
                if (periods[vi].t1 >= cutoff30) validRecent.push(periods[vi].val);
            }
        }
        if (valid.length < 2) return null;

        var sum = 0;
        for (var si = 0; si < valid.length; si++) sum += valid[si];
        var D_avg = sum / valid.length;

        var varSum = 0;
        for (var vj = 0; vj < valid.length; vj++) varSum += Math.pow(valid[vj] - D_avg, 2);
        var sigma = Math.sqrt(varSum / valid.length);
        var CV = sigma / Math.max(D_avg, 0.001);

        // p25
        var sortedValid = valid.slice().sort(function(a,b){ return a-b; });
        var p25idx = Math.floor(0.25 * (sortedValid.length - 1));
        var p25 = sortedValid[p25idx];

        // D_recent_30d
        var D_recent_30d = D_avg;
        if (validRecent.length > 0) {
            var rSum = 0;
            for (var ri2 = 0; ri2 < validRecent.length; ri2++) rSum += validRecent[ri2];
            D_recent_30d = rSum / validRecent.length;
        }

        return { D_avg: D_avg, D_recent_30d: D_recent_30d, sigma: sigma, CV: CV, n: valid.length, p25: p25, unit: unit, periods: valid };
    }

    function computeOrderQty_v3(abcEntry, consumption, currentStock) {
        var LT = ORDER_LT_DAYS;
        var safetyDays = abcEntry.clase === 'A' ? SR_CONFIG.safety_days_A :
                         abcEntry.clase === 'B' ? SR_CONFIG.safety_days_B : SR_CONFIG.safety_days_C;
        var z_base = abcEntry.z_base || (abcEntry.clase === 'A' ? SR_CONFIG.z_A : abcEntry.clase === 'B' ? SR_CONFIG.z_B : SR_CONFIG.z_C);

        // z dinámico por CV
        var CV = (consumption && consumption.CV) ? consumption.CV : 0;
        var z_used, z_source;
        if (CV > 0.5) {
            z_used = z_base * (1 + 0.5 * (CV - 0.5));
            if (z_used > z_base * 2.0) z_used = z_base * 2.0;
            z_source = 'dinamico_cv=' + CV.toFixed(2);
        } else {
            z_used = z_base;
            z_source = 'base_clase_' + abcEntry.clase;
        }

        // Safety stock
        var SS;
        if (consumption && consumption.n >= 3) {
            SS = z_used * consumption.sigma * Math.sqrt(LT);
        } else {
            SS = (consumption ? consumption.D_avg : 0) * safetyDays;
        }

        // D_base con flag conservative
        var D_base = (consumption && abcEntry.conservative && consumption.p25 > 0) ? consumption.p25 : (consumption ? consumption.D_avg : 0);

        // Feedback recalibración
        var feedback_flag = null;
        var D_used = D_base;
        try {
            var contracts = getOrderContracts();
            var fbHist = contracts.feedback_history || [];
            var cutoff30 = Date.now() - 30 * 86400000;
            var prod = abcEntry.sku_id || '';
            var dcEntries = [];
            for (var fi = 0; fi < fbHist.length; fi++) {
                var fb = fbHist[fi];
                if (fb.sku_id !== prod) continue;
                if (fb.reason_code !== 'demand_change') continue;
                var fbTs = fb.session_date ? new Date(fb.session_date).getTime() : 0;
                if (fbTs >= cutoff30) dcEntries.push(fb);
            }
            if (dcEntries.length >= 3) {
                var deltaSum = 0;
                for (var di = 0; di < dcEntries.length; di++) {
                    deltaSum += (dcEntries[di].adjusted_qty - dcEntries[di].suggested_qty);
                }
                var delta_D = (deltaSum / dcEntries.length) / Math.max(LT + safetyDays, 1);
                var D_calibrado = D_base + delta_D;
                if (D_calibrado < 0) D_calibrado = 0;
                if (D_calibrado > D_base * 3.0) D_calibrado = D_base * 3.0;
                D_used = D_calibrado;
                feedback_flag = 'D_AVG_RECALIBRADO_POR_FEEDBACK';
            }
        } catch(e) {}

        var need = D_used * (LT + safetyDays) + SS - (currentStock || 0);
        var Q_raw = Math.max(0, need);
        var Q = Q_raw < 10 ? Math.ceil(Q_raw * 2) / 2 : Math.ceil(Q_raw);

        return { Q: Q, z_used: z_used, z_source: z_source, SS: SS, safetyDays: safetyDays, D_used: D_used, feedback_flag: feedback_flag };
    }

    function buildConsumptionExplanation(prod, abcEntry, qResult, consumption, currentStock) {
        if (!consumption) {
            return 'Sin pares de conteo STOCK suficientes para calcular consumo.';
        }
        if (abcEntry && abcEntry.confidence === 'STALE') {
            var ageMax = abcEntry.clase === 'A' ? 7 : abcEntry.clase === 'B' ? 14 : 45;
            return 'Requiere conteo — último relevamiento hace más de ' + ageMax + ' días.';
        }
        var D_used   = qResult ? qResult.D_used   : consumption.D_avg;
        var z_source = qResult ? qResult.z_source  : '';
        var SS       = qResult ? qResult.SS        : 0;
        var safetyDays = qResult ? qResult.safetyDays : 2;
        var feedback_flag = qResult ? qResult.feedback_flag : null;

        var sigmaText = consumption.n >= 3 ? ' ±' + consumption.sigma.toFixed(2) : '';
        var unitTxt = consumption.unit ? ' ' + consumption.unit : '';
        var explanation = 'Consumo ~' + D_used.toFixed(2) + sigmaText + unitTxt + '/día (' + consumption.n + ' período' + (consumption.n !== 1 ? 's' : '') + '). ';
        explanation += 'Cubre ' + ORDER_LT_DAYS + 'd entrega + ' + SS.toFixed(1) + ' seguridad (' + z_source + ').';
        if (abcEntry && abcEntry.conservative) explanation += ' Pedido conservador (alta merma).';
        if (feedback_flag) explanation += ' [Demanda recalibrada por historial de ajustes]';
        return explanation;
    }

    // ── Módulo 4: Cálculo de consumo (Chain of Thought) ─────────────────────

    function _sortedArray(arr) {
        var copy = arr.slice();
        copy.sort(function(a, b) { return a - b; });
        return copy;
    }

    function _percentile(arr, p) {
        if (!arr || arr.length === 0) return 0;
        var sorted = _sortedArray(arr);
        var idx = Math.floor(p / 100 * (sorted.length - 1));
        return sorted[idx];
    }

    function getConsumptionData(prod) {
        return getConsumptionData_v3(prod, getOrderContracts());
    }

    function computeOrderQty(abcEntry, consumption, currentStock) {
        return computeOrderQty_v3(abcEntry, consumption, currentStock).Q;
    }

    // ── Módulo 4: Render sugerencias smart ───────────────────────────────────

    var HiddenSkus = {
        _key: function() { return 'fede_hidden_skus_' + (typeof activeSheetId !== 'undefined' && activeSheetId ? activeSheetId : 'default'); },
        _data: null,
        _load: function() {
            if (!this._data) {
                try { this._data = JSON.parse(localStorage.getItem(this._key()) || '{}'); }
                catch(e) { this._data = {}; }
            }
            return this._data;
        },
        _persist: function() { try { localStorage.setItem(this._key(), JSON.stringify(this._data)); } catch(e) {} },
        has:    function(id) { return !!this._load()[id]; },
        add:    function(id) { this._load()[id] = 1; this._persist(); },
        remove: function(id) { delete this._load()[id]; this._persist(); },
        all:    function()   { return Object.keys(this._load()); },
        count:  function()   { return Object.keys(this._load()).length; },
        clear:  function()   { this._data = {}; this._persist(); },
        invalidateCache: function() { this._data = null; }
    };

    var ReactivatedSkus = {
        _key: function() { return 'fede_reactivated_skus_' + (typeof activeSheetId !== 'undefined' && activeSheetId ? activeSheetId : 'default'); },
        _data: null,
        _load: function() {
            if (!this._data) {
                try { this._data = JSON.parse(localStorage.getItem(this._key()) || '{}'); }
                catch(e) { this._data = {}; }
            }
            return this._data;
        },
        _persist: function() { try { localStorage.setItem(this._key(), JSON.stringify(this._data)); } catch(e) {} },
        has:    function(id) { return !!this._load()[id]; },
        add:    function(id) { this._load()[id] = 1; this._persist(); },
        remove: function(id) { delete this._load()[id]; this._persist(); },
        invalidateCache: function() { this._data = null; }
    };

    function renderSmartSuggestions() {
        if (!ABC_DATA) ABC_DATA = computeABC();
        var listEl = document.getElementById('order-items-list');
        if (!listEl) return;
        var banner = document.getElementById('order-info-banner');
        var missing = document.getElementById('order-missing-alert');
        if (missing) missing.classList.add('hidden');

        var urgent = [], stale = [], classA = [], classB = [], classC = [], inactivos = [];
        var prodKeys = Object.keys(ABC_DATA);
        for (var i = 0; i < prodKeys.length; i++) {
            var prod = prodKeys[i];
            var abcEntry = ABC_DATA[prod];
            var currentStock = ORDER_TEMP_STOCK[prod] !== undefined ? ORDER_TEMP_STOCK[prod] : null;
            if (currentStock === null) {
                for (var hi = HIST.length - 1; hi >= 0; hi--) {
                    var h = HIST[hi];
                    if (h.mode !== 'stock') continue;
                    var hitems = h.items || [];
                    for (var hii = 0; hii < hitems.length; hii++) {
                        if (hitems[hii].prod === prod) { currentStock = hitems[hii].qty; break; }
                    }
                    if (currentStock !== null) break;
                }
            }
            if (currentStock === null) currentStock = 0;

            if (HiddenSkus.has(prod)) continue;
            if (currentStock <= 0 && abcEntry.freq < 0.01 && !ReactivatedSkus.has(prod)) { inactivos.push({ prod: prod, abcEntry: abcEntry }); continue; }
            if (currentStock <= 0) { urgent.push({ prod: prod, abcEntry: abcEntry, currentStock: 0 }); continue; }
            if (abcEntry.confidence === 'STALE' && abcEntry.clase !== 'C') { stale.push({ prod: prod, abcEntry: abcEntry, currentStock: currentStock }); continue; }
            if (abcEntry.clase === 'A') classA.push({ prod: prod, abcEntry: abcEntry, currentStock: currentStock });
            else if (abcEntry.clase === 'B') classB.push({ prod: prod, abcEntry: abcEntry, currentStock: currentStock });
            else classC.push({ prod: prod, abcEntry: abcEntry, currentStock: currentStock });
        }

        var html = '';

        if (urgent.length > 0) {
            html += '<div class="smart-section-header"><i data-lucide="alert-octagon" style="width:13px;height:13px;color:var(--fede-error,#dc2626);vertical-align:-2px;"></i> Urgente — ' + urgent.length + ' sin stock</div>';
            for (var ui = 0; ui < urgent.length; ui++) {
                html += _renderSmartCard(urgent[ui].prod, urgent[ui].abcEntry, 0, 'urgent');
            }
        }
        if (classA.length > 0) {
            var A_LIMIT = 20;
            html += '<div class="smart-section-header"><i data-lucide="package" style="width:13px;height:13px;vertical-align:-2px;"></i> Clase A — ' + classA.length + (classA.length === 1 ? ' producto' : ' productos') + '</div>';
            html += '<div class="order-guide-tip">Ajustá las cantidades con − y + · tocá ✕ para ocultar items · cuando termines tocá <strong>Revisar y Enviar</strong></div>';
            var aVisible = Math.min(classA.length, A_LIMIT);
            for (var ai = 0; ai < aVisible; ai++) {
                html += _renderSmartCard(classA[ai].prod, classA[ai].abcEntry, classA[ai].currentStock, 'A');
            }
            if (classA.length > A_LIMIT) {
                var aRest = classA.length - A_LIMIT;
                html += '<button class="smart-section-expand-btn" onclick="toggleSmartSection(\'smart-sec-a-rest\',this)">';
                html += 'Expandir ' + aRest + ' productos más de Clase A</button>';
                html += '<div id="smart-sec-a-rest" style="display:none;">';
                for (var ai2 = A_LIMIT; ai2 < classA.length; ai2++) {
                    html += _renderSmartCard(classA[ai2].prod, classA[ai2].abcEntry, classA[ai2].currentStock, 'A');
                }
                html += '</div>';
            }
        }
        if (stale.length > 0) {
            html += '<button class="smart-section-expand-btn smart-section-expand-btn--warning" onclick="toggleSmartSection(\'smart-sec-stale\',this)">';
            html += '<i data-lucide="alert-triangle" style="width:13px;height:13px;color:#d97706;vertical-align:-2px;margin-right:4px;"></i>';
            html += 'Expandir Inciertos — ' + stale.length + (stale.length === 1 ? ' producto sin conteo reciente' : ' productos sin conteo reciente') + '</button>';
            html += '<div id="smart-sec-stale" style="display:none;">';
            for (var sti = 0; sti < stale.length; sti++) {
                html += _renderSmartCardStale(stale[sti].prod, stale[sti].abcEntry);
            }
            html += '</div>';
        }
        if (classB.length > 0) {
            html += '<button class="smart-section-expand-btn" onclick="toggleSmartSection(\'smart-sec-b\',this)">';
            html += 'Expandir Clase B — ' + classB.length + (classB.length === 1 ? ' producto' : ' productos') + '</button>';
            html += '<div id="smart-sec-b" style="display:none;">';
            for (var bi = 0; bi < classB.length; bi++) {
                html += _renderSmartCard(classB[bi].prod, classB[bi].abcEntry, classB[bi].currentStock, 'B');
            }
            html += '</div>';
        }
        if (classC.length > 0) {
            html += '<button class="smart-section-expand-btn" onclick="toggleSmartSection(\'smart-sec-c\',this)">';
            html += 'Expandir Clase C — ' + classC.length + (classC.length === 1 ? ' producto' : ' productos') + '</button>';
            html += '<div id="smart-sec-c" style="display:none;">';
            for (var sci = 0; sci < classC.length; sci++) {
                html += _renderSmartCard(classC[sci].prod, classC[sci].abcEntry, classC[sci].currentStock, 'C');
            }
            html += '</div>';
        }
        if (inactivos.length > 0) {
            var hiddenCount = HiddenSkus.count();
            var inactivosLabel = 'Inactivos — ' + inactivos.length + ' sin actividad reciente';
            if (hiddenCount > 0) inactivosLabel += ' · ' + hiddenCount + ' ocultos';
            html += '<button class="smart-section-expand-btn" onclick="toggleSmartSection(\'smart-sec-inactivos\',this)">' + inactivosLabel + '</button>';
            html += '<div id="smart-sec-inactivos" style="display:none;">';
            for (var ini = 0; ini < inactivos.length; ini++) {
                html += _renderInactivoCard(inactivos[ini].prod);

            if (hiddenCount > 0) {
                var hiddenProds = HiddenSkus.all();
                html += '<div class="smart-section-header" style="font-size:11px;opacity:0.7;">— Ocultos del pedido —</div>';
                for (var hi2 = 0; hi2 < hiddenProds.length; hi2++) {
                    html += _renderInactivoCard(hiddenProds[hi2], true);
                }
            }
            html += '</div>';
        }
        if (!html) {
            html = '<div style="text-align:center; padding:40px; color:var(--fede-on-surface-3);">No hay productos para mostrar.</div>';
        }

        listEl.innerHTML = html;
        saveOrderDraft();
        refreshIcons();
    }

    function _renderSmartCard(prod, abcEntry, currentStock, section) {
        var consumption = getConsumptionData(prod);
        var Q = 0;
        var explanation = '';
        var confClass = 'smart-conf-badge--projected';
        var confLabel = '~ Proyectado';

        // Módulo 5: si ORDER_SESSION tiene datos pre-computados para este SKU y no hay override manual,
        // usar Q_star y explanation del session para evitar doble cómputo
        var sessionEntry = (ORDER_SESSION && ORDER_SESSION.skus) ? (function() {
            for (var _si = 0; _si < ORDER_SESSION.skus.length; _si++) {
                if (ORDER_SESSION.skus[_si].sku_id === prod) return ORDER_SESSION.skus[_si];
            }
            return null;
        }()) : null;

        if (section === 'urgent') {
            if (consumption) {
                var qrUrgent = computeOrderQty_v3(abcEntry, consumption, 0);
                Q = qrUrgent.Q || Math.ceil(consumption.D_avg * (ORDER_LT_DAYS + 2));
                explanation = 'Stock en 0. ' + buildConsumptionExplanation(prod, abcEntry, qrUrgent, consumption, 0);
            } else {
                Q = 1;
                explanation = 'Stock en 0. Sin datos históricos suficientes.';
            }
            confClass = 'smart-conf-badge--stale';
            confLabel = '⛔ Sin stock';
        } else if (sessionEntry && ORDER_QTY[prod] === undefined) {
            // Usar datos pre-computados del Módulo 5
            Q = sessionEntry.Q_star;
            explanation = sessionEntry.explanation || '';
            if (abcEntry.confidence === 'RELIABLE') { confClass = 'smart-conf-badge--reliable'; confLabel = '✓ Confiable'; }
        } else if (consumption) {
            var qResult = computeOrderQty_v3(abcEntry, consumption, currentStock);
            Q = qResult.Q;
            explanation = buildConsumptionExplanation(prod, abcEntry, qResult, consumption, currentStock);
            if (abcEntry.confidence === 'RELIABLE') { confClass = 'smart-conf-badge--reliable'; confLabel = '✓ Confiable'; }
        } else {
            explanation = buildConsumptionExplanation(prod, abcEntry, null, null, currentStock);
            Q = 0;
        }

        if (ORDER_QTY[prod] !== undefined) Q = ORDER_QTY[prod];
        else ORDER_QTY[prod] = Q;

        var unit = consumption ? consumption.unit : (sessionEntry ? sessionEntry.unit : '');
        if (!unit) {
            for (var _hi = HIST.length - 1; _hi >= 0 && !unit; _hi--) {
                var _hitems = HIST[_hi].items || [];
                for (var _hii = 0; _hii < _hitems.length; _hii++) {
                    if (_hitems[_hii].prod === prod && _hitems[_hii].unit) { unit = _hitems[_hii].unit; break; }
                }
            }
        }
        var prodEncoded = encodeURIComponent(prod);
        var cardClass = 'smart-card' + (section === 'urgent' ? ' smart-card--urgent' : '');

        // Map old confClass to new badge classes
        var badgeClass = 'sc-badge--projected';
        var badgeLabel = 'Proyectado';
        if (confClass === 'smart-conf-badge--reliable') { badgeClass = 'sc-badge--reliable'; badgeLabel = 'Confiable'; }
        else if (confClass === 'smart-conf-badge--stale') { badgeClass = 'sc-badge--stale'; badgeLabel = 'Sin datos'; }
        if (section === 'urgent') { badgeClass = 'sc-badge--stale'; badgeLabel = 'Sin stock'; }

        var safeUnit = FeDe_Utils.sanitize(unit);
        var h = '<div class="' + cardClass + '" data-prod="' + prodEncoded + '">';
        // Top row: badge + hide button
        h += '<div class="sc-top-row">';
        h += '<div class="sc-badge ' + badgeClass + '">' + badgeLabel + '</div>';
        h += '<button class="sc-hide-btn" onclick="hideSkuFromOrder(\'' + prodEncoded + '\')" title="Ocultar"><i data-lucide="x" style="width:15px;height:15px;pointer-events:none;"></i></button>';
        h += '</div>';
        // Product name
        h += '<div class="sc-name">' + FeDe_Utils.sanitize(prod) + '</div>';
        // Stock line
        if (currentStock > 0) {
            h += '<div class="sc-stock-line">Stock actual: <strong>' + currentStock + ' ' + safeUnit + '</strong></div>';
        }
        // Stepper — primary action
        h += '<div class="sc-stepper-zone">';
        h += '<button class="sc-btn sc-btn--minus" onclick="orderStep(\'' + prodEncoded + '\', -1)">−</button>';
        h += '<div class="sc-qty-block">';
        h += '<span class="sc-qty-num" id="oval-' + prodEncoded + '">' + Q + '</span>';
        h += '<span class="sc-qty-unit">' + safeUnit + '</span>';
        h += '</div>';
        h += '<button class="sc-btn sc-btn--plus" onclick="orderStep(\'' + prodEncoded + '\', 1)">+</button>';
        h += '</div>';
        // Explanation — tertiary
        if (explanation) h += '<div class="sc-why">' + explanation + '</div>';
        h += '</div>';
        return h;
    }

    /* Indicadores del carrusel de operaciones.
       Llamado desde goHome() en lugar de DOMContentLoaded para garantizar que el DOM exista.
       Guard de doble-registro via flag en el elemento. */
    /* Anima el scroll del carrusel con curva ease-out via requestAnimationFrame.
       Usa offsetLeft de la card real para posición exacta, garantizando que la
       última tarjeta siempre es alcanzable independientemente del viewport. */
    function scrollCarouselTo(idx) {
        var carousel = document.getElementById('home-op-carousel');
        if (!carousel) return;
        var cards = carousel.querySelectorAll('.fede-op-card');
        if (!cards || idx >= cards.length) return;

        var target = cards[idx].offsetLeft - carousel.offsetLeft;
        // Para el último índice forzar al máximo scroll (garantiza llegar al final)
        if (idx === cards.length - 1) {
            target = carousel.scrollWidth - carousel.clientWidth;
        }

        var start    = carousel.scrollLeft;
        var distance = target - start;
        var duration = 380; // ms — animación dinámica pero no lenta
        var startTime = null;

        // Cancelar animación previa si existe
        if (carousel._scrollRaf) cancelAnimationFrame(carousel._scrollRaf);

        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

        function step(ts) {
            if (!startTime) startTime = ts;
            var elapsed = ts - startTime;
            var progress = Math.min(elapsed / duration, 1);
            carousel.scrollLeft = start + distance * easeOutCubic(progress);
            if (progress < 1) {
                carousel._scrollRaf = requestAnimationFrame(step);
            } else {
                carousel._scrollRaf = null;
            }
        }
        carousel._scrollRaf = requestAnimationFrame(step);
    }

    function _initCarouselDots() {
        var carousel = document.getElementById('home-op-carousel');
        var track    = document.getElementById('home-carousel-dots');
        var pill     = document.getElementById('home-carousel-pill');
        if (!carousel || !track) return;
        if (carousel._dotsInitialized) return;
        carousel._dotsInitialized = true;

        var cards = carousel.querySelectorAll('.fede-op-card');
        var n = cards.length || 1;

        var colors = [
            'var(--fede-accent-pedido)',
            'var(--fede-accent-stock)',
            'var(--fede-accent-recepcion)',
            'var(--fede-accent-merma)',
            'var(--fede-accent-produccion)',
            'var(--fede-danger)'
        ];

        /* Pill proporcional al scrollLeft — sincronía exacta en mobile y desktop */
        function _updatePill() {
            if (!pill) return;
            var maxScroll = carousel.scrollWidth - carousel.clientWidth;
            var ratio = maxScroll > 0 ? carousel.scrollLeft / maxScroll : 0;
            var trackW = track.clientWidth;
            var pillW  = Math.round(trackW / n);
            var x      = Math.round(ratio * (trackW - pillW));

            pill.style.width     = pillW + 'px';
            pill.style.transform = 'translateX(' + x + 'px)';

            var activeIdx = Math.min(Math.round(ratio * (n - 1)), n - 1);
            pill.style.background = colors[activeIdx] || colors[0];
        }

        carousel.addEventListener('scroll', _updatePill, { passive: true });

        /* Click en cualquier punto de la barra → salta a la tarjeta */
        track.addEventListener('click', function(e) {
            var rect  = track.getBoundingClientRect();
            var ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            scrollCarouselTo(Math.round(ratio * (n - 1)));
        });

        /* Imagen decorativa — delega en _activateCardImages() */
        _activateCardImages();

        _updatePill();
    }

    function kaSearchIngredients(query) {
        var listEl = document.getElementById('ka-results-list');
        if (!listEl) return;
        var q = _normDensityKey(query || '');
        if (!q || q.length < 2) { listEl.innerHTML = ''; return; }

        /* Unir claves de KA_TABLE y DENSITY_TABLE sin duplicados */
        var allKeys = [];
        var seen = {};
        var k;
        for (k in KA_TABLE) { if (KA_TABLE.hasOwnProperty(k) && !seen[k]) { allKeys.push(k); seen[k] = 1; } }
        for (k in DENSITY_TABLE) { if (DENSITY_TABLE.hasOwnProperty(k) && !seen[k]) { allKeys.push(k); seen[k] = 1; } }

        var results = [];
        for (var i = 0; i < allKeys.length; i++) {
            if (allKeys[i].indexOf(q) !== -1) results.push(allKeys[i]);
            if (results.length >= 12) break;
        }
        kaRenderSearchResults(results, q);
    }

    function kaRenderSearchResults(results, q) {
        var listEl = document.getElementById('ka-results-list');
        if (!listEl) return;
        if (!results || results.length === 0) {
            listEl.innerHTML = '<div style="padding:12px 16px;font:var(--fede-caption);color:var(--fede-on-surface-3);text-align:center;">Sin resultados</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < results.length; i++) {
            var key = results[i];
            /* Capitaliza primera letra para display */
            var label = key.charAt(0).toUpperCase() + key.slice(1);

    function kaGetAvailableUnits(normKey) {
        /* Unidades volumétricas siempre disponibles si hay datos KA o densidad */
        var hasDensity = getDensity(normKey) !== null;
        var kaEntry    = KA_TABLE[normKey] || null;
        var units = ['gr', 'kg', 'ml', 'lt', 'cc'];
        /* Agregar unidades culturales solo si hay datos para convertir */
        if (kaEntry || hasDensity) {
            if (kaEntry && kaEntry.taza  !== null) units.push('taza');
            if (kaEntry && kaEntry.cda   !== null) units.push('cda');
            if (kaEntry && kaEntry.cdita !== null) units.push('cdita');
            /* Si tiene densidad también puede convertir con taza/cda/cdita via motor */
            if (hasDensity && !kaEntry) { units.push('taza'); units.push('cda'); units.push('cdita'); }
        }
        return units;
    }

    function kaUpdateUnitSelectors() {
        if (!_kaSelectedKey) return;
        var units = kaGetAvailableUnits(_kaSelectedKey);
        var labels = { gr:'g', kg:'kg', ml:'ml', lt:'lt', cc:'cc', taza:'taza', cda:'cda', cdita:'cdita' };
        function buildSelect(id, current) {
            var el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = '';
            for (var i = 0; i < units.length; i++) {
                var opt = document.createElement('option');
                opt.value = units[i];
                opt.textContent = labels[units[i]] || units[i];
                if (units[i] === current) opt.selected = true;
                el.appendChild(opt);
            }
        }
        /* Validar que las unidades actuales sigan disponibles */
        if (units.indexOf(_kaFromUnit) === -1) _kaFromUnit = units[0];
        if (units.indexOf(_kaToUnit)   === -1) _kaToUnit   = (units[1] || units[0]);
        buildSelect('ka-from-unit', _kaFromUnit);
        buildSelect('ka-to-unit',   _kaToUnit);
    }

    function kaOnFromUnitChange(val) { _kaFromUnit = val; kaConvert(); }
    function kaOnToUnitChange(val)   { _kaToUnit   = val; kaConvert(); }

    function kaSwapUnits() {
        var tmp = _kaFromUnit;
        _kaFromUnit = _kaToUnit;
        _kaToUnit   = tmp;
        kaUpdateUnitSelectors();
        kaConvert();
    }

    /* Motor de conversión principal del Conversor */
    function kaConvert() {
        if (!_kaSelectedKey) return;
        var qtyRaw = parseFloat(document.getElementById('ka-from-qty').value);
        if (isNaN(qtyRaw) || qtyRaw <= 0) {
            document.getElementById('ka-output-result').textContent = '—';
            document.getElementById('ka-source-badge').textContent = '';
            return;
        }
        var fromU = _kaFromUnit;
        var toU   = _kaToUnit;
        var key   = _kaSelectedKey;

        /* Caso trivial: misma unidad */
        if (fromU === toU) {
            kaUpdateOutput(qtyRaw, 'directo');
            return;
        }

        var fromDim = UNIT_REGISTRY.getDimension(_normVolumeUnit(fromU));
        var toDim   = UNIT_REGISTRY.getDimension(_normVolumeUnit(toU));

        /* Caso 1: misma dimensión (masa↔masa o volumen↔volumen) */
        if (fromDim === toDim) {
            var r1 = UNIT_CONVERTER.convertSmart(qtyRaw, fromU, toU, key);
            if (r1 !== null) { kaUpdateOutput(r1, 'conversion-directa'); return; }
        }

        /* Caso 2: cross-dimension. Intentar con KA_TABLE primero */
        var kaEntry = KA_TABLE[key];
        if (kaEntry) {
            /* Normalizar qty a gramos usando KA_TABLE */
            var grFromKA = null;
            var grPerTaza  = kaEntry.taza;
            var grPerCda   = kaEntry.cda;
            var grPerCdita = kaEntry.cdita;

            function _kaToGrams(qty, unit) {
                if (unit === 'gr')    return qty;
                if (unit === 'kg')    return qty * 1000;
                if (unit === 'taza'  && grPerTaza  !== null) return qty * grPerTaza;
                if (unit === 'cda'   && grPerCda   !== null) return qty * grPerCda;
                if (unit === 'cdita' && grPerCdita !== null) return qty * grPerCdita;
                /* Para ml/lt/cc: usar densidad si existe, sino KA_TABLE via equivalencia taza */
                var density = getDensity(key);
                if (density && (unit === 'ml' || unit === 'lt' || unit === 'cc')) {
                    var ml = UNIT_CONVERTER.convertSmart(qty, unit, 'ml', key);
                    return ml !== null ? ml * density : null;
                }
                return null;
            }

            function _gramsToUnit(gr, unit) {
                if (unit === 'gr')    return gr;
                if (unit === 'kg')    return gr / 1000;
                if (unit === 'taza'  && grPerTaza  !== null) return gr / grPerTaza;
                if (unit === 'cda'   && grPerCda   !== null) return gr / grPerCda;
                if (unit === 'cdita' && grPerCdita !== null) return gr / grPerCdita;
                if (unit === 'ml' || unit === 'lt' || unit === 'cc') {
                    var density = getDensity(key);
                    if (density) {
                        var ml = gr / density;
                        return UNIT_CONVERTER.convertSmart(ml, 'ml', unit, key);
                    }
                }
                return null;
            }

            grFromKA = _kaToGrams(qtyRaw, fromU);
            if (grFromKA !== null) {
                var resultKA = _gramsToUnit(grFromKA, toU);
                if (resultKA !== null) { kaUpdateOutput(resultKA, 'ka-table'); return; }
            }
        }

        /* Caso 3: fallback al motor de densidad estándar */
        var r3 = UNIT_CONVERTER.convertSmart(qtyRaw, fromU, toU, key);
        if (r3 !== null) { kaUpdateOutput(r3, 'densidad'); return; }

        /* Sin datos suficientes */
        document.getElementById('ka-output-result').textContent = 'Sin datos';
        document.getElementById('ka-source-badge').textContent = '';
    }

    function kaUpdateOutput(result, source) {
        var labels = { gr:'g', kg:'kg', ml:'ml', lt:'lt', cc:'cc', taza:'taza', cda:'cda', cdita:'cdita' };
        var toLabel = labels[_kaToUnit] || _kaToUnit;

        /* Formateo inteligente */
        var formatted;
        if (Math.abs(result) >= 1000) {
            formatted = parseFloat(result.toFixed(1)).toLocaleString('es-AR') + ' ' + toLabel;
        } else if (Math.abs(result) >= 10) {
            formatted = parseFloat(result.toFixed(1)) + ' ' + toLabel;
        } else {
            formatted = parseFloat(result.toFixed(2)) + ' ' + toLabel;
        }

        document.getElementById('ka-output-result').textContent = formatted;

        var sourceTxt = { 'ka-table': 'King Arthur', 'densidad': 'Densidad estándar', 'conversion-directa': '', 'directo': '' };
        document.getElementById('ka-source-badge').textContent = sourceTxt[source] || '';
    }

    // ── CONTROLAR STEPPER DE UN ÍTEM ──
    function orderStep(prodEncoded, delta) {
        var prod = decodeURIComponent(prodEncoded);
        var current = ORDER_QTY[prod] || 0;

        // Incremento en 0.5 para cantidades < 5, en 1 para el resto
        var step = current < 5 ? 0.5 : 1;
        var next = Math.max(0, current + (delta > 0 ? step : -step));
        next = Math.round(next * 10) / 10;

        ORDER_QTY[prod] = next;
        var el = document.getElementById('oval-' + prodEncoded);
        if (el) el.textContent = next;

        // Persistir en localStorage inmediatamente
        saveOrderDraft();
    }

    // ── Módulo 6: captura de feedback al enviar ──
    function captureFeedbackOnSend(reasonCode) {
        if (!ORDER_SESSION || !ORDER_SESSION.skus) return;
        var today = new Date();
        var sessionDate = today.getFullYear() + '-' +
            ('0' + (today.getMonth() + 1)).slice(-2) + '-' +
            ('0' + today.getDate()).slice(-2);

        // Índice Q_star y D_avg por sku_id
        var sessionIdx = {};
        for (var si = 0; si < ORDER_SESSION.skus.length; si++) {
            sessionIdx[ORDER_SESSION.skus[si].sku_id] = ORDER_SESSION.skus[si];
        }

        var prods = Object.keys(ORDER_QTY);
        for (var pi = 0; pi < prods.length; pi++) {
            var prod = prods[pi];
            var skuData = sessionIdx[prod];
            if (!skuData) continue;
            var suggested = skuData.Q_star;
            var adjusted  = ORDER_QTY[prod];
            if (adjusted === suggested) continue; // sin ajuste, no capturar

            var entry = {
                sku_id:        prod,
                session_date:  sessionDate,
                suggested_qty: suggested,
                adjusted_qty:  adjusted,
                reason_code:   reasonCode || 'other',
                note:          null,
                d_avg_at_time: skuData.D_avg !== null ? skuData.D_avg : null
            };
            saveFeedbackEntry(entry);
            _hookH2(entry);
        }
    }

    function showFeedbackModal(adjustedItems, onConfirm) {
        // Eliminar modal previo si existe
        var existing = document.getElementById('feedback-modal-overlay');
        if (existing && existing.parentNode) existing.parentNode.removeChild(existing);

        var selectedReason = 'other';

        var reasons = [
            { code: 'demand_change',    label: 'Cambió el consumo' },

            { code: 'supplier_change',  label: 'Cambio de proveedor' },

        ];

        // Construir lista de ítems (máx 5 visibles + indicador de "N más")
        var itemsHtml = '';
        var maxVisible = 5;
        for (var ii = 0; ii < Math.min(adjustedItems.length, maxVisible); ii++) {
            var item = adjustedItems[ii];
            itemsHtml += '<div class="feedback-item-row">';
            itemsHtml += '<span class="feedback-item-name">' + FeDe_Utils.sanitize(item.prod) + '</span>';
            itemsHtml += '<span class="feedback-item-delta">' + item.suggested + ' → ' + item.adjusted + ' ' + FeDe_Utils.sanitize(item.unit || '') + '</span>';
            itemsHtml += '</div>';
        }
        if (adjustedItems.length > maxVisible) {
            itemsHtml += '<div class="feedback-item-more">+ ' + (adjustedItems.length - maxVisible) + ' más</div>';
        }

        // Construir pills de motivo
        var pillsHtml = '';
        for (var ri = 0; ri < reasons.length; ri++) {
            var r = reasons[ri];
            var activeClass = (r.code === 'other') ? ' feedback-reason-btn--active' : '';
            pillsHtml += '<button class="feedback-reason-btn' + activeClass + '" onclick="__fbSelectReason(\'' + r.code + '\')">' + r.label + '</button>';
        }

        var html = '<div id="feedback-modal-overlay" class="feedback-modal-overlay" onclick="__fbDismiss(event)">';
        html += '<div class="feedback-modal">';
        html += '<div class="feedback-modal-title">¿Por qué ajustaste estas cantidades?</div>';
        html += '<div class="feedback-modal-items">' + itemsHtml + '</div>';
        html += '<div class="feedback-modal-reasons">' + pillsHtml + '</div>';
        html += '<div style="display:flex; gap:10px; margin-top:16px;">';
        html += '<button class="btn-secondary-ctx" style="flex:1;" onclick="__fbSkip()">Enviar sin registrar</button>';
        html += '<button class="btn-primary-ctx" style="flex:2;" onclick="__fbConfirm()">Registrar y enviar</button>';
        html += '</div>';
        html += '</div></div>';

        // Insertar en el body
        var wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        document.body.appendChild(wrapper.firstChild);

        // Funciones temporales en window (se limpian al cerrar)
        window.__fbSelectReason = function(code) {
            selectedReason = code;
            var btns = document.querySelectorAll('.feedback-reason-btn');
            for (var bi = 0; bi < btns.length; bi++) {
                btns[bi].className = btns[bi].className.replace(' feedback-reason-btn--active', '');
                if (btns[bi].textContent === reasons[_findReasonIdx(code)].label) {
                    btns[bi].className += ' feedback-reason-btn--active';
                }
            }
        };

        function _findReasonIdx(code) {
            for (var fi = 0; fi < reasons.length; fi++) {
                if (reasons[fi].code === code) return fi;
            }
            return reasons.length - 1;
        }

        window.__fbConfirm = function() {
            captureFeedbackOnSend(selectedReason);
            _removeModal();
            onConfirm();
        };

        window.__fbSkip = function() {
            _removeModal();
            onConfirm();
        };

        window.__fbDismiss = function(e) {
            if (e.target && e.target.id === 'feedback-modal-overlay') {
                _removeModal();
                onConfirm();
            }
        };

        function _removeModal() {
            var el = document.getElementById('feedback-modal-overlay');
            if (el && el.parentNode) el.parentNode.removeChild(el);
            delete window.__fbSelectReason;
            delete window.__fbConfirm;
            delete window.__fbSkip;
            delete window.__fbDismiss;
        }
    }

    function openOrderReview() {
        var itemsWithQty = [];

        for (var pi = 0; pi < prodKeys.length; pi++) {
            var prod = prodKeys[pi];
            if (ORDER_QTY[prod] > 0) {
                var cat = (ABC_DATA && ABC_DATA[prod]) ? ABC_DATA[prod].cat : 'Varios';
                var unit = '';
                var consumption = getConsumptionData(prod);
                if (consumption) unit = consumption.unit;
                if (!unit) {
                    for (var hi = HIST.length - 1; hi >= 0 && !unit; hi--) {
                        var hitems = HIST[hi].items || [];
                        for (var hii = 0; hii < hitems.length; hii++) {
                            if (hitems[hii].prod === prod && hitems[hii].unit) { unit = hitems[hii].unit; break; }

    // ── ENVIAR PEDIDO POR WHATSAPP ──
    function sendOrderByWA() {
        var lines = [];
        var now = new Date();
        var dias  = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        var meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

        lines.push('📅 ' + dias[now.getDay()] + ' ' + now.getDate() + ' ' + meses[now.getMonth()]);
        lines.push('');

        // Agrupar ORDER_QTY por categoría usando ABC_DATA + CATS
        var bycat = {};
        var prodKeys = Object.keys(ORDER_QTY);
        for (var pi = 0; pi < prodKeys.length; pi++) {
            var prod = prodKeys[pi];
            var qty = ORDER_QTY[prod];
            if (!qty || qty <= 0) continue;
            var cat = (ABC_DATA && ABC_DATA[prod]) ? ABC_DATA[prod].cat : 'Varios';

            // Buscar unidad en último registro HIST para este producto
            var unit = '';
            for (var hi = HIST.length - 1; hi >= 0 && !unit; hi--) {
                var hitems = HIST[hi].items || [];
                for (var hii = 0; hii < hitems.length; hii++) {
                    if (hitems[hii].prod === prod && hitems[hii].unit) { unit = hitems[hii].unit; break; }
                }
            }
            if (!bycat[cat]) bycat[cat] = [];
            bycat[cat].push({ prod: prod, qty: qty, unit: unit });
        }

        var catNames = Object.keys(bycat).sort();
        if (catNames.length === 0) {
            showToast('No hay ítems con cantidad > 0 para enviar.');
            return;
        }

        for (var ci = 0; ci < catNames.length; ci++) {
            var catName = catNames[ci];
            var items = bycat[catName];
            lines.push('*' + catName.toUpperCase() + '*');
            for (var ii = 0; ii < items.length; ii++) {
                lines.push('   • ' + items[ii].prod + ': *' + items[ii].qty + ' ' + (items[ii].unit || '') + '*');
            }
            lines.push('');
        }

        lines.push('_Generado por FeDe Gastro Pro_');

        var msg = lines.join('\n');

        // Módulo 6: detectar ajustes vs Q_star antes de enviar
        var adjustedItems = [];
        if (ORDER_SESSION && ORDER_SESSION.skus) {
            var _sessionIdx = {};
            for (var _si = 0; _si < ORDER_SESSION.skus.length; _si++) {
                _sessionIdx[ORDER_SESSION.skus[_si].sku_id] = ORDER_SESSION.skus[_si];
            }
            var _prodKeys = Object.keys(ORDER_QTY);
            for (var _pi = 0; _pi < _prodKeys.length; _pi++) {
                var _prod = _prodKeys[_pi];
                var _skuData = _sessionIdx[_prod];
                if (!_skuData) continue;
                if (ORDER_QTY[_prod] <= 0) continue;
                if (ORDER_QTY[_prod] !== _skuData.Q_star) {
                    adjustedItems.push({
                        prod:      _prod,
                        suggested: _skuData.Q_star,
                        adjusted:  ORDER_QTY[_prod],
                        unit:      _skuData.unit || ''
                    });
                }
            }
        }

        var _waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
        var _doSend = function() {
            window.open(_waUrl, '_blank');
            clearOrderDraft();
            showToast('✅ Pedido enviado — borrador limpiado');
        };

        if (adjustedItems.length > 0) {
            showFeedbackModal(adjustedItems, _doSend);
        } else {
            _doSend();
        }
    }

    function _pfSearchProd(query) {
        var resultsEl = document.getElementById('pf-prod-results');
        if (!resultsEl) return;
        if (!query || query.length < 2) { resultsEl.style.display = 'none'; return; }
        var allProds = [];
        var cats = Object.keys(CATS);
        for (var i = 0; i < cats.length; i++) {
            var prods = CATS[cats[i]].prods || [];
            for (var k = 0; k < prods.length; k++) { allProds.push(prods[k]); }
        }
        var q = query.toLowerCase();
        var matches = [];
        for (var m = 0; m < allProds.length; m++) {
            if (allProds[m].toLowerCase().indexOf(q) !== -1) { matches.push(allProds[m]); }
            if (matches.length >= 8) break;
        }
        if (matches.length === 0) { resultsEl.style.display = 'none'; return; }
        var html = '';
        for (var n = 0; n < matches.length; n++) {
            var p = matches[n];
            var safe = p.replace(/'/g, "\\'");
            html += '<div onclick="_pfPickProd(\'' + safe + '\')" onmouseover="this.style.background=\'var(--fede-surface-2)\'" onmouseout="this.style.background=\'\'" style="padding:10px 14px;font:var(--fede-body);cursor:pointer;color:var(--fede-on-surface);">' + FeDe_Utils.sanitize(p) + '</div>';
        }
        resultsEl.innerHTML = html;
        resultsEl.style.display = 'block';
    }

    function _pfPickProd(prod) {
        var searchInp = document.getElementById('pf-prod-search');
        var hiddenInp = document.getElementById('pf-inp-prod');
        var resultsEl = document.getElementById('pf-prod-results');
        if (searchInp) searchInp.value = prod;
        if (hiddenInp) hiddenInp.value = prod.toLowerCase();
        if (resultsEl) resultsEl.style.display = 'none';
        _pfUpdatePreview();
    }

    function _pfSelectChip(type, value) {
        var containerId = type === 'base' ? 'pf-base-chips' : 'pf-pack-chips';
        var hiddenId    = type === 'base' ? 'pf-sel-base'   : 'pf-sel-pack';
        var attrName    = type === 'base' ? 'data-pf-base'  : 'data-pf-pack';
        var container   = document.getElementById(containerId);
        var hiddenEl    = document.getElementById(hiddenId);
        if (container) {
            var chips = container.querySelectorAll('.pf-chip');
            for (var i = 0; i < chips.length; i++) {
                if (chips[i].getAttribute(attrName) === value) {
                    chips[i].classList.add('active');
                } else {
                    chips[i].classList.remove('active');
                }
            }
        }
        if (hiddenEl) hiddenEl.value = value;
        _pfUpdatePreview();
    }

    function _pfUpdatePreview() {
        var previewEl = document.getElementById('pf-preview');
        if (!previewEl) return;
        var prod   = document.getElementById('pf-prod-search') ? document.getElementById('pf-prod-search').value.trim() : '';
        var base   = document.getElementById('pf-sel-base')    ? document.getElementById('pf-sel-base').value.trim()    : '';
        var pack   = document.getElementById('pf-sel-pack')    ? document.getElementById('pf-sel-pack').value.trim()    : '';
        var factor = document.getElementById('pf-inp-factor')  ? document.getElementById('pf-inp-factor').value.trim()  : '';
        if (prod && base && pack && factor) {
            previewEl.textContent = '1 ' + pack + ' de ' + prod + ' = ' + factor + ' ' + base;
        } else {
            previewEl.textContent = '—';
        }
    }

    function _confirmAddPackRule() {
        var prod   = document.getElementById('pf-inp-prod')   ? document.getElementById('pf-inp-prod').value.trim().toLowerCase()   : '';
        var base   = document.getElementById('pf-sel-base')   ? document.getElementById('pf-sel-base').value.trim()   : '';
        var pack   = document.getElementById('pf-sel-pack')   ? document.getElementById('pf-sel-pack').value.trim()   : '';
        var factor = document.getElementById('pf-inp-factor') ? parseFloat(document.getElementById('pf-inp-factor').value) : NaN;
        if (!prod || !base || !pack || isNaN(factor) || factor <= 0) {
            showToast('Completá todos los campos con valores válidos.');
            return;
        }
        if (!PACK_FACTORS_EDIT[prod]) PACK_FACTORS_EDIT[prod] = {};
        if (!PACK_FACTORS_EDIT[prod][base]) PACK_FACTORS_EDIT[prod][base] = {};
        PACK_FACTORS_EDIT[prod][base][pack] = factor;
        _cancelPackRuleForm();
        renderPackFactorsConfig();
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function _cancelPackRuleForm() {
        var f = document.getElementById('pack-rule-inline-form');
        if (f) f.parentNode.removeChild(f);
    }

            container.classList.remove('hdr-search-hidden');
            setTimeout(function () { if(input) input.focus(); }, 300);
        } else {
            container.classList.remove('hdr-search-active');
            if (!container.classList.contains('hdr-search-persistent')) {
                container.classList.add('hdr-search-hidden');
            }
            if(input) input.value = '';
            if(results) { results.style.display = 'none'; results.innerHTML = ''; }
            if(clearBtn) clearBtn.style.display = 'none';
        }
    }

    /**
     * 🔍 NORMALIZACIÓN (IGNORAR TILDES)
     */
    function normalizeStr(str) {
        if (!str) return '';
        return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    var FUSE_INSTANCE = null;

    function buildSearchIndex() {
        var items = [];
        var catKeys = Object.keys(CATS);
        for (var ci = 0; ci < catKeys.length; ci++) {
            var cat = catKeys[ci];
            var prods = CATS[cat].prods || [];
            for (var pi = 0; pi < prods.length; pi++) {
                var p = prods[pi];
                if (typeof p !== 'string') continue;
                items.push({
                    name:       p,
                    cat:        cat,
                    normalized: normalizeStr(p)
                });
            }
        }
        if (typeof Fuse !== 'undefined') {
            FUSE_INSTANCE = new Fuse(items, {
                keys:               ['name', 'normalized'],
                threshold:          0.38,
                ignoreLocation:     true,
                minMatchCharLength: 3,
                includeScore:       true
            });
        }
    }

    function handleHdrSearch(val, target) {
        var isOp2 = (target === 'op2');
        var resEl = isOp2 ? document.getElementById('op2-search-results') : document.getElementById('hdr-search-res');
        var clearBtn = document.getElementById('mcf-search-clear');
        if (clearBtn) clearBtn.style.display = (val ? 'block' : 'none');
        
        if (!resEl) return;
        var _emptyRelS = document.getElementById('relevamiento-empty');
        if (!val || val.length < 1) {
            resEl.innerHTML = '';
            resEl.style.display = 'none';
            if (_emptyRelS) _emptyRelS.classList.remove('hidden');
            return;
        }
        
        if (_emptyRelS) _emptyRelS.classList.add('hidden');
        var matches = [];

        if (typeof CATS !== 'object' || !CATS) return;

        // Paso 1: substring exacto normalizado (siempre)
        var query = normalizeStr(val.trim());
        if (typeof CATS === 'object' && CATS) {
            Object.keys(CATS).forEach(function(cat) {
                var prods = (CATS[cat] && CATS[cat].prods) ? CATS[cat].prods : [];
                for (var i = 0; i < prods.length; i++) {
                    var p = prods[i];
                    if (typeof p === 'string') {
                        var idx = normalizeStr(p).indexOf(query);
                        if (idx !== -1) matches.push({ name: p, cat: cat.toUpperCase(), idx: idx });
                    }
                }
            });
            matches.sort(function(a, b) {
                if ((a.idx === 0) !== (b.idx === 0)) return a.idx === 0 ? -1 : 1;
                if (a.idx !== b.idx) return a.idx - b.idx;
                return a.name.length - b.name.length;
            });
        }

        // Paso 2: fallback fuzzy via Fuse solo si indexOf no encontró nada y query >= 3 chars
        if (matches.length === 0 && val.trim().length >= 3) {
            if (!FUSE_INSTANCE) buildSearchIndex();
            if (FUSE_INSTANCE) {
                var fuseResults = FUSE_INSTANCE.search(val.trim());
                for (var fri = 0; fri < Math.min(fuseResults.length, 10); fri++) {
                    matches.push({ name: fuseResults[fri].item.name, cat: fuseResults[fri].item.cat.toUpperCase(), idx: 0 });
                }
            }
        }

        if (matches.length === 0) {
            var safeVal = FeDe_Utils.sanitize(val.trim());
            var eVal = encodeURIComponent(val.trim());
            resEl.innerHTML = '<div class="ts-no-results-block">' +
                '<div class="ts-no-res-text">Sin resultados para "' + safeVal + '"</div>' +
                '<button class="ts-create-btn" onclick="openQuickCreateProduct(\'' + eVal + '\')">' +
                '<i data-lucide="plus-circle" style="width:14px;height:14px;"></i> ' +
                'Crear "' + safeVal + '"</button></div>';
            resEl.style.display = 'block';
            refreshIcons(resEl);
            return;
        }

        var displayMatches = matches.slice(0, 15);
        if (!isOp2) displayMatches.reverse();
        if (displayMatches.length > 0 && query.length > 2) {
            if (navigator.vibrate) navigator.vibrate(5);
        }

        var html = '';
        displayMatches.forEach(function(m) {
            var eProdName = encodeURIComponent(m.name);
            var eCatName = encodeURIComponent(m.cat);
            var safeName = FeDe_Utils.sanitize(m.name);
            var safeCat = FeDe_Utils.sanitize(m.cat);
            
            var itemClass = isOp2 ? 'mcf-search-item' : 'mcf-res-item';
            var nameClass = isOp2 ? 'mcf-search-name' : 'mcf-res-name';
            var catClass = isOp2 ? 'mcf-search-cat' : 'mcf-res-cat';

            html += '<div class="' + itemClass + '" data-prod-name="' + eProdName + '" data-cat-name="' + eCatName + '" role="button" tabindex="0">' +
                    '<span class="' + nameClass + '">' + safeName + '</span>' +
                    '<span class="' + catClass + '">' + safeCat + '</span>' +
                    '</div>';
        });
        
        if (resEl) {
            resEl.innerHTML = html;
            resEl.style.display = (html ? 'block' : 'none');
            // Force scroll to bottom for thumb-proximity if not Op2
            if (!isOp2) resEl.scrollTop = resEl.scrollHeight;
            
            var itemSelector = isOp2 ? '.mcf-search-item' : '.mcf-res-item';
            resEl.querySelectorAll(itemSelector).forEach(function(item) {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var prodName = decodeURIComponent(this.dataset.prodName);
                    var catName = decodeURIComponent(this.dataset.catName);
                    selectSearchItem(prodName, catName);
                });
                
                // Keyboard support (Enter key)
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        e.stopPropagation();
                        var prodName = decodeURIComponent(this.dataset.prodName);
                        var catName = decodeURIComponent(this.dataset.catName);
                        selectSearchItem(prodName, catName);
                    }
                });
            });
        }
    }

    /**
     * SEARCH CONTROLLER: Selection logic with industrial mobile mechanics.
     */
    function selectSearchItem(prod, cat) {
        if (navigator.vibrate) navigator.vibrate([15, 30]);

        // 1. UI Reset & Authority Clearance
        var inp = document.getElementById('hdr-search-input');
        var op2Inp = document.getElementById('op2-relevamiento-search');
        var resEl = document.getElementById('hdr-search-res');
        var op2ResEl = document.getElementById('op2-search-results');
        var clearBtn = document.getElementById('mcf-search-clear');
        
        if (inp) { inp.value = ''; inp.blur(); }
        if (op2Inp) { op2Inp.value = ''; op2Inp.blur(); }
        if (resEl) { resEl.style.display = 'none'; resEl.innerHTML = ''; }
        if (op2ResEl) { op2ResEl.style.display = 'none'; op2ResEl.innerHTML = ''; }
        if (clearBtn) clearBtn.style.display = 'none';

        // Flotar la barra de búsqueda inmediatamente como feedback de selección
        var searchSec = document.querySelector('.fede-op2-search-section');
        if (searchSec) searchSec.classList.add('is-floating');

        if (typeof exitFullscreenMode === 'function') exitFullscreenMode();
        
        // 2. Data Resolution
        var targetCat = null;
        Object.keys(CATS).forEach(function(c) {
            if (c.toUpperCase() === cat.toUpperCase()) targetCat = c;
        });

        if (!targetCat) {
            toast("⚠️ Error de arquitectura: Categoría desconocida");
            return;
        }

        // 3. Navigation Trigger
        if (!currentMode) {
            var lastMode = localStorage.getItem('fede_last_mode') || 'pedido';
            initRelevamiento(lastMode);
        } else {
            goTab('relevamiento');
        }
        
        // Immediate Category Switch
        selectCat(targetCat);
        
        // 4. Polling Seeker securely by data-attribute
        var attempts = 0;
        var safeSelector = '[data-prow="' + encodeURIComponent(prod) + '"]';
        
        if (window._mcf_search_seeker) clearInterval(window._mcf_search_seeker);
        window._mcf_search_seeker = setInterval(function() {
            attempts++;
            var target = document.querySelector(safeSelector);

            if (target) {
                clearInterval(window._mcf_search_seeker);
                
                // Scroll suave al elemento y pulso de highlight por 2s
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('fede-item-highlight');

                setTimeout(function() {
                    target.classList.remove('fede-item-highlight');
                }, 2200);
            }

            if (attempts > 40) {
                clearInterval(window._mcf_search_seeker);
                console.warn("Element not found after 40 attempts:", prod);
            }
        }, 120);
    }

    // ── Módulo 2: Motor de Viabilidad ────────────────────────────────────────

    function resolveIngredientStock(prod, recipeUnit) {
        var stockQty = null;
        var stockUnit = null;
        var stockDate = null;

        for (var i = 0; i < HIST.length; i++) {
            var h = HIST[i];
            if (h.mode !== 'stock') continue;
            var items = h.items || [];
            for (var j = 0; j < items.length; j++) {
                var it = items[j];
                if (it.prod !== prod) continue;
                if (!stockDate || h.fecha > stockDate) {
                    var rawQty = Number(it.qty);
                    stockQty  = (rawQty === 86) ? 0 : (rawQty || 0);
                    stockUnit = it.unit;
                    stockDate = h.fecha;
                }
            }
        }

        if (stockQty === null) {
            return { stockQty: null, stockUnit: null, canConvert: false, status: 'unknown' };
        }

        for (var k = 0; k < HIST.length; k++) {
            var hk = HIST[k];
            if (hk.mode !== 'produccion' || !stockDate || hk.fecha <= stockDate) continue;
            var hkItems = hk.items || [];
            for (var l = 0; l < hkItems.length; l++) {
                var hki = hkItems[l];
                if (hki.prod !== prod || !hki.consumed) continue;
                var consumed = UNIT_CONVERTER.convertSmart(Number(hki.qty) || 0, hki.unit, stockUnit, prod);
                if (consumed !== null) stockQty -= consumed;
            }
        }

        /* Verificar conversión: primero capa 1 (misma dimensión), luego cross-dimension */
        var canDirect = UNIT_CONVERTER.canConvert(stockUnit, recipeUnit);
        var canCross  = !canDirect && (UNIT_CONVERTER.convertCross(1, stockUnit, recipeUnit, prod) !== null);

        if (!canDirect && !canCross) {
            return { stockQty: stockQty, stockUnit: stockUnit, canConvert: false, status: 'incompatible' };
        }

        return { stockQty: stockQty, stockUnit: stockUnit, canConvert: true, status: 'ok' };
    }

    function calcViabilidad(receta, qtyRecetas) {
        qtyRecetas = qtyRecetas || 1;
        var result = { viable: true, maxProducible: Infinity, limitante: null, ingredients: [] };

        if (!receta || !receta.ingredients || receta.ingredients.length === 0) {
            result.maxProducible = 0;
            result.viable = false;
            return result;
        }

        // yields = cuántas porciones produce una preparación completa de la receta
        var yields = (receta.yields && receta.yields > 0) ? receta.yields : 1;

        for (var i = 0; i < receta.ingredients.length; i++) {
            var ing = receta.ingredients[i];
            var info = resolveIngredientStock(ing.prod, ing.unit);

            /* Fix 1: qty null/undefined/NaN propaga NaN a todo el cálculo */
            var rawQty = (ing.qty !== null && ing.qty !== undefined && !isNaN(Number(ing.qty))) ? Number(ing.qty) : null;
            if (rawQty === null) {
                result.ingredients.push({ prod: ing.prod, neededQty: 0, neededUnit: ing.unit,
                    stockQty: info.stockQty, stockUnit: info.stockUnit,
                    canConvert: false, status: 'unknown', maxFromStock: 0 });
                continue;
            }

            var qtyPorPorcion = rawQty / yields;
            var ingR = {
                prod: ing.prod, neededQty: Math.round(qtyPorPorcion * qtyRecetas * 100) / 100, neededUnit: ing.unit,
                stockQty: info.stockQty, stockUnit: info.stockUnit,
                canConvert: info.canConvert, status: 'unknown', maxFromStock: 0
            };

            if (!info.canConvert || info.stockQty === null) {
                ingR.status = info.status;
                result.viable = false;
                result.ingredients.push(ingR);
                continue;
            }

            /* Fix 2: convertSmart capa 1+3. Si retorna null (sin densidad) → no_density, sin fallback inválido */
            var stockInRecipeUnit = UNIT_CONVERTER.convertSmart(info.stockQty, info.stockUnit, ing.unit, ing.prod);
            if (stockInRecipeUnit === null) {
                ingR.status = 'no_density';
                result.viable = false;
                result.ingredients.push(ingR);
                continue;
            }

            // maxPorciones = cuántas porciones se pueden hacer con el stock disponible
            var qtyRaw = qtyPorPorcion > 0 ? qtyPorPorcion / (ing.factor || 1) : 0;
            var maxPorciones = qtyRaw > 0 ? Math.floor(stockInRecipeUnit / qtyRaw) : Infinity;
            ingR.maxFromStock = maxPorciones;
            ingR.status = maxPorciones === 0 ? 'critical' : maxPorciones < (yields * 3) ? 'low' : 'ok';

            if (maxPorciones < result.maxProducible) {
                result.maxProducible = maxPorciones;
                result.limitante = ing.prod;
            }
            result.ingredients.push(ingR);
        }

        if (result.maxProducible === Infinity) result.maxProducible = 0;
        result.viable = result.maxProducible >= qtyRecetas;
        return result;
    }

    function _checkTodayPlanAlerts() {
        if (!CONFIG || !CONFIG.recetas) return [];
        var today = _getTodayStr();
        var plan = _getPlanDiario(today);
        var out = [];
        var items = plan.items || [];
        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            if (it.status === 'done' || it.status === 'cancelled') continue;
            var receta = CONFIG.recetas[it.recipe];
            if (!receta) continue;
            var restante = (it.qty_planned || 1) - (it.qty_done || 0);
            if (restante <= 0) continue;
            var viab = calcViabilidad(receta, restante);
            if (!viab.viable) {
                out.push({ recipe: it.recipe, maxProducible: viab.maxProducible, needed: restante });
            }
        }
        return out;
    }

    // ── Recetario: sort & view helpers ──────────────────────────────────────
    function _getRecetaSort() {
        return localStorage.getItem('fede_recipe_sort') || 'alpha-asc';
    }
    function _setRecetaSort(val) {
        localStorage.setItem('fede_recipe_sort', val);
    }
    function _getRecetaView() {
        return localStorage.getItem('fede_recipe_view') || 'list';
    }
    function _setRecetaView(val) {
        localStorage.setItem('fede_recipe_view', val);
    }
    function _sortRecetaNames(names) {
        var sort = _getRecetaSort();
        var sorted = names.slice();
        var recetas = CONFIG.recetas || {};
        if (sort === 'alpha-asc') {
            sorted.sort(function(a, b) { return a.localeCompare(b, 'es', {sensitivity:'base'}); });
        } else if (sort === 'alpha-desc') {
            sorted.sort(function(a, b) { return b.localeCompare(a, 'es', {sensitivity:'base'}); });
        } else if (sort === 'recent') {
            sorted.sort(function(a, b) {
                var ta = (recetas[a] && recetas[a].updatedAt) ? recetas[a].updatedAt : 0;
                var tb = (recetas[b] && recetas[b].updatedAt) ? recetas[b].updatedAt : 0;
                return tb - ta;
            });
        } else if (sort === 'uses') {
            sorted.sort(function(a, b) {
                var ua = (recetas[a] && recetas[a].useCount) ? recetas[a].useCount : 0;
                var ub = (recetas[b] && recetas[b].useCount) ? recetas[b].useCount : 0;
                return ub - ua;
            });
        }
        return sorted;
    }

    function _renderRecetaCards(names, recetas) {

        var view = _getRecetaView();
        var html = '';

        if (view === 'grid') {
            list.style.display = 'grid';
            list.style.flexDirection = '';
            list.style.gridTemplateColumns = 'repeat(2,1fr)';
            list.style.gap = '10px';
            list.style.padding = '12px 16px 88px';

            for (var i = 0; i < sorted.length; i++) {
                var name = sorted[i];
                var r = recetas[name];

                var ingCount = (r && r.ingredients) ? r.ingredients.length : 0;
                var meta = ingCount + ' ingrediente' + (ingCount !== 1 ? 's' : '');

                if (hasPhoto) {
                    html +=

                            '<div class="receta-grid-card-body">' +
                                '<div class="receta-grid-card-title">' + FeDe_Utils.sanitize(name) + '</div>' +
                                '<div class="receta-grid-card-meta">' + meta + '</div>' +
                            '</div>' +
                        '</div>';
                } else {
                    html +=
                        '<div class="receta-grid-card no-photo" onclick="openRecetaDetail(\'' + safe + '\')">' +

                                '<i data-lucide="' + iconName + '" style="width:34px;height:34px;stroke-width:1.5;color:var(--primary);opacity:0.7;"></i>' +

                                '<div class="receta-grid-card-meta">' + meta + '</div>' +
                            '</div>' +
                        '</div>';
                }
            }
            list.innerHTML = html;
            if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [list] });

        } else {
            list.style.display = 'flex';
            list.style.flexDirection = 'column';
            list.style.gridTemplateColumns = '';

            list.style.padding = '12px 16px 88px';

                    : '<div class="receta-list-icon"><i data-lucide="' + iconR + '" style="width:26px;height:26px;stroke-width:1.5;color:var(--primary);"></i></div>';

                html +=
                    '<div class="receta-list-card" onclick="openRecetaDetail(\'' + safer + '\')">' +

    function filterRecetarios(query) {
        var recetas = CONFIG.recetas || {};
        var all = Object.keys(recetas);
        if (!query || !query.trim()) {
            _renderRecetaCards(all, recetas);
            return;
        }
        var q = query.trim().toLowerCase();
        var filtered = [];
        for (var i = 0; i < all.length; i++) {
            if (all[i].toLowerCase().indexOf(q) !== -1) filtered.push(all[i]);
        }
        // También filtrar por ingredientes
        for (var j = 0; j < all.length; j++) {
            var n = all[j];
            if (filtered.indexOf(n) !== -1) continue;
            var ings = (recetas[n].ingredients || []);
            for (var k = 0; k < ings.length; k++) {
                if (ings[k].prod && ings[k].prod.toLowerCase().indexOf(q) !== -1) {
                    filtered.push(n);
                    break;
                }
            }
        }
        _renderRecetaCards(filtered, recetas);
    }

    function _addIngredientRow(data) {
